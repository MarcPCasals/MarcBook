    <!-- LOGICA FIREBASE: EVENT GLOBALS I MODULE -->
    <script>
        // Sistema de pont entre Firebase i React
        window.loadedDades = null;
        window.isDataLoaded = false;
        window.inicialitzarDades = function(dades) {
            window.loadedDades = dades;
            window.isDataLoaded = true;
            window.dispatchEvent(new CustomEvent('dadesCarregades'));
        };
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDocs, collection, deleteDoc, query, orderBy, limit, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAoUM58SRUMEFlCFm56jzI7eTU9QB-JxBE",
          authDomain: "eines-docents.firebaseapp.com",
          projectId: "eines-docents",
          storageBucket: "eines-docents.firebasestorage.app",
          messagingSenderId: "80852705741",
          appId: "1:80852705741:web:375c1a3dfd2ae2466c6484",
          measurementId: "G-JJ73JJ3DQX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        window.login = async function() {
          await signInWithPopup(auth, provider);
        };

        window.logout = async function() {
          await signOut(auth);
        };

        onAuthStateChanged(auth, (user) => {
          if (user) {
            currentUser = user;
            document.getElementById("userInfo").textContent = user.email;
            document.getElementById("userInfo").style.display = "block";
            document.getElementById("loginBtn").style.display = "none";
            document.getElementById("logoutBtn").style.display = "flex";

            carregarDades();
          } else {
            currentUser = null;
            document.getElementById("userInfo").textContent = "";
            document.getElementById("userInfo").style.display = "none";
            document.getElementById("loginBtn").style.display = "flex";
            document.getElementById("logoutBtn").style.display = "none";
            
            window.inicialitzarDades([]);
          }
        });

        window.guardarDades = async function(dades) {
          if (!currentUser) return;
          
          if (!window.isDataLoaded) {
              console.warn("Guardat bloquejat: dades no carregades");
              return;
          }
          if (!dades || dades.length === 0) {
              console.warn("Guardat cancel·lat: dades buides");
              return;
          }
          if (window.loadedDades && dades.length < window.loadedDades.length * 0.5) {
              console.warn("Guardat cancel·lat: possible pèrdua de dades");
              return;
          }
          
          try {
              const subCollectionRef = collection(db, "avaluapro", currentUser.uid, "classes");
              const querySnapshot = await getDocs(subCollectionRef);
              
              if (!dades || dades.length === 0) return;
              if (dades.length < querySnapshot.size * 0.5) {
                  console.warn("Cancel·lat esborrat: possible pèrdua massiva");
                  return;
              }

              const dadesIds = dades ? dades.map(c => c.id) : [];
              
              const deletePromises = [];
              querySnapshot.forEach((documento) => {
                  if (!dadesIds.includes(documento.id)) {
                      deletePromises.push(deleteDoc(documento.ref));
                  }
              });
              await Promise.all(deletePromises);

              if (dades && dades.length > 0) {
                  const savePromises = dades.map((classe, index) => {
                      classe.orderIndex = index; 
                      const classId = classe.id || "class_" + Date.now() + Math.floor(Math.random() * 1000);
                      classe.id = classId;
                      const docRef = doc(db, "avaluapro", currentUser.uid, "classes", classId);
                      return setDoc(docRef, classe);
                  });
                  await Promise.all(savePromises);
              }
              
              window.loadedDades = dades;
          } catch(e) {
              console.error("Error en sincronitzar subcol·leccions:", e);
          }
        };
        
        window.guardarManualment = async function(classes) {
            if (!currentUser) {
                alert("No hi ha usuari autenticat");
                return;
            }

            try {
                const savePromises = classes.map((classe, index) => {
                    classe.orderIndex = index;
                    const classId = classe.id || "class_" + Date.now() + Math.floor(Math.random() * 1000);
                    classe.id = classId;
                    const docRef = doc(db, "avaluapro", currentUser.uid, "classes", classId);
                    return setDoc(docRef, classe);
                });
                await Promise.all(savePromises);
                alert("Dades guardades correctament en documents independents");
            } catch (error) {
                console.error("Error guardant:", error);
                alert("Error en guardar dades");
            }
        };

        window.esborrarDadesFirebase = async function() {
            if (!currentUser) return;
            try {
                const subCollectionRef = collection(db, "avaluapro", currentUser.uid, "classes");
                const querySnapshot = await getDocs(subCollectionRef);
                const deletePromises = [];
                querySnapshot.forEach((documento) => {
                    deletePromises.push(deleteDoc(documento.ref));
                });
                await Promise.all(deletePromises);
                
                await deleteDoc(doc(db, "avaluapro", currentUser.uid));
            } catch(e) {
                console.error("Error esborrant col·lecció completa", e);
            }
        };

        async function carregarDades() {
          if (!currentUser) return;

          try {
              const classesRef = collection(db, "avaluapro", currentUser.uid, "classes");
              const snap = await getDocs(classesRef);

              if (!snap.empty) {
                  const classesCarregades = [];
                  snap.forEach((doc) => {
                      classesCarregades.push(doc.data());
                  });
                  classesCarregades.sort((a, b) => (a.orderIndex || 0) - (b.orderIndex || 0));
                  window.inicialitzarDades(classesCarregades);
              } else {
                  let backupData = [];
                  try {
                      const localBackupStr = localStorage.getItem('evalApp_data_v2');
                      if (localBackupStr) {
                          backupData = JSON.parse(localBackupStr);
                      }
                  } catch(e) {
                      console.error("No s'ha pogut llegir el backup local", e);
                  }
                  
                  window.inicialitzarDades(backupData || []);
              }
          } catch (error) {
              console.error("Error carregant les dades inicials:", error);
              window.inicialitzarDades([]);
          }
        }

        window.createAvaluaproBackupCloud = async function(data, tipus) {
            if (!currentUser) throw new Error("No user autenticat");

            if (!data || data.length === 0) {
                throw new Error("No hi ha dades per fer backup");
            }

            const now = new Date();
            const timestamp = now.toLocaleDateString('ca-ES') + ' a les ' + now.toLocaleTimeString('ca-ES', {hour: '2-digit', minute:'2-digit'});
            const backupId = "backup_" + Date.now();

            console.log("Classes a guardar:", data.length);
            console.log("Backup ID:", backupId);

            const backupObj = {
                id: backupId,
                timestamp: timestamp,
                tipus: tipus,
                timeMs: Date.now(),
                totalClasses: data.length
            };

            try {
                const docRef = doc(db, "avaluapro_backups", currentUser.uid, "backups", backupId);
                await setDoc(docRef, backupObj);
                
                const savePromises = data.map((classe) => {
                    const classId = classe.id || "class_" + Date.now() + Math.floor(Math.random() * 1000);
                    classe.id = classId;
                    const classRef = doc(db, "avaluapro_backups", currentUser.uid, "backups", backupId, "classes", classId);
                    return setDoc(classRef, classe);
                });
                await Promise.all(savePromises);
                
                await window.netejarBackupsAntics();
                return true;
            } catch(e) {
                console.error("Error creant backup al núvol:", e);
                throw e;
            }
        };

        window.netejarBackupsAntics = async function() {
            if (!currentUser) return;
            try {
                const backupsRef = collection(db, "avaluapro_backups", currentUser.uid, "backups");
                const qLimit = query(backupsRef, orderBy("timeMs", "desc"));
                const snap = await getDocs(qLimit);
                let count = 0;
                const deletePromises = [];
                snap.forEach((documento) => {
                    count++;
                    if (count > 20) {
                        deletePromises.push(deleteDoc(documento.ref));
                    }
                });
                await Promise.all(deletePromises);
            } catch(e) {
                console.error("Error netejant backups antics:", e);
            }
        };

        window.loadBackups = async function() {
            if (!currentUser) return [];
            try {
                const backupsRef = collection(db, "avaluapro_backups", currentUser.uid, "backups");
                const q = query(backupsRef, orderBy("timeMs", "desc"), limit(20));
                const snap = await getDocs(q);
                
                const backups = [];
                snap.forEach(docSnap => {
                    backups.push(docSnap.data());
                });
                return backups;
            } catch (error) {
                console.error("Error carregant backups:", error);
                return [];
            }
        };

        window.restoreFromBackup = async function(backupId) {
            if (!currentUser) return;
            
            const backups = await window.loadBackups();
            const backupToRestore = backups.find(b => b.id === backupId);
            
            if (!backupToRestore) {
                alert("Error: No s'ha trobat el backup o les dades estan corruptes.");
                return;
            }

            if (confirm(`⚠️ ATENCIÓ: Segur que vols restaurar el backup del ${backupToRestore.timestamp}? \nAixò substituirà TOTES les dades actuals i es farà un guardat immediat.`)) {
                try {
                    await window.createAvaluaproBackupCloud(window.loadedDades, "pre-restore");
                    
                    const classesSnap = await getDocs(collection(db, "avaluapro_backups", currentUser.uid, "backups", backupId, "classes"));
                    const classesToRestore = [];
                    classesSnap.forEach(doc => classesToRestore.push(doc.data()));
                    
                    let dadesFinals = classesToRestore;
                    if (classesToRestore.length === 0 && backupToRestore.dades) {
                        dadesFinals = typeof backupToRestore.dades === 'string' ? JSON.parse(backupToRestore.dades) : backupToRestore.dades;
                    }
                    
                    if (!dadesFinals || dadesFinals.length === 0) {
                        alert("Error: No hi ha dades al backup per restaurar.");
                        return;
                    }

                    window.loadedDades = dadesFinals; 
                    await window.guardarDades(dadesFinals);
                    alert("Dades restaurades correctament. L'aplicació es recarregarà.");
                    window.location.reload();
                } catch(e) {
                    console.error("Error durant la restauració:", e);
                    alert("Hi ha hagut un error en restaurar el backup.");
                }
            }
        };

        window.forcarBackupNuvol = function(currentData) {
            if (!window.isDataLoaded) {
                alert("Bloquejat: dades no carregades");
                return;
            }

            if (!currentData || currentData.length === 0) {
                alert("No hi ha dades per fer backup");
                return;
            }

            window.createAvaluaproBackupCloud(currentData, "manual")
                .then(() => {
                    alert("✅ Backup manual creat correctament");
                    window.dispatchEvent(new Event('cloudBackupUpdated'));
                })
                .catch(err => {
                    console.error(err);
                    alert("❌ Error real creant backup");
                });
        };

        window.descarregarBackupIndividual = async function(backupId) {
            if (!currentUser) return;
            try {
                const backups = await window.loadBackups();
                const backup = backups.find(b => b.id === backupId);
                if (backup) {
                    const classesSnap = await getDocs(collection(db, "avaluapro_backups", currentUser.uid, "backups", backupId, "classes"));
                    const classesToRestore = [];
                    classesSnap.forEach(doc => classesToRestore.push(doc.data()));
                    
                    let dadesFinals = classesToRestore;
                    if (classesToRestore.length === 0 && backup.dades) {
                        dadesFinals = typeof backup.dades === 'string' ? JSON.parse(backup.dades) : backup.dades;
                    }

                    const now = new Date();
                    const dateStr = window.getLocalYYYYMMDD(now);
                    const timeStr = now.toLocaleTimeString('ca-ES', {hour: '2-digit', minute:'2-digit'}).replace(/:/g, '');
                    const filename = `AvaluaproBackup_${dateStr}_${timeStr}.json`;
                    window.downloadBackupJSON(JSON.stringify(dadesFinals), filename);
                }
            } catch(e) {
                console.error("Error descarregant el backup:", e);
            }
        };

        setInterval(() => {
            if (!currentUser || !window.isDataLoaded) return;
            
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            
            if (hours === 23 && minutes === 59 && now.getSeconds() < 5) {
                const todayStr = window.getLocalYYYYMMDD(now);
                const lastAuto = localStorage.getItem('avaluapro_lastAutoBackup');
                
                if (lastAuto !== todayStr) {
                    localStorage.setItem('avaluapro_lastAutoBackup', todayStr);
                    window.createAvaluaproBackupCloud(window.loadedDades, "auto");
                }
            }
        }, 1000);

        document.getElementById("loginBtn").onclick = window.login;
        document.getElementById("logoutBtn").onclick = window.logout;
    </script>

    <!-- --- FUNCIONS GLOBALS DE BACKUP --- -->
    <script>
        window.getLocalYYYYMMDD = (d) => {
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        window.downloadBackupJSON = (dataStr, filename) => {
            if (!dataStr) return;
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 100);
        };

        window.createAvaluaproBackup = (silent = false, customLabel = null, triggerDownload = false, currentData = null) => {
            if (!currentData || currentData === '[]') {
                if (!silent && !triggerDownload) alert("No hi ha dades actuals per guardar al backup.");
                return;
            }
            
            if (triggerDownload) {
                const now = new Date();
                const dateStrForFile = window.getLocalYYYYMMDD(now);
                const safeTime = now.toLocaleTimeString('ca-ES', {hour: '2-digit', minute:'2-digit'}).replace(/:/g, '');
                window.downloadBackupJSON(currentData, `AvaluaproBackup_${dateStrForFile}_${safeTime}.json`);
                if (!silent) alert("✅ Backup descarregat al teu dispositiu correctament.");
                return; 
            }
            
            let history = [];
            try {
                history = JSON.parse(localStorage.getItem('avaluaproBackupHistory')) || [];
                if (!Array.isArray(history)) history = [];
            } catch(e) { history = []; }
            
            if (history.length > 0 && history[0].data === currentData && silent) {
                return; 
            } else if (history.length > 0 && history[0].data === currentData && !silent) {
                if(!confirm("⚠️ Les dades actuals són idèntiques a l'últim backup. Vols crear una entrada duplicada de tota manera?")) return;
            }
            
            const now = new Date();
            const timestamp = now.toLocaleDateString('ca-ES') + ' a les ' + now.toLocaleTimeString('ca-ES', {hour: '2-digit', minute:'2-digit'});
            
            history.unshift({ 
                id: Date.now(), 
                timestamp: timestamp, 
                label: customLabel || (silent ? 'Còpia automàtica' : 'Còpia manual'), 
                data: currentData 
            });
            
            if (history.length > 10) history = history.slice(0, 10);
            
            localStorage.setItem('avaluaproBackupHistory', JSON.stringify(history));
            
            if (!silent) alert("✅ Backup creat correctament.");
            window.dispatchEvent(new Event('backupHistoryUpdated'));
        };
    </script>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Component } = React;

        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true };
            }

            componentDidCatch(error, errorInfo) {
                this.setState({ error: error, errorInfo: errorInfo });
                console.error("Error capturat per ErrorBoundary:", error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex flex-col items-center justify-center h-screen bg-red-50 text-red-800 p-8 text-center">
                            <h1 className="text-3xl font-bold mb-4">Ups! L'aplicació ha fallat.</h1>
                            <p className="mb-4 text-gray-700">Això passa perquè les teves dades antigues no coincideixen amb el nou disseny.</p>
                            <div className="bg-white p-4 rounded border border-red-200 w-full max-w-2xl overflow-auto mb-6 text-left shadow-sm">
                                <p className="font-bold text-red-600 mb-2">Codi de l'error:</p>
                                <pre className="text-xs text-gray-600">{this.state.error ? this.state.error.toString() : "Error desconegut"}</pre>
                            </div>
                            <button 
                                onClick={() => { 
                                    if(confirm("Atenció! Si continues, s'esborraran totes les dades emmagatzemades al núvol per aquest compte i l'eina es reiniciarà de fàbrica. Vols continuar?")) {
                                        if(window.guardarDades) window.guardarDades([]);
                                        window.location.reload(); 
                                    }
                                }} 
                                className="px-6 py-3 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700 shadow-lg transition-transform hover:scale-105"
                            >
                                <i className="fa-solid fa-trash-can mr-2"></i> Esborrar la memòria corrupta i Reiniciar
                            </button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const generateUUID = () => {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        };
        
        const compressImage = (file, maxWidth, callback) => {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new window.Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    if (width > maxWidth) {
                        height *= maxWidth / width;
                        width = maxWidth;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL(file.type || 'image/jpeg', 0.7));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        const createTransversalStructure = () => {
            return [
                { id: generateUUID(), name: "C1: Emprenedoria", color: "orange", criteria: [{id: generateUUID(), name: "Criteri 1", indicators: [{id: generateUUID(), name: "IA 1", description: ""}]}] },
                { id: generateUUID(), name: "C2: Gestió d'aprenentatge", color: "green", criteria: [{id: generateUUID(), name: "Criteri 1", indicators: [{id: generateUUID(), name: "IA 1", description: ""}]}] },
                { id: generateUUID(), name: "C3: Relacions positives", color: "purple", criteria: [{id: generateUUID(), name: "Criteri 1", indicators: [{id: generateUUID(), name: "IA 1", description: ""}]}] },
                { id: generateUUID(), name: "C4: Comunicació", color: "blue", criteria: [{id: generateUUID(), name: "Criteri 1", indicators: [{id: generateUUID(), name: "IA 1", description: ""}]}] }
            ];
        };

        const calculateGrade = (marks) => {
            if (!marks || marks.length === 0) return '';
            const validMarks = [];
            for (let i=0; i<marks.length; i++) {
                if (marks[i] === 'A' || marks[i] === 'B' || marks[i] === 'C' || marks[i] === 'D' || marks[i] === 'NA') {
                    validMarks.push(marks[i]);
                }
            }
            if (validMarks.length === 0) return '';
            
            let countA = 0, countB = 0, countC = 0, countD = 0, countNA = 0;
            let sum = 0;
            
            validMarks.forEach(m => { 
                if(m === 'A') { countA++; sum += 4; }
                else if(m === 'B') { countB++; sum += 3; }
                else if(m === 'C') { countC++; sum += 2; }
                else if(m === 'D') { countD++; sum += 1; }
                else if(m === 'NA') { countNA++; sum += 1; }
            });
            
            const total = validMarks.length;
            if ((countD + countNA) / total > 0.5) return 'D';
            
            const avg = sum / total;
            if (avg >= 3.5) return 'A';
            if (avg >= 2.5) {
                if ((countD > 0 || countNA > 0) && avg < 2.75) return 'C';
                return 'B';
            }
            if (avg > 1.5) return 'C';
            return 'D';
        };

        const calculateNumericAverage = (marks) => {
            if (!marks) return 0;
            const validMarks = marks.filter(m => m === 'A' || m === 'B' || m === 'C' || m === 'D' || m === 'NA');
            if (validMarks.length === 0) return 0;
            let sum = 0;
            validMarks.forEach(m => {
                if(m === 'A') sum += 4;
                if(m === 'B') sum += 3;
                if(m === 'C') sum += 2;
                if(m === 'D' || m === 'NA') sum += 1;
            });
            return (sum / validMarks.length);
        };

        const calculateMode = (marks) => {
             if (!marks) return '-';
             const validMarks = marks.filter(m => m === 'A' || m === 'B' || m === 'C' || m === 'D' || m === 'NA');
             if (validMarks.length === 0) return '-';
             const counts = { A: 0, B: 0, C: 0, D: 0, NA: 0 };
             validMarks.forEach(m => {
                 if (counts[m] !== undefined) counts[m]++;
             });
             let max = 0; 
             let mode = '-';
             for (const key in counts) {
                 if (counts.hasOwnProperty(key)) {
                     const value = counts[key];
                     if (value > max) { 
                         max = value; 
                         mode = key; 
                     } else if (value === max && max > 0) { 
                         mode += `, ${key}`; 
                     }
                 }
             }
             return mode;
        };

            if (!avg) return '-';
            if (avg >= 3.5) return 'A';
            if (avg >= 2.5) return 'B';

            return 'D';

                rows.forEach((rowVals, rOffset) => {

                    if (targetRow < newGrid.length) {
                        const newRow = [...newGrid[targetRow]];
                        rowVals.forEach((val, cOffset) => {
                            const targetCol = colIdx + cOffset;
                            if (targetCol < newRow.length) {
                                let cleanVal = val.trim().toUpperCase();
                                if(['A','B','C','D','NA'].includes(cleanVal) || cleanVal === '') newRow[targetCol] = cleanVal;
                            }
                        });
                        newGrid[targetRow] = newRow;
                    }
                });
                setGridData(newGrid);

                                                        <tr key={cName}>
