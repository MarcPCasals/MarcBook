                                                            <td className="p-2 text-center"><span className={`px-2 py-0.5 rounded font-bold text-xs shadow-sm border ${getGradeColor(grade)}`}>{grade}</span></td>
                                                        </tr>
                                                    )
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="h-64 p-4">
                                        <ChartComponent type="radar" data={{ labels: labels, datasets:[{label:'Assoliment Actual', data:radarData, borderColor:'#4f46e5', backgroundColor: 'rgba(79, 70, 229, 0.2)'}] }} options={{scales:{r:{min:0, max:4, ticks: { display: false }}}, plugins:{legend:{display:false}}, animation:false}} />
                                    </div>
                                </div>
                            </div>

                            <div style={{pageBreakInside: 'avoid'}}>
                                <div className="flex justify-between items-center border-b pb-2 mb-4">
                                    <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2"><Icon name="layer-group" className="text-indigo-500"/> Altres Assignatures (Visió Global)</h3>
                                    <button data-html2canvas-ignore onClick={addSubject} className="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded hover:bg-indigo-200 font-bold transition"><Icon name="plus"/> Afegir Assignatura</button>
                                </div>
                                {subjects.length === 0 && <p className="text-sm text-gray-400 italic">No hi ha altres assignatures registrades.</p>}
                                <div className="space-y-4">
                                    {subjects.map(sub => (
                                        <div key={sub.id} className="bg-gray-50 border border-gray-200 rounded-xl p-4 relative group/sub">
                                            <button data-html2canvas-ignore onClick={() => removeSubject(sub.id)} className="absolute top-2 right-2 text-red-400 hover:text-red-600 opacity-0 group-hover/sub:opacity-100 transition"><Icon name="trash"/></button>
                                            <input value={sub.name} onChange={(e) => updateSubjectName(sub.id, e.target.value)} className="font-bold text-gray-800 bg-transparent border border-transparent hover:border-gray-300 focus:border-indigo-500 rounded px-1 w-2/3 outline-none mb-3" />
                                            <div className="space-y-2 pl-2 border-l-2 border-indigo-200">
                                                {sub.competencies.map(comp => (
                                                    <div key={comp.id} className="flex items-center gap-3 group/comp">
                                                        <button data-html2canvas-ignore onClick={() => removeSubComp(sub.id, comp.id)} className="text-red-300 hover:text-red-500 opacity-0 group-hover/comp:opacity-100 transition"><Icon name="xmark"/></button>
                                                        <input value={comp.name} onChange={(e) => updateSubComp(sub.id, comp.id, 'name', e.target.value)} className="flex-1 text-sm bg-transparent border border-transparent hover:border-gray-300 focus:border-indigo-500 rounded px-1 outline-none text-gray-700" placeholder="Nom de la competència..." />
                                                        <select value={comp.grade} onChange={(e) => updateSubComp(sub.id, comp.id, 'grade', e.target.value)} className={`w-14 text-center text-xs font-bold rounded outline-none p-1 border hover:border-gray-300 focus:border-indigo-500 appearance-none bg-transparent ${getGradeTextColor(comp.grade)}`}>
                                                            <option value="" className="text-gray-400">-</option><option value="A" className="text-green-600">A</option><option value="B" className="text-blue-600">B</option><option value="C" className="text-yellow-600">C</option><option value="D" className="text-red-600">D</option><option value="NA" className="text-gray-800">NA</option>
                                                        </select>
                                                    </div>
                                                ))}
                                                <button data-html2canvas-ignore onClick={() => addSubComp(sub.id)} className="text-xs text-indigo-500 hover:text-indigo-700 font-bold mt-2"><Icon name="plus"/> Afegir competència</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div style={{pageBreakInside: 'avoid'}}>
                                <h3 className="text-lg font-bold text-gray-800 border-b pb-2 mb-4 flex items-center gap-2"><Icon name="comment-dots" className="text-indigo-500"/> Comentari Genèric (Tutor/a)</h3>
                                <textarea value={profileComment} onChange={(e) => setProfileComment(e.target.value)} className="w-full h-32 p-3 bg-indigo-50/30 border border-indigo-100 rounded-lg text-sm text-gray-700 outline-none hover:border-indigo-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition resize-none" placeholder="Anotacions generals sobre el progrés competencial, actitud, objectius propers de l'alumne..."></textarea>
                            </div>
                        </div>
                    </div>
                </Modal>
            );
        };

        const App = () => {
            const [history, setHistory] = useState([]);
            const [historyIndex, setHistoryIndex] = useState(-1);
            const [isReady, setIsReady] = useState(false);
            const [hasLoadedFromFirebase, setHasLoadedFromFirebase] = useState(false);
            const lastLoadedDataStr = useRef(null);
            
            const [showCloudBackupModal, setShowCloudBackupModal] = useState(false);
            
            let classes = [];
            if (historyIndex >= 0 && historyIndex < history.length) {
                if (Array.isArray(history[historyIndex])) classes = history[historyIndex];
            }
            
            const classesRef = useRef(classes);
            useEffect(() => { classesRef.current = classes; }, [classes]);

            const [activeClassId, setActiveClassId] = useState(null);
            const [activeTab, setActiveTab] = useState('S1'); 
            const [activeHalfGroupFilter, setActiveHalfGroupFilter] = useState("");
            
            const [showResetModal, setShowResetModal] = useState(false);
            const [isEditingStructure, setIsEditingStructure] = useState(false);
            const [showWizard, setShowWizard] = useState(false);
            const [showNewClassModal, setShowNewClassModal] = useState(false);
            const [showEditClassModal, setShowEditClassModal] = useState(null);
            const [showManageStudents, setShowManageStudents] = useState(false);
            const [showHalfGroupsModal, setShowHalfGroupsModal] = useState(false);
            const [showSeatingChartsModal, setShowSeatingChartsModal] = useState(false);
            const [showStudentNotes, setShowStudentNotes] = useState(null); 
            const [showStudentProfile, setShowStudentProfile] = useState(null); 
            const [showGlobalNotes, setShowGlobalNotes] = useState(false);
            const [showCopyTable, setShowCopyTable] = useState(false);
            const [showSemesterStats, setShowSemesterStats] = useState(false);
            const [showBulkImport, setShowBulkImport] = useState(false);
            const [showStudentEvoModal, setShowStudentEvoModal] = useState(null);
            const [editingIndicatorDesc, setEditingIndicatorDesc] = useState(null); 
            const [showRiskModal, setShowRiskModal] = useState(null);
            const [isFilterOpen, setIsFilterOpen] = useState(false);
            const filterRef = useRef(null);
            const [visibleCompetencies, setVisibleCompetencies] = useState({});
            const [expandedComps, setExpandedComps] = useState({});

            useEffect(() => {
                const handleClickOutside = (e) => {
                    if (filterRef.current && !filterRef.current.contains(e.target)) setIsFilterOpen(false);
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            useEffect(() => {
                const initData = () => {
                    if (!window.isDataLoaded) return;
                    let parsed = window.loadedDades || [];
                    let initialData = [];

                    try { 
                        if (!Array.isArray(parsed)) parsed = [];
                        initialData = parsed.map(cls => {
                            let newCls = {...cls};
                            if (newCls.seatingChartMain === undefined) newCls.seatingChartMain = "";
                            if (!newCls.semesters || !Array.isArray(newCls.semesters)) {
                                newCls.semesters = [
                                    { id: 'S1', name: '1r Semestre', isActive: true, competencies: newCls.competencies ? newCls.competencies : [] },
                                    { id: 'S2', name: '2n Semestre', isActive: false, competencies: [] },
                                    { id: 'T1', name: 'Transversals 1', isActive: false, competencies: createTransversalStructure() },
                                    { id: 'T2', name: 'Transversals 2', isActive: false, competencies: createTransversalStructure() }
                                ];
                            } else {
                                let hasT1 = false; let hasT2 = false;
                                newCls.semesters.forEach(s => { if (s.id === 'T1') hasT1 = true; if (s.id === 'T2') hasT2 = true; });
                                if (!hasT1) newCls.semesters.push({ id: 'T1', name: 'Transversals 1', isActive: false, competencies: createTransversalStructure() });
                                if (!hasT2) newCls.semesters.push({ id: 'T2', name: 'Transversals 2', isActive: false, competencies: createTransversalStructure() });
                            }
                            if (!newCls.students) newCls.students = [];
                            if (!newCls.halfGroups) newCls.halfGroups = [];
                            return newCls;
                        });
                    } catch(e) { initialData = []; }
                    
                    setShowWizard(initialData.length === 0);
                    lastLoadedDataStr.current = JSON.stringify(initialData);
                    setHistory([initialData]); 
                    setHistoryIndex(0);
                    setActiveClassId(initialData.length > 0 ? initialData[0].id : null);
                    setHasLoadedFromFirebase(true);
                    setIsReady(true);
                };

                window.addEventListener('dadesCarregades', initData);
                if (window.isDataLoaded) initData();
                return () => window.removeEventListener('dadesCarregades', initData);
            }, []);

            useEffect(() => { 
                if (!hasLoadedFromFirebase || !classes) return;
                const currentDataStr = JSON.stringify(classes);
                if (currentDataStr === lastLoadedDataStr.current) return;

                try { 
                    if(window.guardarDades) window.guardarDades(classes); 
                    lastLoadedDataStr.current = currentDataStr;
                } catch(e) {}
            }, [classes, hasLoadedFromFirebase]);

            useEffect(() => { 
                if (classes && classes.length > 0) {
                    try { localStorage.setItem('evalApp_data_v2', JSON.stringify(classes)); } catch(e) {}
                }
            }, [classes]);

            useEffect(() => {
                const handleUserInteractionForBackup = () => {
                    const todayStr = window.getLocalYYYYMMDD ? window.getLocalYYYYMMDD(new Date()) : new Date().toISOString().split('T')[0];
                    const lastDownload = localStorage.getItem('lastAvaluaproAutoBackupDate');
                    
                    if (lastDownload !== todayStr) {
                        const currentDataStr = JSON.stringify(classesRef.current);
                        if (currentDataStr && currentDataStr.length > 10 && currentDataStr !== '[]') {
                            try {
                                document.removeEventListener('click', handleUserInteractionForBackup);
                                document.removeEventListener('keydown', handleUserInteractionForBackup);
                                document.removeEventListener('touchstart', handleUserInteractionForBackup);
                                localStorage.setItem('lastAvaluaproAutoBackupDate', todayStr);
                                if (window.createAvaluaproBackup) window.createAvaluaproBackup(true, 'Còpia automàtica diària', true, currentDataStr);
                            } catch (err) {}
                        }
                    }
                };

                document.addEventListener('click', handleUserInteractionForBackup, { passive: true });
                document.addEventListener('keydown', handleUserInteractionForBackup, { passive: true });
                document.addEventListener('touchstart', handleUserInteractionForBackup, { passive: true });
                return () => {
                    document.removeEventListener('click', handleUserInteractionForBackup);
                    document.removeEventListener('keydown', handleUserInteractionForBackup);
                    document.removeEventListener('touchstart', handleUserInteractionForBackup);
                };
            }, []);

            useEffect(() => { setActiveHalfGroupFilter(""); }, [activeClassId]);

            const updateClasses = (newClasses) => {
                let newHistory = historyIndex >= 0 ? history.slice(0, historyIndex + 1) : [];
                newHistory.push(newClasses);
                if (newHistory.length > 50) newHistory.shift(); 
                setHistory(newHistory); 
                setHistoryIndex(newHistory.length - 1);
            };

            const undo = () => { if (historyIndex > 0) setHistoryIndex(historyIndex - 1); };
            const redo = () => { if (historyIndex < history.length - 1) setHistoryIndex(historyIndex + 1); };
            
            const handleBackupBeforeReset = () => {
                const dataStr = JSON.stringify(classes, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "avaluapro_backup_" + new Date().toISOString().slice(0,10) + ".json";
                a.click();
                setTimeout(() => URL.revokeObjectURL(url), 100);
            };

            const handleConfirmReset = async () => {
                try {
                    if (window.esborrarDadesFirebase) await window.esborrarDadesFirebase();
                    localStorage.removeItem('evalApp_data_v2');
                    setHistory([[]]);
                    setHistoryIndex(0);
                    setActiveClassId(null);
                    setShowResetModal(false);
                    setShowWizard(true);
                    lastLoadedDataStr.current = "[]";
                    alert("Nou curs iniciat. Les dades anteriors han estat esborrades.");
                } catch(e) {
                    alert("Hi ha hagut un error reiniciant el curs.");
                }
            };
            
            const resetAllData = () => setShowResetModal(true);

            let currentClass = null;
            if (classes && classes.length > 0 && activeClassId) {
                const found = classes.find(c => c.id === activeClassId);
                if (found) currentClass = found;
            }

            const isGlobalView = activeTab === 'GLOBAL';
            let currentSemester = null;
            if (currentClass && currentClass.semesters) {
                const foundSem = currentClass.semesters.find(s => s.id === activeTab);
                if (foundSem) currentSemester = foundSem;
            }

            const activeCompetencies = currentSemester && currentSemester.competencies ? currentSemester.competencies : [];
            const visibleCompsList = activeCompetencies.filter(c => { 
                const visibleSet = visibleCompetencies[activeClassId]; 
                if (!visibleSet || visibleSet.length === 0) return true;
                return visibleSet.includes(c.id); 
            });

            const saveStudentsList = (ns) => updateClasses(classes.map(c => c.id === activeClassId ? { ...c, students: ns } : c)); 
            const updateStudentNotes = (sid, notes) => updateClasses(classes.map(c => c.id === activeClassId ? { ...c, students: c.students.map(s => s.id === sid ? { ...s, notes: notes } : s) } : c)); 
            const updateStudentHalfGroup = (sid, hgId) => updateClasses(classes.map(c => c.id === activeClassId ? { ...c, students: c.students.map(s => s.id === sid ? { ...s, halfGroup: hgId } : s) } : c));
            const handleUpdateClass = (id, data) => updateClasses(classes.map(c => c.id === id ? { ...c, ...data } : c));
            const handleDeleteClass = (id) => { 
                const nc = classes.filter(c => c.id !== id); 
                updateClasses(nc); 
                if(nc.length > 0) setActiveClassId(nc[0].id);
                else { setActiveClassId(null); setShowWizard(true); } 
            };
            const handleCreateClass = (nc) => { updateClasses([...classes, nc]); setActiveClassId(nc.id); setShowWizard(false); };
            
            const updateMark = (sid, iid, val) => {
                updateClasses(classes.map(c => {
                    if (c.id !== activeClassId) return c;
                    
                    if (iid.startsWith('override_')) {
                        return { ...c, students: c.students.map(s => s.id === sid ? { ...s, marks: { ...(s.marks ? s.marks : {}), [iid]: val } } : s) };
                    }
                    
                    let parentCritId = null;
                    let parentCompId = null;
                    
                    if (c.semesters) {
                        c.semesters.forEach(sem => {
                            if (sem.competencies) {
                                sem.competencies.forEach(comp => {
                                    if (comp.criteria) {
                                        comp.criteria.forEach(crit => {
                                            if (crit.indicators && crit.indicators.some(i => i.id === iid)) {
                                                parentCritId = crit.id;
                                                parentCompId = comp.id;
                                            }
                                        });
                                    }
                                });
                            }
                        });
                    }

                    return {
                        ...c,
                        students: c.students.map(s => {
                            if (s.id !== sid) return s;
                            const newMarks = { ...(s.marks ? s.marks : {}), [iid]: val };
                            if (parentCritId) delete newMarks[`override_${parentCritId}`];
                            if (parentCompId) delete newMarks[`override_${parentCompId}`];
                            return { ...s, marks: newMarks };
                        })
                    };
                }));
            };
            
            const renameItem = (type, itemId, parentId, grandParentId) => {
                const newName = prompt("Nou nom:"); 
                if (!newName || newName.trim() === "") return;
                
                const newClasses = classes.map(c => { 
                    if (c.id !== activeClassId) return c; 
                    
                    if (type === 'comp') {
                        let oldName = "";
                        const currentSem = c.semesters.find(s => s.id === activeTab);
                        if (currentSem && currentSem.competencies) {
                            const compTarget = currentSem.competencies.find(x => x.id === itemId);
                            if (compTarget) oldName = compTarget.name;
                        }

                        return {
                            ...c,
                            semesters: c.semesters.map(s => ({
                                ...s,
                                competencies: (s.competencies ? s.competencies : []).map(x => (x.id === itemId || (oldName !== "" && x.name === oldName)) ? { ...x, name: newName } : x)
                            }))
                        };
                    }
                    
                    return { ...c, semesters: c.semesters.map(s => { 
                        if (s.id !== activeTab) return s; 
                        return {...s, competencies: s.competencies.map(comp => { 
                            if(type === 'crit') return {...comp, criteria: comp.criteria.map(x => x.id===itemId ? {...x, name:newName} : x)}; 
                            if(type === 'ind') return {...comp, criteria: comp.criteria.map(crit => ({...crit, indicators: crit.indicators.map(x => x.id===itemId ? {...x, name:newName} : x)}))}; 
                            return comp; 
                        })}; 
                    })}; 
                });
                updateClasses(newClasses);
            };

            const deleteItem = (type, itemId, parentId, grandParentId) => {
                if(!confirm("Segur que vols esborrar-ho? Es perdran les notes associades.")) return;
                const newClasses = classes.map(c => { 
                    if (c.id !== activeClassId) return c; 
                    return { ...c, semesters: c.semesters.map(s => { 
                        if (s.id !== activeTab) return s; 
                        if(type === 'comp') return {...s, competencies: s.competencies.filter(x => x.id !== itemId)}; 
                        return {...s, competencies: s.competencies.map(comp => { 
                            if(type === 'crit' && comp.id === parentId) return {...comp, criteria: (comp.criteria || []).filter(x => x.id !== itemId)}; 
                            if(type === 'ind' && comp.id === grandParentId) return {...comp, criteria: (comp.criteria || []).map(crit => crit.id === parentId ? {...crit, indicators: (crit.indicators || []).filter(x => x.id !== itemId)} : crit)}; 
                            return comp; 
                        })}; 
                    })}; 
                });
                updateClasses(newClasses);
            };

            const addStructureItem = (type, parentId, grandParentId) => {
                let name = prompt("Nom del nou element:"); 
                if(!name || name.trim() === "") {
                    if (type === 'comp') name = "Nova Competència";
                    if (type === 'crit') name = "Nou Criteri";
                    if (type === 'ind') name = "Nou IA";
                }
                const newClasses = classes.map(c => { 
                    if (c.id !== activeClassId) return c; 
                    return { ...c, semesters: c.semesters.map(s => { 
                        if (s.id !== activeTab) return s; 
                        if(type === 'comp') { 
                            const color = COMP_COLORS_ORDER[s.competencies.length % COMP_COLORS_ORDER.length]; 
                            return {...s, competencies: [...s.competencies, {id:generateUUID(), name: name, color: color, criteria:[]}]}; 
                        } 
                        return {...s, competencies: s.competencies.map(comp => { 
                            if(type === 'crit' && comp.id === parentId) return {...comp, criteria: [...(comp.criteria || []), {id:generateUUID(), name: name, indicators:[{id:generateUUID(), name: "IA 1", description: ""}]}]}; 
                            if(type === 'ind' && comp.id === grandParentId) return {...comp, criteria: (comp.criteria || []).map(crit => crit.id === parentId ? {...crit, indicators: [...(crit.indicators || []), {id:generateUUID(), name: name, description: ""}]} : crit)}; 
                            return comp; 
                        })}; 
                    })}; 
                });
                updateClasses(newClasses);
            };
            
            const handleCopyTable = (targetId, compIds) => {
                const sourceComps = currentSemester.competencies.filter(c => compIds.includes(c.id));
                const clonedComps = sourceComps.map(c => ({ 
                    ...c, id: generateUUID(), criteria: (c.criteria || []).map(k => ({ ...k, id: generateUUID(), indicators: (k.indicators || []).map(i => ({ ...i, id: generateUUID() })) })) 
                }));

                const newClasses = classes.map(c => { 
                    if (c.id !== targetId) return c; 
                    return { ...c, semesters: c.semesters.map(s => { 
                        if (s.id !== activeTab) return s; 
                        let newComps = [...(s.competencies || [])]; 
                        clonedComps.forEach(clone => { 
                            const idx = newComps.findIndex(nc => nc.name === clone.name); 
                            if (idx !== -1) newComps[idx] = clone; else newComps.push(clone); 
                        }); 
                        return { ...s, competencies: newComps }; 
                    }) }; 
                });
                updateClasses(newClasses);
                alert("Estructura copiada amb èxit!");
            };

            const getFlatIndicators = (comps) => {
                let list = [];
                comps.forEach(c => { if(c.criteria) c.criteria.forEach(crit => { if(crit.indicators) crit.indicators.forEach(i => list.push(i)); }); });
                return list;
            };

            const handleBulkImportSave = (gridData) => {
                const flatInds = getFlatIndicators(visibleCompsList);
                const updated = currentClass.students.map((s, r) => { 
                    const marks = s.marks ? {...s.marks} : {}; 
                    if(gridData[r]) gridData[r].forEach((val, c) => { if(c < flatInds.length && val) marks[flatInds[c].id] = val; }); 
                    return {...s, marks}; 
                });
                updateClasses(classes.map(c => c.id === activeClassId ? {...c, students: updated} : c));
            };

            const saveIndicatorDescription = (desc) => {
                if(!editingIndicatorDesc) return;
                const { id, compId, critId } = editingIndicatorDesc;
                const newClasses = classes.map(c => {
                    if(c.id !== activeClassId) return c;
                    return {
                        ...c,
                        semesters: c.semesters.map(s => {
                            if(s.id !== activeTab) return s;
                            return {
                                ...s,
                                competencies: s.competencies.map(comp => {
                                    if(comp.id !== compId) return comp;
                                    return {
                                        ...comp,
                                        criteria: (comp.criteria || []).map(crit => {
                                            if(crit.id !== critId) return crit;
                                            return { ...crit, indicators: (crit.indicators || []).map(ind => ind.id !== id ? ind : {...ind, description: desc}) }
                                        })
                                    }
                                })
                            }
                        })
                    };
                });
                updateClasses(newClasses);
                setEditingIndicatorDesc(null);
            };

            const handleExportExcel = () => {
                if(!currentClass) return; 
                const headers = ["Alumne"]; const subH = [""]; 
                visibleCompsList.forEach(c => { 
                    if(c.criteria) {
                        c.criteria.forEach(k => { 
                            if(k.indicators) k.indicators.forEach(i => { headers.push(c.name); subH.push(`${k.name}-${i.name}`); }); 
                            headers.push(c.name); subH.push('Nota '+k.name); 
                        }); 
                    }
                    headers.push(c.name); subH.push('FINAL'); 
                }); 
                
                const d = [headers, subH]; 
                if(currentClass.students) {
                    const studentsToExport = activeHalfGroupFilter ? currentClass.students.filter(s => s.halfGroup === activeHalfGroupFilter) : currentClass.students;
                    studentsToExport.forEach(s => { 
                        const r = [s.name]; 
                        visibleCompsList.forEach(c => { 
                            let cm = []; 
                            if(c.criteria) {
                                c.criteria.forEach(k => { 
                                    let km = []; 
                                    if(k.indicators) k.indicators.forEach(i => { const v = (s.marks && s.marks[i.id]) ? s.marks[i.id] : ""; r.push(v); if(v) km.push(v); }); 
                                    const g = (s.marks && s.marks[`override_${k.id}`]) || calculateGrade(km);
                                    r.push(g); if(g) cm.push(g); 
                                }); 
                            }
                            r.push((s.marks && s.marks[`override_${c.id}`]) || calculateGrade(cm)); 
                        }); 
                        d.push(r); 
                    }); 
                }
                const wb = window.XLSX.utils.book_new(); 
                window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(d), currentClass.name.substring(0,31)); 
                window.XLSX.writeFile(wb, `avaluacio_${currentClass.name}.xlsx`); 
            };

            const handleExportJSON = () => {
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(JSON.stringify(classes));
                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', `avaluapro_backup_${new Date().toISOString().slice(0,10)}.json`);
                linkElement.click();
            };

            const handleImportJSON = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!confirm("Atenció: En carregar aquest arxiu se sobreescriurà l'estat actual i es guardarà al núvol. Estàs segur?")) { e.target.value = null; return; }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const parsed = JSON.parse(ev.target.result);
                        if (Array.isArray(parsed)) window.inicialitzarDades(parsed); else alert("L'arxiu no té un format vàlid per a AvaluaPro.");
                    } catch (err) { alert("Error llegint l'arxiu JSON."); }
                };
                reader.readAsText(file);
                e.target.value = null; 
            };

            const renderGlobalDashboard = () => { 
                if (!currentClass || !currentClass.semesters) return <div className="p-10 text-center text-gray-500 font-bold text-xl">Sense dades suficients.</div>;
                
                const studentStats = {}; const criteriaStats = { S1: {}, S2: {} }; const compStats = {};
                const semesterCounts = { S1: {A:0,B:0,C:0,D:0}, S2: {A:0,B:0,C:0,D:0} };
                const semesterCompCounts = { S1: {}, S2: {} }; const progressMap = []; 

                try {
                    currentClass.semesters.forEach(sem => {
                        if (sem.id !== 'S1' && sem.id !== 'S2') return;
                        if (sem.competencies) sem.competencies.forEach(comp => { if(!compStats[comp.name]) compStats[comp.name] = { name: comp.name, grades: [], color: comp.color }; });
                        if(!semesterCompCounts[sem.id]) semesterCompCounts[sem.id] = {};
                        Object.keys(compStats).forEach(cName => { if(!semesterCompCounts[sem.id][cName]) semesterCompCounts[sem.id][cName] = { A:0, B:0, C:0, D:0 }; });
                        if(!semesterCounts[sem.id]) semesterCounts[sem.id] = {A:0,B:0,C:0,D:0};
                        
                        if (sem.competencies) {
                            sem.competencies.forEach(comp => {
                                if(!criteriaStats[sem.id][comp.name]) criteriaStats[sem.id][comp.name] = [];
                                if(comp.criteria) {
                                    comp.criteria.forEach(crit => {
                                        let cStats = { name: crit.name, compName: comp.name, counts: {A:0,B:0,C:0,D:0} };
                                        (currentClass.students || []).forEach(s => {
                                            let marks = []; 
                                            if(crit.indicators) crit.indicators.forEach(i => { if(s.marks && s.marks[i.id]) marks.push(s.marks[i.id]); });
                                            const g = (s.marks && s.marks[`override_${crit.id}`]) || calculateGrade(marks);
                                            if(g && g !== 'NA') cStats.counts[g]++;
                                        });
                                        criteriaStats[sem.id][comp.name].push(cStats);
                                    });
                                }
                            });
                        }
                    });

                    let assolit = 0; let proces = 0; let noAssolit = 0;
                    let riskStudentsList = []; let attentionStudentsList = [];

                    (currentClass.students || []).forEach(s => {
                        studentStats[s.id] = { name: s.name, timePoints: [], radarFirst: {}, radarLast: {}, finalAvg: 0, studentId: s.id };
                        let allG = [];
                        
                        currentClass.semesters.forEach(sem => {
                            if (sem.id !== 'S1' && sem.id !== 'S2') return;
                            let semG = [];
                            if (sem.competencies) {
                                sem.competencies.forEach(comp => {
                                    let compMarks = []; 
                                    if(comp.criteria) {
                                        comp.criteria.forEach(c => {
                                            let critMarks = [];
                                            if(c.indicators) c.indicators.forEach(i => { if(s.marks && s.marks[i.id]) critMarks.push(s.marks[i.id]); }); 
                                            const cg = (s.marks && s.marks[`override_${c.id}`]) || calculateGrade(critMarks);
                                            if (cg) compMarks.push(cg);
                                        });
                                    }
                                    
                                    const finalCompGrade = (s.marks && s.marks[`override_${comp.id}`]) || calculateGrade(compMarks);
                                    if(finalCompGrade) { 
                                        const n = getNumericFromGrade(finalCompGrade); 
                                        allG.push(n); semG.push(n); 
                                        if(!studentStats[s.id].radarFirst[comp.name]) studentStats[s.id].radarFirst[comp.name] = n; 
                                        studentStats[s.id].radarLast[comp.name] = n; 
                                        compStats[comp.name].grades.push(n);

                                        let displayGrade = finalCompGrade === 'NA' ? 'D' : finalCompGrade; 
                                        if (['A', 'B', 'C', 'D'].includes(displayGrade)) {
                                            semesterCounts[sem.id][displayGrade]++;
                                            semesterCompCounts[sem.id][comp.name][displayGrade]++;
                                        }
                                    }
                                });
                            }
                            if(semG.length > 0) studentStats[s.id].timePoints.push(semG.reduce((a,b)=>a+b,0)/semG.length);
                        });
                        
                        const finalAvg = allG.length ? allG.reduce((a,b)=>a+b,0)/allG.length : 0;
                        studentStats[s.id].finalAvg = finalAvg;

                        if (finalAvg >= 2.5) assolit++;
                        else if (finalAvg > 1.5) { proces++; attentionStudentsList.push({ id: s.id, name: s.name, finalAvg }); }
                        else if (finalAvg > 0) { noAssolit++; riskStudentsList.push({ id: s.id, name: s.name, finalAvg }); }
                    });

                    currentClass.semesters.forEach(sem => {
                        if (sem.id !== 'S1' && sem.id !== 'S2') return;
                        let semSum = 0; let semCount = 0;
                        if (sem.competencies) {
                            sem.competencies.forEach(comp => {
                                (currentClass.students || []).forEach(s => {
                                    let compMarks = []; 
                                    if(comp.criteria) {
                                        comp.criteria.forEach(c => {
                                            let critMarks = [];
                                            if(c.indicators) c.indicators.forEach(i => { if(s.marks && s.marks[i.id]) critMarks.push(s.marks[i.id]); }); 
                                            const cg = (s.marks && s.marks[`override_${c.id}`]) || calculateGrade(critMarks);
                                            if (cg) compMarks.push(cg);
                                        });
                                    }
                                    const fg = (s.marks && s.marks[`override_${comp.id}`]) || calculateGrade(compMarks);
                                    if (fg) { semSum += getNumericFromGrade(fg); semCount++; }
                                });
                            });
                        }
                        if (semCount > 0) progressMap.push(semSum / semCount);
                    });

                    Object.keys(compStats).forEach(k => {
                        const c = compStats[k];
                        c.avg = c.grades.length ? c.grades.reduce((a,b)=>a+b,0)/c.grades.length : 0;
                    });

                    const compAvgs = Object.keys(compStats).map(k => compStats[k].avg); 
                    const range = compAvgs.length > 1 ? Math.max(...compAvgs) - Math.min(...compAvgs) : 0;
                    
                    let iecgLevel = range > 1.5 ? '🔴 Desequilibri important' : range > 0.8 ? '🟠 Desenvolupament desigual' : '🟢 Grup equilibrat'; 
                    let sortedByAvg = Object.keys(compStats).filter(k => compStats[k].grades.length > 0).map(k => compStats[k]).sort((a,b)=>a.avg-b.avg);
                    const worstComp = sortedByAvg.length > 0 ? sortedByAvg[0] : null;
                    const bestComp = sortedByAvg.length > 0 ? sortedByAvg[sortedByAvg.length-1] : null;

                    let iecgExplanation = "Nivells similars en totes les competències.";
                    if (worstComp && bestComp && range > 0.5) iecgExplanation = `Desequilibri de ${range.toFixed(2)} punts entre la més alta (${bestComp.name}: ${bestComp.avg.toFixed(2)}) i la més baixa (${worstComp.name}: ${worstComp.avg.toFixed(2)}).`;

                    let compNamesSet = [];
                    currentClass.semesters.forEach(sem => {
                        if (sem.id === 'S1' || sem.id === 'S2') {
                            if(sem.competencies) sem.competencies.forEach(c => { if (!compNamesSet.includes(c.name)) compNamesSet.push(c.name); });
                        }
                    });

                    const stats = { 
                        studentStats, criteriaStats, compStats, bestComp, worstComp, semesterCounts, semesterCompCounts,
                        iecg: { range, level: iecgLevel }, iecgExplanation, progressMap, 
                        achievement: { assolit, proces, noAssolit, total: assolit+proces+noAssolit, riskStudents: riskStudentsList, attentionStudents: attentionStudentsList },
                        allCompNames: compNamesSet
                    };

                    const handleToggleComp = (name) => setExpandedComps(prev => ({...prev, [name]: !prev[name]})); 

                    return (
                        <div className="p-6 space-y-6 pb-20">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2"><Icon name="scale-balanced" className="text-blue-500"/> Comparativa de Notes per Competències (1r vs 2n Semestre)</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    {['A', 'B', 'C', 'D'].map(grade => {
                                        const styleClass = getGradeColor(grade);
                                        const [bgLight, textDark, borderClass] = styleClass.split(' '); 
                                        
                                        return (
                                            <div key={grade} className={`rounded-xl border-2 ${borderClass} bg-white shadow-sm overflow-hidden flex flex-col`}>
                                                <div className={`${bgLight} ${textDark} text-center py-3 border-b ${borderClass}`}><div className="text-3xl font-black">{grade}</div></div>
                                                <div className="flex-1 grid grid-cols-2 divide-x divide-gray-100">
                                                    {['S1', 'S2'].map((semId, i) => {
                                                        const totalForGrade = stats.semesterCounts[semId] ? stats.semesterCounts[semId][grade] : 0;
                                                        return (
                                                            <div key={semId} className="p-3 bg-gray-50/50 hover:bg-gray-50 transition">
                                                                <div className="text-center font-bold text-gray-700 border-b border-gray-200 pb-1 mb-2">{i===0 ? '1r Sem' : '2n Sem'} ({totalForGrade})</div>
                                                                <div className="space-y-1.5 mt-2">
                                                                    {stats.semesterCompCounts[semId] && Object.keys(stats.semesterCompCounts[semId]).map(cName => {
                                                                        const counts = stats.semesterCompCounts[semId][cName];
                                                                        if (counts[grade] > 0) return (<div key={cName} className="flex justify-between text-[11px] items-center pb-1 border-b border-gray-100 last:border-0"><span className="text-gray-600 font-medium pr-2 text-left">{cName}</span><span className={`font-bold px-1.5 rounded ${bgLight} ${textDark}`}>{counts[grade]}</span></div>);
                                                                        return null;
                                                                    })}
                                                                    {totalForGrade === 0 && <div className="text-center text-xs text-gray-400 py-2">-</div>}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl shadow-lg border border-indigo-100 overflow-hidden">
                                <div className="bg-indigo-600 px-6 py-4 text-white flex justify-between items-center">
                                    <div><h3 className="font-bold text-xl">Diagnòstic Global de Classe</h3><p className="text-sm opacity-90">En què he d’intervenir? El grup avança equilibradament?</p></div>
                                    <Icon name="stethoscope" className="text-3xl opacity-50"/>
                                </div>
                                <div className="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                    <div className="bg-gray-50 p-4 rounded-xl border border-gray-100 flex flex-col justify-center">
                                        <h4 className="font-bold text-gray-500 text-xs uppercase tracking-wider mb-2">Equilibri Competencial</h4>
                                        <div className="text-2xl font-black text-gray-800">{stats.iecg.level.split(' ')[0]}</div>
                                        <div className="text-sm font-bold text-gray-600 mb-3">{stats.iecg.level.substring(2)}</div>
                                        <div className="w-full bg-gray-200 rounded-full h-2 mb-2"><div className="h-2 rounded-full bg-blue-500" style={{width: `${Math.min(100, stats.iecg.range*25)}%`, backgroundColor: stats.iecg.range > 1.5 ? '#ef4444' : stats.iecg.range > 0.8 ? '#f97316' : '#22c55e'}}></div></div>
                                        <p className="text-xs text-gray-500 font-medium leading-tight">{stats.iecgExplanation}</p>
                                    </div>
                                    <div className="bg-gray-50 p-4 rounded-xl border border-gray-100 flex flex-col justify-center">
                                        <h4 className="font-bold text-gray-500 text-xs uppercase tracking-wider mb-2">Tendència Global</h4>
                                        <div className="h-24"><ChartComponent className="h-full" type="line" data={{labels: stats.progressMap.map((_, i) => `T${i+1}`), datasets: [{ data: stats.progressMap, borderColor: '#4f46e5', tension: 0.4, pointRadius: 4 }]}} options={{plugins: { legend: { display: false } }, scales: { y: { min: 1, max: 4, display: false }, x: { display: false } }, maintainAspectRatio: false}}/></div>
                                        <p className="text-xs text-center font-bold text-indigo-600 mt-2">{stats.progressMap.length > 1 ? (stats.progressMap[stats.progressMap.length-1] > stats.progressMap[0] ? "↗ Progrés Sostingut" : "↘ Estancament/Regressió") : "Dades insuficients"}</p>
                                    </div>
                                    <div className="bg-gray-50 p-4 rounded-xl border border-gray-100 flex flex-col justify-center">
                                        <h4 className="font-bold text-gray-500 text-xs uppercase tracking-wider mb-2">Nivells d'Assoliment</h4>
                                        <div className="flex h-24 items-center justify-center relative"><ChartComponent type="doughnut" className="h-full w-full" data={{labels: ['Assolit', 'Procés', 'No'], datasets: [{ data: [stats.achievement.assolit, stats.achievement.proces, stats.achievement.noAssolit], backgroundColor: ['#22c55e', '#eab308', '#ef4444'], borderWidth: 0 }]}} options={{ cutout: '75%', plugins: { legend: { display: false } }, maintainAspectRatio: false }}/><div className="absolute text-center z-10 flex flex-col items-center justify-center"><span className="text-[10px] text-gray-500 uppercase font-bold tracking-widest leading-none">Total</span><span className="font-black text-2xl text-gray-700 leading-tight">{stats.achievement.total}</span></div></div>
                                        <div className="flex justify-between items-center text-xs font-bold mt-3 px-2">
                                            <span className="text-green-600 bg-green-50 px-2 py-1 rounded border border-green-100 shadow-sm">High: {stats.achievement.total > 0 ? Math.round(stats.achievement.assolit/stats.achievement.total*100) : 0}%</span>
                                            <button onClick={() => setShowRiskModal(stats.achievement.riskStudents)} className="text-red-600 bg-red-50 px-2 py-1 rounded border border-transparent hover:border-red-200 hover:bg-red-100 transition shadow-sm cursor-pointer">
                                                Risc: {stats.achievement.total > 0 ? Math.round(stats.achievement.noAssolit/stats.achievement.total*100) : 0}%
                                            </button>
                                        </div>
                                    </div>
                                    <div className="bg-red-50 p-4 rounded-xl border border-red-200 flex flex-col justify-center text-center shadow-inner">
                                        <div className="w-12 h-12 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-3"><Icon name="triangle-exclamation" className="text-2xl"/></div>
                                        <h4 className="font-bold text-red-800 text-xs uppercase tracking-wider mb-2">Intervenció Prioritària</h4>
                                        <p className="font-black text-xl text-gray-900 leading-tight">{stats.worstComp ? stats.worstComp.name : "-"}</p>
                                        <div className="mt-2 inline-block bg-red-200 text-red-800 px-3 py-1 rounded-full text-xs font-bold">Mitjana: {stats.worstComp ? stats.worstComp.avg.toFixed(2) : '0.00'}</div>
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col">
                                    <div className="flex justify-between items-center mb-6">
                                        <div><h3 className="font-bold text-xl text-gray-800"><Icon name="user-graduate" className="text-blue-500 mr-2"/> Evolució Individual</h3><p className="text-sm text-gray-500">Com avança cada alumne?</p></div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto pr-2 custom-scroll" style={{maxHeight: "350px"}}>
                                        <table className="w-full text-sm">
                                            <thead className="bg-gray-50 sticky top-0 z-10">
                                                <tr className="text-gray-500 uppercase text-xs tracking-wider">
                                                    <th className="p-3 text-left rounded-tl">Alumne</th><th className="p-3 text-center">Nota Actual</th><th className="p-3 text-right rounded-tr">Detall</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-50">
                                                {Object.keys(stats.studentStats).map(k => {
                                                    const s = stats.studentStats[k];
                                                    return (
                                                        <tr key={s.name} className="hover:bg-blue-50/50 transition">
                                                            <td className="p-3 font-medium text-gray-700">{s.name}</td>
                                                            <td className="p-3 text-center font-bold text-gray-600">
                                                                {s.timePoints.length > 0 ? <span className={getGradeTextColor(getGradeFromNumeric(s.timePoints[s.timePoints.length-1]))}>{getGradeFromNumeric(s.timePoints[s.timePoints.length-1])} <span className="text-xs text-gray-400">({s.timePoints[s.timePoints.length-1].toFixed(2)})</span></span> : '-'}
                                                            </td>
                                                            <td className="text-right p-3">
                                                                <button onClick={() => {
                                                                    let rf = []; let rl = []; let lb = [];
                                                                    Object.keys(stats.compStats).forEach(ck => { lb.push(ck); rf.push(s.radarFirst[ck] ? s.radarFirst[ck] : 0); rl.push(s.radarLast[ck] ? s.radarLast[ck] : 0); });
                                                                    setShowStudentEvoModal({ name: s.name, history: s.timePoints, labels: lb, radarFirst: rf, radarLast: rl, studentId: s.studentId });
                                                                }} className="text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition font-medium shadow-sm"><Icon name="chart-line" className="mr-1"/> Veure</button>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col">
                                    <div className="mb-6"><h3 className="font-bold text-xl text-gray-800"><Icon name="brain" className="text-purple-500 mr-2"/> Anàlisi Pedagògica</h3><p className="text-sm text-gray-500">Conclusions i recomanacions automàtiques</p></div>
                                    <div className="space-y-4 flex-1 flex flex-col">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-green-50 p-4 rounded-xl border border-green-100">
                                                <div className="flex items-center gap-2 mb-2"><Icon name="award" className="text-green-600 text-lg"/><span className="text-xs font-bold text-green-700 uppercase tracking-wider">Millor Competència</span></div>
                                                <span className="font-bold text-gray-800 text-lg leading-tight block">{stats.bestComp ? stats.bestComp.name : "-"}</span>
                                            </div>
                                            <div className="bg-red-50 p-4 rounded-xl border border-red-100">
                                                <div className="flex items-center gap-2 mb-2"><Icon name="fire" className="text-red-600 text-lg"/><span className="text-xs font-bold text-red-700 uppercase tracking-wider">Més Dificultat</span></div>
                                                <span className="font-bold text-gray-800 text-lg leading-tight block">{stats.worstComp ? stats.worstComp.name : "-"}</span>
                                            </div>
                                        </div>
                                        <div className="mt-auto p-5 bg-gradient-to-r from-purple-50 to-blue-50 border border-purple-100 text-gray-700 italic rounded-xl shadow-inner relative">
                                            <Icon name="quote-left" className="text-purple-200 text-4xl absolute top-2 left-2 opacity-50"/>
                                            <p className="relative z-10 font-medium">
                                                {(() => {
                                                    let textParts = [];
                                                    if (stats.achievement.proces > 0) textParts.push(`${stats.achievement.proces} alumnes que requereixen atenció directa (${stats.achievement.attentionStudents.map(s=>s.name).join(', ')})`);
                                                    if (stats.achievement.noAssolit > 0) textParts.push(`${stats.achievement.noAssolit} ${stats.achievement.proces > 0 ? "" : "alumnes "}que requereixen una possible modificació (${stats.achievement.riskStudents.map(s=>s.name).join(', ')})`);
                                                    return (
                                                        <React.Fragment>
                                                            Es recomana centrar els esforços de reforç en <span className="font-bold text-purple-700">{stats.worstComp ? stats.worstComp.name : '...'}</span>, especialment treballant els criteris amb més suspensos.
                                                            {textParts.length > 0 ? ` Hi ha ${textParts.join(' i ')}.` : ` El grup avança favorablement sense riscos greus d'estancament generalitzat.`}
                                                        </React.Fragment>
                                                    );
                                                })()}
                                            </p>

                                </div>

                                <div className="space-y-4">
                                    {stats.allCompNames.map(compName => {
                                        const compInfo = stats.compStats[compName];
                                        const styles = compInfo ? COMP_COLORS_STYLES[compInfo.color ? compInfo.color : 'blue'] : COMP_COLORS_STYLES['gray'];
                                        
                                        return (
                                            <div key={compName} className="border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                                                <button onClick={() => handleToggleComp(compName)} className={`w-full flex justify-between items-center p-4 transition ${expandedComps[compName] ? 'bg-gray-50' : 'bg-white hover:bg-gray-50'}`}>
                                                    <div className="flex items-center gap-3"><div className={`w-3 h-3 rounded-full ${styles ? styles.header : 'bg-gray-500'}`}></div><span className="font-bold text-gray-800 text-lg">{compName}</span></div>
                                                    <div className="flex items-center gap-4"><Icon name={expandedComps[compName] ? "chevron-up" : "chevron-down"} className="text-gray-400"/></div>

                                                                    {stats.criteriaStats[sem.id] && stats.criteriaStats[sem.id][compName] && stats.criteriaStats[sem.id][compName].map((c,i)=>(
                                                                        <div key={i} className="bg-white border border-gray-200 p-4 rounded-xl shadow-sm hover:shadow transition">
                                                                            <div className="font-bold text-gray-800 mb-3 line-clamp-2 h-10 leading-tight text-sm" title={c.name}>{c.name}</div>
                                                                            <div className="flex h-3 rounded-full overflow-hidden bg-gray-100 mb-2">
                                                                                <div style={{width:`${c.counts.A/(stats.achievement.total||1)*100}%`}} className="bg-green-500"/><div style={{width:`${c.counts.B/(stats.achievement.total||1)*100}%`}} className="bg-blue-500"/><div style={{width:`${c.counts.C/(stats.achievement.total||1)*100}%`}} className="bg-yellow-500"/><div style={{width:`${c.counts.D/(stats.achievement.total||1)*100}%`}} className="bg-red-500"/>
                                                                            </div>
                                                                            <div className="flex justify-between text-xs font-bold mt-2"><span className="text-green-600 bg-green-50 px-2 py-0.5 rounded border border-green-100">Excel·lents: {c.counts.A}</span><span className="text-red-500 bg-red-50 px-2 py-0.5 rounded border border-red-100">Suspesos: {c.counts.D}</span></div>

                            <div className="flex items-center gap-2">
                                {currentClass && <button onClick={() => setShowEditClassModal(currentClass)} className="p-2 text-slate-400 hover:text-white transition" title="Configuració del Grup"><Icon name="gear"/></button>}
                                <div className="h-6 w-px bg-slate-700 mx-1"></div>
                                <button onClick={() => setShowCloudBackupModal(true)} className="p-2 text-blue-400 hover:text-blue-300 transition" title="Backups al Núvol"><Icon name="cloud" /></button>
                                <button onClick={() => { if(window.createAvaluaproBackup) window.createAvaluaproBackup(false, null, true, JSON.stringify(classes)); }} className="p-2 text-slate-400 hover:text-white transition" title="Descarregar Backup Local JSON"><Icon name="download"/></button>
                                <button onClick={() => document.getElementById('importFile').click()} className="p-2 text-slate-400 hover:text-white transition" title="Importar Backup JSON"><Icon name="upload"/></button>
                                <input type="file" id="importFile" accept=".json" className="hidden" onChange={handleImportJSON} />
                                <button onClick={handleExportExcel} className="p-2 text-green-400 hover:text-green-300 transition" title="Exportar a Excel"><Icon name="file-excel"/></button>
                                <div className="h-6 w-px bg-slate-700 mx-1"></div>
                                <button onClick={undo} disabled={historyIndex <= 0} className="p-2 text-slate-400 hover:text-white disabled:opacity-30 transition"><Icon name="rotate-left"/></button>
                                <button onClick={redo} disabled={historyIndex >= history.length - 1} className="p-2 text-slate-400 hover:text-white disabled:opacity-30 transition"><Icon name="rotate-right"/></button>
                                <div className="h-6 w-px bg-slate-700 mx-1"></div>
                                <button onClick={resetAllData} className="p-2 text-red-400 hover:text-red-300 transition" title="Reiniciar curs sencer"><Icon name="trash-can"/></button>
                            </div>
                        </header>

                        <main className="flex-1 flex flex-col min-h-0 bg-gray-50/50">
                            {currentClass ? (
                                <React.Fragment>
                                    <div className="bg-white border-b border-gray-200 px-4 flex items-end gap-1 pt-2 shrink-0 shadow-sm relative z-10 overflow-x-auto hide-scrollbar">
                                        {(currentClass.semesters ? currentClass.semesters : []).map(sem => (
                                            <button key={sem.id} onClick={() => setActiveTab(sem.id)} className={`px-5 py-2.5 rounded-t-lg font-bold text-sm transition-colors border border-b-0 whitespace-nowrap ${activeTab === sem.id ? 'bg-white text-brand-600 border-gray-200 shadow-[0_-2px_5px_rgba(0,0,0,0.02)] relative top-[1px]' : 'bg-gray-50 text-gray-500 border-transparent hover:bg-gray-100 hover:text-gray-700'}`}>
                                                {sem.name}
                                            </button>
                                        ))}
                                        <div className="flex-1"></div>
                                        <button onClick={() => setActiveTab('GLOBAL')} className={`px-5 py-2.5 rounded-t-lg font-bold text-sm transition-colors border border-b-0 flex items-center gap-2 whitespace-nowrap ${activeTab === 'GLOBAL' ? 'bg-indigo-50 text-indigo-700 border-indigo-200 shadow-[0_-2px_5px_rgba(0,0,0,0.02)] relative top-[1px]' : 'bg-gray-50 text-gray-500 border-transparent hover:bg-gray-100 hover:text-indigo-600'}`}>
                                            <Icon name="chart-pie" /> Dashboard Global
                                        </button>
                                        {activeTab !== 'GLOBAL' && (
                                            <button onClick={() => setShowSemesterStats(true)} className="px-4 py-2 mb-1 text-xs font-bold text-gray-500 hover:text-brand-600 bg-white border border-gray-200 rounded shadow-sm hover:bg-gray-50 transition ml-2 flex items-center gap-2 whitespace-nowrap">
                                                <Icon name="chart-simple" /> Estadístiques
                                            </button>
                                        )}
                                    </div>
                                    <div className="flex-1 overflow-hidden relative flex flex-col bg-gray-50/50">
                                        {isGlobalView ? (
                                            <div className="flex-1 overflow-y-auto custom-scroll">
                                                {renderGlobalDashboard()}
                                            </div>
                                        ) : (
                                            <div className="flex-1 p-6 h-full overflow-hidden flex flex-col">
                                                {renderSpreadsheet()}
                                            </div>
                                        )}
                                    </div>
                                </React.Fragment>
                            ) : (
                                <div className="flex-1 flex flex-col items-center justify-center text-gray-400 bg-gray-50">
                                    <Icon name="folder-open" className="text-6xl mb-4 text-gray-300"/>
                                    <p className="text-xl font-medium">Selecciona o crea una classe per començar.</p>
                                </div>
                            )}
                        </main>
                    </ErrorBoundary>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
