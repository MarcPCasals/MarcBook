<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Docent</title>
    
    <!-- Estils CSS (Tailwind) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tipografies -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* Fons base (es sobreescriurà per JS segons el tema) */
        body { font-family: 'Inter', sans-serif; background-color: #fff7ed; color: #374151; transition: background-color 0.3s ease; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Scrollbar Base */
        .custom-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f9fafb; }
        /* Els colors del thumb es defineixen dinàmicament al JS */
        .custom-scroll::-webkit-scrollbar-thumb { border-radius: 4px; }
        
        /* Animacions */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        
        @keyframes expandOpen { from { height: 0; opacity: 0; transform: scaleY(0.9); } to { height: auto; opacity: 1; transform: scaleY(1); } }
        .expand-open { animation: expandOpen 0.15s ease-out forwards; transform-origin: top; }

        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .slide-in-right { animation: slideInRight 0.3s ease-out forwards; }

        /* Estils especials de Text */
        .time-red { color: #dc2626; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        
        /* Estils IMPORTANTS per inputs */
        input.task-skipped { 
            text-decoration: line-through !important; 
            color: #dc2626 !important; 
            opacity: 0.8 !important;
            font-style: italic;
        }
        
        input.task-unfinished { 
            text-decoration: underline !important; 
            text-decoration-color: #d97706 !important; 
            text-decoration-thickness: 2px !important;
            color: #d97706 !important; 
            font-weight: 600 !important;
        }
        
        /* Estil sessió cancel·lada */
        .session-cancelled {
            background-color: #d1d5db !important; 
            color: #6b7280 !important; 
        }
        
        .session-cancelled input.task-input {
             pointer-events: none;
        }
        
        .session-cancelled .reactivate-btn, .session-cancelled textarea {
            pointer-events: auto !important;
        }

        /* Loading Overlay */
        #app-loader {
            position: fixed; inset: 0; z-index: 9999;
            background: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .loader-spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #f97316; 
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .error-box {
            background: #fee2e2; border: 1px solid #ef4444; color: #b91c1c;
            padding: 20px; border-radius: 8px; max-width: 500px; text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <!-- BARRA D'AUTENTICACIÓ GOOGLE -->
    <div id="authBar" class="bg-gray-800 text-white p-3 flex justify-between items-center shadow-md relative z-[10000]">
        <div class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-orange-400"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span class="font-bold hidden sm:inline">Agenda Docent - Espai Segur</span>
        </div>
        <div class="flex items-center gap-4">
            <p id="userInfo" class="text-sm font-medium text-gray-300"></p>
            <button id="loginBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-bold text-sm transition-colors flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                Inicia sessió amb Google
            </button>
            <button id="logoutBtn" style="display:none;" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded font-bold text-sm transition-colors flex items-center gap-2">
                Tanca sessió
            </button>
        </div>
    </div>

    <!-- PANTALLA DE CÀRREGA -->
    <div id="app-loader">
        <div id="loader-content" class="text-center flex flex-col items-center">
            <div class="loader-spinner"></div>
            <h2 class="text-xl font-bold text-gray-700">Carregant Planificador...</h2>
        </div>
        <div id="error-content" class="error-box">
            <h3 class="font-bold text-lg mb-2">Error de càrrega</h3>
            <p id="error-message">No s'ha pogut iniciar l'aplicació.</p>
        </div>
    </div>

    <div id="root"></div>

    <!-- LLIBRERIES -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- FIREBASE -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
      import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
      import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAoUM58SRUMEFlCFm56jzI7eTU9QB-JxBE",
        authDomain: "eines-docents.firebaseapp.com",
        projectId: "eines-docents",
        storageBucket: "eines-docents.firebasestorage.app",
        messagingSenderId: "80852705741",
        appId: "1:80852705741:web:375c1a3dfd2ae2466c6484",
        measurementId: "G-JJ73JJ3DQX"
      };

      // Inicialitzar Firebase
      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
      const db = getFirestore(app);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });

      window.firebaseDb = db;
      window.setDoc = setDoc;
      window.getDoc = getDoc;
      window.doc = doc;
      window.currentUser = null;

      // FUNCIONS D'AUTENTICACIÓ
      window.login = async () => {
          try { 
              const provider = new GoogleAuthProvider();
              provider.setCustomParameters({ prompt: 'select_account' });
              await signInWithPopup(auth, provider); 
          } catch(e) { 
              console.error("Error de login:", e);
              if (e.code === 'auth/configuration-not-found') {
                  alert("⚠️ ACCÉS AMB GOOGLE DESACTIVAT A FIREBASE ⚠️\n\nAquest error passa perquè has de configurar Firebase. Segueix aquests passos:\n\n1. Ves a console.firebase.google.com i entra al teu projecte.\n2. Al menú lateral, clica a 'Authentication' i després a la pestanya 'Sign-in method'.\n3. Clica 'Add new provider', selecciona 'Google', activa'l (Enable) i posa el teu correu de suport.\n4. Guarda els canvis.\n\nSi ja ho has fet, recorda també afegir la teva URL de GitHub a 'Authorized domains' a la pestanya 'Settings' de Authentication.");
              } else if (window.location.protocol === 'file:' || e.code === 'auth/unauthorized-domain') {
                  alert("⚠️ DOMINI NO AUTORITZAT O ARXIU LOCAL\n\nPerquè funcioni a GitHub, has d'autoritzar el teu domini.\n\n1. Ves a Firebase Console -> Authentication -> Settings -> Authorized domains.\n2. Afegeix la teva adreça de GitHub (sense https:// ni rutes finals, només ex: elteunom.github.io).");
              } else if (e.code === 'auth/popup-blocked') {
                  alert("⚠️ El navegador ha bloquejat la finestra emergent. Si us plau, permet els popups a la barra d'adreces per poder iniciar sessió.");
              } else if (e.code !== 'auth/popup-closed-by-user' && e.code !== 'auth/cancelled-popup-request') {
                  alert("❌ S'ha produït un error al iniciar sessió: " + e.message);
              }
          }
      };

      window.logout = async () => {
          try { await signOut(auth); window.location.reload(); } 
          catch(e) { console.error("Error de logout", e); }
      };

      // Assignació d'esdeveniments
      const loginBtn = document.getElementById("loginBtn");
      if (loginBtn) loginBtn.onclick = window.login;
      
      const logoutBtn = document.getElementById("logoutBtn");
      if (logoutBtn) logoutBtn.onclick = window.logout;

      // GESTIÓ DE SESSIÓ I INICIALITZACIÓ
      onAuthStateChanged(auth, async (user) => {
          if (user) {
              window.currentUser = user;
              await inicialitzarApp(user);
          } else {
              window.currentUser = null;
              mostrarLogin();
          }
      });

      function mostrarLogin() {
          if (window.loadingTimeout) clearTimeout(window.loadingTimeout);
          document.getElementById("userInfo").textContent = "";
          document.getElementById("loginBtn").style.display = "flex";
          document.getElementById("logoutBtn").style.display = "none";
          
          const loaderContent = document.getElementById('loader-content');
          if (loaderContent) {
              loaderContent.innerHTML = '<h3 class="text-blue-600 font-bold mb-4 text-xl">Inicia sessió amb Google per accedir a la teva agenda.</h3>';
          }
      }

      async function inicialitzarApp(user) {
          document.getElementById("userInfo").textContent = user.email;
          document.getElementById("loginBtn").style.display = "none";
          document.getElementById("logoutBtn").style.display = "flex";

          window.cloudAgendaData = null;
          try {
              const userId = user.uid;

              // 1. CARREGAR CONFIGURACIÓ GLOBAL
              const configSnap = await getDoc(doc(db, "agenda_docent", userId));
              const configData = configSnap.exists() ? configSnap.data() : {};

              // 2. CARREGAR SETMANES INDIVIDUALS (NOVA ARQUITECTURA)
              const weeksSnap = await getDocs(
                  collection(db, "agenda_docent_weeks", userId, "weeks")
              );

              let loadedWeeksData = {};
              weeksSnap.forEach(docSnap => {
                  loadedWeeksData[docSnap.id] = docSnap.data();
              });

              // 3. MIGRACIÓ AUTOMÀTICA DE DADES ANTIGUES
              if (configData.weeksData) {
                  console.log("Migrant dades antigues a la nova arquitectura per evitar el límit d'1MB...");
                  for (const weekId in configData.weeksData) {
                      await setDoc(
                          doc(db, "agenda_docent_weeks", userId, "weeks", weekId),
                          configData.weeksData[weekId]
                      );
                      loadedWeeksData[weekId] = configData.weeksData[weekId];
                  }
                  
                  // Eliminem weeksData del document principal per alliberar l'espai
                  delete configData.weeksData;
                  await setDoc(doc(db, "agenda_docent", userId), configData); 
              }

              console.log("Setmanes carregades de Firebase:", Object.keys(loadedWeeksData).length);

              // Reconstruir objecte compatible per React
              if (configSnap.exists() || Object.keys(loadedWeeksData).length > 0) {
                  window.cloudAgendaData = {
                      config: configData.config || {},
                      weeksData: loadedWeeksData,
                      radar: configData.radar || [],
                      holidayWeeks: configData.holidayWeeks || [],
                      reminders: configData.reminders || {}
                  };
              }
          } catch(e) { console.error("Firebase load error", e); }

          window.firebaseInitialized = true;
          window.dispatchEvent(new Event('firebaseReady')); // Avisem al React que ja pot carregar
      }

      // FUNCIONS CLOUD ADAPTADES A NOVA ARQUITECTURA
      window.saveAgendaToCloud = async (dataInput) => {
          if (!window.currentUser) return;
          try {
              const dataObj = typeof dataInput === "string" 
                  ? JSON.parse(dataInput) 
                  : dataInput;
                  
              const { config, weeksData, radar, holidayWeeks, reminders } = dataObj;
              const userId = window.currentUser.uid;

              // 1. Guardar config principal (sense weeksData)
              await setDoc(doc(db, "agenda_docent", userId), {
                  config: config || {},
                  radar: radar || [],
                  holidayWeeks: holidayWeeks || [],
                  reminders: reminders || {}
              });

              // 2. Guardar setmanes individualment en la subcol·lecció
              if (weeksData && Object.keys(weeksData).length > 0) {
                  console.log("Guardant setmanes al núvol:", Object.keys(weeksData).length);
                  for (const weekId in weeksData) {
                      await setDoc(
                          doc(db, "agenda_docent_weeks", userId, "weeks", weekId),
                          weeksData[weekId]
                      );
                  }
              }
          } catch(e) { console.error("Firebase save error", e); }
      };

      window.loadAgendaFromCloud = async () => {
          if (!window.currentUser) return null;
          try {
              const userId = window.currentUser.uid;
              const configSnap = await getDoc(doc(db, "agenda_docent", userId));
              const configData = configSnap.exists() ? configSnap.data() : {};

              const weeksSnap = await getDocs(collection(db, "agenda_docent_weeks", userId, "weeks"));
              let loadedWeeksData = {};
              weeksSnap.forEach(d => { loadedWeeksData[d.id] = d.data(); });

              return JSON.stringify({
                  config: configData.config || {},
                  weeksData: loadedWeeksData,
                  radar: configData.radar || [],
                  holidayWeeks: configData.holidayWeeks || [],
                  reminders: configData.reminders || {}
              });
          } catch(e) { console.error("Firebase load error", e); }
          return null;
      };

      window.saveBackupToCloud = async (history) => {
          if (!window.currentUser) return;
          try {
              await setDoc(doc(db, "agenda_docent_backups", window.currentUser.uid), { history });
          } catch(e) { console.error("Firebase backup save error", e); }
      };

      window.loadBackupsFromCloud = async () => {
          if (!window.currentUser) return [];
          try {
              const snap = await getDoc(doc(db, "agenda_docent_backups", window.currentUser.uid));
              if (snap.exists() && snap.data().history) return snap.data().history;
          } catch(e) { console.error("Firebase backup load error", e); }
          return [];
      };
      
      window.getAutoBackupDate = async () => {
          if (!window.currentUser) return null;
          try {
              const snap = await getDoc(doc(db, "agenda_docent_metadata", window.currentUser.uid));
              if (snap.exists()) return snap.data().lastAutoBackupDate;
          } catch(e) {}
          return null;
      };

      window.setAutoBackupDate = async (dateStr) => {
          if (!window.currentUser) return;
          try {
              await setDoc(doc(db, "agenda_docent_metadata", window.currentUser.uid), { lastAutoBackupDate: dateStr }, { merge: true });
          } catch(e) {}
      };
    </script>

    <script>
        // Timeout controlat perquè no mostri l'error si estem a la pantalla de login
        window.loadingTimeout = setTimeout(function() {
            var loader = document.getElementById('app-loader');
            if (loader && loader.style.display !== 'none' && !document.getElementById('root').hasChildNodes()) {
                document.getElementById('loader-content').innerHTML = '<h3 class="text-red-600 font-bold">Error de càrrega. Revisa la connexió.</h3>';
            }
        }, 8000);
        
        // --- FUNCIONS GLOBALS DE BACKUP ---
        window.getLocalYYYYMMDD = (d) => {
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        window.downloadBackupJSON = (dataStr, filename) => {
            if (!dataStr) return;
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 100);
        };

        window.restoreAgendaBackup = async (backupId) => {
            let history = await window.loadBackupsFromCloud();
            
            let targetData = null;
            if (backupId) {
                const found = history.find(b => b.id === backupId);
                if (found) targetData = found.data;
            } else if (history.length > 0) {
                targetData = history[0].data;
            }
            
            if (targetData) {
                if (confirm("⚠️ ATENCIÓ: Segur que vols restaurar aquest backup? Es perdrà l'estat actual de l'agenda.")) {
                    await window.saveAgendaToCloud(targetData);
                    window.location.reload();
                }
            } else {
                alert("❌ No s'ha trobat cap backup a restaurar.");
            }
        };

        window.createAgendaBackup = async (silent = false, customLabel = null, triggerDownload = false) => {
            const currentData = window.currentAgendaData;
            if (!currentData) {
                if (!silent) alert("No hi ha dades actuals per guardar al backup.");
                return;
            }
            
            let history = await window.loadBackupsFromCloud();
            if (!Array.isArray(history)) history = [];
            
            // Evitar duplicats exactes en desats automàtics
            if (history.length > 0 && history[0].data === currentData && silent) {
                return; 
            } else if (history.length > 0 && history[0].data === currentData && !silent) {
                if(!confirm("⚠️ Les dades actuals són idèntiques a l'últim backup. Vols crear una entrada duplicada de tota manera?")) return;
            }
            
            const now = new Date();
            const timestamp = now.toLocaleDateString('ca-ES') + ' a les ' + now.toLocaleTimeString('ca-ES', {hour: '2-digit', minute:'2-digit'});
            const dateStrForFile = window.getLocalYYYYMMDD(now);
            
            history.unshift({ 
                id: Date.now(), 
                timestamp: timestamp, 
                label: customLabel || (silent ? 'Còpia automàtica' : 'Còpia manual'), 
                data: currentData 
            });
            
            // Mantenim només els darrers 10 backups
            if (history.length > 10) history = history.slice(0, 10);
            
            await window.saveBackupToCloud(history);
            
            if (triggerDownload) {
                const safeTime = now.toLocaleTimeString('ca-ES', {hour: '2-digit', minute:'2-digit'}).replace(/:/g, '');
                window.downloadBackupJSON(currentData, `AgendaBackup_${dateStrForFile}_${safeTime}.json`);
            }
            
            if (!silent) alert("✅ Backup creat" + (triggerDownload ? " i descarregat" : "") + " correctament al núvol.");
            window.dispatchEvent(new Event('backupHistoryUpdated')); // Avisa a la UI per refrescar el modal
        };
    </script>

        const getLocalISODate = (d) => {
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const generateAllWeeks = (yearStr) => {
            const weeks = [];
            const year = parseInt(yearStr) || new Date().getFullYear();
            let current = new Date(year, 8, 1, 12, 0, 0); 
            const day = current.getDay();
            const diff = current.getDate() - day + (day == 0 ? -6 : 1);
            current.setDate(diff);
            const end = new Date(year + 1, 6, 15, 12, 0, 0);
            while (current < end) {
                const weekStart = new Date(current);
                const weekEnd = new Date(current);
                weekEnd.setDate(weekEnd.getDate() + 6); // Diumenge
                weeks.push({
                    id: getLocalISODate(weekStart),
                    label: `Setmana ${weekStart.getDate()} ${MONTHS[weekStart.getMonth()]}`,
                    startDate: new Date(weekStart),
                    endDate: new Date(weekEnd),
                    month: weekStart.getMonth(),
                    year: weekStart.getFullYear()
                });
                current.setDate(current.getDate() + 7);
            }
            return weeks;
        };

        const addDays = (dateStr, days) => {
            const [y, m, d] = dateStr.split('-');
            const result = new Date(y, m - 1, d, 12, 0, 0); 
            result.setDate(result.getDate() + days);
            return getLocalISODate(result);

            if (!name) return "";
            const match = name.match(/(1r|2n|3r|4t|1R|2N|3R|4T)/i);

            const [newRadarDate, setNewRadarDate] = useState("");

            const theme = config.theme || 'orange';

            const allWeeks = useMemo(() => generateAllWeeks(config.schoolYear), [config.schoolYear]);
            const currentMonthWeeks = allWeeks.filter(w => w.month === currentViewDate.getMonth() && w.year === currentViewDate.getFullYear());

            useEffect(() => {
                if (showBackupModal) {
                    const loadHistory = async () => {
                        try {
                            const hist = await window.loadBackupsFromCloud();
                            setBackupHistory(hist);
                        } catch(e) { setBackupHistory([]); }
                    };
                    loadHistory();
                    window.addEventListener('backupHistoryUpdated', loadHistory);
                    return () => window.removeEventListener('backupHistoryUpdated', loadHistory);
                }
            }, [showBackupModal]);

            useEffect(() => {
                const todayStr = getLocalISODate(new Date());
                const oneWeekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
                let changed = false;
                const newRadar = radar.filter(item => {
                    if (item.completedAt && item.completedAt < oneWeekAgo) {
                        changed = true;
                        return false;
                    }
                    return true;
                }).map(item => {
                    if (!item.completedAt && item.date && item.date < todayStr) {
                        changed = true;
                        return { ...item, completedAt: Date.now() };
                    }
                    return item;
                });
                if (changed) setRadar(newRadar);
            }, [radar, setRadar]);

            const calculateProgress = () => {
                if (allWeeks.length === 0) return 0;
                const activeWeeks = allWeeks.filter(w => !(holidayWeeks || []).includes(w.id));
                if (activeWeeks.length === 0) return 0;
                const now = new Date();
                let pastWeeks = 0;
                activeWeeks.forEach(w => {
                    const end = new Date(w.endDate);
                    end.setHours(23, 59, 59, 999);
                    if (now > end) pastWeeks++;
                });
                return ((pastWeeks / activeWeeks.length) * 100).toFixed(1);
            };

            const changeMonth = (delta) => {
                const newDate = new Date(currentViewDate);
                newDate.setMonth(newDate.getMonth() + delta);
                setCurrentViewDate(newDate);
            };

            const isCurrentWeek = (w) => {
                const now = new Date();
                const start = new Date(w.startDate);
                start.setHours(0, 0, 0, 0);
                const end = new Date(w.startDate);
                end.setDate(end.getDate() + 6); 
                end.setHours(23, 59, 59, 999);
                return now >= start && now <= end;
            };

            const handleImportClick = () => setShowImportModal(true);
            const confirmImport = () => { setShowImportModal(false); if(fileInputRef.current) fileInputRef.current.click(); };

            const handleSaveLink = () => {
                onSaveConfig({ ...config, googleSheetUrl: tempLink });
                setEditingLink(false);
            };

            const handleSaveTaskLink = () => {
                onSaveConfig({ ...config, taskTrackingUrl: tempTaskLink });
                setEditingTaskLink(false);
            };

            const getUTForWeek = (week) => {
                if (!config.utDates || config.utDates.length === 0) return null;
                return config.utDates.find(ut => {
                    const [y, m, d] = ut.date.split('-');
                    const utDate = new Date(y, m - 1, d, 12, 0, 0); 
                    return utDate >= week.startDate && utDate <= week.endDate;
                });
            };

            const handleAddRadar = () => {
                if (!newRadarText.trim()) return;
                const newEntry = {
                    id: Date.now(),
                    text: newRadarText.trim(),
                    date: newRadarDate || null,
                    fromTask: false,
                    completedAt: null
                };
                setRadar([...radar, newEntry]);
                setNewRadarText("");
                setNewRadarDate("");
            };

            const handleRemoveRadar = (id) => {
                setRadar(radar.map(item => item.id === id ? { ...item, completedAt: Date.now() } : item));
            };

            const currentWeekObj = allWeeks.find(isCurrentWeek);
            let activeReminders = [];
            
            if (currentWeekObj && reminders) {
                let dayOfWeek = new Date().getDay(); 
                let todayIndex = dayOfWeek === 0 ? 6 : dayOfWeek - 1;

                if (todayIndex >= 0 && todayIndex <= 6) {
                    const todayKey = addDays(currentWeekObj.id, todayIndex);
                    if (reminders[todayKey]) {
                        activeReminders.push(...reminders[todayKey].map(r => ({...r, day: 'AVUI'})));
                    }
                }
                const tomorrowIndex = todayIndex + 1;
                if (tomorrowIndex >= 0 && tomorrowIndex <= 6) {
                    const tomorrowKey = addDays(currentWeekObj.id, tomorrowIndex);
                    if (reminders[tomorrowKey]) {
                        activeReminders.push(...reminders[tomorrowKey].map(r => ({...r, day: 'DEMÀ'})));
                    }
                }

                if (todayIndex >= 3 && weeksData && weeksData[currentWeekObj.id]) {
                    const currentWeekData = weeksData[currentWeekObj.id];
                    
                    const satTasks = currentWeekData["5-weekend"]?.tasks || [];
                    satTasks.forEach(t => {
                        if (t.text.trim()) activeReminders.push({ text: t.text, time: t.time, day: 'DISSABTE', isTask: true });
                    });
                    
                    const sunTasks = currentWeekData["6-weekend"]?.tasks || [];
                    sunTasks.forEach(t => {
                        if (t.text.trim()) activeReminders.push({ text: t.text, time: t.time, day: 'DIUMENGE', isTask: true });
                    });
                }
            }
            
            const dayPriority = { 'AVUI': 1, 'DEMÀ': 2, 'DISSABTE': 3, 'DIUMENGE': 4 };
            activeReminders.sort((a, b) => {
                const pA = dayPriority[a.day] || 5;
                const pB = dayPriority[b.day] || 5;
                if (pA !== pB) return pA - pB;
                if (!a.time && !b.time) return 0;
                if (!a.time) return -1;
                if (!b.time) return 1;
                return a.time.localeCompare(b.time);
            });

            const nowForUI = new Date();
            const isWeekendNow = nowForUI.getDay() === 0 || nowForUI.getDay() === 6;
            const weekBadgeText = isWeekendNow ? "SEGÜENT SETMANA" : "Actual";
            
            const isHighlightedWeek = (w) => {
                const targetDate = new Date(nowForUI);
                if (isWeekendNow) {
                    const daysToNextMonday = nowForUI.getDay() === 0 ? 1 : 2;
                    targetDate.setDate(targetDate.getDate() + daysToNextMonday);
                }
                const start = new Date(w.startDate);
                start.setHours(0, 0, 0, 0);
                const end = new Date(w.startDate);
                end.setDate(end.getDate() + 6);
                end.setHours(23, 59, 59, 999);
                return targetDate >= start && targetDate <= end;
            };

            return (
                <div className="max-w-7xl mx-auto p-6 fade-in pb-20">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <div>
                            <h1 className="text-3xl font-extrabold text-gray-800">Hola, {config.teacherName || 'Professor'} 👋</h1>
                            <p className={`text-${theme}-500 font-medium`}>Curs {config.schoolYear} - {parseInt(config.schoolYear)+1}</p>
                        </div>

                        {activeReminders.length > 0 && (
                            <div className="flex-1 mx-4 max-w-xl w-full">
                                <div className="bg-yellow-50 border-l-4 border-yellow-400 rounded-lg p-3 shadow-sm animate-in fade-in zoom-in duration-300">
                                    <div className="flex items-center gap-2 mb-2">
                                        <Icons.Lightbulb className="text-yellow-600" size={18}/>
                                        <h3 className="font-bold text-yellow-800 text-sm uppercase">Recordatoris Actius</h3>
                                    </div>
                                    <div className="space-y-2 max-h-[80px] overflow-y-auto custom-scroll pr-1">
                                        {activeReminders.map((r, i) => (
                                            <div key={i} className="flex justify-between items-center bg-white/80 p-1.5 rounded border border-yellow-200 text-sm">
                                                <span className="font-medium text-gray-700 truncate mr-2">{r.text}</span>
                                                <div className="flex items-center gap-1 shrink-0">
                                                    <span className={`text-[10px] px-1.5 py-0.5 rounded font-bold ${r.day === 'AVUI' ? 'bg-red-100 text-red-700' : (r.isTask ? 'bg-orange-100 text-orange-700' : 'bg-blue-100 text-blue-700')}`}>{r.day}</span>
                                                    {r.time && <span className="text-[10px] text-gray-500 font-mono bg-gray-100 px-1 rounded">{r.time}</span>}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="flex gap-2 items-center">
                             <button onClick={() => setShowGlobalRemindersModal(true)} className="p-2 text-yellow-500 hover:text-yellow-600 hover:bg-yellow-50 rounded-lg flex items-center gap-1 transition-colors mr-2" title="Tots els Recordatoris"><Icons.Bell size={18}/></button>
                             <button onClick={() => setShowBackupModal(true)} className="p-2 text-blue-500 hover:text-blue-700 hover:bg-blue-50 rounded-lg flex items-center gap-1 transition-colors mr-2" title="Protecció de Dades"><Icons.Shield size={18}/></button>
                             <button onClick={() => setShowResetModal(true)} className="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg flex items-center gap-1 transition-colors mr-4" title="Reiniciar"><Icons.Trash size={18}/></button>
                             <button onClick={() => setShowInfoModal(true)} className="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 flex gap-2 items-center text-gray-700 font-medium"><Icons.FileJson /> Guardar</button>
                             <button onClick={handleImportClick} className="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 flex gap-2 items-center text-gray-700 font-medium cursor-pointer"><Icons.ArrowRight /> Carregar</button>
                             <input type="file" className="hidden" ref={fileInputRef} onChange={onImport} accept=".json"/>
                            <button onClick={goToConfig} className="p-2 bg-gray-100 rounded-lg hover:bg-gray-200 text-gray-600"><Icons.Settings /></button>
                        </div>
                    </header>

                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-8">
                        <div className="flex justify-between text-sm font-bold text-gray-600 mb-2"><span>Progrés Real del Curs</span><span>{calculateProgress()}%</span></div>
                        <div className="w-full bg-gray-100 rounded-full h-4 overflow-hidden"><div className={`bg-${theme}-500 h-4 rounded-full transition-all duration-500`} style={{ width: `${calculateProgress()}%` }}></div></div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2">
                            <div className="flex justify-between items-center mb-4">
                                <button onClick={() => changeMonth(-1)} className="p-2 bg-white rounded-full shadow hover:bg-gray-50 text-gray-600"><Icons.ChevronLeft /></button>
                                <h2 className="text-xl font-bold flex items-center gap-2 capitalize text-gray-800">{MONTHS[currentViewDate.getMonth()]} {currentViewDate.getFullYear()}</h2>
                                <button onClick={() => changeMonth(1)} className="p-2 bg-white rounded-full shadow hover:bg-gray-50 text-gray-600"><Icons.ChevronRight /></button>
                            </div>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                {currentMonthWeeks.map(week => {
                                    const isHoliday = holidayWeeks?.includes(week.id);
                                    const isCurrent = isHighlightedWeek(week);
                                    const utEnding = getUTForWeek(week);
                                    
                                    let cardClasses = `relative p-5 rounded-xl border transition-all h-full flex flex-col justify-between `;
                                    if (isCurrent) {
                                        cardClasses += `ring-2 ring-${theme}-500 bg-${theme}-300 shadow-lg scale-[1.02]`;
                                    } else {
                                        cardClasses += `bg-white border-gray-200 hover:border-${theme}-200`;
                                    }

                                    return (
                                        <div key={week.id} className={cardClasses}>
                                            <div onClick={() => onSelectWeek(week.id)} className="cursor-pointer h-full pr-12">
                                                <h3 className={`font-bold text-lg ${isCurrent ? `text-${theme}-900` : 'text-gray-800'}`}>{week.label}</h3>
                                                <p className={`text-sm mb-2 ${isCurrent ? `text-${theme}-800` : 'text-gray-500'}`}>{week.startDate.toLocaleDateString()} - {week.endDate.toLocaleDateString()}</p>
                                                {isCurrent && <span className={`bg-${theme}-600 text-white text-[10px] px-2 py-0.5 rounded font-bold uppercase shadow-sm inline-block mr-1`}>{weekBadgeText}</span>}
                                            </div>
                                            
                                            {utEnding && <div className="absolute bottom-3 right-3 bg-red-600 text-white text-[10px] px-2 py-1 rounded shadow-md font-bold uppercase">Final {utEnding.name}</div>}

                                            <button onClick={(e) => { e.stopPropagation(); onToggleHoliday(week.id); }} className={`absolute top-4 right-4 w-9 h-9 flex items-center justify-center rounded-full transition-all ${isHoliday ? 'bg-purple-100 text-purple-600 shadow-inner' : 'bg-gray-100 text-gray-300 hover:bg-gray-200'}`} title="Marcar com Vacances">🎉</button>
                                        </div>
                                    );
                                })}
                            </div>

                            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mt-8">
                                <h2 className="text-lg font-bold mb-4 text-gray-800 flex items-center gap-2"><Icons.Table /> Programació per Classes</h2>
                                {config.classes.length === 0 ? (
                                    <p className="text-sm text-gray-500 italic">No tens cap classe configurada encara.</p>
                                ) : (
                                    <div className="flex flex-wrap gap-3">
                                        {config.classes.map(c => (
                                            <button 
                                                key={c.id} 
                                                onClick={() => onSelectClassView(c.id)} 
                                                className={`px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition-all hover:scale-105 border ${c.color.replace('text-', 'text-gray-900 border-').replace('bg-', 'bg-').split(' ')[0]}`}
                                            >
                                                {c.name}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="lg:col-span-1 h-full flex flex-col gap-6">
                            <div className="bg-white rounded-xl shadow-lg border border-gray-200 flex flex-col overflow-hidden h-[350px]">
                                <div className="bg-gray-800 text-white p-4 flex justify-between items-center shrink-0">
                                    <h2 className="font-bold flex items-center gap-2"><Icons.AlertCircle /> RADAR {showRadarHistory && "(Historial)"}</h2>
                                    <button onClick={() => setShowRadarHistory(!showRadarHistory)} className={`text-gray-300 hover:text-white transition-colors ${showRadarHistory ? 'text-yellow-400' : ''}`} title="Veure historial">
                                        <Icons.Hourglass size={18} />
                                    </button>
                                </div>
                                <div className="flex-1 bg-yellow-50/30 p-4 overflow-y-auto custom-scroll space-y-3">
                                    {(() => {
                                        const visibleRadar = showRadarHistory 
                                            ? radar.filter(item => item.completedAt).sort((a,b) => b.completedAt - a.completedAt)
                                            : radar.filter(item => !item.completedAt);
                                        return (
                                            <>
                                                {visibleRadar.length === 0 && <p className="text-gray-400 italic text-sm text-center mt-4">Cap entrada {showRadarHistory ? "a l'historial" : "pendent"}.</p>}
                                                {visibleRadar.map(item => (
                                                    <div key={item.id} className={`relative group bg-white border border-gray-200 rounded p-2 shadow-sm flex gap-2 ${item.completedAt ? 'opacity-60' : ''}`}>
                                                        {item.date && (
                                                            <div className="absolute -top-2 right-2 bg-red-100 text-red-800 text-[9px] font-bold px-1.5 py-0.5 rounded shadow-sm border border-red-200">
                                                                {new Date(item.date).toLocaleDateString()}
                                                            </div>
                                                        )}
                                                        {!item.completedAt ? (
                                                            <button onClick={() => handleRemoveRadar(item.id)} className="shrink-0 mt-0.5 text-gray-300 hover:text-green-500 transition-colors" title="Marcar com a fet">
                                                                <Icons.CheckCircle size={18} />
                                                            </button>
                                                        ) : (
                                                            <span className="shrink-0 mt-0.5 text-green-500"><Icons.CheckCircle size={18} /></span>
                                                        )}
                                                        <p className={`text-sm text-gray-700 pt-0.5 ${item.date ? 'mt-1' : ''} ${item.completedAt ? 'line-through' : ''}`}>{item.text}</p>
                                                    </div>
                                                ))}
                                            </>
                                        );
                                    })()}
                                    
                                    {!showRadarHistory && (
                                        <div className="border-t border-gray-200 pt-3 mt-4">
                                            <div className="bg-white border-2 border-dashed border-gray-200 rounded p-2 flex flex-col gap-2">
                                                <textarea 
                                                    className="w-full text-sm resize-none outline-none focus:bg-gray-50"
                                                    placeholder="Nova nota o tasca al radar..."
                                                    value={newRadarText}
                                                    onChange={(e) => setNewRadarText(e.target.value)}
                                                    onKeyDown={(e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleAddRadar(); }}}
                                                />
                                                <div className="flex justify-between items-center">
                                                    <input 
                                                        type="date" 
                                                        className="text-[10px] text-gray-500 border rounded p-1 outline-none"
                                                        value={newRadarDate}
                                                        onChange={(e) => setNewRadarDate(e.target.value)}
                                                    />
                                                    <button onClick={handleAddRadar} disabled={!newRadarText.trim()} className="bg-gray-800 text-white text-xs px-3 py-1 rounded font-bold disabled:opacity-50">Afegir</button>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
                                    <div className="bg-blue-600 text-white p-3 flex justify-between items-center">
                                        <h2 className="font-bold flex items-center gap-1 text-sm"><Icons.CheckCircle size={16} /> Seguiment</h2>
                                        <button onClick={() => setEditingTaskLink(!editingTaskLink)} className="text-white hover:text-blue-100"><Icons.Edit size={14}/></button>
                                    </div>
                                    <div className="p-3 bg-blue-50 text-center h-24 flex items-center justify-center">
                                        {editingTaskLink ? (
                                            <div className="flex flex-col gap-2 w-full">
                                                <input 
                                                    type="text" 
                                                    className="w-full p-1 border rounded text-xs focus:outline-none focus:border-blue-500" 
                                                    placeholder="URL..." 
                                                    value={tempTaskLink} 
                                                    onChange={(e) => setTempTaskLink(e.target.value)}
                                                />
                                                <button onClick={handleSaveTaskLink} className="bg-blue-600 text-white px-2 py-0.5 rounded text-xs font-bold hover:bg-blue-700">Guardar</button>
                                            </div>
                                        ) : (
                                            config.taskTrackingUrl ? (
                                                <a href={config.taskTrackingUrl} target="_blank" rel="noreferrer" className="flex flex-col items-center gap-1 text-blue-700 font-bold hover:text-blue-900 text-xs">
                                                    <Icons.Link size={24}/> Obrir
                                                </a>
                                            ) : (
                                                <span className="text-xs text-gray-400 italic cursor-pointer" onClick={() => setEditingTaskLink(true)}>Afegir Link</span>
                                            )
                                        )}
                                    </div>
                                </div>

                                <div className="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
                                    <div className="bg-green-600 text-white p-3 flex justify-between items-center">
                                        <h2 className="font-bold flex items-center gap-1 text-sm"><Icons.Link size={16} /> Programació</h2>
                                        <button onClick={() => setEditingLink(!editingLink)} className="text-white hover:text-green-100"><Icons.Edit size={14}/></button>
                                    </div>
                                    <div className="p-3 bg-green-50 text-center h-24 flex items-center justify-center">
                                        {editingLink ? (
                                            <div className="flex flex-col gap-2 w-full">
                                                <input 
                                                    type="text" 
                                                    className="w-full p-1 border rounded text-xs focus:outline-none focus:border-green-500" 
                                                    placeholder="URL..." 
                                                    value={tempLink} 
                                                    onChange={(e) => setTempLink(e.target.value)}
                                                />
                                                <button onClick={handleSaveLink} className="bg-green-600 text-white px-2 py-0.5 rounded text-xs font-bold hover:bg-green-700">Guardar</button>
                                            </div>
                                        ) : (
                                            config.googleSheetUrl ? (
                                                <a href={config.googleSheetUrl} target="_blank" rel="noreferrer" className="flex flex-col items-center gap-1 text-green-700 font-bold hover:text-green-900 text-xs">
                                                    <Icons.Link size={24}/> Obrir
                                                </a>
                                            ) : (
                                                <span className="text-xs text-gray-400 italic cursor-pointer" onClick={() => setEditingLink(true)}>Afegir Link</span>
                                            )
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {showGlobalRemindersModal && ReactDOM.createPortal(
                        <GlobalRemindersModal 
                            reminders={reminders} 
                            onSaveReminder={onSaveReminder}
                            onClose={() => setShowGlobalRemindersModal(false)}
                        />, document.body
                    )}

                    {showBackupModal && ReactDOM.createPortal(
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[9999] fade-in p-4">
                            <div className="bg-white p-6 rounded-xl max-w-lg w-full shadow-2xl border-t-4 border-blue-500 max-h-[90vh] flex flex-col">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="text-xl font-bold text-gray-800 flex items-center gap-2"><Icons.Shield /> Protecció de Dades</h3>
                                    <button onClick={() => setShowBackupModal(false)} className="text-gray-400 hover:text-gray-600">✕</button>
                                </div>
                                
                                <div className="bg-blue-50 p-4 rounded-lg border border-blue-100 mb-4 text-sm text-blue-800 space-y-2 shrink-0">
                                    <p><strong>Còpia externa (Arxiu JSON):</strong> Es descarrega automàticament al teu dispositiu un cop al dia (a la primera interacció).</p>
                                    <p><strong>Còpies internes:</strong> Es guarden les últimes 10 versions a la memòria del navegador just abans d'accions importants o quan ho fas manualment.</p>
                                    <p className="pt-2 border-t border-blue-200 text-xs">
                                        Última còpia: <span className="font-bold">{backupHistory.length > 0 ? backupHistory[0].timestamp : "Mai"}</span>
                                    </p>
                                </div>
                                
                                <div className="flex flex-col gap-3 mb-4 shrink-0">
                                    <button onClick={() => window.createAgendaBackup(false, 'Còpia manual', true)} className="w-full px-4 py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition-colors flex items-center justify-center gap-2 shadow-sm">
                                        <Icons.Save size={18}/> Crear i Descarregar Nou Backup Ara
                                    </button>
                                </div>

                                <h4 className="font-bold text-gray-700 mb-2 text-sm border-b pb-1 shrink-0">Restaurar des de les darreres 10 còpies:</h4>
                                <div className="flex-1 overflow-y-auto custom-scroll pr-2 space-y-2">
                                    {backupHistory.length === 0 ? (
                                        <p className="text-sm text-gray-500 italic">No hi ha cap còpia guardada encara.</p>
                                    ) : (
                                        backupHistory.map((b, idx) => (
                                            <div key={b.id} className="flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-200">
                                                <div>
                                                    <p className="font-bold text-gray-700 text-sm">{b.timestamp}</p>
                                                    <p className="text-xs text-gray-500">{b.label}</p>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <button onClick={() => window.downloadBackupJSON(b.data, `AgendaBackup_${b.id}.json`)} className="p-1.5 bg-blue-100 text-blue-700 hover:bg-blue-200 rounded transition-colors" title="Descarregar aquest backup">
                                                        <Icons.Download size={14}/>
                                                    </button>
                                                    <button onClick={() => window.restoreAgendaBackup(b.id)} className="px-3 py-1.5 bg-orange-100 text-orange-700 hover:bg-orange-200 font-bold rounded text-xs transition-colors flex items-center gap-1">
                                                        <Icons.Undo size={14}/> Restaurar
                                                    </button>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>

                                <div className="flex justify-end mt-4 pt-4 border-t border-gray-100 shrink-0">

            const [dragOverIdx, setDragOverIdx] = useState(null);
            const [dragEnabled, setDragEnabled] = useState(false);
            const containerRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (e) => {
                    if (containerRef.current && !containerRef.current.contains(e.target)) {
                        setFocusedIndex(null);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const updateTask = (idx, field, value) => {
                const newTasks = [...tasks];
                newTasks[idx] = { ...newTasks[idx], [field]: value };
                if (idx === tasks.length - 1 && field === 'text' && value.trim() !== '') {
                    newTasks.push({ text: '', time: '', status: null });
                }
                onChange(newTasks);
            };

            const deleteTask = (idx) => {
                setFocusedIndex(null);
                const newTasks = tasks.filter((_, i) => i !== idx);
                if(newTasks.length === 0) newTasks.push({ text: '', time: '', status: null });
                if(newTasks[newTasks.length-1].text.trim() !== '') newTasks.push({ text: '', time: '', status: null });
                onChange(newTasks);
            };

            const onDragStart = (e, index) => {
                setDraggedIdx(index);
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', index);
            };

            const onDragOver = (e, index) => {
                e.preventDefault(); 
                e.dataTransfer.dropEffect = 'move';
                if (dragOverIdx !== index) setDragOverIdx(index);
            };

            const onDrop = (e, targetIndex) => {
                e.preventDefault();
                if (draggedIdx === null) return;
                if (draggedIdx === targetIndex) {
                    setDragOverIdx(null);
                    setDraggedIdx(null);
                    return;
                }

                const newTasks = [...tasks];
                const draggedTask = newTasks[draggedIdx];
                newTasks.splice(draggedIdx, 1);
                newTasks.splice(targetIndex, 0, draggedTask);

                let filtered = newTasks.filter(t => t.text.trim() !== '');
                filtered.push({ text: '', time: '', status: null });
                while(filtered.length < 3) filtered.push({ text: '', time: '', status: null });

                onChange(filtered);
                setDragOverIdx(null);
                setDraggedIdx(null);
                setDragEnabled(false);
            };

            const onDragEnd = () => {
                setDragOverIdx(null);
                setDraggedIdx(null);
                setDragEnabled(false);
            };

            const getInputClass = (status) => {
                if (status === 'skipped') return "task-skipped";

                            draggable={dragEnabled && !disabled && task.text.trim() !== ''}
                            onDragStart={(e) => onDragStart(e, idx)}
                            onDragOver={(e) => onDragOver(e, idx)}
                            onDrop={(e) => onDrop(e, idx)}
                            onDragEnd={onDragEnd}
                            className={`flex flex-col group relative border-dashed border-gray-100 last:border-0 pl-6 ${dragOverIdx === idx ? 'border-t-2 border-t-blue-500 pt-1 mt-1' : 'border-b pb-1 mt-1'} ${draggedIdx === idx ? 'opacity-40' : ''}`}
                        >
                            <div className="flex items-center gap-1.5 relative">
                                {!disabled && task.text.trim() !== '' && (
                                    <div 
                                        className="absolute -left-6 top-1.5 z-20 flex items-center text-gray-300 hover:text-gray-500 cursor-grab active:cursor-grabbing" 
                                        title="Arrossega per moure"
                                        onMouseEnter={() => setDragEnabled(true)}
                                        onMouseLeave={() => setDragEnabled(false)}
                                    >
                                        <Icons.Menu size={16}/>
                                    </div>
                                )}

                                <span className={`text-${theme}-400 font-bold mt-1`}>•</span>
                                {task.tag === 'skipped' && <span className="text-red-500 text-[10px] mr-1" title="No feta">🔴</span>}
                                {task.tag === 'unfinished' && <span className="text-red-600 text-[10px] mr-1" title="Inacabada">⚠️</span>}

                                <div className="flex-shrink-0 flex items-center justify-end w-[35px]">
                                    <input 
                                        type="text" 
                                        className="w-6 bg-transparent text-right text-xs font-bold time-red focus:bg-white focus:ring-1 focus:ring-red-200 rounded outline-none"
                                        placeholder="-"
                                        value={task.time || ''}
                                        onChange={(e) => {
                                            const val = e.target.value.replace(/\D/g, ''); 
                                            updateTask(idx, 'time', val);
                                        }}
                                        onFocus={() => { setFocusedIndex(idx); }}
                                        disabled={disabled}
                                    />
                                    <span className="text-xs font-bold time-red select-none">'</span>
                                </div>
                                <input 
                                    type="text" 
                                    className={`flex-1 bg-transparent hover:bg-gray-50 focus:bg-white rounded px-1 focus:ring-1 focus:ring-${theme}-200 focus:outline-none text-sm py-0.5 transition-colors task-input ${getInputClass(task.status)}`}

                                    value={task.text}
                                    onChange={(e) => updateTask(idx, 'text', e.target.value)}
                                    onFocus={() => { setFocusedIndex(idx); }}
                                    disabled={disabled}
                                />

                            {focusedIndex === idx && task.text.trim() !== '' && !disabled && (

                                            <Icons.AlertTriangle size={12}/> Aplaçar

                                </div>
                            )}

        const ReminderModal = ({ dateStr, dayName, reminders, onSave, onClose }) => {
            const [localReminders, setLocalReminders] = useState(reminders || []);
            const [newReminder, setNewReminder] = useState({ text: "", time: "" });

            const addReminder = () => {
                if (newReminder.text.trim()) {
                    setLocalReminders([...localReminders, newReminder]);
                    setNewReminder({ text: "", time: "" });
                }
            };

            const removeReminder = (index) => {
                setLocalReminders(localReminders.filter((_, i) => i !== index));
            };

            const handleSave = () => {
                const sorted = [...localReminders].sort((a, b) => {
                    if (!a.time && !b.time) return 0;
                    if (!a.time) return -1;
                    if (!b.time) return 1;
                    return a.time.localeCompare(b.time);
                });
                onSave(dateStr, sorted);
                onClose();
            };

            return (
                <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 relative animate-in zoom-in duration-200">
                        <div className="flex justify-between items-center mb-4 border-b pb-2">
                            <h3 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                <Icons.Lightbulb className="text-yellow-500"/> Recordatoris {dayName}
                            </h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600">✕</button>

                        <div className="space-y-3 mb-6">

                                    <input 
                                        type="text" className="w-full border p-2 rounded" placeholder="Ex: Avaluació..." 
                                        value={newReminder.text} onChange={(e) => setNewReminder({...newReminder, text: e.target.value})}
                                        onKeyDown={(e) => e.key === 'Enter' && addReminder()}
                                    />
                                </div>
                                <div className="w-24">
                                    <label className="text-xs font-bold text-gray-500">Hora</label>
                                    <input 
                                        type="time" className="w-full border p-2 rounded" 
                                        value={newReminder.time} onChange={(e) => setNewReminder({...newReminder, time: e.target.value})}

                                <button onClick={addReminder} className="bg-yellow-500 text-white px-3 py-2 rounded font-bold hover:bg-yellow-600">+</button>
                            </div>
                            
                            <div className="bg-yellow-50 rounded-lg p-3 min-h-[100px] max-h-[200px] overflow-y-auto">
                                {localReminders.length === 0 && <p className="text-gray-400 text-sm italic text-center">Cap recordatori.</p>}
                                {localReminders.map((r, i) => (
                                    <div key={i} className="flex justify-between items-center bg-white p-2 rounded mb-2 shadow-sm">
