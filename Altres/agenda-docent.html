        };

        const GlobalRemindersModal = ({ reminders, onSaveReminder, onClose }) => {
            const [newDate, setNewDate] = useState("");
            const [newText, setNewText] = useState("");
            const [newTime, setNewTime] = useState("");

            const allRems = [];
            const todayStr = getLocalISODate(new Date());
            Object.entries(reminders || {}).forEach(([dateStr, rems]) => {
                if (dateStr >= todayStr) {
                    rems.forEach(r => allRems.push({ ...r, dateStr }));
                }
            });
            allRems.sort((a, b) => {
                if (a.dateStr !== b.dateStr) return new Date(a.dateStr) - new Date(b.dateStr);
                if (!a.time && !b.time) return 0;
                if (!a.time) return -1;
                if (!b.time) return 1;
                return a.time.localeCompare(b.time);
            });

            const handleAdd = () => {
                if (newDate && newText.trim()) {
                    const existing = reminders[newDate] || [];
                    const updated = [...existing, { text: newText.trim(), time: newTime }].sort((a, b) => {
                        if (!a.time && !b.time) return 0;
                        if (!a.time) return -1;
                        if (!b.time) return 1;
                        return a.time.localeCompare(b.time);
                    });
                    onSaveReminder(newDate, updated);
                    setNewText("");
                    setNewTime("");
                }
            };

            const handleRemove = (dateStr, text, time) => {
                const existing = reminders[dateStr] || [];
                onSaveReminder(dateStr, existing.filter(item => !(item.text === text && item.time === time)));
            };

            return (
                <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg p-6 relative animate-in zoom-in duration-200 max-h-[90vh] flex flex-col">
                        <div className="flex justify-between items-center mb-4 border-b pb-2 shrink-0">
                            <h3 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                <Icons.Bell className="text-yellow-500"/> Tots els Recordatoris
                            </h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600">✕</button>
                        </div>
                        
                        <div className="bg-yellow-50 p-3 rounded-lg border border-yellow-200 mb-4 shrink-0 flex flex-col gap-2">
                            <h4 className="text-sm font-bold text-yellow-800">Afegir Nou Recordatori</h4>
                            <div className="flex gap-2 items-end">
                                <div>
                                    <label className="text-[10px] font-bold text-gray-500 uppercase">Data</label>
                                    <input type="date" className="w-full border p-1.5 rounded text-sm outline-none" value={newDate} onChange={e => setNewDate(e.target.value)} />
                                </div>
                                <div className="flex-1">
                                    <label className="text-[10px] font-bold text-gray-500 uppercase">Text</label>
                                    <input type="text" className="w-full border p-1.5 rounded text-sm outline-none" placeholder="Què vols recordar?" value={newText} onChange={e => setNewText(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAdd()} />
                                </div>
                                <div className="w-20">
                                    <label className="text-[10px] font-bold text-gray-500 uppercase">Hora</label>
                                    <input type="time" className="w-full border p-1.5 rounded text-sm outline-none" value={newTime} onChange={e => setNewTime(e.target.value)} />
                                </div>
                                <button onClick={handleAdd} disabled={!newDate || !newText.trim()} className="bg-yellow-500 text-white px-3 py-1.5 rounded font-bold hover:bg-yellow-600 disabled:opacity-50 h-[34px]">+</button>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto custom-scroll pr-2 space-y-2">
                            {allRems.length === 0 ? (
                                <p className="text-center text-gray-400 italic text-sm mt-4">No hi ha cap recordatori actiu.</p>
                            ) : (
                                allRems.map((r, i) => (
                                    <div key={i} className="flex justify-between items-center bg-white p-2 rounded shadow-sm border border-gray-100">
                                        <div>
                                            <div className="flex items-center gap-2">
                                                <span className="bg-yellow-100 text-yellow-800 text-[10px] px-1.5 py-0.5 rounded font-bold">{new Date(r.dateStr).toLocaleDateString('ca-ES', {day: '2-digit', month: 'short', year: 'numeric'})}</span>
                                                {r.time && <span className="text-[10px] text-gray-500 font-mono bg-gray-100 px-1 rounded">{r.time}</span>}
                                            </div>
                                            <p className="text-sm font-medium text-gray-800 mt-1">{r.text}</p>
                                        </div>
                                        <button onClick={() => handleRemove(r.dateStr, r.text, r.time)} className="text-red-400 hover:text-red-600 font-bold px-2 text-lg">×</button>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const PlannerScreen = ({ weekId, weeksData, config, onConfigChange, onUpdateWeekData, onBack, onAddToRadar, allWeeks, holidayWeeks, reminders, onSaveReminder }) => {
            const [planData, setPlanData] = useState(weeksData[weekId] || {});
            const [history, setHistory] = useState([]);
            const [future, setFuture] = useState([]);
            const [reviewMode, setReviewMode] = useState(false);
            const [showExportModal, setShowExportModal] = useState(false);
            const [exportClassId, setExportClassId] = useState("");
            const [exportConfig, setExportConfig] = useState({ curs: "", ut: "", fase: "FASE DE PREPARACIÓ" });
            const [showAddClassModal, setShowAddClassModal] = useState(false);
            const [newExtra, setNewExtra] = useState({ day: 0, slot: 0, classId: "" });
            const [showWeekends, setShowWeekends] = useState(false);
            
            const [showCopyModal, setShowCopyModal] = useState(false);
            const [copySource, setCopySource] = useState(null);
            const [targetClassId, setTargetClassId] = useState("");
            const [targetDay, setTargetDay] = useState(0);
            const [targetSlot, setTargetSlot] = useState(0);

            const [pendingActionTask, setPendingActionTask] = useState(null);
            const [activeDayNotepad, setActiveDayNotepad] = useState(null); 
            const [activeSessionNotepad, setActiveSessionNotepad] = useState(null);
            const [activeReminderModal, setActiveReminderModal] = useState(null); 
            const [activeSmartPaste, setActiveSmartPaste] = useState(null); 

            const theme = config.theme || 'orange';
            const viewDays = showWeekends ? [...WORK_DAYS, ...WEEKEND_DAYS] : WORK_DAYS;

            useEffect(() => {
                setPlanData(weeksData[weekId] || {});
            }, [weekId, weeksData]);

            const updatePlanData = (newData, saveToHistory = true) => {
                if (saveToHistory) {
                    setHistory(prev => [...prev, planData]);
                    setFuture([]); 
                }
                setPlanData(newData);
                onUpdateWeekData(weekId, newData);
            }

            const handleUndo = () => {
                if (history.length === 0) return;
                const previous = history[history.length - 1];
                const newHistory = history.slice(0, -1);
                setFuture(prev => [planData, ...prev]); 
                setHistory(newHistory);
                setPlanData(previous);
                onUpdateWeekData(weekId, previous);
            };

            const handleRedo = () => {
                if (future.length === 0) return;
                const next = future[0];
                const newFuture = future.slice(1);
                setHistory(prev => [...prev, planData]); 
                setFuture(newFuture);
                setPlanData(next);
                onUpdateWeekData(weekId, next);
            };

            const getTasks = (d, s, dataObj = planData) => {
                const k = `${d}-${s}`;
                const existing = dataObj[k]?.tasks;
                if (existing && Array.isArray(existing) && existing.length > 0) return existing;
                return [{ text: '', time: '', status: null }, { text: '', time: '', status: null }, { text: '', time: '', status: null }];
            };

            const getTotalTime = (d, s) => {
                const tasks = getTasks(d, s);
                return tasks.reduce((acc, t) => acc + (parseInt(t.time) || 0), 0);
            };

            const handleTasksChange = (d, s, newTasks) => {
                const newData = { ...planData, [`${d}-${s}`]: { ...planData[`${d}-${s}`], tasks: newTasks } };
                updatePlanData(newData);
            };

            const handleReviewChange = (d, s, val) => {
                const newData = { ...planData, [`${d}-${s}`]: { ...planData[`${d}-${s}`], review: val } };
                updatePlanData(newData);
            };

            const handleStatusChange = (d, s, val) => {
                const newData = { ...planData, [`${d}-${s}`]: { ...planData[`${d}-${s}`], status: val } };
                if (val === null) {
                    newData[`${d}-${s}`].zzzReason = "";
                }
                updatePlanData(newData);
            };

            const handleDailyNotepadSave = (dayIndex, dayData) => {
                let newData = { ...planData };
                Object.keys(dayData).forEach(slotId => {
                    const k = `${dayIndex}-${slotId}`;
                    const currentCell = newData[k] || {};
                    newData[k] = { 
                        ...currentCell, 
                        notes: dayData[slotId].notes, 
                        materials: dayData[slotId].materials,
                        links: dayData[slotId].links
                    };
                });
                updatePlanData(newData);
            };

            const handleSessionNotepadSave = (dayIndex, slotId, data) => {
                let newData = { ...planData };
                const k = `${dayIndex}-${slotId}`;
                const currentCell = newData[k] || {};
                newData[k] = {
                    ...currentCell,
                    notes: data.notes,
                    materials: data.materials,
                    links: data.links
                };
                updatePlanData(newData);
            }

            const handleSmartPaste = (tasks) => {
                if (!activeSmartPaste) return;
                const { day, slot } = activeSmartPaste;
                
                const currentTasks = getTasks(day, slot).filter(t => t.text.trim() !== '');
                const combinedTasks = [...currentTasks, ...tasks];
                
                while(combinedTasks.length < 3) {
                    combinedTasks.push({text: "", time: "", status: null});
                }
                
                const newData = { ...planData };
                const key = `${day}-${slot}`;
                newData[key] = { ...(newData[key] || {}), tasks: combinedTasks };
                updatePlanData(newData);
            };

            const findNextSession = (d, s, cid) => {
                let found = null;
                const currentDuration = config.durations?.[`${d}-${s}`] === 2 ? 2 : 1;
                let startSlot = s + currentDuration;

                for(let i=d; i<5; i++) { 
                    for(let j=0; j<TIME_SLOTS.length; j++) { 
                        if(i===d && j < startSlot) continue; 
                        if(config.schedule[i]?.[j] === cid) { found={d:i, s:j, w:0}; break; } 
                    } 
                    if(found) break; 
                }
                if(!found) { 
                    for(let i=0; i<5; i++) { 
                        for(let j=0; j<TIME_SLOTS.length; j++) { 
                            if(config.schedule[i]?.[j] === cid) { found={d:i, s:j, w:1}; break; } 
                        } 
                        if(found) break; 
                    } 
                }
                return found;
            };

            const handleTaskAction = (d, s, cid, task, action) => {
                if (action === 'save') {
                    const exactDateStr = addDays(weekId, d);
                    onAddToRadar(task.text, exactDateStr);
                    alert("Afegit al Radar!");
                } else if (action === 'alert_menu') {
                    if (!cid) {
                        alert("Aquesta acció només està disponible per a classes regulars.");
                        return;
                    }
                    const tasks = getTasks(d, s);
                    const idx = tasks.findIndex(t => t === task);
                    setPendingActionTask({ d, s, cid, idx, task });
                }
            };

            const executePendingAction = (type) => {
                if (!pendingActionTask) return;
                const { d, s, cid, idx, task } = pendingActionTask;
                const newPlanData = { ...planData };
                const sourceKey = `${d}-${s}`;
                const sourceTasks = getTasks(d, s, newPlanData); 
                const newSourceTasks = [...sourceTasks];
                newSourceTasks[idx] = { ...newSourceTasks[idx], status: type }; 
                newPlanData[sourceKey] = { ...(newPlanData[sourceKey] || {}), tasks: newSourceTasks };

                const found = findNextSession(d, s, cid);
                if(found) {
                    const newTaskObj = { 
                        text: task.text, 
                        time: task.time, 
                        status: null, 
                        tag: type === 'skipped' ? 'skipped' : 'unfinished' 
                    };
                    
                    if(found.w === 0) {
                        const targetKey = `${found.d}-${found.s}`;
                        const targetTasks = getTasks(found.d, found.s, newPlanData);
                        const newTargetTasks = [newTaskObj, ...targetTasks];
                        newPlanData[targetKey] = { ...(newPlanData[targetKey] || {}), tasks: newTargetTasks };
                        updatePlanData(newPlanData); 
                        alert(`Activitat moguda a ${DAYS[found.d]}`);
                    } else {
                        updatePlanData(newPlanData);
                        
                        const getNextActiveWeekId = (currentWid) => {
                            const currentIndex = allWeeks.findIndex(w => w.id === currentWid);
                            if (currentIndex === -1) return null;
                            let nextIndex = currentIndex + 1;
                            while (nextIndex < allWeeks.length) {
                                const w = allWeeks[nextIndex];
                                if (!holidayWeeks.includes(w.id)) return w.id;
                                nextIndex++;
                            }
                            return null;
                        };

                        const nextWeekId = getNextActiveWeekId(weekId);
                        if (nextWeekId) {
                            const nextWeekData = weeksData[nextWeekId] || {};
                            const targetKey = `${found.d}-${found.s}`;
                            const targetTasks = getTasks(found.d, found.s, nextWeekData);
                            const newTargetTasks = [newTaskObj, ...targetTasks];
                            const updatedNextWeekData = { ...nextWeekData, [targetKey] : { ...(nextWeekData[targetKey] || {}), tasks: newTargetTasks } };
                            onUpdateWeekData(nextWeekId, updatedNextWeekData);
                            alert(`Activitat moguda a la setmana vinent (${DAYS[found.d]})`);
                        } else {
                            alert("No s'ha trobat cap setmana lectiva disponible.");
                        }
                    }
                } else {
                    updatePlanData(newPlanData);
                    alert("No s'ha trobat cap altra sessió per moure l'activitat.");
                }
                setPendingActionTask(null);
            };

            const handleZzzAction = (d, s, cid) => {
                const currentTasks = getTasks(d, s).filter(t => t.text.trim());
                let newData = { ...planData };
                
                const currentKey = `${d}-${s}`;
                newData[currentKey] = { 
                    ...newData[currentKey], 
                    status: 'zzz', 
                    zzzReason: newData[currentKey]?.zzzReason || "", 
                    tasks: [{text: "", time: "", status: null}, {text: "", time: "", status: null}, {text: "", time: "", status: null}] 
                };

                if (currentTasks.length > 0) {
                    const found = findNextSession(d, s, cid);
                    if (found) {
                        const movedTasks = currentTasks.map(t => ({...t, text: `(Del ${DAYS[d]}) ${t.text}`, status: null}));
                        
                        if (found.w === 0) {
                            const targetKey = `${found.d}-${found.s}`;
                            const targetTasks = getTasks(found.d, found.s, planData); 
                            newData[targetKey] = {
                                ...newData[targetKey],
                                tasks: [...movedTasks, ...targetTasks]
                            };
                            alert(`Classe cancel·lada. Mogut a ${DAYS[found.d]}.`);
                        } else {
                            const getNextActiveWeekId = (currentWid) => {
                                const currentIndex = allWeeks.findIndex(w => w.id === currentWid);
                                if (currentIndex === -1) return null;
                                let nextIndex = currentIndex + 1;
                                while (nextIndex < allWeeks.length) {
                                    const w = allWeeks[nextIndex];
                                    if (!holidayWeeks.includes(w.id)) return w.id;
                                    nextIndex++;
                                }
                                return null;
                            };

                            const nextWeekId = getNextActiveWeekId(weekId);
                            if (nextWeekId) {
                                const nextWeekData = weeksData[nextWeekId] || {};
                                const targetKey = `${found.d}-${found.s}`;
                                const targetTasks = getTasks(found.d, found.s, nextWeekData);
                                const updatedNextWeekData = { ...nextWeekData, [targetKey]: { ...(nextWeekData[targetKey] || {}), tasks: [...movedTasks, ...targetTasks] } };
                                onUpdateWeekData(nextWeekId, updatedNextWeekData);
                                alert(`Classe cancel·lada. Mogut a la setmana vinent (${DAYS[found.d]}).`);
                            } else {
                                alert("No s'ha trobat cap setmana lectiva disponible per moure les tasques.");
                            }
                        }
                    } else {
                        alert("Zzz marcat (sense moure, no hi propera sessió).");
                    }
                }
                
                updatePlanData(newData);
            };

            const handleAddExtraClass = () => {
                if (!newExtra.classId) return;
                const newExtraClasses = { ...(planData.extraClasses || {}) };
                if (!newExtraClasses[newExtra.day]) newExtraClasses[newExtra.day] = {};
                newExtraClasses[newExtra.day][newExtra.slot] = newExtra.classId;

                const newData = { ...planData, extraClasses: newExtraClasses };
                updatePlanData(newData);
                setShowAddClassModal(false);
            };

            const handleRemoveExtraClass = (d, s) => {
                if (confirm("Segur que vols eliminar aquesta classe extra?")) {
                    const newExtraClasses = { ...(planData.extraClasses || {}) };
                    if (newExtraClasses[d]) {
                        delete newExtraClasses[d][s];
                    }
                    const newData = { ...planData, extraClasses: newExtraClasses };
                    updatePlanData(newData);
                }
            };

            const openCopyModal = (d, s, cid) => {
                setCopySource({ day: d, slot: s, classId: cid });
                setShowCopyModal(true);
            };

            const executeCopy = (targetType) => {
                const sourceTasks = getTasks(copySource.day, copySource.slot).filter(t => t.text.trim());
                if(sourceTasks.length === 0) { alert("No hi ha activitats."); setShowCopyModal(false); return; }
                let found = null;
                if (targetType === 'next_same') found = findNextSession(copySource.day, copySource.slot, copySource.classId);
                else if (targetType === 'next_other') { if(!targetClassId) return alert("Selecciona un grup."); found = findNextSession(copySource.day, copySource.slot, targetClassId); }
                else if (targetType === 'manual') found = { d: targetDay, s: targetSlot, w: 0 };

                if (found && found.w === 0) {
                    const existingTasks = getTasks(found.d, found.s);
                    const combined = [...existingTasks.filter(t => t.text.trim()), ...sourceTasks.map(t => ({...t, status: null}))];
                    while(combined.length < 3) combined.push({text:"", time:"", status: null});
                    handleTasksChange(found.d, found.s, combined);
                    alert("Copiades!");
                    setShowCopyModal(false);
                } else { alert("Només es pot copiar dins la mateixa setmana actualment."); }
            };

            const generateHTML = (onlyRows = false) => {
                let html = onlyRows ? '' : `<table style="width:100%; border-collapse:collapse; font-family:Arial, sans-serif;"><tbody>`;
                
                WORK_DAYS.forEach((day, d) => {
                    TIME_SLOTS.forEach((slot, s) => {
                        const cid = config.schedule[d]?.[slot.id] || planData.extraClasses?.[d]?.[slot.id];
                        if (cid && slot.type !== 'break' && (!exportClassId || cid === exportClassId)) {
                            const data = planData[`${d}-${slot.id}`] || {};
                            const tasks = data.tasks || [];
                            const validTasks = tasks.filter(t => t.text.trim());
                            
                            let contentHtml = "";
                            if (data.status === 'zzz') {
                                const rao = data.zzzReason ? ` (${data.zzzReason})` : '';
                                contentHtml = `💤 NO ES FA CLASSE${rao}`;
                            } else {

                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Hora</label>
                                        <select className="w-full border p-2 rounded" value={newExtra.slot} onChange={e => setNewExtra({...newExtra, slot: parseInt(e.target.value)})}>
                                            {TIME_SLOTS.filter(s => s.type !== 'break').map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Grup / Classe</label>
                                        <select className="w-full border p-2 rounded" value={newExtra.classId} onChange={e => setNewExtra({...newExtra, classId: e.target.value})}>
                                            <option value="">Selecciona grup...</option>
                                            {config.classes.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                        </select>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-2">
                                    <button onClick={() => setShowAddClassModal(false)} className="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded">Cancel·lar</button>
                                    <button onClick={handleAddExtraClass} disabled={!newExtra.classId} className="px-4 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 disabled:opacity-50">Afegir</button>
                                </div>
                            </div>
                        </div>,
                        document.body
                    )}

                    {showCopyModal && copySource && ReactDOM.createPortal(
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 fade-in">
                            <div className="bg-white p-6 rounded-xl max-w-md w-full shadow-2xl border-t-4 border-blue-500">
                                <h3 className="text-xl font-bold mb-4 flex gap-2 text-blue-800"><Icons.Copy /> Copiar Sessió</h3>
                                <div className="space-y-3">
                                    <button onClick={() => executeCopy('next_same')} className="w-full text-left px-4 py-3 bg-blue-50 hover:bg-blue-100 rounded border border-blue-200 font-semibold text-blue-800 transition-colors">1. Enganxar a la propera sessió d'aquest grup</button>
                                    <div className="bg-gray-50 p-3 rounded border border-gray-200">
                                        <p className="text-xs font-bold text-gray-500 mb-2 uppercase">2. Enganxar a propera sessió de:</p>
                                        <div className="flex gap-2">
                                            <select className="flex-1 p-2 border rounded text-sm" value={targetClassId} onChange={(e) => setTargetClassId(e.target.value)}><option value="">Selecciona grup...</option>{config.classes.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select>
                                            <button onClick={() => executeCopy('next_other')} className="px-3 py-1 bg-blue-600 text-white rounded text-sm hover:bg-blue-700">Enganxar</button>
                                        </div>
                                    </div>
                                    <div className="bg-gray-50 p-3 rounded border border-gray-200">
                                        <p className="text-xs font-bold text-gray-500 mb-2 uppercase">3. Enganxar manualment a:</p>
                                        <div className="flex gap-2 mb-2">
                                            <select className="flex-1 p-2 border rounded text-sm" value={targetDay} onChange={(e) => setTargetDay(parseInt(e.target.value))}>{WORK_DAYS.map((d, i) => <option key={i} value={i}>{d}</option>)}</select>
                                            <select className="flex-1 p-2 border rounded text-sm" value={targetSlot} onChange={(e) => setTargetSlot(parseInt(e.target.value))}>{TIME_SLOTS.filter(s => s.type !== 'break').map(s => <option key={s.id} value={s.id}>{s.label}</option>)}</select>
                                        </div>
                                        <button onClick={() => executeCopy('manual')} className="w-full px-3 py-2 bg-gray-600 text-white rounded text-sm hover:bg-gray-700">Enganxar Aquí</button>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-2 mt-4"><button onClick={() => setShowCopyModal(false)} className="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded">Cancel·lar</button></div>
                            </div>
                        </div>,
                        document.body
                    )}
                </div>
            );
        };

        const ClassPlannerScreen = ({ classId, config, weeksData, allWeeks, holidayWeeks, onUpdateWeekData, onConfigChange, onBack, onAddToRadar, reminders, onSaveReminder }) => {
            const classInfo = config.classes.find(c => c.id === classId);
            const theme = config.theme || 'orange';

            const [history, setHistory] = useState([]);
            const [future, setFuture] = useState([]);
            const [reviewMode, setReviewMode] = useState(false);
            const [showExportModal, setShowExportModal] = useState(false);
            const [exportConfig, setExportConfig] = useState({ curs: classInfo ? stripClassLetter(classInfo.name) : "", ut: "", fase: "FASE DE PREPARACIÓ" });
            const [exportInterval, setExportInterval] = useState("");
            const [selectedUTId, setSelectedUTId] = useState("");

            const [pendingActionTask, setPendingActionTask] = useState(null);
            const [activeSessionNotepad, setActiveSessionNotepad] = useState(null);
            const [activeSmartPaste, setActiveSmartPaste] = useState(null);
            const [showCopyModal, setShowCopyModal] = useState(false);
            const [copySource, setCopySource] = useState(null);
            const [targetClassId, setTargetClassId] = useState("");
            const [targetDay, setTargetDay] = useState(0);
            const [targetSlot, setTargetSlot] = useState(0);

            const [newMatTitle, setNewMatTitle] = useState("");
            const [newMatUrl, setNewMatUrl] = useState("");
            const classMaterials = config.classMaterials?.[classId] || [];

            const utList = useMemo(() => {
                return [...(config.utDates || [])].sort((a,b) => new Date(a.date) - new Date(b.date));
            }, [config.utDates]);

            useEffect(() => {
                if (utList.length > 0 && !selectedUTId) {
                    const now = new Date();
                    const nextUT = utList.find(ut => new Date(ut.date) >= now);
                    setSelectedUTId(nextUT ? nextUT.id : utList[utList.length - 1].id);
                }
            }, [utList]);

            const currentUT = useMemo(() => utList.find(ut => ut.id === selectedUTId), [utList, selectedUTId]);

            const visibleWeeks = useMemo(() => {
                if (!currentUT) return allWeeks;
                const currentIdx = utList.findIndex(ut => ut.id === currentUT.id);
                const prevUT = currentIdx > 0 ? utList[currentIdx - 1] : null;
                
                const start = prevUT ? new Date(prevUT.date) : new Date(config.schoolYear, 8, 1);
                const end = new Date(currentUT.date);
                end.setHours(23, 59, 59, 999);

                return allWeeks.filter(w => {
                    const wStart = new Date(w.startDate);
                    const wEnd = new Date(w.endDate);
                    return wEnd >= start && wStart <= end;
                });
            }, [allWeeks, currentUT, utList, config.schoolYear]);

            const allClassSessions = useMemo(() => {
                let counter = 1;
                const sessions = [];
                visibleWeeks.forEach(w => {
                    const wData = weeksData[w.id] || {};
                    const isHoliday = holidayWeeks?.includes(w.id);
                    
                    for (let d = 0; d < 5; d++) {
                        for (let s = 0; s < TIME_SLOTS.length; s++) {
                            const slot = TIME_SLOTS[s];
                            if (slot.type === 'break') continue;
                            
                            const isGlobal = config.schedule[d]?.[slot.id] === classId;
                            const isExtra = wData.extraClasses?.[d]?.[slot.id] === classId;
                            
                            if (isGlobal || isExtra) {
                                const prevSlot = TIME_SLOTS[s - 1];
                                const isCovered = prevSlot && !isExtra && config.durations?.[`${d}-${prevSlot.id}`] === 2 && config.schedule[d]?.[prevSlot.id] === classId;
                                if (isCovered) continue;

                                const dateStr = addDays(w.id, d);
                                const cellData = wData[`${d}-${slot.id}`] || {};
                                const isZzz = cellData.status === 'zzz';
                                
                                let sessionNumber = null;
                                if (!isHoliday && !isZzz) {
                                    sessionNumber = counter++;
                                }

                                const now = new Date();
                                const [y, m, day] = dateStr.split('-');
                                const cellEndTime = new Date(y, m - 1, day, slot.endH, slot.endM, 0);
                                const isPast = now > cellEndTime;

                                sessions.push({
                                    weekId: w.id,
                                    weekLabel: w.label,
                                    dayIndex: d,
                                    slot: slot,
                                    dateStr: dateStr,
                                    sessionNumber: sessionNumber,
                                    isHoliday: isHoliday,
                                    isZzz: isZzz,
                                    isExtra: isExtra,
                                    isPast: isPast,
                                    data: cellData
                                });
                            }
                        }
                    }
                });
                return sessions;
            }, [visibleWeeks, weeksData, config, holidayWeeks, classId]);

            const updatePlanData = (wId, newData, saveToHistory = true) => {
                if (saveToHistory) {
                    setHistory(prev => [...prev, weeksData]);
                    setFuture([]); 
                }
                onUpdateWeekData(wId, newData);
            };

            const handleUndo = () => {
                if (history.length === 0) return;
                const previous = history[history.length - 1];
                const newHistory = history.slice(0, -1);
                setFuture(prev => [weeksData, ...prev]); 
                setHistory(newHistory);
                Object.keys(previous).forEach(wId => {
                    if (JSON.stringify(previous[wId]) !== JSON.stringify(weeksData[wId])) {
                        onUpdateWeekData(wId, previous[wId]);
                    }
                });
            };

            const handleRedo = () => {
                if (future.length === 0) return;
                const next = future[0];
                const newFuture = future.slice(1);
                setHistory(prev => [...prev, weeksData]); 
                setFuture(newFuture);
                Object.keys(next).forEach(wId => {
                    if (JSON.stringify(next[wId]) !== JSON.stringify(weeksData[wId])) {
                        onUpdateWeekData(wId, next[wId]);
                    }
                });
            };

            const getTasks = (wId, d, s) => {
                const wData = weeksData[wId] || {};
                const k = `${d}-${s}`;
                const existing = wData[k]?.tasks;
                if (existing && Array.isArray(existing) && existing.length > 0) return existing;
                return [{ text: '', time: '', status: null }, { text: '', time: '', status: null }, { text: '', time: '', status: null }];
            };

            const getTotalTime = (wId, d, s) => {
                const tasks = getTasks(wId, d, s);
                return tasks.reduce((acc, t) => acc + (parseInt(t.time) || 0), 0);
            };

            const handleTasksChange = (wId, d, s, newTasks) => {
                const wData = { ...(weeksData[wId] || {}) };
                wData[`${d}-${s}`] = { ...wData[`${d}-${s}`], tasks: newTasks };
                updatePlanData(wId, wData);
            };

            const handleReviewChange = (wId, d, s, val) => {
                const wData = { ...(weeksData[wId] || {}) };
                wData[`${d}-${s}`] = { ...wData[`${d}-${s}`], review: val };
                updatePlanData(wId, wData);
            };

            const handleStatusChange = (wId, d, s, val) => {
                const wData = { ...(weeksData[wId] || {}) };
                wData[`${d}-${s}`] = { ...wData[`${d}-${s}`], status: val };
                if (val === null) {
                    wData[`${d}-${s}`].zzzReason = "";
                }
                updatePlanData(wId, wData);
            };

            const handleSessionNotepadSave = (wId, dayIndex, slotId, data) => {
                const wData = { ...(weeksData[wId] || {}) };
                const k = `${dayIndex}-${slotId}`;
                wData[k] = { ...wData[k], notes: data.notes, materials: data.materials, links: data.links };
                updatePlanData(wId, wData);
            };

            const handleSmartPaste = (tasks) => {
                if (!activeSmartPaste) return;
                const { wId, day, slot } = activeSmartPaste;
                const currentTasks = getTasks(wId, day, slot).filter(t => t.text.trim() !== '');
                const combinedTasks = [...currentTasks, ...tasks];
                while(combinedTasks.length < 3) combinedTasks.push({text: "", time: "", status: null});
                const wData = { ...(weeksData[wId] || {}) };
                wData[`${day}-${slot}`] = { ...(wData[`${day}-${slot}`] || {}), tasks: combinedTasks };
                updatePlanData(wId, wData);
            };

            const handleTaskAction = (wId, d, s, cid, task, action) => {
                if (action === 'save') {
                    const exactDateStr = addDays(wId, d);
                    onAddToRadar(task.text, exactDateStr);
                    alert("Afegit al Radar!");
                } else if (action === 'alert_menu') {
                    const tasks = getTasks(wId, d, s);
                    const idx = tasks.findIndex(t => t === task);
                    setPendingActionTask({ wId, d, s, idx, task });
                }
            };

            const executePendingAction = (type) => {
                if (!pendingActionTask) return;
                const { wId, d, s, idx, task } = pendingActionTask;
                const wData = { ...(weeksData[wId] || {}) };
                const sourceKey = `${d}-${s}`;
                const sourceTasks = getTasks(wId, d, s); 
                const newSourceTasks = [...sourceTasks];
                newSourceTasks[idx] = { ...newSourceTasks[idx], status: type }; 
                wData[sourceKey] = { ...(wData[sourceKey] || {}), tasks: newSourceTasks };

                const currentIdx = allClassSessions.findIndex(sess => sess.weekId === wId && sess.dayIndex === d && sess.slot.id === s);
                let nextSession = null;
                for (let i = currentIdx + 1; i < allClassSessions.length; i++) {
                    if (!allClassSessions[i].isZzz && !allClassSessions[i].isHoliday) {
                        nextSession = allClassSessions[i];
                        break;
                    }
                }

                if(nextSession) {
                    const newTaskObj = { text: task.text, time: task.time, status: null, tag: type === 'skipped' ? 'skipped' : 'unfinished' };
                    if (nextSession.weekId === wId) {
                        const targetKey = `${nextSession.dayIndex}-${nextSession.slot.id}`;
                        const targetTasks = getTasks(wId, nextSession.dayIndex, nextSession.slot.id);
                        wData[targetKey] = { ...(wData[targetKey] || {}), tasks: [newTaskObj, ...targetTasks] };
                        updatePlanData(wId, wData);
                        alert(`Activitat moguda al proper dia d'aquesta setmana.`);
                    } else {
                        updatePlanData(wId, wData); 
                        const targetWData = { ...(weeksData[nextSession.weekId] || {}) };
                        const targetKey = `${nextSession.dayIndex}-${nextSession.slot.id}`;
                        const targetTasks = getTasks(nextSession.weekId, nextSession.dayIndex, nextSession.slot.id);
                        targetWData[targetKey] = { ...(targetWData[targetKey] || {}), tasks: [newTaskObj, ...targetTasks] };
                        onUpdateWeekData(nextSession.weekId, targetWData); 
                        alert(`Activitat moguda a la sessió del ${new Date(nextSession.dateStr).toLocaleDateString()}`);
                    }
                } else {
                    updatePlanData(wId, wData);
                    alert("No s'ha trobat cap altra sessió per moure l'activitat.");
                }
                setPendingActionTask(null);
            };

            const handleZzzAction = (wId, d, s) => {
                const currentTasks = getTasks(wId, d, s).filter(t => t.text.trim());
                const wData = { ...(weeksData[wId] || {}) };
                const currentKey = `${d}-${s}`;
                wData[currentKey] = { 
                    ...wData[currentKey], 
                    status: 'zzz', 
                    zzzReason: wData[currentKey]?.zzzReason || "", 
                    tasks: [{text: "", time: "", status: null}, {text: "", time: "", status: null}, {text: "", time: "", status: null}] 
                };

                if (currentTasks.length > 0) {
                    const currentIdx = allClassSessions.findIndex(sess => sess.weekId === wId && sess.dayIndex === d && sess.slot.id === s);
                    let nextSession = null;
                    for (let i = currentIdx + 1; i < allClassSessions.length; i++) {
                        if (!allClassSessions[i].isZzz && !allClassSessions[i].isHoliday) {
                            nextSession = allClassSessions[i];
                            break;
                        }
                    }

                    if (nextSession) {
                        const movedTasks = currentTasks.map(t => ({...t, text: `(Del ${DAYS[d]}) ${t.text}`, status: null}));
                        if (nextSession.weekId === wId) {
                            const targetKey = `${nextSession.dayIndex}-${nextSession.slot.id}`;
                            const targetTasks = getTasks(wId, nextSession.dayIndex, nextSession.slot.id);
                            wData[targetKey] = { ...(wData[targetKey] || {}), tasks: [...movedTasks, ...targetTasks] };
                            alert(`Classe cancel·lada. Mogut al següent dia.`);
                        } else {
                            const targetWData = { ...(weeksData[nextSession.weekId] || {}) };
                            const targetKey = `${nextSession.dayIndex}-${nextSession.slot.id}`;
                            const targetTasks = getTasks(nextSession.weekId, nextSession.dayIndex, nextSession.slot.id);
                            targetWData[targetKey] = { ...(targetWData[targetKey] || {}), tasks: [...movedTasks, ...targetTasks] };
                            onUpdateWeekData(nextSession.weekId, targetWData);
                            alert(`Classe cancel·lada. Mogut a la sessió del ${new Date(nextSession.dateStr).toLocaleDateString()}`);
                        }
                    } else {
                        alert("Zzz marcat (sense moure, no hi ha propera sessió).");
                    }
                }
                updatePlanData(wId, wData);
            };

            const openCopyModal = (wId, d, s, cid) => {
                setCopySource({ weekId: wId, day: d, slot: s, classId: cid });
                setShowCopyModal(true);
            };

            const executeCopy = (targetType) => {
                const sourceTasks = getTasks(copySource.weekId, copySource.day, copySource.slot).filter(t => t.text.trim());
                if(sourceTasks.length === 0) { alert("No hi ha activitats."); setShowCopyModal(false); return; }
                
                let targetSession = null;

                if (targetType === 'next_same' || targetType === 'next_other') {
                    const currentIdx = allClassSessions.findIndex(sess => sess.weekId === copySource.weekId && sess.dayIndex === copySource.day && sess.slot.id === copySource.slot);
                    for (let i = currentIdx + 1; i < allClassSessions.length; i++) {
                        if (!allClassSessions[i].isZzz && !allClassSessions[i].isHoliday) {
                            targetSession = allClassSessions[i];
                            break;
                        }
                    }
                } else if (targetType === 'manual') {
                     targetSession = { weekId: copySource.weekId, dayIndex: targetDay, slot: {id: targetSlot} };
                }

                if (targetSession) {
                    const targetWData = { ...(weeksData[targetSession.weekId] || {}) };
                    const existingTasks = getTasks(targetSession.weekId, targetSession.dayIndex, targetSession.slot.id);
                    const combined = [...existingTasks.filter(t => t.text.trim()), ...sourceTasks.map(t => ({...t, status: null}))];
                    while(combined.length < 3) combined.push({text:"", time:"", status: null});
                    
                    targetWData[`${targetSession.dayIndex}-${targetSession.slot.id}`] = { 
                        ...(targetWData[`${targetSession.dayIndex}-${targetSession.slot.id}`] || {}), 
                        tasks: combined 
                    };
                    
                    if (targetSession.weekId === copySource.weekId) {
                        updatePlanData(targetSession.weekId, targetWData);
                    } else {
                        onUpdateWeekData(targetSession.weekId, targetWData);
                    }
                    alert("Copiades!");
                    setShowCopyModal(false);
                } else { 
                    alert("No s'ha trobat cap sessió de destí."); 
                }
            };

            const generateHTML = (onlyRows = false, interval = "") => {
                let html = onlyRows ? '' : `<table style="width:100%; border-collapse:collapse; font-family:Arial, sans-serif;"><tbody>`;
                
                let minSess = 1, maxSess = 999;
                if (interval.trim() !== "") {
                    if (interval.includes('-')) {
                        const parts = interval.split('-');
                        minSess = parseInt(parts[0]) || 1;
                        maxSess = parseInt(parts[1]) || 999;
                    } else {
                        minSess = parseInt(interval) || 1;
                        maxSess = parseInt(interval) || 999;
                    }
                }

                visibleWeeks.forEach(w => {
                    const sessions = allClassSessions.filter(sess => sess.weekId === w.id);
                    sessions.forEach(sess => {
                        if (sess.isHoliday) return;

                        if (interval.trim() !== "") {
                            if (sess.sessionNumber === null || sess.sessionNumber < minSess || sess.sessionNumber > maxSess) return;
                        } else {
                            if (sess.sessionNumber !== null && (sess.sessionNumber < minSess || sess.sessionNumber > maxSess)) return;
                        }

                        const data = sess.data || {};
                        const tasks = data.tasks || [];
                        const validTasks = tasks.filter(t => t.text.trim());
                        
                        let contentHtml = "";
                        if (data.status === 'zzz') {
                            const rao = data.zzzReason ? ` (${data.zzzReason})` : '';
                            contentHtml = `💤 NO ES FA CLASSE${rao}`;
                        } else {
                            contentHtml = validTasks.map(t => {
                                let style = "margin-bottom: 4px;";
                                let prefix = "";
                                if(t.status === 'skipped') style += "text-decoration:line-through;color:#DC2626;font-style:italic;";
                                if(t.status === 'unfinished') style += "text-decoration:underline;text-decoration-color:#DC2626;font-weight:600;color:#b91c1c;";
                                if(t.tag === 'skipped') prefix = "🔴 ";
                                if(t.tag === 'unfinished') prefix = "⚠️ ";
                                const timeStr = t.time ? `<b>[${t.time}']</b> ` : "";
                                return `<div style="${style}">• ${prefix}${timeStr}${t.text}</div>`;
                            }).join('');
                            if (data.review) contentHtml += `<div style="color:#DC2626; margin-top: 4px; font-weight: bold;">[REV: ${data.review}]</div>`;
                        }

                        if (contentHtml || validTasks.length > 0 || data.notes || data.materials) {
                            const linksHtml = data.links && data.links.length > 0 ? `<div style="margin-top: 6px;"><b>Enllaços:</b><br>` + data.links.map(l => {
                                const url = typeof l === 'string' ? l : l.url;
                                const title = typeof l === 'string' ? l : (l.title || l.url);
                                return `<a href="${url}" target="_blank" style="color:#2563EB;text-decoration:underline;">${title}</a>`;
                            }).join('<br>') + `</div>` : '';
                            
                            html += `<tr style="border-bottom: 1px solid #E5E7EB;">
                                <td style="padding:12px; vertical-align:top; border-right: 1px solid #E5E7EB; width: 40%;">${contentHtml}</td>
                                <td style="padding:12px; vertical-align:top; border-right: 1px solid #E5E7EB; width: 30%;">${data.materials ? data.materials.replace(/\n/g, '<br>') : ''}${linksHtml}</td>
                                <td style="padding:12px; font-style:italic; vertical-align:top; width: 30%; color: #4B5563;">${data.notes ? data.notes.replace(/\n/g, '<br>') : ''}</td>
                            </tr>`;
                        }
                    });
                });
                
                if (!onlyRows) html += `</tbody></table>`;
                return html;
            };

            const handleExportToProgramacio = () => {
                const htmlRows = generateHTML(true, exportInterval);
                const strippedRows = htmlRows.replace('<table style="width:100%; border-collapse:collapse; font-family:Arial, sans-serif;"><tbody>', '').replace('</tbody></table>', '');
                
                const payload = {
                    action: 'SYNC_TABLE',
                    curs: stripClassLetter(exportConfig.curs),
                    ut: exportConfig.ut.trim(),
                    fase: exportConfig.fase,
                    html: strippedRows,
                    mode: 'append',
                    timestamp: Date.now()
                };
                
                window.pendingSyncPayload = payload;
                const targetUrl = config.googleSheetUrl || 'https://marcpcasals.github.io/MarcBook/Altres/programador.html';
                window.open(targetUrl, '_blank');
                
                setShowExportModal(false);
            };

            const addMaterial = () => {
                if (!newMatUrl.trim()) return;
                const newMaterial = {
                    id: Date.now().toString(),
                    title: newMatTitle.trim(),
                    url: newMatUrl.trim()
                };
                const updatedMaterials = { ...(config.classMaterials || {}) };
                updatedMaterials[classId] = [...(updatedMaterials[classId] || []), newMaterial];
                onConfigChange({ ...config, classMaterials: updatedMaterials });
                setNewMatTitle("");
                setNewMatUrl("");
            };

            const removeMaterial = (mId) => {
                const updatedMaterials = { ...(config.classMaterials || {}) };
                updatedMaterials[classId] = (updatedMaterials[classId] || []).filter(m => m.id !== mId);
                onConfigChange({ ...config, classMaterials: updatedMaterials });
            };

            const handleCopyMaterial = (url) => {
                const el = document.createElement('textarea');
                el.value = url;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("Enllaç copiat al portapapers!");
            };

            // NOU DISSENY AMB FLEXBOX PER EVITAR QUE EL HEADER TAPI LA BARRA LATERAL
            return (
                <div className="max-w-[1500px] mx-auto p-4 fade-in pb-20 flex flex-col xl:flex-row gap-6 items-start">
                    
                    {/* COLUMNA ESQUERRA (Contingut Principal) */}

const IntelligentImportModal = ({ data, config, weeksData, holidayWeeks, onConfirm, onClose }) => {
            const [selectedClassId, setSelectedClassId] = useState("");
            const [selectedUT, setSelectedUT] = useState("");

            useEffect(() => {
                if (data && data.courseName) {
                    const cleanCourse = data.courseName.toLowerCase().replace(/[^a-z0-9]/g, '');
                    const found = config.classes.find(c => c.name.toLowerCase().replace(/[^a-z0-9]/g, '').includes(cleanCourse) || cleanCourse.includes(c.name.toLowerCase().replace(/[^a-z0-9]/g, '')));

                }
                if (!selectedClassId && config.classes.length > 0) {
                    setSelectedClassId(config.classes[0].id);
                }
            }, [data, config]);

            const handleProcess = () => {
                if (!selectedClassId) return alert("Selecciona una classe destí");

                let newWeeksData = JSON.parse(JSON.stringify(weeksData));
                let totalInserted = 0;
                let totalMissing = 0;

                const allWeeks = generateAllWeeks(config.schoolYear);
                
                let startDate = new Date(config.schoolYear, 8, 1);
                let endDate = new Date(parseInt(config.schoolYear) + 1, 6, 15);
                
                if (selectedUT) {
                     const targetUT = config.utDates.find(u => u.id === selectedUT);
                     if (targetUT) {
                         endDate = new Date(targetUT.date);
                         endDate.setHours(23, 59, 59, 999);
                         const sortedUTs = [...config.utDates].sort((a,b) => new Date(a.date) - new Date(b.date));
                         const utIndex = sortedUTs.findIndex(ut => ut.id === targetUT.id);
                         if (utIndex > 0) startDate = new Date(sortedUTs[utIndex - 1].date);
                     }
                }

                let classSessions = [];
                allWeeks.forEach(w => {
                    const isHoliday = holidayWeeks?.includes(w.id);
                    for (let d = 0; d < 5; d++) {
                        for (let s = 0; s < TIME_SLOTS.length; s++) {
                            const slot = TIME_SLOTS[s];
                            if (slot.type === 'break') continue;
                            
                            const isGlobal = config.schedule[d]?.[slot.id] === selectedClassId;
                            const isExtra = newWeeksData[w.id]?.extraClasses?.[d]?.[slot.id] === selectedClassId;
                            
                            if (isGlobal || isExtra) {
                                const prevSlot = TIME_SLOTS[s - 1];
                                const isCovered = prevSlot && !isExtra && config.durations?.[`${d}-${prevSlot.id}`] === 2 && config.schedule[d]?.[prevSlot.id] === selectedClassId;
                                if (isCovered) continue;

                                const dateStr = addDays(w.id, d);
                                const [y, m, day] = dateStr.split('-');
                                const sessionDate = new Date(y, m - 1, day, 12, 0, 0);

                                if (sessionDate >= startDate && sessionDate <= endDate) {
                                    const cellData = newWeeksData[w.id]?.[`${d}-${slot.id}`] || {};
                                    classSessions.push({
                                        weekId: w.id,
                                        dayIndex: d,
                                        slotId: slot.id,
                                        isHoliday: isHoliday,
                                        isZzz: cellData.status === 'zzz',
                                        tasks: cellData.tasks || []
                                    });
                                }
                            }
                        }
                    }
                });

                let agendaIndex = 0;
                const progSessions = data.sessions;

                for (let i = 0; i < progSessions.length; i++) {
                    const pSess = progSessions[i];
                    let placed = false;

                    while (agendaIndex < classSessions.length) {
                        const sess = classSessions[agendaIndex];
                        
                        // LÒGICA CLAU: Comprovem si la sessió ja té text escrit prèviament
                        const hasExistingText = sess.tasks.some(t => t && t.text && t.text.trim() !== '');

                        // Saltem si és festiu, si està cancel·lada (zzz), o si JA TÉ TEXT (evitem sobreescriure)
                        if (sess.isHoliday || sess.isZzz || hasExistingText) {
                            agendaIndex++;
                            continue;
                        }

                        // Hem trobat un forat buit real!
                        const wId = sess.weekId;
                        const cellKey = `${sess.dayIndex}-${sess.slotId}`;
                        
                        if (!newWeeksData[wId]) newWeeksData[wId] = {};
                        if (!newWeeksData[wId][cellKey]) newWeeksData[wId][cellKey] = {};
                        
                        const newTasks = [];
                        if (pSess.activities && pSess.activities.length > 0) {
                             pSess.activities.forEach(act => {
                                 if (typeof act === 'string') {
                                     const match = act.match(/^(\d+)'/);
                                     if (match) {
                                         const time = parseInt(match[1]);
                                         const text = act.replace(/^(\d+)'/, '').trim();
                                         newTasks.push({ text: text, time: time, status: null });
                                     } else {
                                         newTasks.push({ text: act.trim(), time: "", status: null });
                                     }
                                 } else {
                                     const taskText = act.text || act.description || act.title || act.name || "";
                                     const taskTime = act.time || act.duration || "";
                                     newTasks.push({ text: taskText, time: taskTime, status: null });
                                 }
                             });
                        } else if (pSess.description || pSess.text) {
                            const taskText = pSess.text || pSess.description || "";
                            const taskTime = pSess.time || pSess.duration || "";
                            if (taskText) newTasks.push({ text: taskText, time: taskTime, status: null });
                        }
                        
                        console.log("Activitats parsejades:", newTasks);

                        while (newTasks.length < 3) newTasks.push({ text: "", time: "", status: null });
                        
                        let parsedMaterials = [];
                        let parsedLinks = [];
                        
                        if (pSess.materials && Array.isArray(pSess.materials)) {
                            pSess.materials.forEach(mat => {
                                if (typeof mat === 'string') {
                                    const match = mat.match(/^(.*?)\s*\((https?:\/\/.*?)\)$/);
                                    if (match) {
                                        parsedLinks.push({
                                            title: match[1].trim() || match[2].trim(),
                                            url: match[2].trim()
                                        });
                                    } else {
                                        parsedMaterials.push(mat.trim());
                                    }
                                }
                            });
                        } else if (pSess.materials && typeof pSess.materials === 'string') {
                             parsedMaterials.push(pSess.materials.trim());
                        }
                        
                        if (pSess.links && Array.isArray(pSess.links)) {
                            parsedLinks = [...parsedLinks, ...pSess.links];
                        }
                        
                        console.log("Materials parsejats:", parsedMaterials);
                        console.log("Links parsejats:", parsedLinks);

                        const existingData = newWeeksData[wId][cellKey] || {};
                        
                        newWeeksData[wId][cellKey] = {
                            ...existingData,
                            tasks: newTasks,
                            materials: parsedMaterials.join('\n'),
                            links: parsedLinks
                        };
                        
                        placed = true;
                        totalInserted++;
                        agendaIndex++;
                        break;
                    }
                    
                    if (!placed) {
                        totalMissing++;
                    }
                }

                onConfirm(newWeeksData, totalInserted, totalMissing);
            };

            return (
                <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg p-6 relative animate-in zoom-in duration-200">
                        <div className="flex items-center gap-3 mb-6 border-b pb-4">
                            <div className="bg-blue-100 p-3 rounded-full text-blue-600">
                                <Icons.Download size={24}/>
                            </div>
                            <div>
                                <h3 className="text-xl font-bold text-gray-800">Importació Intel·ligent</h3>
                                <p className="text-sm text-gray-500">S'han detectat {data?.sessions?.length || 0} sessions al document.</p>
                            </div>
                        </div>

                        <div className="space-y-4 mb-6">
                            <div className="bg-blue-50 p-4 rounded-lg border border-blue-100">
                                <label className="block text-sm font-bold text-blue-800 mb-2">1. A quina classe pertanyen aquestes sessions?</label>
                                <select 
                                    className="w-full p-2 border border-blue-300 rounded focus:ring-2 focus:ring-blue-500 outline-none"
                                    value={selectedClassId}
                                    onChange={(e) => setSelectedClassId(e.target.value)}
                                >
                                    {config.classes.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                            </div>

                            <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                <label className="block text-sm font-bold text-gray-700 mb-2">2. Des de quina UT vols començar? (Opcional)</label>
                                <select 
                                    className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-gray-500 outline-none"
                                    value={selectedUT}
                                    onChange={(e) => setSelectedUT(e.target.value)}
                                >
                                    <option value="">Des de l'inici del curs (Setembre)</option>
                                    {(config.utDates || []).map(ut => <option key={ut.id} value={ut.id}>{ut.name} (Acaba: {new Date(ut.date).toLocaleDateString()})</option>)}
                                </select>
                            </div>
                            
                            <div className="text-xs text-gray-500 bg-gray-100 p-3 rounded flex gap-2 items-start">
                                <Icons.AlertCircle size={16} className="shrink-0 text-gray-400 mt-0.5"/>
                                <p>L'importador buscarà automàticament els forats lliures en l'horari d'aquesta classe i hi col·locarà les sessions. <b>Les cel·les que ja tinguin text no es sobreescriuran.</b></p>
                            </div>
                        </div>

                        <div className="flex justify-end gap-3">
                            <button onClick={onClose} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg font-medium transition-colors">Cancel·lar</button>
                            <button onClick={handleProcess} className="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 shadow-md transition-all flex items-center gap-2">
                                <Icons.Check size={18}/> Inserir a l'Agenda
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [config, setConfig] = useState({ classes: [], schedule: {}, schoolYear: new Date().getFullYear().toString(), teacherName: "" });
            const [weeksData, setWeeksData] = useState({});
            const [radar, setRadar] = useState([]);
            const [holidayWeeks, setHolidayWeeks] = useState([]);
            const [reminders, setReminders] = useState({});
            const [currentWeekId, setCurrentWeekId] = useState(null);
            const [selectedClassId, setSelectedClassId] = useState(null);
            const [isLoaded, setIsLoaded] = useState(false);
            const [pendingImportData, setPendingImportData] = useState(null);

            useEffect(() => {
                const initApp = () => {
                    if (window.cloudAgendaData) {
                        const d = window.cloudAgendaData;
                        setConfig(d.config || { classes: [], schedule: {}, schoolYear: new Date().getFullYear().toString(), teacherName: "" });
                        setWeeksData(d.weeksData || {});
                        setRadar(d.radar || []);
                        setHolidayWeeks(d.holidayWeeks || []);
                        setReminders(d.reminders || {});
                    } else {
                        setView('config');
                    }
                    setIsLoaded(true);
                    const loader = document.getElementById('app-loader');
                    if (loader) loader.style.opacity = '0';
                    setTimeout(() => { if (loader) loader.style.display = 'none'; }, 500);

                    // Escoltador per importar des de Programació Docent
                    window.addEventListener('message', (event) => {
                        if (event.data && event.data.action === 'IMPORT_SESSIONS') {
                            setPendingImportData(event.data.payload);
                        }
                    });
                };

                if (window.firebaseInitialized) { initApp(); } 
                else { window.addEventListener('firebaseReady', initApp); }
                
                return () => window.removeEventListener('firebaseReady', initApp);
            }, []);

            useEffect(() => {
                if (isLoaded) {
                    window.currentAgendaData = JSON.stringify({ config, weeksData, radar, holidayWeeks, reminders });
                    window.saveAgendaToCloud({ config, weeksData, radar, holidayWeeks, reminders });
                }
            }, [config, weeksData, radar, holidayWeeks, reminders, isLoaded]);

            const handleUpdateWeekData = (wId, newData) => setWeeksData(prev => ({ ...prev, [wId]: newData }));
            const handleSelectWeek = (wId) => { setCurrentWeekId(wId); setView('planner'); };
            const handleSelectClassView = (cId) => { setSelectedClassId(cId); setView('class_planner'); };
            const handleToggleHoliday = (wId) => { setHolidayWeeks(prev => prev.includes(wId) ? prev.filter(id => id !== wId) : [...prev, wId]); };
            const handleSaveReminder = (dateStr, rems) => { setReminders(prev => ({...prev, [dateStr]: rems})); };

            const handleExport = () => {
                const dataStr = JSON.stringify({ config, weeksData, radar, holidayWeeks, reminders });
                window.downloadBackupJSON(dataStr, `AgendaDocent_${new Date().toISOString().split('T')[0]}.json`);
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const parsed = JSON.parse(evt.target.result);
                        if (confirm("Això sobreescriurà les dades actuals. Vols continuar?")) {
                            setConfig(parsed.config || { classes: [], schedule: {}, schoolYear: new Date().getFullYear().toString() });
                            setWeeksData(parsed.weeksData || {});
                            setRadar(parsed.radar || []);
                            setHolidayWeeks(parsed.holidayWeeks || []);
                            setReminders(parsed.reminders || {});
                            await window.saveAgendaToCloud(parsed);
                            alert("Dades carregades i guardades al núvol correctament!");
                        }
                    } catch(err) { alert("Error al llegir l'arxiu. Assegura't que és un .json vàlid."); }
                };
                reader.readAsText(file);
            };

            const handleReset = () => {
                setConfig({ classes: [], schedule: {}, schoolYear: new Date().getFullYear().toString(), teacherName: "" });
                setWeeksData({}); setRadar([]); setHolidayWeeks([]); setReminders({});
                setView('config');
            };

            if (!isLoaded) return null;

            return (
                <div className={`min-h-screen bg-${config.theme || 'orange'}-50/30`}>
                    {view === 'config' && <ConfigScreen config={config} onSave={(newConfig) => { setConfig(newConfig); setView('dashboard'); }} />}
                    
                    {view === 'dashboard' && <DashboardScreen config={config} radar={radar} setRadar={setRadar} onSelectWeek={handleSelectWeek} onSelectClassView={handleSelectClassView} onExport={handleExport} onImport={handleImport} goToConfig={() => setView('config')} onReset={handleReset} onSaveConfig={setConfig} holidayWeeks={holidayWeeks} onToggleHoliday={handleToggleHoliday} reminders={reminders} onSaveReminder={handleSaveReminder} weeksData={weeksData} />}
                    
                    {view === 'planner' && <PlannerScreen weekId={currentWeekId} weeksData={weeksData} config={config} onConfigChange={setConfig} onUpdateWeekData={handleUpdateWeekData} onBack={() => setView('dashboard')} onAddToRadar={(t, d) => setRadar([...radar, { id: Date.now(), text: t, date: d, fromTask: true, completedAt: null }])} allWeeks={generateAllWeeks(config.schoolYear)} holidayWeeks={holidayWeeks} reminders={reminders} onSaveReminder={handleSaveReminder} />}
                    
                    {view === 'class_planner' && <ClassPlannerScreen classId={selectedClassId} config={config} weeksData={weeksData} allWeeks={generateAllWeeks(config.schoolYear)} holidayWeeks={holidayWeeks} onUpdateWeekData={handleUpdateWeekData} onConfigChange={setConfig} onBack={() => setView('dashboard')} onAddToRadar={(t, d) => setRadar([...radar, { id: Date.now(), text: t, date: d, fromTask: true, completedAt: null }])} reminders={reminders} onSaveReminder={handleSaveReminder} />}

                    {/* MODAL D'IMPORTACIÓ INTEL·LIGENT (S'activa al rebre el postMessage) */}
                    {pendingImportData && (
                        <IntelligentImportModal 
                            data={pendingImportData}
                            config={config}
                            weeksData={weeksData}
                            holidayWeeks={holidayWeeks}
                            onConfirm={(newWeeksData, inserted, missing) => {
                                setWeeksData(newWeeksData);
                                window.saveAgendaToCloud({ config, weeksData: newWeeksData, radar, holidayWeeks, reminders });
                                setPendingImportData(null);
                                if (missing > 0) {
                                    alert(`⚠️ Atenció: S'han importat ${inserted} sessions, però no hi ha hagut espai per a ${missing} sessions.\n\nS'han col·locat només als espais buits (sense text) per no sobreescriure la teva feina. Cerca més endavant al calendari!`);
                                } else {
                                    alert(`✅ Èxit! S'han importat les ${inserted} sessions perfectament als espais lliures.`);
                                }
                            }}
                            onClose={() => setPendingImportData(null)}
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
