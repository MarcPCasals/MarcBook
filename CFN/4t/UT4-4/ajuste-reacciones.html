<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="/MarcBook/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Balanza Química</title>
    
    <!-- Librerías de React y Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- html2pdf para descargar el informe -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f8fafc; }
        
        /* Animaciones suaves */
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .celebrate { animation: celebrate 0.5s ease-in-out; }
        @keyframes celebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.1) rotate(2deg); }
            100% { transform: scale(1); }
        }

        /* Estilos DUA y Accesibilidad */
        .coef-input:focus { outline: 3px solid #3b82f6; outline-offset: 2px; }
        
        /* Ocultar flechas del input number */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        /* Scrollbar personalizado */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col overflow-hidden">
    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ==========================================
        // 1. BASE DE DATOS Y CONFIGURACIÓN
        // ==========================================

        const ELEMENT_COLORS = {
            'H': '#fcd34d', 'O': '#ef4444', 'C': '#8b5cf6', 'N': '#3b82f6', 
            'Cl': '#22c55e', 'Mg': '#f472b6', 'Ca': '#a855f7', 'S': '#eab308',
            'Al': '#0ea5e9', 'Cr': '#14b8a6', 'Na': '#8b5cf6', 'P': '#f97316', 'F': '#86efac'
        };

        const ELEMENT_SIZES = {
            'H': 12, 'O': 16, 'C': 18, 'N': 17, 'F': 15,
            'Na': 22, 'Mg': 20, 'Al': 19, 'P': 21, 'S': 20, 'Cl': 19,
            'Ca': 26, 'Cr': 24
        };

        const EQUATIONS = [
            { id: 'eq1', type: 'Desplazamiento simple', desc: 'Reacción de un ácido con un metal (corrosión). Frecuente en la degradación de estructuras metálicas expuestas a lluvia ácida.', reactants: [{ f: 'Mg', a: {Mg:1}, n: 'Magnesio' }, { f: 'HCl', a: {H:1, Cl:1}, n: 'Ácido clorhídrico' }], products: [{ f: 'MgCl₂', a: {Mg:1, Cl:2}, n: 'Cloruro de magnesio' }, { f: 'H₂', a: {H:2}, n: 'Hidrógeno' }], solution: [1, 2, 1, 1], libreta: { f: 'C₂H₆ + O₂ → CO₂ + H₂O', solTexto: '2 C₂H₆ + 7 O₂ → 4 CO₂ + 6 H₂O' } },
            { id: 'eq2', type: 'Síntesis', desc: 'Formación de nitruros. Reacción que ocurre al calentar metales en atmósferas ricas en nitrógeno.', reactants: [{ f: 'Ca', a: {Ca:1}, n: 'Calcio' }, { f: 'N₂', a: {N:2}, n: 'Nitrógeno' }], products: [{ f: 'Ca₃N₂', a: {Ca:3, N:2}, n: 'Nitruro de calcio' }], solution: [3, 1, 1], libreta: { f: 'C₃H₈ + O₂ → CO₂ + H₂O', solTexto: 'C₃H₈ + 5 O₂ → 3 CO₂ + 4 H₂O' } },
            { id: 'eq3', type: 'Descomposición', desc: 'Descomposición de nitrato de amonio (fertilizante). Su uso excesivo causa eutrofización y contaminación grave de acuíferos.', reactants: [{ f: 'NH₄NO₃', a: {N:2, H:4, O:3}, n: 'Nitrato de amonio' }], products: [{ f: 'N₂O', a: {N:2, O:1}, n: 'Óxido nitroso' }, { f: 'H₂O', a: {H:2, O:1}, n: 'Agua' }], solution: [1, 1, 2], libreta: { f: 'Fe + O₂ → Fe₂O₃', solTexto: '4 Fe + 3 O₂ → 2 Fe₂O₃' } },
            { id: 'eq4', type: 'Doble desplazamiento', desc: 'Formación de sulfuro de hidrógeno (gas tóxico). Puede darse en vertidos industriales incontrolados que mezclan ácidos y sulfuros.', reactants: [{ f: 'AlCl₃', a: {Al:1, Cl:3}, n: 'Cloruro de aluminio' }, { f: 'H₂S', a: {H:2, S:1}, n: 'Sulfuro de hidrógeno' }], products: [{ f: 'Al₂S₃', a: {Al:2, S:3}, n: 'Sulfuro de aluminio' }, { f: 'HCl', a: {H:1, Cl:1}, n: 'Cloruro de hidrógeno' }], solution: [2, 3, 1, 6], libreta: { f: 'Al + O₂ → Al₂O₃', solTexto: '4 Al + 3 O₂ → 2 Al₂O₃' } },
            { id: 'eq5', type: 'Combustión', desc: 'Combustión de butano (gas fósil). Principal causa de emisión de CO₂ antropogénico y del calentamiento global.', reactants: [{ f: 'C₄H₁₀', a: {C:4, H:10}, n: 'Butano' }, { f: 'O₂', a: {O:2}, n: 'Oxígeno' }], products: [{ f: 'CO₂', a: {C:1, O:2}, n: 'Dióxido de carbono' }, { f: 'H₂O', a: {H:2, O:1}, n: 'Agua' }], solution: [2, 13, 8, 10], libreta: { f: 'NH₃ + O₂ → NO + H₂O', solTexto: '4 NH₃ + 5 O₂ → 4 NO + 6 H₂O' } },
            // A partir de la 6 (index 5) se añaden los nuevos retos de libreta y bloqueos
            { id: 'eq6', type: 'Combustión celular', desc: 'Respiración celular. El proceso biológico fundamental donde los seres vivos obtienen energía quemando glucosa.', reactants: [{ f: 'C₆H₁₂O₆', a: {C:6, H:12, O:6}, n: 'Glucosa' }, { f: 'O₂', a: {O:2}, n: 'Oxígeno' }], products: [{ f: 'CO₂', a: {C:1, O:2}, n: 'Dióxido de carbono' }, { f: 'H₂O', a: {H:2, O:1}, n: 'Agua' }], solution: [1, 6, 6, 6], libreta: { f: 'C₄H₁₀ + O₂ → CO₂ + H₂O', solTexto: '2 C₄H₁₀ + 13 O₂ → 8 CO₂ + 10 H₂O' } },
            { id: 'eq7', type: 'Redox', desc: 'Formación de lluvia ácida. Los gases de los tubos de escape (NO₂) reaccionan con el agua de las nubes formando ácido nítrico.', reactants: [{ f: 'NO₂', a: {N:1, O:2}, n: 'Dióxido de nitrógeno' }, { f: 'H₂O', a: {H:2, O:1}, n: 'Agua' }], products: [{ f: 'HNO₃', a: {H:1, N:1, O:3}, n: 'Ácido nítrico' }, { f: 'NO', a: {N:1, O:1}, n: 'Monóxido de nitrógeno' }], solution: [3, 1, 2, 1], libreta: { f: 'Ca + N₂ → Ca₃N₂', solTexto: '3 Ca + N₂ → Ca₃N₂' } },
            { id: 'eq8', type: 'Doble desplazamiento', desc: 'Tratamiento de aguas residuales. Se usa hidróxido de sodio para neutralizar y precipitar metales pesados contaminantes como el cromo.', reactants: [{ f: 'Cr₂(SO₄)₃', a: {Cr:2, S:3, O:12}, n: 'Sulfato de cromo(III)' }, { f: 'NaOH', a: {Na:1, O:1, H:1}, n: 'Hidróxido de sodio' }], products: [{ f: 'Cr(OH)₃', a: {Cr:1, O:3, H:3}, n: 'Hidróxido de cromo(III)' }, { f: 'Na₂SO₄', a: {Na:2, S:1, O:4}, n: 'Sulfato de sodio' }], solution: [1, 6, 2, 3], libreta: { f: 'Na₃PO₄ + MgCl₂ → NaCl + Mg₃(PO₄)₂', solTexto: '2 Na₃PO₄ + 3 MgCl₂ → 6 NaCl + Mg₃(PO₄)₂' } },
            { id: 'eq9', type: 'Hidrólisis', desc: 'Generación de gas metano. El metano es un gas de efecto invernadero 25 veces más potente que el CO₂.', reactants: [{ f: 'Al₄C₃', a: {Al:4, C:3}, n: 'Carburo de aluminio' }, { f: 'H₂O', a: {H:2, O:1}, n: 'Agua' }], products: [{ f: 'CH₄', a: {C:1, H:4}, n: 'Metano' }, { f: 'Al(OH)₃', a: {Al:1, O:3, H:3}, n: 'Hidróxido de aluminio' }], solution: [1, 12, 3, 4], libreta: { f: 'C₂H₅OH + O₂ → CO₂ + H₂O', solTexto: 'C₂H₅OH + 3 O₂ → 2 CO₂ + 3 H₂O' } },
            // Extras
            { id: 'ext1', type: 'Síntesis', desc: 'Combustión incompleta. Forma monóxido de carbono (CO), un gas muy tóxico y silencioso producido en estufas mal ventiladas.', reactants: [{ f: 'C', a: {C:1}, n: 'Carbono' }, { f: 'O₂', a: {O:2}, n: 'Oxígeno' }], products: [{ f: 'CO', a: {C:1, O:1}, n: 'Monóxido de carbono' }], solution: [2, 1, 2] },
            { id: 'ext2', type: 'Síntesis', desc: 'Contaminación por motores. Forma gases NOx responsables del "smog fotoquímico" (la boina de humo) en grandes ciudades.', reactants: [{ f: 'N₂', a: {N:2}, n: 'Nitrógeno' }, { f: 'O₂', a: {O:2}, n: 'Oxígeno' }], products: [{ f: 'N₂O₅', a: {N:2, O:5}, n: 'Pentóxido de dinitrógeno' }], solution: [2, 5, 2] },
            { id: 'ext3', type: 'Síntesis', desc: 'Formación de óxidos de fósforo. Usado en la industria química; un mal vertido daña gravemente ecosistemas acuáticos.', reactants: [{ f: 'P', a: {P:1}, n: 'Fósforo' }, { f: 'O₂', a: {O:2}, n: 'Oxígeno' }], products: [{ f: 'P₂O₅', a: {P:2, O:5}, n: 'Pentóxido de difósforo' }], solution: [4, 5, 2] },
            { id: 'ext4', type: 'Hidrogenación', desc: 'Reacción muy utilizada en la industria petroquímica y alimentaria para procesar y saturar compuestos.', reactants: [{ f: 'C₂H₂', a: {C:2, H:2}, n: 'Acetileno' }, { f: 'H₂', a: {H:2}, n: 'Hidrógeno' }], products: [{ f: 'C₂H₆', a: {C:2, H:6}, n: 'Etano' }], solution: [1, 2, 1] },
        ];

        const RETOS = [
            { id: 'r1', level: 1, title: 'Nivel 1: Difícil', hints: false, views: [], reactants: [{ f: 'PCl₃', a: {P:1, Cl:3}, n: 'Tricloruro de fósforo' }], products: [{ f: 'P₄', a: {P:4}, n: 'Fósforo blanco' }, { f: 'Cl₂', a: {Cl:2}, n: 'Cloro' }], solution: [4, 1, 6] },
            { id: 'r2', level: 2, title: 'Nivel 2: Muy Difícil', hints: false, views: [], reactants: [{ f: 'OF₂', a: {O:1, F:2}, n: 'Difluoruro de oxígeno' }, { f: 'H₂O', a: {H:2, O:1}, n: 'Agua' }], products: [{ f: 'O₂', a: {O:2}, n: 'Oxígeno' }, { f: 'HF', a: {H:1, F:1}, n: 'Fluoruro de hidrógeno' }], solution: [1, 1, 1, 2] },
            { id: 'r3', level: 3, title: 'Nivel 3: A ciegas', hints: false, views: [], reactants: [{ f: 'CO₂', a: {C:1, O:2}, n: 'Dióxido de carbono' }, { f: 'H₂O', a: {H:2, O:1}, n: 'Agua' }], products: [{ f: 'C₂H₆', a: {C:2, H:6}, n: 'Etano' }, { f: 'O₂', a: {O:2}, n: 'Oxígeno' }], solution: [4, 6, 2, 7] }
        ];

        // ==========================================
        // 2. UTILIDADES QUÍMICAS Y LÓGICA
        // ==========================================

        const gcd = (a, b) => b ? gcd(b, a % b) : a;
        
        const getSimplifiedStatus = (coefs) => {
            const allZero = coefs.every(c => c === 0);
            if (allZero) return false;
            const hasZero = coefs.some(c => c === 0);
            if (hasZero) return false; // Si falta algún coef, no está completo
            
            const divisor = coefs.reduce((acc, val) => gcd(acc, val));
            return divisor === 1;
        };

        const calculateAtoms = (equation, coefs) => {
            const rTotals = {}; const pTotals = {};
            const elements = new Set();

            equation.reactants.forEach((mol, idx) => {
                const c = coefs[idx] || 0;
                Object.entries(mol.a).forEach(([elem, count]) => {
                    rTotals[elem] = (rTotals[elem] || 0) + (count * c);
                    elements.add(elem);
                });
            });

            equation.products.forEach((mol, idx) => {
                const c = coefs[idx + equation.reactants.length] || 0;
                Object.entries(mol.a).forEach(([elem, count]) => {
                    pTotals[elem] = (pTotals[elem] || 0) + (count * c);
                    elements.add(elem);
                });
            });

            return { rTotals, pTotals, elements: Array.from(elements) };
        };

        // ==========================================
        // 3. COMPONENTES VISUALES (DUA)
        // ==========================================

        const FormattedFormula = ({ formula, colorMode = 'color' }) => {
            const parts = formula.split(/([A-Z][a-z]*)/);
            return (
                <span>
                    {parts.map((part, i) => {
                        if (!part) return null;
                        if (/^[A-Z][a-z]*$/.test(part)) {
                            let clr = 'inherit';
                            if (colorMode === 'black') clr = '#000';
                            else if (colorMode === 'white') clr = '#fff';
                            else clr = ELEMENT_COLORS[part] || 'inherit';
                            return <span key={i} style={{ color: clr }}>{part}</span>;
                        }
                        return <span key={i} style={{ color: colorMode === 'white' ? '#fff' : 'inherit' }}>{part}</span>;
                    })}
                </span>
            );
        };

        const AtomSphere = ({ element, count }) => {
            const color = ELEMENT_COLORS[element] || '#9ca3af';
            const size = ELEMENT_SIZES[element] || 16;
            const spheres = Array.from({ length: Math.min(count, 36) }); // Cap visual
            return (
                <div className="flex flex-wrap gap-1 justify-center max-w-[80px]">
                    {spheres.map((_, i) => (
                        <div key={i} className="rounded-full shadow-md border border-slate-300" style={{ backgroundColor: color, width: `${size}px`, height: `${size}px` }} title={element}></div>
                    ))}
                    {count > 36 && <span className="text-xs font-bold">+</span>}
                </div>
            );
        };

        const BalanzaView = ({ elements, rTotals, pTotals, showIndividualBalances = true }) => {
            if (!showIndividualBalances) return null; 

            return (
                <div className="w-full flex-1 flex flex-col fade-in">
                    <div className="flex flex-wrap justify-center gap-4 sm:gap-6 w-full mx-auto pb-4">
                        {elements.map(el => {
                            const rCount = rTotals[el] || 0;
                            const pCount = pTotals[el] || 0;
                            const diff = pCount - rCount;
                            const angle = Math.max(-20, Math.min(20, diff * 5)); 
                            const isBalanced = rCount === pCount && rCount > 0;
                            const bgClass = isBalanced ? 'bg-green-50 border-green-200' : 'bg-white border-slate-100';
                            
                            return (
                                <div key={el} className={`flex flex-col items-center px-2 py-3 rounded-xl shadow-sm border transition-colors duration-500 ${bgClass}`}>
                                    <span className="font-bold text-slate-600 mb-2 text-sm" style={{color: ELEMENT_COLORS[el]}}>{el}</span>
                                    <div className="relative w-[240px] sm:w-[260px] h-20 flex items-end justify-center">
                                        <div className="absolute bottom-0 w-0 h-0 border-l-[8px] border-r-[8px] border-b-[16px] border-transparent border-b-slate-400 z-10"></div>
                                        <div className="absolute bottom-[16px] w-36 sm:w-40 h-1 bg-slate-400 transition-transform duration-500 origin-center flex justify-between" style={{ transform: `rotate(${angle}deg)` }}>
                                            <div className="relative" style={{ transform: `rotate(${-angle}deg)` }}>
                                                <div className="absolute -top-14 -left-10 w-20 flex flex-col items-center">
                                                    <AtomSphere element={el} count={rCount} />
                                                    <div className="w-16 h-1 bg-slate-300 mt-1"></div>
                                                </div>
                                            </div>
                                            <div className="relative" style={{ transform: `rotate(${-angle}deg)` }}>
                                                <div className="absolute -top-14 -right-10 w-20 flex flex-col items-center">
                                                    <AtomSphere element={el} count={pCount} />
                                                    <div className="w-16 h-1 bg-slate-300 mt-1"></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex justify-between w-full mt-2 px-6 text-xs font-bold text-slate-500">
                                        <span>{rCount}</span><span>{pCount}</span>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const BarrasView = ({ elements, rTotals, pTotals }) => {
            const maxVal = Math.max(1, ...Object.values(rTotals), ...Object.values(pTotals));
            return (
                <div className="p-4 space-y-4 fade-in bg-white rounded-xl shadow-sm border border-slate-100 w-full max-w-xl mx-auto">
                    <div className="flex justify-between text-xs font-bold text-slate-400 border-b pb-2 px-2">
                        <span className="w-1/3 text-right pr-4">REACTIVOS</span>
                        <span className="w-1/3 text-center">ELEMENTO</span>
                        <span className="w-1/3 pl-4">PRODUCTOS</span>
                    </div>
                    {elements.map(el => {
                        const rCount = rTotals[el] || 0;
                        const pCount = pTotals[el] || 0;
                        const rWidth = (rCount / maxVal) * 100;
                        const pWidth = (pCount / maxVal) * 100;
                        const color = ELEMENT_COLORS[el] || '#9ca3af';

                        return (
                            <div key={el} className="flex items-center w-full">
                                <div className="w-1/3 flex justify-end items-center pr-4">
                                    <span className="mr-2 text-xs font-bold">{rCount}</span>
                                    <div className="h-6 rounded-l-md transition-all duration-300" style={{ width: `${rWidth}%`, backgroundColor: color, border: '1px solid #cbd5e1' }}></div>
                                </div>
                                <div className="w-1/3 text-center font-bold text-lg text-slate-700 bg-slate-50 py-1 rounded">{el}</div>
                                <div className="w-1/3 flex justify-start items-center pl-4">
                                    <div className="h-6 rounded-r-md transition-all duration-300" style={{ width: `${pWidth}%`, backgroundColor: color, border: '1px solid #cbd5e1' }}></div>
                                    <span className="ml-2 text-xs font-bold">{pCount}</span>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const TablaView = ({ elements, rTotals, pTotals }) => {
            return (
                <div className="p-4 fade-in w-full">
                    <table className="w-full max-w-lg mx-auto bg-white rounded-xl shadow-sm overflow-hidden text-center">
                        <thead className="bg-slate-100 text-slate-600 text-sm">
                            <tr>
                                <th className="py-3 px-4">Reactivos</th>
                                <th className="py-3 px-4">Elemento</th>
                                <th className="py-3 px-4">Productos</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                            {elements.map(el => {
                                const rCount = rTotals[el] || 0;
                                const pCount = pTotals[el] || 0;
                                const isEq = rCount === pCount && rCount > 0;
                                const isEmpty = rCount === 0 && pCount === 0;

                                return (
                                    <tr key={el} className={isEq ? 'bg-green-50/50' : ''}>
                                        <td className={`py-3 px-4 text-xl font-bold ${isEmpty ? 'text-slate-300' : (rCount > pCount ? 'text-orange-500' : 'text-slate-600')}`}>{rCount}</td>
                                        <td className="py-3 px-4">
                                            <span className="inline-flex items-center justify-center w-8 h-8 rounded-full border border-slate-200 font-bold shadow-sm" style={{ backgroundColor: ELEMENT_COLORS[el] || '#fff' }}>{el}</span>
                                        </td>
                                        <td className={`py-3 px-4 text-xl font-bold ${isEmpty ? 'text-slate-300' : (pCount > rCount ? 'text-orange-500' : 'text-slate-600')}`}>{pCount}</td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            );
        };

        // ==========================================
        // 4. CONTROLES Y WORKSPACE (ESPACIO DE TRABAJO)
        // ==========================================

        const CoefInput = ({ value, onChange, disabled }) => {
            return (
                <div className={`flex flex-col items-center bg-white rounded-lg shadow-sm border ${disabled ? 'border-slate-100 opacity-60' : 'border-slate-200'} overflow-hidden z-10`}>
                    <button disabled={disabled} onClick={() => onChange(Math.min(15, value + 1))} className={`w-12 h-8 flex items-center justify-center transition-colors ${disabled ? 'bg-slate-50 text-slate-300 cursor-not-allowed' : 'bg-slate-100 hover:bg-blue-100 text-blue-500 hover:text-blue-700'}`}>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M18 15l-6-6-6 6"/></svg>
                    </button>
                    <input 
                        disabled={disabled}
                        type="number" 
                        min="0" max="15"
                        value={value} 
                        onChange={(e) => { const v = parseInt(e.target.value); onChange(isNaN(v) ? 0 : Math.max(0, Math.min(15, v))); }}
                        className={`w-12 h-12 text-center text-2xl font-bold ${disabled ? 'text-slate-400 bg-slate-50 cursor-not-allowed' : 'text-slate-800 bg-white'} focus:outline-none coef-input`}
                    />
                    <button disabled={disabled} onClick={() => onChange(Math.max(0, value - 1))} className={`w-12 h-8 flex items-center justify-center transition-colors ${disabled ? 'bg-slate-50 text-slate-300 cursor-not-allowed' : 'bg-slate-100 hover:bg-blue-100 text-blue-500 hover:text-blue-700'}`}>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M6 9l6 6 6-6"/></svg>
                    </button>
                </div>
            );
        };

        const renderGeneralBalance = (elements, rTotals, pTotals, bgGeneralClass, generalAngle, scaleClass) => {
            let totalR = 0, totalP = 0;
            elements.forEach(el => { totalR += rTotals[el] || 0; totalP += pTotals[el] || 0; });
            return (
                <div className={`flex flex-col items-center py-6 px-2 w-full rounded-2xl shadow-sm border ${bgGeneralClass} transition-all duration-500 transform ${scaleClass}`}>
                    <div className="relative w-[260px] sm:w-[280px] h-24 flex items-end justify-center">
                        <div className="absolute bottom-0 w-0 h-0 border-l-[12px] border-r-[12px] border-b-[24px] border-transparent border-b-slate-400 z-10"></div>
                        <div className="absolute bottom-[24px] w-56 sm:w-60 h-1.5 bg-slate-400 transition-transform duration-500 origin-center flex justify-between" style={{ transform: `rotate(${generalAngle}deg)` }}>
                            <div className="relative" style={{ transform: `rotate(${-generalAngle}deg)` }}>
                                <div className="absolute -top-20 -left-12 w-24 flex flex-col items-center">
                                    <div className="flex flex-wrap gap-1 justify-center max-w-[100px] mb-2">
                                        {elements.map(el => (rTotals[el] > 0 ? <AtomSphere key={`g-r-${el}`} element={el} count={rTotals[el]} /> : null))}
                                    </div>
                                    <div className="w-24 h-1.5 bg-slate-300 mt-1"></div>
                                </div>
                            </div>
                            <div className="relative" style={{ transform: `rotate(${-generalAngle}deg)` }}>
                                <div className="absolute -top-20 -right-12 w-24 flex flex-col items-center">
                                    <div className="flex flex-wrap gap-1 justify-center max-w-[100px] mb-2">
                                        {elements.map(el => (pTotals[el] > 0 ? <AtomSphere key={`g-p-${el}`} element={el} count={pTotals[el]} /> : null))}
                                    </div>
                                    <div className="w-24 h-1.5 bg-slate-300 mt-1"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div className="flex justify-between w-full mt-4 px-4 text-xs font-black text-slate-600">
                        <span>{totalR} átomos</span><span>{totalP} átomos</span>
                    </div>
                </div>
            );
        };

        const EquationWorkspace = ({ equation, onSolve, onScore, showHints, allowedViews, isReto, requirePrediction = false, colorMode = 'color', showIndividualBalances = true, showGeneralBalance = true }) => {
            const numCoefs = equation.reactants.length + equation.products.length;
            const [coefs, setCoefs] = useState(Array(numCoefs).fill(0));
            const [view, setView] = useState(allowedViews.length > 0 ? allowedViews[0] : null);
            
            // Estado de predicción estratégica
            const [predictionDone, setPredictionDone] = useState(!requirePrediction);
            const [predElement, setPredElement] = useState('');
            const [predCoef, setPredCoef] = useState('');
            const [predJust, setPredJust] = useState('');

            // Reiniciar estado si cambia la ecuación
            useEffect(() => { 
                setCoefs(Array(numCoefs).fill(0)); 
                setPredictionDone(!requirePrediction);
                setPredElement('');
                setPredCoef('');
                setPredJust('');
            }, [equation, requirePrediction, numCoefs]);

            // Asegurar que la vista seleccionada esté permitida
            useEffect(() => { 
                if (allowedViews.length > 0 && !allowedViews.includes(view)) {
                    setView(allowedViews[0]); 
                }
            }, [allowedViews]);

            const updateCoef = (idx, val) => {
                const newCoefs = [...coefs];
                newCoefs[idx] = val;
                setCoefs(newCoefs);
            };

            const { rTotals, pTotals, elements } = calculateAtoms(equation, coefs);
            
            const isStarted = coefs.some(c => c > 0);
            const isSimplified = getSimplifiedStatus(coefs);
            
            let isBalanced = true;
            let excessReactants = [];
            let excessProducts = [];
            
            elements.forEach(el => {
                const r = rTotals[el] || 0;
                const p = pTotals[el] || 0;
                if (r !== p) isBalanced = false;
                if (r > p) excessReactants.push(el);
                if (p > r) excessProducts.push(el);
            });
            
            if (coefs.some(c => c === 0)) isBalanced = false;

            // Trigger guardado si no es reto y está resuelta
            useEffect(() => {
                if (!isReto && isStarted && isBalanced && isSimplified) {
                    onSolve(true);
                }
            }, [isStarted, isBalanced, isSimplified, isReto]);

            let feedback = { msg: "Empieza añadiendo coeficientes (1, 2, 3...) a las moléculas.", type: "neutral" };
            
            if (isStarted && !isReto) {
                if (isBalanced) {
                    if (isSimplified) feedback = { msg: "¡Excelente! La ecuación está perfectamente ajustada.", type: "success" };
                    else feedback = { msg: "La ecuación está balanceada, pero los coeficientes se pueden simplificar más.", type: "warning" };
                } else {
                    if (showHints) {
                        if (excessReactants.length > 0 && excessProducts.length === 0) feedback = { msg: `Hay demasiados átomos de ${excessReactants.join(', ')} en los reactivos. Añade productos.`, type: "error" };
                        else if (excessProducts.length > 0 && excessReactants.length === 0) feedback = { msg: `Hay demasiados átomos de ${excessProducts.join(', ')} en los productos. Añade reactivos.`, type: "error" };
                        else feedback = { msg: "Los átomos no coinciden. Fíjate en los elementos que tienen cantidades diferentes.", type: "error" };
                    } else {
                        feedback = { msg: "Feedback en vivo desactivado. Usa la balanza general o tus cálculos.", type: "neutral" };
                    }
                }
            } else if (isReto) {
                feedback = { msg: "Evalúa tus coeficientes y pulsa COMPROBAR cuando estés seguro.", type: "neutral" };
            }

            // Cálculo Balanza General
            let totalR = 0, totalP = 0;
            elements.forEach(el => { totalR += rTotals[el] || 0; totalP += pTotals[el] || 0; });
            const generalDiff = totalP - totalR;
            const generalAngle = Math.max(-20, Math.min(20, generalDiff * 2));
            const isGeneralBalanced = elements.length > 0 && elements.every(el => rTotals[el] === pTotals[el] && rTotals[el] > 0);
            const bgGeneralClass = isGeneralBalanced ? 'bg-green-50 border-green-200' : 'bg-white border-slate-200';

            const handlePredSubmit = () => {
                if(predElement.trim() && predCoef.trim() && predJust.trim()) {
                    const cleanInput = predCoef.replace(/\s+/g, '');
                    const correctStr = equation.solution.join(',');
                    const isCorrect = cleanInput === correctStr;

                    if (isCorrect) {
                        if (onScore) onScore(10);
                        alert("¡Hipótesis correcta! Has ganado 10 puntos.");
                    } else {
                        alert("Hipótesis incorrecta (0 puntos). ¡Comprueba tus cálculos en el simulador!");
                    }

                    const newPred = { eqId: equation.id, element: predElement, coefs: predCoef, just: predJust, timestamp: new Date().toISOString(), isCorrect };
                    const saved = JSON.parse(localStorage.getItem('phEt_predictions') || '[]');
                    saved.push(newPred);
                    localStorage.setItem('phEt_predictions', JSON.stringify(saved));
                    setPredictionDone(true);
                } else {
                    alert("Por favor, completa todos los campos de predicción y justificación para poder continuar.");
                }
            };

            const isOnlyGeneralBalance = view === 'balanza' && !showIndividualBalances && showGeneralBalance;

            return (
                <div className="flex flex-col bg-slate-100 rounded-2xl shadow-lg border border-slate-300 overflow-hidden relative w-full">
                    
                    {/* 1. Panel de Ecuación */}
                    <div className="bg-slate-800 text-white shadow-inner relative flex flex-col w-full shrink-0 z-10">
                        <div className="p-4 md:p-6 flex flex-wrap justify-center items-center gap-3 relative">
                            {equation.type && !isReto && <div className="absolute top-3 left-4 text-[10px] sm:text-xs font-bold text-blue-300 uppercase tracking-widest">{equation.type}</div>}
                            
                            {/* Reactivos */}
                            {equation.reactants.map((mol, i) => (
                                <React.Fragment key={`r-${i}`}>
                                    <div className="flex flex-col items-center gap-1 relative min-w-[60px] pb-4">
                                        <div className="flex items-center gap-2 sm:gap-3 z-10">
                                            <CoefInput disabled={requirePrediction && !predictionDone} value={coefs[i]} onChange={(v) => updateCoef(i, v)} />
                                            <span className="text-2xl sm:text-3xl md:text-4xl font-bold tracking-wide"><FormattedFormula formula={mol.f} colorMode={colorMode} /></span>
                                        </div>
                                        <div className="absolute bottom-0 text-[10px] text-slate-200 w-max text-center whitespace-nowrap px-1.5 py-0.5 rounded bg-slate-900/60 font-medium tracking-wide">{mol.n}</div>
                                    </div>
                                    {i < equation.reactants.length - 1 && <span className="text-2xl sm:text-3xl font-bold text-slate-400 mx-1 sm:mx-2 mb-4">+</span>}
                                </React.Fragment>
                            ))}

                            <span className="text-3xl sm:text-4xl font-black text-blue-400 mx-2 sm:mx-4 mb-4">→</span>

                            {/* Productos */}
                            {equation.products.map((mol, i) => (
                                <React.Fragment key={`p-${i}`}>
                                    <div className="flex flex-col items-center gap-1 relative min-w-[60px] pb-4">
                                        <div className="flex items-center gap-2 sm:gap-3 z-10">
                                            <CoefInput disabled={requirePrediction && !predictionDone} value={coefs[i + equation.reactants.length]} onChange={(v) => updateCoef(i + equation.reactants.length, v)} />
                                            <span className="text-2xl sm:text-3xl md:text-4xl font-bold tracking-wide"><FormattedFormula formula={mol.f} colorMode={colorMode} /></span>
                                        </div>
                                        <div className="absolute bottom-0 text-[10px] text-slate-200 w-max text-center whitespace-nowrap px-1.5 py-0.5 rounded bg-slate-900/60 font-medium tracking-wide">{mol.n}</div>
                                    </div>
                                    {i < equation.products.length - 1 && <span className="text-2xl sm:text-3xl font-bold text-slate-400 mx-1 sm:mx-2 mb-4">+</span>}
                                </React.Fragment>
                            ))}
                        </div>
                        
                        {equation.desc && !isReto && (
                            <div className="w-full bg-slate-900/60 px-4 py-2 text-center text-xs md:text-sm text-slate-200 italic border-t border-slate-700">
                                <span className="mr-2">💡</span> {equation.desc}
                            </div>
                        )}
                    </div>

                    {/* Barra de Feedback y Controles */}
                    <div className="bg-white border-b border-slate-200 p-2 sm:p-3 flex flex-col xl:flex-row items-center justify-between gap-3 shadow-sm z-10 shrink-0">
                        {/* Indicadores: Se ocultan en los Retos */}
                        {!isReto && (
                            <div className="flex items-center gap-2 shrink-0 w-full xl:w-auto justify-center">
                                <div className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-xs sm:text-sm font-bold transition-colors ${isBalanced && isStarted ? 'bg-green-50 border-green-200 text-green-700' : 'bg-slate-50 border-slate-200 text-slate-400'}`}>
                                    <div className={`w-4 h-4 rounded-full flex items-center justify-center text-white text-[10px] ${isBalanced && isStarted ? 'bg-green-500' : 'bg-slate-300'}`}>✓</div>
                                    Equilibrado
                                </div>
                                <div className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-xs sm:text-sm font-bold transition-colors ${isSimplified && isBalanced ? 'bg-green-50 border-green-200 text-green-700' : 'bg-slate-50 border-slate-200 text-slate-400'}`}>
                                    <div className={`w-4 h-4 rounded-full flex items-center justify-center text-white text-[10px] ${isSimplified && isBalanced ? 'bg-green-500' : 'bg-slate-300'}`}>✓</div>
                                    Simplificado
                                </div>
                            </div>
                        )}

                        <div className={`flex-1 w-full xl:w-auto min-h-[40px] px-4 py-2 rounded-lg border flex items-center justify-center transition-colors duration-300 ${feedback.type === 'success' ? 'bg-green-100 border-green-300 text-green-800 celebrate' : feedback.type === 'error' ? 'bg-orange-50 border-orange-200 text-orange-800' : feedback.type === 'warning' ? 'bg-yellow-50 border-yellow-200 text-yellow-800' : 'bg-blue-50 border-blue-200 text-blue-800'}`}>
                            <p className="font-bold text-sm leading-tight text-center m-0">{feedback.msg}</p>
                        </div>

                        <div className="flex items-center gap-2 shrink-0 w-full xl:w-auto justify-center">
                            {allowedViews.length > 0 && (
                                <div className="flex items-center bg-slate-100 rounded-lg px-2 py-1.5 border border-slate-200 shadow-sm cursor-pointer hover:bg-slate-200 transition-colors">
                                    <select 
                                        value={view} 
                                        onChange={(e) => setView(e.target.value)} 
                                        className="bg-transparent font-bold text-sm text-slate-700 outline-none cursor-pointer w-full pl-1 pr-2"
                                    >
                                        {allowedViews.includes('balanza') && <option value="balanza">⚖️ Balanza</option>}
                                        {allowedViews.includes('barras') && <option value="barras">📊 Barras</option>}
                                        {allowedViews.includes('tabla') && <option value="tabla">🔢 Tabla</option>}
                                    </select>
                                </div>
                            )}
                            {isReto ? (
                                <button 
                                    onClick={() => onSolve(isBalanced && isSimplified, { rTotals, pTotals })}
                                    className="px-4 py-2 rounded-lg font-black text-sm text-white bg-indigo-600 hover:bg-indigo-700 shadow-sm transition-all transform hover:-translate-y-0.5 active:translate-y-0"
                                >
                                    COMPROBAR
                                </button>
                            ) : (
                                <button disabled={requirePrediction && !predictionDone} onClick={() => setCoefs(Array(numCoefs).fill(0))} className="px-4 py-2 rounded-lg font-bold text-sm text-slate-600 bg-slate-200 hover:bg-slate-300 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                                    Reiniciar
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Ventanas de Visualización o Formulario de Predicción */}
                    <div className="flex flex-col lg:flex-row flex-1 p-2 md:p-4 gap-4 bg-slate-100 min-h-0 overflow-y-auto w-full">
                        
                        {requirePrediction && !predictionDone ? (
                            <div className="flex-1 w-full flex flex-col items-center justify-center p-4 sm:p-8 bg-white rounded-xl shadow-sm border border-slate-200 fade-in">
                                <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2 border-b border-slate-200 pb-3 w-full max-w-xl">
                                    <span className="text-2xl">🧠</span> Antes de empezar
                                </h3>
                                <div className="w-full max-w-xl space-y-5 text-left">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-2">1. ¿Qué elemento ajustarás primero?</label>
                                        <input type="text" value={predElement} onChange={e=>setPredElement(e.target.value)} className="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-3 text-slate-800 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all shadow-inner" placeholder="Ej: Carbono (C) o Oxígeno (O)" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-2">2. Escribe los coeficientes que crees correctos:</label>
                                        <input type="text" value={predCoef} onChange={e=>setPredCoef(e.target.value)} className="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-3 text-slate-800 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all shadow-inner" placeholder="Por orden, por ejemplo: 2, 1, 2 (para 2 H₂ + 1 O₂ → 2 H₂O)" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-2">3. Justifica brevemente el motivo:</label>
                                        <textarea value={predJust} onChange={e=>setPredJust(e.target.value)} className="w-full bg-slate-50 border border-slate-300 rounded-lg px-4 py-3 text-slate-800 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all h-24 resize-none custom-scroll shadow-inner" placeholder="Empiezo por este elemento porque..."></textarea>
                                    </div>
                                    <button
                                        onClick={handlePredSubmit}
                                        className="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 px-6 rounded-xl shadow-lg transition-transform transform hover:-translate-y-0.5 active:translate-y-0 mt-4"
                                    >
                                        Guardar y Empezar simulación
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <>
                                {/* Ventana 1: Vista Activa o Huge Balanza */}
                                {!isOnlyGeneralBalance && (
                                    <div className="flex-[3] flex flex-col bg-white rounded-xl shadow-sm border border-slate-200 p-2 sm:p-4 relative min-h-[250px] items-center justify-center">
                                        {allowedViews.length > 0 ? (
                                            <div className="flex-1 overflow-y-auto custom-scroll w-full flex flex-col items-center justify-center">
                                                {view === 'balanza' && <BalanzaView elements={elements} rTotals={rTotals} pTotals={pTotals} showIndividualBalances={showIndividualBalances} />}
                                                {view === 'barras' && <BarrasView elements={elements} rTotals={rTotals} pTotals={pTotals} />}
                                                {view === 'tabla' && <TablaView elements={elements} rTotals={rTotals} pTotals={pTotals} />}
                                            </div>
                                        ) : (
                                            <div className="flex-1 flex items-center justify-center py-8">
                                                <div className="text-center text-slate-400 max-w-sm">
                                                    <svg className="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.29 3.29m0 0a9.953 9.953 0 015.8-2.292c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0l3.29 3.29"></path></svg>
                                                    <p className="font-bold text-lg">Modo Experto</p>
                                                    <p className="text-sm">Las ayudas visuales están desactivadas. Confía en tus cálculos matemáticos.</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* Ventana Massive Balanza General (si aplica) */}
                                {isOnlyGeneralBalance && (
                                    <div className="flex-1 flex flex-col bg-white rounded-xl shadow-sm border border-slate-200 p-2 sm:p-4 relative min-h-[300px] items-center justify-center fade-in">
                                        <h3 className="font-black text-slate-400 text-sm uppercase tracking-widest mb-10">Balanza General</h3>
                                        <div className="w-full flex justify-center mt-6">
                                            {renderGeneralBalance(elements, rTotals, pTotals, bgGeneralClass, generalAngle, 'scale-125 sm:scale-150')}
                                        </div>
                                    </div>
                                )}

                                {/* Ventana 2: Balanza General Lateral y Leyenda */}
                                {showGeneralBalance && !isOnlyGeneralBalance && (
                                    <div className="flex-[1] lg:min-w-[340px] xl:min-w-[380px] flex flex-col items-center justify-start bg-white rounded-xl shadow-sm border border-slate-200 p-4 shrink-0 overflow-y-auto fade-in">
                                        <h3 className="text-center font-bold text-slate-600 mb-4 text-xs uppercase tracking-widest">Balanza General</h3>
                                        
                                        {renderGeneralBalance(elements, rTotals, pTotals, bgGeneralClass, generalAngle, 'scale-100')}

                                        {/* Leyenda Universal */}
                                        {allowedViews.length > 0 && (
                                            <div className="mt-auto pt-6 w-full flex flex-col items-center">
                                                <span className="text-xs font-bold text-slate-400 uppercase mb-3">Leyenda de Elementos</span>
                                                <div className="flex flex-wrap justify-center gap-2">
                                                    {elements.map(el => (
                                                        <div key={`leg-${el}`} className="flex items-center gap-1.5 text-xs font-bold text-slate-600 bg-slate-50 px-2 py-1 rounded border border-slate-200">
                                                            <div className="rounded-full shadow-sm" style={{ backgroundColor: ELEMENT_COLORS[el] || '#9ca3af', width: `${Math.max(12, Math.min(16, ELEMENT_SIZES[el] || 16))}px`, height: `${Math.max(12, Math.min(16, ELEMENT_SIZES[el] || 16))}px` }}></div>
                                                            <span>{el}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 5. PESTAÑAS PRINCIPALES
        // ==========================================

        const TabIntro = () => {
            return (
                <div className="max-w-4xl mx-auto p-6 fade-in space-y-8 pb-12">
                    <div className="text-center space-y-4">
                        <h1 className="text-4xl font-black text-slate-800">El Arte de Balancear</h1>
                        <p className="text-lg text-slate-600 max-w-2xl mx-auto">En una reacción química, la materia no se crea ni se destruye, solo se transforma. Por eso, debe haber el <strong>mismo número de átomos</strong> de cada elemento a ambos lados de la flecha.</p>
                    </div>

                    <div className="grid md:grid-cols-2 gap-8">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <h2 className="text-xl font-bold text-blue-600 mb-4 flex items-center gap-2"><span className="text-2xl">⚖️</span> Conservación de la masa</h2>
                            <p className="text-slate-600 mb-4">Si empiezas con 4 átomos de Hidrógeno y 2 de Oxígeno, debes terminar exactamente con lo mismo.</p>
                            <div className="bg-blue-50 p-4 rounded-lg text-center font-mono text-lg font-bold text-slate-700 border border-blue-100">
                                Reactivos = Productos
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <h2 className="text-xl font-bold text-orange-600 mb-4 flex items-center gap-2"><span className="text-2xl">🔢</span> Coeficientes vs Subíndices</h2>
                            <p className="text-slate-600 mb-4">Solo puedes cambiar los <strong>números grandes (coeficientes)</strong> delante de las moléculas. No puedes cambiar los subíndices (números pequeños) porque cambiarías la sustancia.</p>
                            <div className="flex justify-center items-end gap-2 font-mono text-2xl font-bold bg-orange-50 py-3 rounded-lg border border-orange-100">
                                <span className="text-blue-600 text-4xl">2</span><span className="text-slate-700">H</span><span className="text-slate-500 text-lg mb-1">2</span><span className="text-slate-700">O</span>
                            </div>
                        </div>
                    </div>

                    <div className="bg-slate-800 text-white rounded-2xl p-4 md:p-8 text-center shadow-lg flex flex-col">
                        <h2 className="text-2xl font-bold mb-2 shrink-0">¡Pruébalo!</h2>
                        <p className="text-slate-300 mb-6 shrink-0">Ajusta la creación de agua.</p>
                        <div className="w-full">
                            <EquationWorkspace 
                                equation={{ reactants: [{ f: 'H₂', a: {H:2}, n: 'Hidrógeno' }, { f: 'O₂', a: {O:2}, n: 'Oxígeno' }], products: [{ f: 'H₂O', a: {H:2, O:1}, n: 'Agua' }], solution: [2, 1, 2] }}
                                onSolve={() => {}} showHints={true} allowedViews={['balanza']} isReto={false} showIndividualBalances={true} showGeneralBalance={true}
                            />
                        </div>
                    </div>
                </div>
            );
        };

        const TabEcuaciones = ({ isCheatActive, onScore }) => {
            const [selectedEqId, setSelectedEqId] = useState(EQUATIONS[0].id);
            const [completedEqs, setCompletedEqs] = useState([]);

        const TabReto = ({ isCheatActive, onScore, score }) => {

                    if ((rTotals['H'] || 0) !== (pTotals['H'] || 0)) errorTypes.H += 1;
                    errorTypes.Coefs += 1;

                    setStats(s => ({ ...s, errors: s.errors + 1, types: errorTypes }));

                            <div className="text-left bg-slate-50 p-6 rounded-xl border border-slate-200 mb-8 max-w-2xl mx-auto">

                                    <li className="flex justify-between"><span>Desajuste en Hidrógeno (H):</span> <span className="bg-white px-2 py-1 rounded shadow-sm">{stats.types.H}</span></li>
                                    <li className="flex justify-between"><span>Fallo general (coeficientes):</span> <span className="bg-white px-2 py-1 rounded shadow-sm">{stats.types.Coefs}</span></li>

                            {/* Informe de justificaciones integrado */}

                                <h3 className="font-black text-slate-800 mb-6 flex items-center gap-3">

                                    <div className="space-y-4">
                                        {savedPredictions.map((pred, i) => {
                                            const eqRef = EQUATIONS.find(e => e.id === pred.eqId);
                                            return (

                                        <span className="text-6xl opacity-30 mb-4 block">📭</span>
                                        <p className="text-slate-500 font-bold text-xl">Aún no hay justificaciones.</p>
                                        <p className="text-slate-400 mt-2">Aparecerán aquí a medida que avances y completes las predicciones obligatorias.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderDocenteModal = () => {
                if (!showDocente) return null;
                return (
                    <div className="fixed inset-0 bg-slate-900/80 z-50 flex items-center justify-center p-4">
                        <div className="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] flex flex-col">
                            <div className="p-4 bg-slate-800 text-white flex justify-between items-center shrink-0 rounded-t-2xl">
                                <h2 className="font-bold text-xl flex items-center gap-2">👨‍🏫 Modo Docente - Soluciones</h2>
                                <button onClick={() => setShowDocente(false)} className="text-slate-300 hover:text-white">
                                    <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 18L18 6M6 6l12 12"/></svg>
                                </button>
                            </div>
                            <div className="p-6 overflow-y-auto custom-scroll flex-1">
                                {!isDocenteAuth ? (
                                    <form onSubmit={handleDocenteSubmit} className="flex flex-col items-center gap-4 py-8">
                                        <p className="text-slate-600 text-center font-medium">Introduce el código de acceso para ver las soluciones.</p>
                                        <input type="password" value={docenteCode} onChange={e => setDocenteCode(e.target.value)} placeholder="Código" className="border-2 border-slate-300 rounded-lg px-4 py-2 text-center text-xl focus:border-blue-500 outline-none w-48 tracking-widest" autoFocus/>
                                        <button type="submit" className="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700">Acceder</button>
                                    </form>
                                ) : (
                                    <div className="space-y-6">
                                        <div>
                                            <h3 className="font-black text-slate-800 border-b pb-2 mb-4 text-lg">Ecuaciones de Práctica</h3>
                                            <div className="space-y-4">
                                                {EQUATIONS.map((eq, i) => (
                                                    <div key={eq.id} className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                        <div className="text-xs font-bold text-slate-400 mb-2">Ecuación {i+1}</div>
                                                        <div className="flex flex-wrap items-center gap-2 text-lg font-bold text-black">
                                                            {eq.reactants.map((m, idx) => <span key={`r${idx}`}><span className="text-blue-600 mr-1">{eq.solution[idx]}</span><FormattedFormula formula={m.f} colorMode='black' /> {idx < eq.reactants.length-1 && '+ '}</span>)}
                                                            <span className="mx-2 text-black">→</span>
                                                            {eq.products.map((m, idx) => <span key={`p${idx}`}><span className="text-blue-600 mr-1">{eq.solution[eq.reactants.length + idx]}</span><FormattedFormula formula={m.f} colorMode='black' /> {idx < eq.products.length-1 && '+ '}</span>)}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        
                                        {EQUATIONS.filter(eq => eq.libreta).length > 0 && (
                                            <div>
                                                <h3 className="font-black text-slate-800 border-b pb-2 mb-4 text-lg mt-8">Soluciones Libreta (Transferencia)</h3>
                                                <div className="space-y-4">
                                                    {EQUATIONS.filter(eq => eq.libreta).map((eq, i) => (
                                                        <div key={`lib-${eq.id}`} className="bg-amber-50 p-4 rounded-xl border border-amber-200">
                                                            <div className="text-xs font-bold text-amber-600 mb-2">Reto libreta (Asociado a ec. anterior)</div>
                                                            <div className="text-lg font-bold text-black bg-white px-4 py-2 rounded-lg border border-amber-100 shadow-inner inline-block">
                                                                <FormattedFormula formula={eq.libreta.solTexto} colorMode='black' />
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        <div>
                                            <h3 className="font-black text-slate-800 border-b pb-2 mb-4 text-lg mt-8">Retos</h3>
                                            <div className="space-y-4">
                                                {RETOS.map((eq, i) => (
                                                    <div key={eq.id} className="bg-indigo-50 p-4 rounded-xl border border-indigo-200">
                                                        <div className="text-xs font-bold text-indigo-400 mb-2">Nivel {i+1}</div>
                                                        <div className="flex flex-wrap items-center gap-2 text-lg font-bold text-black">
                                                            {eq.reactants.map((m, idx) => <span key={`r${idx}`}><span className="text-blue-600 mr-1">{eq.solution[idx]}</span><FormattedFormula formula={m.f} colorMode='black' /> {idx < eq.reactants.length-1 && '+ '}</span>)}
                                                            <span className="mx-2 text-black">→</span>
                                                            {eq.products.map((m, idx) => <span key={`p${idx}`}><span className="text-blue-600 mr-1">{eq.solution[eq.reactants.length + idx]}</span><FormattedFormula formula={m.f} colorMode='black' /> {idx < eq.products.length-1 && '+ '}</span>)}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderConsejosModal = () => {
                if (!showConsejos) return null;
                return (
                    <div className="fixed inset-0 bg-slate-900/80 z-50 flex items-center justify-center p-4 pop-in" onClick={(e) => { if(e.target === e.currentTarget) setShowConsejos(false); }}>
                        <div className="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] flex flex-col relative">
                            <div className="p-4 bg-slate-800 text-white flex justify-between items-center shrink-0 rounded-t-2xl">
                                <h2 className="font-bold text-xl flex items-center gap-2">💡 Consejos para ajustar</h2>
                                <button onClick={() => setShowConsejos(false)} className="text-slate-300 hover:text-white transition-colors">
                                    <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 18L18 6M6 6l12 12"/></svg>
                                </button>
                            </div>
                            <div className="p-6 overflow-y-auto custom-scroll flex-1 text-slate-700 space-y-4 text-sm md:text-base bg-slate-50">
                                <p><b>🔹 1. Empieza por las sustancias más complejas</b><br/>Ajusta primero los compuestos con más átomos o fórmulas más complicadas (por ejemplo, C<sub>4</sub>H<sub>10</sub> o Cr<sub>2</sub>(SO<sub>4</sub>)<sub>3</sub>) y deja para el final las sustancias simples como O<sub>2</sub> o H<sub>2</sub>.</p>
                                <p><b>🔹 2. Ajusta primero los productos y luego los reactivos</b><br/>Fíjate en los átomos que aparecen en los productos y modifica los coeficientes de los reactivos para igualarlos. Mantén siempre una estrategia.</p>
                                <p><b>🔹 3. Ajusta un elemento cada vez</b><br/>Concéntrate en un solo tipo de átomo (por ejemplo, primero el carbono, luego el hidrógeno).</p>
                                <p><b>🔹 4. Deja el oxígeno y el hidrógeno para el final</b><br/>En muchas reacciones es más fácil ajustarlos al final.</p>
                                <p><b>🔹 5. Usa coeficientes, no cambies las fórmulas</b><br/>Nunca modifiques los subíndices (números pequeños).</p>
                                <p><b>🔹 6. Comprueba siempre los átomos</b><br/>Cuenta los átomos en ambos lados para asegurarte de que coinciden.</p>
                                <p><b>🔹 7. Simplifica los coeficientes</b><br/>Reduce si todos tienen un factor común (ej. 2, 4, 2 → 1, 2, 1).</p>
                                <p><b>🔹 8. Elimina fracciones al final</b><br/>Si necesitas usar 1/2, multiplica toda la ecuación por 2 al final.</p>
                                <p><b>🔹 9. Si te bloqueas, vuelve atrás</b><br/>Prueba otra estrategia o empieza por otro elemento.</p>
                                <p><b>🔹 10. Conservación de la materia</b><br/>Recuerda: Los átomos no se crean ni se destruyen, solo se reorganizan.</p>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderAyudaModal = () => {
                if (!showAyudaModal) return null;
                return (
                    <div className="fixed inset-0 bg-slate-900/80 z-50 flex items-center justify-center p-4">
                        <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full flex flex-col relative pop-in">
                            <div className="p-4 bg-emerald-600 text-white flex justify-between items-center shrink-0 rounded-t-2xl">
                                <h2 className="font-bold text-xl flex items-center gap-2">🛡️ Modo Ayuda Constante</h2>
                                <button onClick={() => setShowAyudaModal(false)} className="text-emerald-200 hover:text-white transition-colors">
                                    <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 18L18 6M6 6l12 12"/></svg>
                                </button>
                            </div>
                            <div className="p-6">
                                <form onSubmit={handleAyudaSubmit} className="flex flex-col items-center gap-4 py-4">
                                    <p className="text-slate-600 text-center font-medium">Si necesitas que las ayudas y las balanzas no desaparezcan a medida que avanzas, introduce el código de soporte.</p>
                                    <input type="text" value={ayudaCode} onChange={e => setAyudaCode(e.target.value)} placeholder="Código" className="border-2 border-slate-300 rounded-lg px-4 py-2 text-center text-xl focus:border-emerald-500 outline-none w-48 tracking-widest uppercase" autoFocus/>
                                    <button type="submit" className="bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-emerald-700 w-full mt-2">Activar Ayudas Permanentes</button>
                                </form>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <>
                    {/* Header y Navegación con Menú Desplegable */}
                    <header className="bg-slate-800 text-white shadow-md z-10 shrink-0">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between h-16 items-center">
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 bg-gradient-to-br from-blue-400 to-indigo-500 rounded-lg flex items-center justify-center font-black shadow-inner">N</div>
                                    <h1 className="font-bold text-lg hidden md:block tracking-wide">La Balanza Química</h1>
                                    <div className="ml-2 bg-slate-900 px-3 py-1 rounded-full border border-slate-700 flex items-center gap-1 shadow-inner">
                                        <span className="text-yellow-400 text-lg">🏆</span>
                                        <span className="font-black text-yellow-400 whitespace-nowrap">{score} pts</span>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2 sm:gap-4">
                                    <select
                                        value={activeTab}
                                        onChange={(e) => setActiveTab(e.target.value)}
                                        className="bg-slate-700 text-white font-bold py-1.5 sm:py-2 px-2 sm:px-3 rounded-lg border border-slate-600 outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer shadow-sm text-sm sm:text-base mr-2"
                                    >
                                        <option value="intro">1. Introducción</option>
                                        <option value="ecuaciones">2. Simulador</option>
                                        <option value="reto">3. El Reto</option>
                                    </select>
                                    
                                    {/* Controles extra */}
                                    <button onClick={() => setShowResumenGlobal(true)} className="px-2 sm:px-3 py-2 rounded-md text-sm font-bold text-blue-300 hover:bg-slate-700 hover:text-white transition-colors flex items-center" title="Resumen">
                                        <span className="mr-1">📋</span><span className="hidden lg:inline">Resumen</span>
                                    </button>
                                    <button onClick={() => setShowAyudaModal(true)} className={`px-2 sm:px-3 py-2 rounded-md text-sm font-bold transition-colors flex items-center ${isCheatActive ? 'text-emerald-300 bg-emerald-900/50' : 'text-emerald-400 hover:bg-slate-700 hover:text-emerald-300'}`} title="Ayuda Constante">
                                        <span className="mr-1">🛡️</span><span className="hidden lg:inline">Ayuda</span>
                                    </button>
                                    <button onClick={() => setShowConsejos(true)} className="px-2 sm:px-3 py-2 rounded-md text-sm font-bold text-yellow-400 hover:bg-slate-700 hover:text-yellow-300 transition-colors flex items-center" title="Consejos">
                                        <span className="mr-1">💡</span><span className="hidden lg:inline">Consejos</span>
                                    </button>
                                    <button onClick={() => setShowDocente(true)} className="px-2 sm:px-3 py-2 rounded-md text-sm font-bold text-slate-300 hover:bg-slate-700 hover:text-white transition-colors flex items-center" title="Modo Docente">
                                        <span className="mr-1">👨‍🏫</span><span className="hidden lg:inline">Docente</span>
                                    </button>
                                    <button onClick={clearData} className="px-2 py-2 rounded-md text-slate-300 hover:bg-red-500/20 hover:text-red-400 transition-colors flex items-center" title="Borrar Datos">
                                        <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Contenido Principal */}
                    <main className="flex-1 overflow-y-auto overflow-x-hidden relative bg-slate-100/50">
                        {activeTab === 'intro' && <TabIntro />}
                        {activeTab === 'ecuaciones' && <TabEcuaciones isCheatActive={isCheatActive} onScore={handleAddScore} />}
                        {activeTab === 'reto' && <TabReto isCheatActive={isCheatActive} onScore={handleAddScore} score={score} />}
                        {renderDocenteModal()}
                        {renderConsejosModal()}
                        {renderAyudaModal()}
                        {renderResumenModal()}
                    </main>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
