                                const newHistory = [...pathHistory, { from: selectedOrigin, edge: selectedEdge, to: nodeId }];
                                setPathHistory(newHistory);
                                setCurrentNode(nodeId);
                                setStep(0);
                                setSelectedOrigin(null);
                                setSelectedEdge(null);
                                setCurrentPlanStep(prev => prev + 1);
                                
                                if (!isSandbox && (nodeId === mission.target || (mission.target === 'n_ignea' && (nodeId === 'n_plutonica' || nodeId === 'n_volcanica')))) {
                                    const passedNodes = newHistory.map(h => h.to);
                                    const allMustPassMet = mission.mustPass.every(mp => passedNodes.includes(mp));
                                    
                                    if (allMustPassMet) {
                                        const updatedHyp = Array.isArray(allHypotheses) ? [...allHypotheses] : [];
                                        if(updatedHyp[currentMissionIdx]) {
                                            updatedHyp[currentMissionIdx].actualPath = newHistory.map(h => h.to);
                                            updatedHyp[currentMissionIdx].actualPathEdges = newHistory.map(h => h.edge);
                                        }
                                        setAllHypotheses(updatedHyp);
                                        
                                        setMissionWon(true);
                                    } else {
                                        setFeedback({type: 'error', text: 'Llegaste al destino, pero no cumpliste las restricciones de la misión. Debes reiniciar.'});
                                    }
                                } else {
                                    setFeedback({type: 'success', text: `¡Transformado! Selecciona tu nueva posición para seguir.`});
                                }
                            }, 4500); 
                        } else {
                            consumeEnergyAndCheck("Proceso no es físicamente posible hacia ese destino.");
                        }
                    }
                } catch(e) {
                    console.error(e);
                    consumeEnergyAndCheck("Ha ocurrido un error inesperado al procesar la navegación.");
                }
            };

            const handleEdgeClick = (edgeId) => {
                try {
                    const isRevealed = revealedElements.includes(edgeId) || teacherMode || isSandbox || difficulty === 'easy';
                    if (isRevealed && step === 0) {
                        setInfoModal(getEdgeData(edgeId));
                        return;
                    }

                    if (!hypothesisMade && !isSandbox) return;
                    if (animatingGif || (energy <= 0 && !teacherMode && !isSandbox) || missionWon) return;
                    if (isHintMode) return applyHint(edgeId);

                    if (step === 1) {
                        if (!isSandbox && !teacherMode) {
                            if (currentPlanStep >= plannedPath.length) {
                                return consumeEnergyAndCheck(`¡Te has pasado del número de procesos planificados! Planificaste ${plannedPath.length} procesos. Reinicia la misión.`);
                            }
                        }
                        setSelectedEdge(edgeId);
                        setStep(2);
                        setFeedback({type: 'info', text: 'Clica en el NODO DESTINO al que esperas llegar.'});
                    } else if (step === 0) {
                        setFeedback({type: 'error', text: 'Primero selecciona el NODO DE ORIGEN.'});
                    } else if (step === 2) {
                        if (!isSandbox && !teacherMode) {
                            if (currentPlanStep >= plannedPath.length) {
                                return consumeEnergyAndCheck(`¡Te has pasado del número de procesos planificados! Planificaste ${plannedPath.length} procesos. Reinicia la misión.`);
                            }
                        }
                        setSelectedEdge(edgeId); 
                    }
                } catch (e) {
                    console.error(e);
                    consumeEnergyAndCheck("Ha ocurrido un error inesperado.");
                }
            };

            const getNodeLabel = (nodeId) => {
                const isRevealed = revealedElements.includes(nodeId) || teacherMode || isSandbox || difficulty === 'easy' || difficulty === 'normal' || (difficulty === 'hard' && hypothesisMade && ['n_ignea', 'n_sedi', 'n_meta'].includes(nodeId));
                const itemData = ITEMS_DIAGRAMA.find(i => i.id === DIAGRAM_SOLUTION[nodeId]);
                return isRevealed ? itemData?.label : 'Roca'; 
            };

            const getEdgeLabel = (edgeId) => {
                const itemData = getEdgeData(edgeId);
                const isRevealed = revealedElements.includes(edgeId) || teacherMode || isSandbox || difficulty === 'easy';
                if (isRevealed) return <span className="flex items-center gap-1">{itemData?.icon} {itemData?.label}</span>;
                if (difficulty === 'normal' || difficulty === 'hard') return <span className="flex items-center text-lg">{itemData?.icon}</span>; 
                return <span>Proceso</span>;
            };

            const saveMissionReflectionAndNext = (text) => {
                const newRef = {...missionReflections, [mission.id]: text};
                setMissionReflections(newRef);
                
                const newHyp = [...allHypotheses];
                if(newHyp[currentMissionIdx]) newHyp[currentMissionIdx].reflection = text;
                setAllHypotheses(newHyp);
                
                setMissionWon(false);
                if (currentMissionIdx < MISSIONS.length - 1) {
                    setCurrentMissionIdx(prev => prev + 1);
                } else {
                    setShowMetacognition(true);
                }
            };

            const generatePDF = () => {
                const element = document.getElementById('informe-pdf');
                
                const pxToMm = 0.264583;
                const eWidth = element.scrollWidth * pxToMm;
                const eHeight = element.scrollHeight * pxToMm;

                const opt = { 
                    margin: [10, 10, 10, 10], 
                    filename: 'Laboratorio_Rocas_Resumen.pdf', 
                    image: { type: 'jpeg', quality: 0.98 }, 
                    html2canvas: { scale: 2, useCORS: true, scrollY: 0 }, 
                    jsPDF: { unit: 'mm', format: [Math.max(210, eWidth + 20), eHeight + 20], orientation: 'portrait' } 
                };
                html2pdf().set(opt).from(element).save();
            };

            if (!difficulty) {
                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-4 animate-fade-in h-full">
                        <div className="bg-white p-8 md:p-12 rounded-3xl shadow-xl max-w-4xl w-full border border-stone-200 text-center">
                            <div className="text-6xl mb-6">🧭</div>
                            <h2 className="text-3xl font-black text-stone-800 mb-4">Navegación del Ciclo</h2>
                            <p className="text-stone-600 mb-8 leading-relaxed text-lg">Deduce y traza la ruta de las rocas a través del ciclo. Elige dificultad:</p>
                            
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl mx-auto">
                                <button onClick={() => setDifficulty('easy')} className="flex flex-col items-center p-6 border-2 border-green-400 rounded-2xl hover:bg-green-50 shadow-sm group bg-white transition-transform hover:-translate-y-1">
                                    <div className="bg-green-100 text-green-600 w-16 h-16 rounded-full flex items-center justify-center text-3xl mb-4 group-hover:bg-green-500 group-hover:text-white transition-colors">🤓</div>
                                    <h3 className="font-bold text-green-700 text-xl mb-2">Modo Fácil</h3>
                                    <p className="text-sm text-stone-600">Nombres visibles en todo el mapa.</p>
                                </button>
                                <button onClick={() => setDifficulty('normal')} className="flex flex-col items-center p-6 border-2 border-orange-400 rounded-2xl hover:bg-orange-50 shadow-sm group bg-white transition-transform hover:-translate-y-1">
                                    <div className="bg-orange-100 text-orange-600 w-16 h-16 rounded-full flex items-center justify-center text-3xl mb-4 group-hover:bg-orange-500 group-hover:text-white transition-colors">🧐</div>
                                    <h3 className="font-bold text-orange-700 text-xl mb-2">Modo Normal</h3>
                                    <p className="text-sm text-stone-600">Rocas visibles, procesos como iconos ocultos.</p>
                                </button>
                                <button onClick={() => setDifficulty('hard')} className="flex flex-col items-center p-6 border-2 border-red-400 rounded-2xl hover:bg-red-50 shadow-sm group bg-white transition-transform hover:-translate-y-1">
                                    <div className="bg-red-100 text-red-600 w-16 h-16 rounded-full flex items-center justify-center text-3xl mb-4 group-hover:bg-red-500 group-hover:text-white transition-colors">🤯</div>
                                    <h3 className="font-bold text-red-700 text-xl mb-2">Modo Difícil</h3>
                                    <p className="text-sm text-stone-600">Diagrama oculto hasta guardar la hipótesis.</p>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (showMetacognition) {
                const getProcNameFromEdge = (edgeId) => {
                    const procId = DIAGRAM_SOLUTION[edgeId] || edgeId;
                    const proc = ITEMS_DIAGRAMA.find(i => i.id === procId);
                    return proc ? proc.label : edgeId;
                };

                return (
                    <div className="flex-1 flex flex-col p-4 animate-fade-in h-full max-w-4xl mx-auto w-full custom-scroll overflow-y-auto">
                        <div className="bg-white rounded-3xl shadow-lg border-2 border-stone-200 p-8 flex flex-col items-center text-center mb-8 relative">
                            
                            {/* Visual Content for PDF */}
                            <div id="informe-pdf" className="w-full text-left p-4 pdf-content pb-10">
                                <div className="text-center mb-8 border-b-4 border-blue-600 pb-4">
                                    <h2 className="text-3xl font-black text-stone-800">Boletín Científico: Ciclo de las Rocas</h2>
                                    <p className="text-stone-500">Resumen de aprendizaje y reflexiones</p>
                                </div>
                                
                                {/* Reflections from Phase 1 */}
                                {progress.reflections && Object.keys(progress.reflections).length > 0 && (
                                    <div className="mb-8">
                                        <h3 className="text-xl font-bold text-blue-900 border-b border-blue-200 pb-2 mb-4">Mis Reflexiones de Procesos:</h3>
                                        <ul className="space-y-3 text-sm text-stone-700">
                                            {['calor', 'fusion', 'enfriamiento', 'meteorizacion', 'compactacion'].map((k) => {
                                                if(!progress.reflections[k] || progress.reflections[k].startsWith('metaQ')) return null;
                                                return <li key={k} className="bg-stone-50 p-3 rounded-lg border border-stone-200 shadow-sm"><strong className="capitalize text-blue-700 block mb-1">{k}</strong> "{progress.reflections[k]}"</li>
                                            })}
                                        </ul>
                                    </div>
                                )}

                                {/* Hypotheses & Mission Reflections from Phase 4 */}
                                <div className="mb-8">
                                    <h3 className="text-xl font-bold text-green-900 border-b border-green-200 pb-2 mb-4">Mis Rutas de Navegación:</h3>
                                    {allHypotheses.map((hyp, i) => {
                                        if (!hyp) return null;
                                        return (
                                            <div key={i} className="bg-green-50/50 p-4 rounded-xl border border-green-100 mb-4 text-sm shadow-sm">
                                                <p className="font-bold text-stone-800 text-base mb-2">{hyp.levelName}: <span className="text-stone-500 font-normal">De {hyp.start} a {hyp.target}</span></p>
                                                <p className="italic text-stone-600 mb-2 p-2 bg-white rounded border border-stone-100">Hipótesis inicial: "{hyp.text}"</p>
                                                <p className="text-xs font-mono text-green-700 mb-3">✓ Ruta validada: {hyp.start} ➔ {hyp.actualPathEdges?.map(edgeId => getProcNameFromEdge(edgeId)).join(' ➔ ') || 'Completado'}</p>
                                                {hyp.reflection && <p className="text-stone-800 bg-white p-3 rounded-lg border border-green-200 shadow-sm"><strong className="text-green-800 block mb-1">Conclusión post-reto:</strong> "{hyp.reflection}"</p>}
                                            </div>
                                        )
                                    })}
                                </div>

                                {/* Metacognition Question */}
                                <div className="mb-2">
                                    <h3 className="text-xl font-bold text-orange-900 border-b border-orange-200 pb-2 mb-4">Reflexión Final:</h3>
                                    <div className="flex flex-col gap-4">
                                        <div className="bg-orange-50 p-4 rounded-lg border border-orange-200 text-left shadow-sm">
                                            <label className="block text-sm font-bold text-stone-800 mb-2">1. ¿Crees que el ciclo de las rocas es más complejo o más fácil de lo que imaginabas al principio? ¿Por qué?</label>
                                            <textarea value={metaQ1} onChange={e=>setMetaQ1(e.target.value)} onInput={autoResizeTextarea} className="w-full p-3 border border-orange-300 rounded focus:ring-orange-500 text-sm min-h-[80px] resize-none overflow-hidden" placeholder="Escribe tu respuesta..."></textarea>
                                        </div>
                                        <div className="bg-orange-50 p-4 rounded-lg border border-orange-200 text-left shadow-sm">
                                            <label className="block text-sm font-bold text-stone-800 mb-2">2. ¿Hay algún proceso o tipo de roca que todavía no te haya quedado del todo claro?</label>
                                            <textarea value={metaQ2} onChange={e=>setMetaQ2(e.target.value)} onInput={autoResizeTextarea} className="w-full p-3 border border-orange-300 rounded focus:ring-orange-500 text-sm min-h-[80px] resize-none overflow-hidden" placeholder="Escribe tu respuesta..."></textarea>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="flex flex-col md:flex-row gap-4 w-full mt-4 border-t pt-6">
                                <Button variant="primary" onClick={generatePDF} className="flex-1 py-4 text-lg">📄 Descargar Resumen PDF</Button>
                                <Button variant="success" onClick={() => {
                                    setShowMetacognition(false);
                                    setIsSandbox(true);
                                    setDifficulty('easy');
                                    setHypothesisMade(true);
                                    setPathHistory([]);
                                    setFeedback({type: 'info', text: 'Modo libre activo. Explora sin límites.'});
                                    onCompleteProgress();
                                }} className="flex-1 py-4 text-lg">Jugar Modo Libre →</Button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex-1 flex flex-col h-full relative animate-fade-in w-full">
                    
                    <Modal isOpen={!!animatingGif} title={`Aplicando: ${animatingTitle}`}>
                        <img src={animatingGif} alt="Animación" className="w-full rounded-xl shadow-inner border border-stone-200" />
                    </Modal>

                    {infoModal && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in" onClick={() => setInfoModal(null)}>
                            <div className="bg-white p-6 rounded-2xl shadow-2xl max-w-xl w-full relative" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setInfoModal(null)} className="absolute -top-3 -right-3 bg-stone-700 hover:bg-red-500 text-white rounded-full w-8 h-8 font-bold shadow-lg hover:scale-105 transition-all flex items-center justify-center z-50">✕</button>
                                <h3 className="text-2xl font-black mb-4 text-center text-stone-800 flex items-center justify-center gap-2">
                                    {infoModal.icon} {infoModal.label}
                                </h3>
                                {infoModal.type === 'proceso' ? (
                                    <div className="border border-stone-200 rounded-xl overflow-hidden shadow-inner">
                                        <img src={infoModal.gif} alt={infoModal.label} className="w-full h-auto object-contain bg-stone-50" />
                                    </div>
                                ) : (
                                    <div className="bg-blue-50 border border-blue-100 p-6 rounded-xl text-center shadow-inner">
                                        <p className="text-lg text-blue-900 leading-relaxed">{infoModal.def}</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {missionWon && (
                        <PostMissionReflection 
                            mission={mission} 
                            allHypotheses={allHypotheses} 
                            currentMissionIdx={currentMissionIdx} 
                            onSave={saveMissionReflectionAndNext} 
                        />
                    )}

                    {/* Header Controls */}
                    <div className="bg-white rounded-xl shadow-sm border border-stone-200 p-4 mb-4 flex flex-col md:flex-row items-center justify-between gap-4 shrink-0 relative z-30">
                        <div className="flex-1">
                            <h2 className="text-2xl font-black text-stone-800 flex items-center gap-2">
                                🗺️ {isSandbox ? "Modo Libre Infinito" : mission.name}
                                {!isSandbox && <span className={`text-xs px-2 py-1 rounded text-white ${difficulty==='easy'?'bg-green-500':difficulty==='normal'?'bg-orange-500':'bg-red-500'}`}>{difficulty.toUpperCase()}</span>}
                            </h2>
                            {!isSandbox && <p className="text-stone-600 font-medium text-sm mt-1">
                                {mission.desc} 
                                <button onClick={() => {setDifficulty(null); resetMission(); setHypothesisMade(false);}} className="text-xs bg-stone-200 text-stone-700 px-2 py-1 rounded hover:bg-stone-300 transition ml-2 shadow-sm font-bold border border-stone-300">Cambiar Dificultad</button>
                            </p>}
                        </div>
                        
                        <div className="flex gap-4 items-center flex-wrap justify-center">
                            {!isSandbox && (
                                <div className="flex items-center gap-2 bg-stone-100 p-2 px-4 rounded-xl border border-stone-200">
                                    <div className="text-right"><span className="text-[10px] font-bold text-stone-500 uppercase block">Origen</span><span className="font-bold text-stone-800 text-sm">{ROCK_NAMES[mission.start]}</span></div>
                                    <div className="text-stone-400">➔</div>
                                    <div className="text-left"><span className="text-[10px] font-bold text-stone-500 uppercase block">Destino</span><span className="font-bold text-blue-700 text-sm">{ROCK_NAMES[mission.target]}</span></div>
                                </div>
                            )}

                            {!isSandbox && (
                                <div className="bg-blue-50 border border-blue-200 p-2 px-4 rounded-xl text-center flex items-center gap-4">
                                    <div>
                                        <span className="text-[10px] font-bold text-blue-600 uppercase block">Energía</span>
                                        <span className="font-black text-blue-800 text-lg flex items-center gap-1 justify-center"><IconLightning/> {teacherMode ? '∞' : energy}</span>
                                    </div>
                                    <button 
                                        onClick={() => setIsHintMode(!isHintMode)}
                                        disabled={hintsLeft <= 0 || (energy < 1 && !teacherMode)}
                                        className={`px-3 py-2 rounded-xl text-xs font-bold shadow transition-colors ${isHintMode ? 'bg-yellow-400 text-stone-900 animate-pulse ring-2 ring-yellow-500' : 'bg-yellow-100 text-yellow-800 hover:bg-yellow-200'} disabled:opacity-50`}
                                        title="Revela temporalmente el nombre de un elemento (Coste: 1 energía)"
                                    >
                                        💡 Pista ({hintsLeft})
                                    </button>
                                </div>
                            )}

                            {!isSandbox && (
                                <button onClick={resetMission} className="bg-stone-200 hover:bg-stone-300 text-stone-700 p-3 rounded-xl transition-colors" title="Reiniciar Misión">
                                    ⟲
                                </button>
                            )}
                        </div>
                    </div>
                    
                    <div className={`flex flex-col gap-6 flex-1 relative z-30 w-full ${isHintMode ? 'cursor-help' : ''}`}>
                        
                        {/* DIAGRAMA INTERACTIVO (MAPA) */}
                        <div className="w-full bg-white rounded-3xl shadow-lg border-4 border-stone-200 relative overflow-hidden min-h-[500px] lg:min-h-[700px]">
                            
                            <div className="absolute top-[50%] left-[50%] -translate-x-1/2 -translate-y-1/2 text-center opacity-10 pointer-events-none flex flex-col items-center z-0 mt-8">
                                <span className="font-black text-4xl uppercase tracking-[0.3em] text-stone-800">Ciclo de las<br/>Rocas</span>
                            </div>

                            <svg viewBox="0 0 1200 800" preserveAspectRatio="none" className="absolute inset-0 w-full h-full pointer-events-none z-10">
                                <defs>
                                    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea" /></marker>
                                    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c" /></marker>
                                    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" /></marker>
                                    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#eab308" /></marker>
                                    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706" /></marker>
                                </defs>
                                
                                {DIAGRAM_LAYOUT.EDGES.map(edge => {
                                    if(edge.curved) {
                                        return <path key={`base-${edge.id}`} d={`M ${edge.sx} ${edge.sy} C ${edge.cx1} ${edge.cy1}, ${edge.cx2} ${edge.cy2}, ${edge.ex} ${edge.ey}`} stroke={edge.color} strokeWidth="4" markerEnd={`url(#${edge.marker})`} fill="none" />
                                    }
                                    return <path key={`base-${edge.id}`} 
                                          d={`M ${edge.sx} ${edge.sy} Q ${edge.cx} ${edge.cy} ${edge.ex} ${edge.ey}`}
                                          stroke={edge.color} 
                                          strokeWidth="4" 
                                          fill="none"
                                          markerEnd={`url(#${edge.marker})`}/>
                                })}

                                {teacherMode && !isSandbox && mission.idealPath && mission.idealPath.map(edgeId => {
                                    const edgeData = DIAGRAM_LAYOUT.EDGES.find(e => e.id === edgeId);
                                    if (!edgeData) return null;
                                    if(edgeData.curved) return <path key={`ideal-${edgeId}`} d={`M ${edgeData.sx} ${edgeData.sy} C ${edgeData.cx1} ${edgeData.cy1}, ${edgeData.cx2} ${edgeData.cy2}, ${edgeData.ex} ${edgeData.ey}`} className="teacher-path pointer-events-none" fill="none" />
                                    return <path key={`ideal-${edgeId}`} d={`M ${edgeData.sx} ${edgeData.sy} Q ${edgeData.cx} ${edgeData.cy} ${edgeData.ex} ${edgeData.ey}`} fill="none" className="teacher-path pointer-events-none" />
                                })}

                                {pathHistory.map((hist, idx) => {
                                    const edgeData = DIAGRAM_LAYOUT.EDGES.find(e => e.id === hist.edge);
                                    if(!edgeData) return null;
                                    if(edgeData.curved) return <path key={`hist-${idx}`} d={`M ${edgeData.sx} ${edgeData.sy} C ${edgeData.cx1} ${edgeData.cy1}, ${edgeData.cx2} ${edgeData.cy2}, ${edgeData.ex} ${edgeData.ey}`} className="neon-path pointer-events-none" fill="none" />
                                    return (
                                        <path key={`hist-${idx}`} 
                                            d={`M ${edgeData.sx} ${edgeData.sy} Q ${edgeData.cx} ${edgeData.cy} ${edgeData.ex} ${edgeData.ey}`}
                                            fill="none"
                                            className="neon-path pointer-events-none"/>
                                    );
                                })}
                            </svg>

                            {/* En Modo Difícil, el mapa entero queda borroso durante la hipótesis */}
                            {!hypothesisMade && !isSandbox && difficulty === 'hard' && (
                                <div className="absolute inset-0 z-[15] bg-stone-100/95 backdrop-blur-md flex items-center justify-center flex-col" title="Completa la hipótesis para desbloquear el mapa">
                                    <div className="bg-white p-6 rounded-2xl shadow-xl border-2 border-stone-300 text-center">
                                        <span className="text-4xl text-stone-400 block mb-2"><IconLock/></span>
                                        <p className="font-black text-stone-700 text-xl">Mapa bloqueado en Modo Difícil</p>
                                        <p className="text-sm text-stone-500 mt-2">Deduce la ruta usando tus conocimientos sin mirar el diagrama.</p>
                                    </div>
                                </div>
                            )}

                            {Object.entries(DIAGRAM_LAYOUT.NODES).map(([nodeId, pos]) => {
                                const itemData = ITEMS_DIAGRAMA.find(i => i.id === DIAGRAM_SOLUTION[nodeId]);
                                const isCurrent = nodeId === currentNode;
                                const isOriginSelected = nodeId === selectedOrigin;

                                return (
                                    <div key={nodeId} 
                                         onClick={() => handleNodeClick(nodeId)}
                                         className={`absolute w-32 md:w-36 -translate-x-1/2 -translate-y-1/2 p-3 border-2 border-solid rounded-xl text-center font-bold text-xs md:text-sm shadow-md z-20 transition-transform bg-white
                                            ${!hypothesisMade && !isSandbox ? 'pointer-events-none grayscale opacity-50' : 'cursor-pointer'}
                                            ${itemData ? itemData.color : 'bg-stone-100'}
                                            ${isCurrent && step === 0 ? 'border-blue-500 animate-pulse scale-110' : ''}
                                            ${isOriginSelected ? 'border-green-500 scale-105' : (!hypothesisMade && !isSandbox ? '' : 'hover:scale-105')}
                                            ${!isCurrent && step === 0 ? 'opacity-60 saturate-50' : ''}
                                            ${step === 2 && hypothesisMade ? 'hover:border-blue-400' : ''}
                                            ${isHintMode ? 'ring-2 ring-yellow-400 border-yellow-500 shadow-[0_0_15px_#facc15]' : ''}
                                         `}
                                         style={{ top: `${(pos.cy / 800) * 100}%`, left: `${(pos.cx / 1200) * 100}%` }}>
                                        {getNodeLabel(nodeId)}
                                        {nodeId === 'n_ignea' && <div className="text-[9px] font-normal mt-1 leading-tight text-stone-700">Plutónica / Volcánica</div>}
                                    </div>
                                );
                            })}

                            {DIAGRAM_LAYOUT.EDGES.map((edge) => {
                                const itemData = getEdgeData(edge.id);
                                const isSelected = edge.id === selectedEdge;
                                const isBlocked = !isSandbox && mission.blockedEdges.includes(edge.id);
                                const isRevealed = revealedElements.includes(edge.id) || teacherMode || isSandbox || difficulty === 'easy';
                                
                                const midPos = getEdgeMidpoint(edge);

                                return (
                                    <div key={edge.id} 
                                         onClick={() => !isBlocked && handleEdgeClick(edge.id)}
                                         className={`absolute flex flex-col items-center justify-center z-20 transition-all
                                            ${!hypothesisMade && !isSandbox ? 'pointer-events-none grayscale opacity-50' : 'cursor-pointer'}
                                            ${isSelected ? 'scale-110' : isBlocked ? 'grayscale cursor-not-allowed opacity-60' : 'hover:scale-110'}
                                            ${step === 1 ? 'animate-pulse' : ''}
                                            ${step !== 1 && !isSelected ? 'opacity-90' : ''}
                                         `}
                                         style={{ top: midPos.top, left: midPos.left, transform: 'translate(-50%, -50%)' }}>
                                        
                                        <div className={`w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-md border-[3px]
                                            ${isSelected ? 'ring-4 ring-blue-300 border-blue-500' : isBlocked ? 'border-red-500' : ''}
                                            ${isHintMode ? 'ring-4 ring-yellow-400' : ''}
                                        `} style={{ borderColor: isSelected ? undefined : edge.color }}>
                                            {(!isRevealed && difficulty === 'hard') ? <span className="text-[10px] text-stone-400">?</span> : <span className="text-2xl">{itemData?.icon}</span>}
                                            {isBlocked && <div className="absolute inset-0 flex items-center justify-center text-red-600 text-3xl font-black bg-white/50 backdrop-blur-[1px] rounded-full">X</div>}
                                        </div>
                                        
                                        {(!(!isRevealed && difficulty === 'hard')) && (
                                            <span className="bg-white/90 px-2 py-0.5 rounded text-[10px] font-bold text-stone-800 shadow-sm mt-1 uppercase text-center max-w-[100px] leading-tight">
                                                {getEdgeLabel(edge.id)}
                                            </span>
                                        )}
                                    </div>
                                );
                            })}
                        </div>

                        {/* Sidebar (Hypothesis or Navigation Status) - Ara està a sota horitzontal */}
                        <div className="w-full flex flex-col md:flex-row gap-6 pb-20">
                            {!hypothesisMade && !isSandbox ? (
                                <div className="w-full bg-white rounded-3xl border-2 border-blue-400 p-6 flex flex-col md:flex-row gap-6 shadow-lg z-40">
                                    <div className="flex-1 flex flex-col">
                                        <div className="flex items-center gap-4 mb-2">
                                            <div className="text-4xl">🤔</div>
                                            <h4 className="text-xl font-black text-blue-900">Fase de Hipótesis</h4>
                                        </div>
                                        <p className="text-stone-600 mb-4 text-xs leading-relaxed">
                                            ¿Qué ruta seguirás para llegar de <strong className="text-stone-800">{ROCK_NAMES[mission.start]}</strong> a <strong className="text-blue-700">{ROCK_NAMES[mission.target]}</strong>? Planifica y justifica.
                                        </p>
                                        <textarea 
                                            className="w-full p-3 border-2 border-stone-200 rounded-xl mb-4 text-xs resize-none focus:ring-2 focus:ring-blue-500 outline-none transition-all custom-scroll shadow-inner flex-1 min-h-[80px]"
                                            placeholder="Justifica tu decisión aquí..."
                                            value={hypothesisText}
                                            onChange={(e) => setHypothesisText(e.target.value)}
                                        ></textarea>
                                    </div>

                                    <div className="flex-1 flex flex-col">
                                        <div className="bg-blue-50 p-3 rounded-xl border border-blue-200 mb-4 flex-1">
                                            <h5 className="font-bold text-blue-900 text-xs uppercase mb-2">Ruta Planificada</h5>
                                            {plannedPath.map((stepEdge, idx) => (
                                                <div key={idx} className="flex gap-2 mb-2">
                                                    <span className="font-bold text-blue-800 py-1 text-xs">{idx+1}.</span>
                                                    <select className="flex-1 p-1 text-xs border border-blue-300 rounded focus:ring-blue-500" value={stepEdge} onChange={(e) => handlePlanChange(idx, e.target.value)}>
                                                        <option value="">Selecciona proceso...</option>
                                                        {UNIQUE_PROCESSES.map(p => (
                                                            <option key={p.id} value={p.id}>{difficulty === 'hard' ? EXPERT_PROCESS_LABELS[p.id] : `${p.icon} ${p.label}`}</option>
                                                        ))}
                                                    </select>
                                                    {plannedPath.length > 1 && <button onClick={() => handleRemovePlanStep(idx)} className="text-red-500">✕</button>}
                                                </div>
                                            ))}
                                            <button onClick={handleAddPlanStep} className="text-blue-600 font-bold text-xs mt-2">+ Añadir proceso</button>
                                        </div>
                                        <Button onClick={saveHypothesis} variant="primary" className="py-3 text-sm mt-auto w-full">Guardar y Activar Mapa</Button>
                                    </div>
                                </div>
                            ) : (
                                <div className="w-full bg-stone-100/80 rounded-3xl border border-stone-200 p-6 flex flex-col md:flex-row gap-6 shadow-inner z-40">
                                    <div className="flex-1">
                                        <div className="flex justify-between items-center border-b border-stone-300 pb-2 mb-4">
                                            <h3 className="font-bold text-stone-700">Estado de Navegación</h3>
                                            {!isSandbox && <button onClick={() => {setDifficulty(null); resetMission(); setHypothesisMade(false);}} className="text-xs bg-stone-200 text-stone-700 px-3 py-2 rounded hover:bg-stone-300 transition shadow-sm font-bold">Cambiar Dificultad</button>}
                                        </div>
                                        <div className="flex flex-col md:flex-row gap-3">
                                            <div className={`flex-1 p-3 rounded-lg border-2 transition-all ${step === 0 ? 'bg-white border-blue-400 shadow-md scale-105' : selectedOrigin ? 'bg-green-50 border-green-300 opacity-70' : 'bg-stone-50 border-stone-200 opacity-50'}`}>
                                                <span className="text-xs font-bold text-stone-500 block">1. Origen</span>
                                                <span className="font-bold text-stone-800">{selectedOrigin ? getNodeLabel(selectedOrigin) : 'Esperando clic...'}</span>
                                            </div>
                                            <div className={`flex-1 p-3 rounded-lg border-2 transition-all ${step === 1 ? 'bg-white border-blue-400 shadow-md scale-105' : selectedEdge ? 'bg-green-50 border-green-300 opacity-70' : 'bg-stone-50 border-stone-200 opacity-50'}`}>
                                                <span className="text-xs font-bold text-stone-500 block">2. Proceso</span>
                                                <span className="font-bold text-stone-800 flex items-center">{selectedEdge ? getEdgeLabel(selectedEdge) : 'Esperando clic...'}</span>
                                            </div>
                                            <div className={`flex-1 p-3 rounded-lg border-2 transition-all ${step === 2 ? 'bg-white border-blue-400 shadow-md scale-105' : 'bg-stone-50 border-stone-200 opacity-50'}`}>
                                                <span className="text-xs font-bold text-stone-500 block">3. Destino</span>
                                                <span className="font-bold text-stone-800">Esperando clic...</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex-1 flex flex-col justify-end">
                                        <div className={`p-4 rounded-xl border-2 transition-all flex-1 flex items-center justify-center ${feedback.type === 'error' ? 'bg-red-50 border-red-300 text-red-800' : feedback.type === 'success' ? 'bg-green-50 border-green-300 text-green-800' : 'bg-blue-50 border-blue-300 text-blue-800'}`}>
                                            <p className="text-sm font-bold text-center">{feedback.text}</p>
                                        </div>
                                        {teacherMode && !isSandbox && (
                                            <div className="mt-4 bg-green-50 p-3 rounded-xl border border-green-200">
                                                <h4 className="font-bold text-green-800 text-xs uppercase mb-2">Ruta Correcta (Docente)</h4>
                                                <div className="flex flex-wrap gap-2 text-xs text-green-700 font-medium">
                                                    {mission.idealPath.map((edgeId, idx) => {
                                                        const procId = DIAGRAM_SOLUTION[edgeId];
                                                        const proc = ITEMS_DIAGRAMA.find(i => i.id === procId);
                                                        return <div key={idx} className="bg-white px-2 py-1 rounded shadow-sm border border-green-200"><span className="font-black mr-1">{idx+1}.</span> {proc?.label}</div>
                                                    })}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };


        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [progress, setProgress] = useState(() => {
                const saved = localStorage.getItem('rocas_progress');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        return {
                            ...INITIAL_PROGRESS,
                            ...parsed,
                            reflections: {
                                ...(INITIAL_PROGRESS.reflections || {}),
                                ...(parsed.reflections || {})
                            }
                        };
                    } catch(e) { return INITIAL_PROGRESS; }
                }
                return INITIAL_PROGRESS;
            });
            const [teacherMode, setTeacherMode] = useState(false);
            const [currentPhase, setCurrentPhase] = useState(1);
            const [activeChallenge, setActiveChallenge] = useState(null);

            const updateProgress = (newData) => {
                setProgress(prev => {
                    const combined = { ...prev, ...newData };
                    localStorage.setItem('rocas_progress', JSON.stringify(combined));
                    return combined;
                });
            };

            const completeChallenge = (id, reflectionText) => {
                setProgress(prev => {
                    const newProgress = { ...prev, [id]: true };
                    if (reflectionText) {
                        newProgress.reflections = { ...(prev.reflections || {}), [id]: reflectionText };
                    }
                    localStorage.setItem('rocas_progress', JSON.stringify(newProgress));
                    return newProgress;
                });
            };

            const toggleTeacherMode = () => {
                if (teacherMode) setTeacherMode(false);
                else {
                    const code = prompt("Introduce el código de docente:");
                    if (code === "2421") {
                        setTeacherMode(true);
                        const td = { calor: true, fusion: true, enfriamiento: true, meteorizacion: true, compactacion: true, diagrama: true, retos: true, reflections: progress.reflections, hasDrawnHypothesis: true };
                        setProgress(p => ({...p, ...td}));
                        localStorage.setItem('rocas_progress', JSON.stringify({...progress, ...td}));
                    } else if (code) alert("Código incorrecto");
                }
            };

            const resetProgress = () => {
                if (confirm("¿Estás seguro de querer borrar todo el progreso?")) {
                    setProgress(INITIAL_PROGRESS);
                    localStorage.setItem('rocas_progress', JSON.stringify(INITIAL_PROGRESS));
                    setTeacherMode(false);
                    setCurrentPhase(1);
                    setActiveChallenge(null);
                }
            };

            const retos = [
                { id: 'calor', title: '1. Calor y Presión', icon: '🔥', component: RetoCalor },
                { id: 'fusion', title: '2. Fusión', icon: '🌋', component: RetoFusion },
                { id: 'enfriamiento', title: '3. Enfriamiento', icon: '❄️', component: RetoEnfriamiento },
                { id: 'meteorizacion', title: '4. Meteorización', icon: '🌧️', component: RetoMeteorizacion },
                { id: 'compactacion', title: '5. Compactación', icon: '🧱', component: RetoCompactacion }
            ];

            return (
                <div className="min-h-screen flex flex-col bg-stone-100">
                    {/* HEADER */}
                    <header className="bg-stone-800 text-stone-50 px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-md">
                        <h1 className="text-xl md:text-2xl font-black tracking-tight flex items-center gap-2">
                            <span className="text-3xl">🪨</span> Modelizando el ciclo de las rocas
                        </h1>
                        <div className="flex gap-4 items-center">
                            <button onClick={toggleTeacherMode} className={`p-2 rounded-full transition-colors ${teacherMode ? 'bg-amber-500 text-stone-900' : 'bg-stone-700 text-stone-300 hover:bg-stone-600'}`} title="Modo Docente">
                                {teacherMode ? <IconUnlock/> : <IconTeacher/>}
                            </button>
                            <button onClick={resetProgress} className="p-2 bg-stone-700 text-red-400 rounded-full hover:bg-red-500 hover:text-white transition-colors" title="Borrar Progreso">
                                <IconTrash/>
                            </button>
                        </div>
                    </header>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 w-full max-w-7xl mx-auto p-4 md:p-8 flex flex-col">
                        
                        {/* NAVIGATION TABS */}
                        {!activeChallenge && (
                            <div className="flex flex-wrap bg-white rounded-xl p-2 mb-6 shadow-sm border border-stone-200 max-w-3xl mx-auto w-full shrink-0">
                                <button onClick={() => setCurrentPhase(1)} className={`flex-1 py-3 text-xs md:text-sm font-bold rounded-lg transition-all min-w-[120px] ${currentPhase === 1 ? 'bg-stone-800 text-white shadow-md' : 'text-stone-500 hover:bg-stone-100'}`}>1. Teoría</button>
                                <button onClick={() => setCurrentPhase(1.5)} disabled={!progress.compactacion && !teacherMode} className={`flex-1 py-3 text-xs md:text-sm font-bold rounded-lg transition-all min-w-[120px] ${currentPhase === 1.5 ? 'bg-stone-800 text-white shadow-md' : 'text-stone-500 hover:bg-stone-100 disabled:opacity-50'}`}>2. Acción</button>
                                <button onClick={() => setCurrentPhase(2)} disabled={!progress.compactacion && !teacherMode} className={`flex-1 py-3 text-xs md:text-sm font-bold rounded-lg transition-all min-w-[120px] ${currentPhase === 2 || currentPhase === 2.5 ? 'bg-stone-800 text-white shadow-md' : 'text-stone-500 hover:bg-stone-100 disabled:opacity-50'}`}>3. El Ciclo</button>
                                <button onClick={() => setCurrentPhase(3)} disabled={!progress.diagrama && !teacherMode} className={`flex-1 py-3 text-xs md:text-sm font-bold rounded-lg transition-all min-w-[120px] ${currentPhase === 3 ? 'bg-stone-800 text-white shadow-md' : 'text-stone-500 hover:bg-stone-100 disabled:opacity-50'}`}>4. Navegación</button>
                            </div>
                        )}

                        {/* DYNAMIC VIEW */}
                        <div className="flex-1 flex flex-col animate-fade-in">
                            {activeChallenge ? (
                                <div className="flex-1 flex flex-col h-full">
                                    <PhaseHeader 
                                        title={activeChallenge.title} 
                                        onBack={() => setActiveChallenge(null)}
                                        infoBox={progress[activeChallenge.id] && <span className="text-green-600 flex items-center gap-1 font-bold bg-green-50 px-3 py-1 rounded-lg"><IconCheck/> Completado</span>}
                                    />
                                    <div className="flex-1 bg-white rounded-3xl shadow-sm border border-stone-200 overflow-hidden flex flex-col h-full min-h-[600px]">
                                        <div className="flex-1 overflow-y-auto custom-scroll flex flex-col bg-stone-50/50 relative">
                                            <activeChallenge.component onComplete={(refData) => completeChallenge(activeChallenge.id, refData)} teacherMode={teacherMode} />
                                            {progress[activeChallenge.id] && (
                                                <div className="p-4 bg-white border-t border-stone-200 flex justify-end shrink-0 animate-fade-in sticky bottom-0 z-50">
                                                    <Button variant="success" onClick={() => {
                                                        const currentIndex = retos.findIndex(r => r.id === activeChallenge.id);
                                                        if (currentIndex < retos.length - 1) setActiveChallenge(retos[currentIndex + 1]);
                                                        else { setActiveChallenge(null); setCurrentPhase(1.5); }
                                                    }}>
                                                        {activeChallenge.id === 'compactacion' ? 'Ir a Acción en Vídeo' : 'Siguiente transformación'} →
                                                    </Button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ) : currentPhase === 1 ? (
                                <div className="flex flex-col gap-6 p-4">
                                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-stone-200 text-center max-w-4xl mx-auto w-full">
                                        <h2 className="text-2xl font-black text-stone-800 mb-4">Transformaciones Básicas</h2>
                                        <p className="text-stone-600 text-sm leading-relaxed mb-4">¿Te parece que las rocas nunca cambian? Por ejemplo, si encuentras un trozo de granito hoy, ¿puedes esperar que siga siendo granito al final de tu vida? Puede que sea cierto, pero solo porque nuestra vida es muy corta en comparación con la historia de la Tierra.</p>
                                        <p className="text-stone-600 text-sm leading-relaxed mb-4">Si retrocedemos un paso y observamos el tiempo geológico (que se centra en los cambios que ocurren a lo largo de millones de años), descubrimos que las rocas sí cambian. De hecho, todas las rocas cambian lentamente de un tipo a otro, una y otra vez. Estos cambios forman un ciclo, llamado <strong>"ciclo de las rocas"</strong>.</p>
                                        <p className="text-stone-600 text-sm leading-relaxed">La forma en que las rocas cambian depende de varios procesos que ocurren constantemente en la superficie y bajo la superficie terrestre. Ahora veamos más de cerca cada uno de estos procesos.</p>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {retos.map((reto, idx) => {
                                            const isUnlocked = idx === 0 || progress[retos[idx-1].id] || teacherMode;
                                            const isCompleted = progress[reto.id];
                                            return (
                                                <div key={reto.id} onClick={() => isUnlocked && setActiveChallenge(reto)}
                                                     className={`relative p-6 rounded-3xl border-2 transition-all cursor-pointer h-48 flex flex-col justify-center items-center text-center
                                                        ${isCompleted ? 'bg-green-50 border-green-400 hover:bg-green-100 shadow-sm' : 
                                                          isUnlocked ? 'bg-white border-stone-300 hover:border-blue-400 hover:shadow-md hover:-translate-y-1 shadow-sm' : 
                                                          'bg-stone-100 border-stone-200 opacity-60 cursor-not-allowed'}
                                                     `}>
                                                    <div className="text-5xl mb-4">{reto.icon}</div>
                                                    <h3 className="font-bold text-stone-800 text-lg">{reto.title}</h3>
                                                    {isCompleted && <div className="absolute top-4 right-4 text-green-600 bg-white rounded-full p-1 shadow-sm border border-green-200"><IconCheck/></div>}
                                                    {!isUnlocked && <div className="absolute inset-0 bg-stone-100/60 backdrop-blur-[2px] rounded-3xl flex items-center justify-center"><div className="bg-stone-800 text-white p-4 rounded-full shadow-lg"><IconLock/></div></div>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ) : currentPhase === 1.5 ? (
                                <Movilizacion1Phase onNext={() => setCurrentPhase(progress.hasDrawnHypothesis ? 2.5 : 2)} />
                            ) : currentPhase === 2 ? (
                                <PizarraPhase teacherMode={teacherMode} onNext={() => { updateProgress({hasDrawnHypothesis: true}); setCurrentPhase(2.5); }} />
                            ) : currentPhase === 2.5 ? (
                                <div className="flex-1 flex flex-col h-full animate-shake" style={{animationDuration: '0.2s'}}>
                                    <DiagramPhase onComplete={() => updateProgress({diagrama: true})} onUpdateProgress={updateProgress} progress={progress} teacherMode={teacherMode} onNext={() => setCurrentPhase(3)} />
                                </div>
                            ) : (
                                <DesafiosNavegacionPhase progress={progress} onUpdateProgress={updateProgress} onCompleteProgress={() => updateProgress({retos: true})} teacherMode={teacherMode} />
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
