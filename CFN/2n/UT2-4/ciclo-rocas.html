<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modelizando el ciclo de las rocas</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- html2pdf para la exportación del PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f5f5f4; /* stone-100 */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #e7e5e4; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #a8a29e; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #78716c; }

        /* Animations */
        .animate-fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        @keyframes glow {
            0% { box-shadow: 0 0 5px #16a34a, inset 0 0 5px #16a34a; border-color: #22c55e; }
            50% { box-shadow: 0 0 20px #16a34a, inset 0 0 10px #16a34a; border-color: #4ade80; }
            100% { box-shadow: 0 0 5px #16a34a, inset 0 0 5px #16a34a; border-color: #22c55e; }
        }
        .animate-glow { animation: glow 1.5s ease-out infinite; }

        @keyframes neon-pulse {
            0% { filter: drop-shadow(0 0 5px #2563eb) drop-shadow(0 0 15px #2563eb); stroke: #3b82f6; }
            50% { filter: drop-shadow(0 0 10px #1d4ed8) drop-shadow(0 0 30px #1d4ed8); stroke: #2563eb; }
            100% { filter: drop-shadow(0 0 5px #2563eb) drop-shadow(0 0 15px #2563eb); stroke: #3b82f6; }
        }
        .neon-path { animation: neon-pulse 2s infinite; stroke-width: 6; }

        @keyframes teacher-pulse {
            0% { filter: drop-shadow(0 0 5px #16a34a); stroke: #22c55e; }
            50% { filter: drop-shadow(0 0 15px #15803d); stroke: #16a34a; }
            100% { filter: drop-shadow(0 0 5px #16a34a); stroke: #22c55e; }
        }
        .teacher-path { animation: teacher-pulse 1.5s infinite; stroke-width: 6; stroke-dasharray: 10; animation-direction: reverse;}

        @keyframes morph {
            0% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }
        .magma-blob {
            animation: morph 3s ease-in-out infinite;
            background: radial-gradient(circle at 30% 30%, #ff7e5f, #ea580c);
        }

        .path-line {
            stroke-dasharray: 10;
            animation: dash 20s linear infinite;
        }
        @keyframes dash {
            to { stroke-dashoffset: -1000; }
        }

        /* Specific animations for Meteorización */
        @keyframes rain-fall {
            0% { transform: translateY(-50px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(150px); opacity: 0; }
        }
        @keyframes wind-blow {
            0% { transform: translateX(-100px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(150px); opacity: 0; }
        }
        @keyframes roots-grow {
            0% { stroke-dasharray: 100; stroke-dashoffset: 100; opacity: 1; }
            80% { stroke-dashoffset: 0; opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes particle-fly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #78716c;
            border-radius: 50%;
            pointer-events: none;
            animation: particle-fly 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        /* PDF Styles */
        .pdf-content { font-family: 'Helvetica', 'Arial', sans-serif !important; background: white; color: #1c1917; }
        .pdf-content h2, .pdf-content h3, .pdf-content h4 { color: #1c1917; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- ICONS ---
        const IconTeacher = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;
        const IconTrash = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconCheck = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconLock = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const IconUnlock = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>;
        const IconLightning = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const IconChevronUp = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>;
        const IconChevronDown = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>;
        const IconExpand = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6"></path><path d="M9 21H3v-6"></path><path d="M21 3l-7 7"></path><path d="M3 21l7-7"></path></svg>;

        // --- UNIVERSAL UI COMPONENTS ---
        const Button = ({ variant = 'primary', className = '', onClick, disabled, children, ...props }) => {
            const base = "font-bold py-3 px-6 rounded-xl shadow-sm transition-all active:scale-95 flex items-center justify-center gap-2 select-none disabled:opacity-50 disabled:active:scale-100 disabled:cursor-not-allowed";
            const variants = {
                primary: "bg-blue-600 hover:bg-blue-700 text-white shadow-md",
                secondary: "bg-white hover:bg-stone-50 text-stone-800 border-2 border-stone-200",
                ghost: "bg-transparent hover:bg-stone-100 text-stone-600 border-2 border-transparent hover:border-stone-200",
                danger: "bg-red-500 hover:bg-red-600 text-white shadow-md",
                success: "bg-green-600 hover:bg-green-700 text-white shadow-md",
                warm: "bg-orange-600 hover:bg-orange-700 text-white shadow-md"
            };
            return <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${className}`} {...props}>{children}</button>;
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[999] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 animate-fade-in" onClick={onClose}>
                    <div className="bg-white p-6 rounded-3xl shadow-2xl max-w-xl w-full relative max-h-[90vh] overflow-y-auto custom-scroll" onClick={e => e.stopPropagation()}>
                        {onClose && <button onClick={onClose} className="absolute -top-3 -right-3 bg-red-500 hover:bg-red-600 text-white rounded-full w-8 h-8 font-bold shadow-lg hover:scale-105 transition-transform flex items-center justify-center z-50">✕</button>}
                        {title && <h3 className="text-2xl font-bold mb-4 text-center text-stone-800">{title}</h3>}
                        {children}
                    </div>
                </div>
            );
        };

        const PhaseHeader = ({ title, subtitle, infoBox, onBack, onReset }) => (
            <div className="bg-white rounded-xl shadow-sm border border-stone-200 p-4 mb-4 flex flex-col md:flex-row items-center justify-between gap-4 shrink-0 relative z-30 animate-fade-in">
                <div className="flex-1 flex flex-col items-start text-left">
                    {onBack && (
                        <button onClick={onBack} className="text-stone-500 hover:text-stone-800 font-bold mb-2 flex items-center gap-1 text-sm bg-stone-100 px-3 py-1 rounded-lg transition-colors">
                            ← Volver al menú
                        </button>
                    )}
                    <h2 className="text-2xl font-black text-stone-800 flex items-center gap-2">{title}</h2>
                    {subtitle && <p className="text-stone-600 font-medium text-sm mt-1">{subtitle}</p>}
                </div>
                <div className="flex items-center gap-4 flex-wrap justify-center">
                    {infoBox}
                    {onReset && (
                        <button onClick={onReset} className="bg-stone-200 hover:bg-stone-300 text-stone-700 p-3 rounded-xl transition-colors shadow-sm" title="Reiniciar">
                            ⟲
                        </button>
                    )}
                </div>
            </div>
        );

        const AnalogyDropdown = ({ question, text, result }) => {
            const [open, setOpen] = useState(false);
            return (
                <div className="bg-orange-50 rounded-xl border border-orange-200 shadow-inner overflow-hidden mt-4 transition-all">
                    <button onClick={() => setOpen(!open)} className="w-full p-4 font-bold text-orange-800 text-sm flex items-center justify-between hover:bg-orange-100 transition-colors text-left">
                        <span className="flex items-center gap-2">💡 Analogía: {question}</span>
                        {open ? <IconChevronUp /> : <IconChevronDown />}
                    </button>
                    {open && (
                        <div className="px-4 pb-4 text-orange-700 text-sm leading-relaxed border-t border-orange-100 pt-3 animate-fade-in bg-white/50">
                            <p className="mb-2">{text}</p>
                            <p className="font-bold text-orange-900">{result}</p>
                        </div>
                    )}
                </div>
            )
        };

        const SuccessModal = ({ isOpen, onClose, title = "¡Laboratorio Superado!" }) => {
            return (
                <Modal isOpen={isOpen} onClose={onClose}>
                    <div className="text-center p-4">
                        <div className="text-6xl mb-4 animate-bounce">🎉</div>
                        <h2 className="text-3xl font-black text-green-600 mb-2">{title}</h2>
                        <p className="text-stone-600 font-medium mb-6">Tus datos de reflexión se han guardado correctamente.</p>
                        <Button variant="success" onClick={onClose} className="mx-auto w-full text-lg">Continuar</Button>
                    </div>
                </Modal>
            )
        };

        const autoResizeTextarea = (e) => {
            e.target.style.height = 'auto';
            e.target.style.height = (e.target.scrollHeight) + 'px';
        };

        // --- GLOBAL DATA ---
        const INITIAL_PROGRESS = {
            calor: false,
            fusion: false,
            enfriamiento: false,
            meteorizacion: false,
            compactacion: false,
            diagrama: false,
            retos: false,
            reflections: {},
            missionReflections: {},
            diagramPlacedItems: {},
            navMissionIdx: 0,
            navHypotheses: [],
            navIsSandbox: false,
            navDifficulty: null,
            hasDrawnHypothesis: false
        };

        const EXPERT_LABELS = {
            'n_ignea': 'Roca Ígnea',
            'n_sedi': 'Roca Sedimentaria',
            'n_meta': 'Roca Metamórfica',
            'n_magma': 'Sustancia D',
            'n_sedimento': 'Material E',
            'e_sedimento_sedi': 'Proceso 1',
            'e_sedi_sedimento': 'Proceso 2',
            'e_magma_ignea': 'Proceso 3',
            'e_ignea_magma': 'Proceso 4',
            'e_sedi_meta': 'Proceso 5',
            'e_ignea_meta': 'Proceso 6',
            'e_meta_sedimento': 'Proceso 7',
            'e_meta_magma': 'Proceso 8',
            'e_ignea_sedimento': 'Proceso 9'
        };

        const ITEMS_DIAGRAMA = [
            { id: 'i_metamorfica', type: 'roca', label: 'Roca Metamórfica', color: 'bg-purple-100 border-purple-600 text-purple-900', def: 'Formada por la alteración de otras rocas debido al calor y presión.' },
            { id: 'i_ignea', type: 'roca', label: 'Roca Ígnea', color: 'bg-red-100 border-red-600 text-red-900', def: 'Formada por el enfriamiento y solidificación del magma o lava.' },
            { id: 'i_sedimentaria', type: 'roca', label: 'Roca Sedimentaria', color: 'bg-amber-100 border-amber-600 text-amber-900', def: 'Formada por la compactación y cementación de sedimentos.' },
            { id: 'i_magma', type: 'roca', label: 'Magma / Lava', color: 'bg-orange-100 border-orange-600 text-orange-900 font-bold', def: 'Roca fundida en el interior de la Tierra (o exterior si es lava).' },
            { id: 'i_sedimento', type: 'roca', label: 'Sedimentos', color: 'bg-yellow-50 border-yellow-400 text-yellow-800', def: 'Fragmentos de roca creados por meteorización y erosión.' },
            
            { id: 'p_calor', type: 'proceso', label: 'Calor y Presión', icon: '🔥', image: 'https://i.ibb.co/PG4WPGzm/heat-pressure.png', gif: 'https://i.ibb.co/nsv6C6P6/heat-pressure.gif' },
            { id: 'p_fusion', type: 'proceso', label: 'Fusión', icon: '🌋', image: 'https://i.ibb.co/gFvSYV5C/melting.png', gif: 'https://i.ibb.co/5WWmgYgj/melting.gif' },
            { id: 'p_enfriamiento', type: 'proceso', label: 'Enfriamiento', icon: '❄️', image: 'https://i.ibb.co/TBSd4cQF/cooling.png', gif: 'https://i.ibb.co/cKRCrJLF/cooling.gif' },
            { id: 'p_meteorizacion', type: 'proceso', label: 'Meteorización', icon: '🌧️', image: 'https://i.ibb.co/5xWBvnZ2/weather-erosion.png', gif: 'https://i.ibb.co/q33LWFkh/weather-erosion.gif' },
            { id: 'p_compactacion', type: 'proceso', label: 'Compactación', icon: '🧱', image: 'https://i.ibb.co/Nd0dsLCv/compacting-cementing.png', gif: 'https://i.ibb.co/F4QLcL3g/compacting-cementing.gif' }
        ];

        const DIAGRAM_SOLUTION = {
            'n_meta': 'i_metamorfica',
            'n_ignea': 'i_ignea',
            'n_sedi': 'i_sedimentaria',
            'n_magma': 'i_magma',
            'n_sedimento': 'i_sedimento',
            'e_sedimento_sedi': 'p_compactacion',
            'e_sedi_sedimento': 'p_meteorizacion',
            'e_magma_ignea': 'p_enfriamiento',
            'e_ignea_magma': 'p_fusion',
            'e_sedi_meta': 'p_calor',
            'e_ignea_meta': 'p_calor',
            'e_meta_sedimento': 'p_meteorizacion',
            'e_meta_magma': 'p_fusion',
            'e_ignea_sedimento': 'p_meteorizacion'
        };

        const DIAGRAM_ADJACENCY = {
            'n_sedi': { 'e_sedi_meta': 'n_meta', 'e_sedi_magma': 'n_magma', 'e_sedi_sedimento': 'n_sedimento' },
            'n_ignea': { 'e_ignea_meta': 'n_meta', 'e_ignea_magma': 'n_magma', 'e_ignea_sedimento': 'n_sedimento' },
            'n_meta': { 'e_meta_magma': 'n_magma', 'e_meta_sedimento': 'n_sedimento' },
            'n_magma': { 'e_magma_ignea': 'n_ignea' },
            'n_sedimento': { 'e_sedimento_sedi': 'n_sedi' }
        };

        // COORDENADES EXACTES (SVG 1200x800) ABAIXADES +40px per a visibilitat òptima, sense loop meta_meta
        const DIAGRAM_LAYOUT = {
            NODES: {
                'n_meta': { cx: 600, cy: 160 },
                'n_sedi': { cx: 220, cy: 400 },
                'n_sedimento': { cx: 220, cy: 660 },
                'n_ignea': { cx: 980, cy: 400 },
                'n_magma': { cx: 980, cy: 660 }
            },
            EDGES: [
                { id: 'e_sedimento_sedi', color: '#d97706', marker: 'arrow-amber', sx: 200, sy: 635, ex: 200, ey: 425, cx: 140, cy: 530 },
                { id: 'e_sedi_sedimento', color: '#fbbf24', marker: 'arrow-yellow', sx: 240, sy: 425, ex: 240, ey: 635, cx: 300, cy: 530 },
                { id: 'e_magma_ignea', color: '#ef4444', marker: 'arrow-red', sx: 960, sy: 635, ex: 960, ey: 425, cx: 900, cy: 530 },
                { id: 'e_ignea_magma', color: '#ea580c', marker: 'arrow-orange', sx: 1000, sy: 425, ex: 1000, ey: 635, cx: 1060, cy: 530 },
                { id: 'e_sedi_meta', color: '#9333ea', marker: 'arrow-purple', sx: 220, sy: 375, ex: 530, ey: 200, cx: 350, cy: 190 },
                { id: 'e_ignea_meta', color: '#9333ea', marker: 'arrow-purple', sx: 980, sy: 375, ex: 670, ey: 200, cx: 850, cy: 190 },
                { id: 'e_meta_sedimento', color: '#fbbf24', marker: 'arrow-yellow', sx: 580, sy: 225, ex: 270, ey: 635, cx: 400, cy: 440 },
                { id: 'e_meta_magma', color: '#ea580c', marker: 'arrow-orange', sx: 620, sy: 225, ex: 930, ey: 635, cx: 800, cy: 440 },
                { id: 'e_ignea_sedimento', color: '#fbbf24', marker: 'arrow-yellow', sx: 940, sy: 400, ex: 290, ey: 660, cx: 600, cy: 790 }
            ]
        };

        const getEdgeMidpoint = (edge) => {
            const x = 0.25 * edge.sx + 0.5 * edge.cx + 0.25 * edge.ex;
            const y = 0.25 * edge.sy + 0.5 * edge.cy + 0.25 * edge.ey;
            return { top: `${(y/800)*100}%`, left: `${(x/1200)*100}%` };
        };

        const getEdgeData = (edgeId) => ITEMS_DIAGRAMA.find(i => i.id === DIAGRAM_SOLUTION[edgeId] || i.id === edgeId);

        // Imágenes Reales actualizadas
        const ROCK_IMAGES = {
            'calor': { name: 'Pizarra', url: 'https://i.ibb.co/cSdmSZXf/pizarra.jpg', desc: 'Rocas metamórficas con bandas o capas por la presión extrema.' },
            'fusion': { name: 'Magma Hirviente', url: 'https://i.ibb.co/b5ncq4xX/magma.jpg', desc: 'No es una roca sólida aún, pero es el origen de las rocas ígneas.' },
            'enfriamiento': { name: 'Obsidiana (Volcánica)', url: 'https://i.ibb.co/fGKXwTCp/obsidiana.webp', desc: 'Vidrio liso formado por enfriamiento muy rápido.' },
            'meteorizacion': { name: 'Arcilla', url: 'https://i.ibb.co/TD6Wh1dM/arcilla.jpg', desc: 'Sedimentos sueltos listos para ser transportados.' },
            'compactacion': { name: 'Arenisca o Conglomerado', url: 'https://images.unsplash.com/photo-1596706935749-30514936d6ed?auto=format&fit=crop&q=80&w=200', desc: 'Rocas sedimentarias formadas por litificación.' }
        };

        const ReflectionBox = ({ id, onSave, hideExample = false }) => {
            const [text, setText] = useState("");
            const [expanded, setExpanded] = useState(false);
            const data = ROCK_IMAGES[id];
            
            return (
                <div className="mt-4 bg-stone-50 border-2 border-stone-200 p-4 rounded-2xl animate-fade-in w-full shadow-inner">
                    <Modal isOpen={expanded} onClose={() => setExpanded(false)} title={data?.name}>
                        <img src={data?.url} alt={data?.name} className="w-full max-h-[60vh] object-contain rounded-lg shadow-inner" />
                    </Modal>

                    {!hideExample && data && (
                        <div className="flex items-start gap-4 mb-4 bg-white p-3 rounded-xl border border-stone-100 shadow-sm cursor-pointer hover:bg-stone-50 transition-colors relative group" onClick={() => setExpanded(true)}>
                            <div className="relative shrink-0">
                                <img src={data.url} alt={data.name} className="w-16 h-16 rounded-lg object-cover border border-stone-300" />
                                <div className="absolute inset-0 bg-black/20 hidden group-hover:flex items-center justify-center rounded-lg text-white"><IconExpand/></div>
                            </div>
                            <div>
                                <h4 className="font-black text-stone-800 text-sm">Ejemplo Real: {data.name}</h4>
                                <p className="text-xs text-stone-600 mt-1">{data.desc}</p>
                            </div>
                        </div>
                    )}
                    <label className="block text-sm font-bold text-stone-700 mb-2">¿Qué has entendido de este proceso? Explícaselo a un compañero/a en una frase:</label>
                    <textarea 
                        value={text} 
                        onChange={e => setText(e.target.value)} 
                        onInput={autoResizeTextarea}
                        className="w-full p-3 border-2 border-stone-300 rounded-xl text-sm focus:border-blue-500 focus:ring-0 outline-none transition-colors resize-none mb-3 overflow-hidden min-h-[80px]"
                        placeholder="Escribe tu reflexión..."
                    ></textarea>
                    <Button onClick={() => onSave(text)} disabled={text.trim().length < 5} variant="success" className="w-full text-sm py-2">Guardar y Continuar</Button>
                </div>
            );
        };


        // --- SUB-COMPONENTS (MINIGAMES) ---

        // 1. Calor y Presión
        const RetoCalor = ({ onComplete, teacherMode }) => {
            const [depth, setDepth] = useState(0); 
            const [time, setTime] = useState(0); 
            const [showGif, setShowGif] = useState(false);
            const [hasViewedGif, setHasViewedGif] = useState(false);
            const [hasCompletedOnce, setHasCompletedOnce] = useState(false);
            const isDone = depth >= 100;

            useEffect(() => {
                if (teacherMode) { setDepth(100); setHasViewedGif(true); }
            }, [teacherMode]);

            useEffect(() => {
                setTime(Math.round((depth / 100) * 1000000));
                if (isDone && !hasCompletedOnce) {
                    setHasCompletedOnce(true);
                }
            }, [depth, isDone, hasCompletedOnce]);

            return (
                <div className="flex flex-col lg:flex-row gap-8 items-center justify-center p-4 h-full w-full max-w-5xl mx-auto">
                    
                    <div className="flex-1 w-full space-y-6 flex flex-col justify-center">

        // 2. Fusión
        const RetoFusion = ({ onComplete, teacherMode }) => {

            const [hasCompletedOnce, setHasCompletedOnce] = useState(false);
            const isDone = temp >= 1300;

            useEffect(() => {
                if (teacherMode) { setTemp(1300); setHasViewedGif(true); }
            }, [teacherMode]);

            useEffect(() => {
                setTime(Math.round((temp / 1300) * 100000));
                if (isDone && !hasCompletedOnce) {
                    setHasCompletedOnce(true);
                }
            }, [temp, isDone, hasCompletedOnce]);

            const getZoneInfo = () => {
                if (temp < 400) return { label: 'Sólido', color: 'text-stone-500' };
                if (temp < 800) return { label: 'Deformación Viscosa', color: 'text-orange-500' };

            return (
                <div className="flex flex-col lg:flex-row gap-8 items-center justify-center p-4 h-full w-full max-w-5xl mx-auto">
                    
                    <div className="flex-1 w-full space-y-6 flex flex-col justify-center">

                                ⏳ {time.toLocaleString()} años
                            </div>
                            <p className="text-stone-600 text-sm leading-relaxed mb-4 mt-4">
                                Lo mismo ocurre con una roca cuando se calienta lo suficiente. Claro que se necesita mucho calor para derretir una roca. Las altas temperaturas necesarias generalmente solo se encuentran en las profundidades de la Tierra. La roca es arrastrada hacia abajo por los movimientos de la corteza terrestre y se calienta cada vez más a medida que desciende. Se necesitan temperaturas entre 600 y 1300 grados Celsius (1100 y 2400 grados Fahrenheit) para <strong className="text-orange-600 underline">derretir</strong> una roca, convirtiéndola en una sustancia llamada <strong className="text-red-600 font-bold">magma</strong> (roca fundida).

                                </button>

                                    <div className="h-1 w-16 bg-gray-400 rounded-full animate-[wind-blow_0.5s_linear_infinite]"></div>
                                    <div className="h-1 w-24 bg-gray-400 rounded-full animate-[wind-blow_0.5s_linear_infinite_0.2s] ml-8"></div>
                                    <div className="h-1 w-12 bg-gray-400 rounded-full animate-[wind-blow_0.5s_linear_infinite_0.4s]"></div>
                                </div>
                            )}
                            {activeAgent === 'raices' && (
                                <div className="absolute bottom-10 left-1/2 -translate-x-1/2 pointer-events-none z-20">
                                    <svg width="80" height="80" viewBox="0 0 100 100" className="animate-[roots-grow_0.8s_ease-out_forwards]">
                                        <path d="M50 0 Q40 50 20 80 M50 0 Q60 60 80 90 M50 0 Q50 50 40 100 M50 0 Q50 50 60 100" stroke="#16a34a" strokeWidth="6" strokeLinecap="round" fill="none" />
                                    </svg>
                                </div>
                            )}

                            {rockSize > 0 && (
                                <div className="bg-stone-500 rounded-t-3xl rounded-b-lg border-b-4 border-stone-700 transition-all duration-300 relative z-10 shadow-lg" style={{ width: `${rockSize}px`, height: `${rockSize}px` }}></div>
                            )}
                            
                            {particles.map(p => (
                                <div key={p.id} className="particle bottom-10" style={{ '--tx': p.tx, '--ty': p.ty, backgroundColor: p.color }}></div>
                            ))}

                            <div className="absolute bottom-0 w-full bg-amber-200/80 transition-all duration-500 border-t border-amber-300" style={{ height: `${(time/1000000) * 60}px` }}>
                                <div className="absolute inset-0 opacity-50" style={{ backgroundImage: 'radial-gradient(#b45309 1px, transparent 1px)', backgroundSize: '10px 10px' }}></div>
                            </div>
                        </div>
                        {isDone && <div className="mt-6 text-amber-700 font-black text-xl text-center leading-tight bg-amber-100 border-2 border-amber-300 px-4 py-2 rounded-full shadow-md animate-fade-in">¡Sedimentos!</div>}
                    </div>

                    <Modal isOpen={showGif} onClose={() => setShowGif(false)} title="Animación: Meteorización">
                        <img src="https://i.ibb.co/q33LWFkh/weather-erosion.gif" alt="Meteorización y Erosión" className="w-full rounded-xl shadow-inner border border-stone-200" />
                    </Modal>
                </div>
            );
        };

        // 5. Compactación
        const SEDIMENT_IMAGES = {
            'arena': 'https://i.ibb.co/6c93TgKj/arenisca.jpg',
            'arcilla': 'https://i.ibb.co/TD6Wh1dM/arcilla.jpg',
            'cantos': 'https://i.ibb.co/C3b9rsS6/conglomerado.webp'
        };
        const SEDIMENT_NAMES = {
            'arena': 'Arenisca',
            'arcilla': 'Lutita',
            'cantos': 'Conglomerado'
        };

        const RetoCompactacion = ({ onComplete, teacherMode }) => {
            const [sedimentType, setSedimentType] = useState(null); 
            const [time, setTime] = useState(0);
            const [showGif, setShowGif] = useState(false);
            const [hasViewedGif, setHasViewedGif] = useState(false);
            const [completedTypes, setCompletedTypes] = useState(new Set());
            const [expandedImage, setExpandedImage] = useState(null);
            
            const timerRef = useRef(null);
            const isDone = time >= 5000000;

            useEffect(() => {
                if (teacherMode) {
                    setSedimentType('arena');
                    setTime(5000000);
                    setCompletedTypes(new Set(['arena', 'arcilla', 'cantos']));
                    setHasViewedGif(true);
                }
            }, [teacherMode]);

            useEffect(() => {
                if (isDone && sedimentType) {
                    setCompletedTypes(prev => {
                        const newSet = new Set(prev);
                        newSet.add(sedimentType);
                        return newSet;
                    });
                }
            }, [isDone, sedimentType]);

            const handlePress = () => {
                if (!sedimentType || isDone) return;
                
                let currentT = time;
                timerRef.current = setInterval(() => {
                    currentT += 200000;
                    if(currentT >= 5000000) {
                        clearInterval(timerRef.current);
                        setTime(5000000);
                    } else {
                        setTime(currentT);
                    }
                }, 50);
            };

            const stopPress = () => clearInterval(timerRef.current);

            const handleSedimentChange = (type) => {
                setSedimentType(type);
                setTime(0); 
            };

            return (
                <div className="flex flex-col lg:flex-row gap-8 items-center justify-center p-4 h-full w-full max-w-5xl mx-auto">

                    <Modal isOpen={!!expandedImage} onClose={() => setExpandedImage(null)} title={SEDIMENT_NAMES[sedimentType]}>
                        <img src={expandedImage} alt={SEDIMENT_NAMES[sedimentType]} className="w-full max-h-[60vh] object-contain rounded-lg shadow-inner" />
                    </Modal>

                    <div className="flex-1 w-full space-y-4 flex flex-col justify-center">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200 relative">
                            <h3 className="text-xl font-bold text-stone-800 mb-2">Compactación y Cementación</h3>
                            <div className="absolute top-4 right-4 bg-stone-100 px-3 py-1 rounded-full text-xs font-bold text-stone-500 shadow-inner">
                                ⏳ {time.toLocaleString()} años
                            </div>
                            <p className="text-stone-600 text-sm leading-relaxed mb-4 mt-4">
                                Lo mismo ocurre con los sedimentos formados por la meteorización y la erosión de las rocas. Con el tiempo, los sedimentos se acumulan en océanos, lagos y valles, formando capas que ejercen <strong className="text-stone-600 underline">peso</strong> sobre el material subyacente. Este peso <strong className="text-amber-800 underline">comprime</strong> las partículas de sedimento, compactándolas. El agua que pasa por los espacios entre las partículas ayuda a cementarlas aún más. Este proceso de <strong className="text-amber-800 underline">compactación y cementación</strong> de sedimentos forma la <strong className="text-amber-700 font-bold">roca sedimentaria</strong>.
                            </p>
                            
                            <AnalogyDropdown 
                                question="¿Qué sucede con un montón de basura suelta cuando se introduce en una compactadora?" 
                                text="La presión de la máquina produce un cubo sólido de basura compactada."
                                result="Es como el camión de la basura que aplasta las bolsas. Capas y capas de sedimentos se acumulan, y el peso aplasta a las de abajo, mientras los minerales las pegan. ¡Así nacen las Rocas Sedimentarias!"
                            />

                            <Button onClick={() => {setShowGif(true); setHasViewedGif(true);}} variant={hasViewedGif ? "secondary" : "primary"} className="w-full py-2 text-sm mt-4 animate-pulse">🎬 Ver Animación (OBLIGATORIO)</Button>
                        </div>
                        
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-stone-200 space-y-4">
                            <h4 className="font-bold text-sm text-stone-700">Paso 1: Elige sedimentos depositados</h4>
                            <div className="grid grid-cols-3 gap-2">
                                <button onClick={()=>handleSedimentChange('arena')} className={`font-bold py-3 rounded-lg border text-xs shadow-sm transition-colors relative ${sedimentType === 'arena' ? 'bg-yellow-500 text-white border-yellow-600' : 'bg-yellow-50 hover:bg-yellow-100 text-yellow-800 border-yellow-200'}`}>
                                    Granos de Arena
                                    {completedTypes.has('arena') && <span className="absolute -top-2 -right-2 text-green-500 bg-white rounded-full text-lg shadow"><IconCheck/></span>}
                                </button>
                                <button onClick={()=>handleSedimentChange('arcilla')} className={`font-bold py-3 rounded-lg border text-xs shadow-sm transition-colors relative ${sedimentType === 'arcilla' ? 'bg-orange-500 text-white border-orange-600' : 'bg-orange-50 hover:bg-orange-100 text-orange-800 border-orange-200'}`}>
                                    Lodo y Arcilla
                                    {completedTypes.has('arcilla') && <span className="absolute -top-2 -right-2 text-green-500 bg-white rounded-full text-lg shadow"><IconCheck/></span>}
                                </button>
                                <button onClick={()=>handleSedimentChange('cantos')} className={`font-bold py-3 rounded-lg border text-xs shadow-sm transition-colors relative ${sedimentType === 'cantos' ? 'bg-stone-600 text-white border-stone-700' : 'bg-stone-100 hover:bg-stone-200 text-stone-800 border-stone-300'}`}>
                                    Cantos rodados
                                    {completedTypes.has('cantos') && <span className="absolute -top-2 -right-2 text-green-500 bg-white rounded-full text-lg shadow"><IconCheck/></span>}
                                </button>
                            </div>

                            {sedimentType && !isDone && (
                                <>
                                    <div className="flex justify-between items-center">
                                        <h4 className="font-bold text-sm text-stone-700">Paso 2: Simular millones de años de presión</h4>
                                        <button onClick={() => setSedimentType(null)} className="text-xs text-blue-600 hover:underline">Cambiar sedimento</button>
                                    </div>
                                    <Button 
                                        onMouseDown={handlePress} onMouseUp={stopPress} onMouseLeave={stopPress}
                                        onTouchStart={handlePress} onTouchEnd={stopPress}
                                        className="w-full h-16 select-none cursor-pointer animate-pulse"
                                        variant="primary"
                                    >
                                        👇 Mantener presionado
                                    </Button>
                                </>
                            )}
                            
                            {isDone && (
                                <div className="animate-fade-in mt-4">
                                    <div className="flex justify-between items-center mb-3">
                                        <h4 className="font-bold text-sm text-stone-700">¡Roca formada!</h4>
                                        <button onClick={() => setSedimentType(null)} className="text-xs text-blue-600 hover:underline">← Cambiar sedimento</button>
                                    </div>
                                    <div 
                                        className="flex items-center gap-4 bg-stone-50 p-3 rounded-xl border border-stone-200 mb-2 cursor-pointer hover:border-blue-300 transition-colors relative group"
                                        onClick={() => setExpandedImage(sedimentType)}
                                    >
                                        <div className="relative">
                                            <img src={SEDIMENT_IMAGES[sedimentType]} alt={SEDIMENT_NAMES[sedimentType]} className="w-20 h-20 rounded-lg object-cover border border-stone-300 shadow-sm" />
                                            <div className="absolute inset-0 bg-black/20 hidden group-hover:flex items-center justify-center rounded-lg text-white"><IconExpand/></div>
                                        </div>
                                        <div>
                                            <h4 className="font-black text-stone-800 text-sm">Ejemplo Real: {SEDIMENT_NAMES[sedimentType]}</h4>
                                            <p className="text-xs text-stone-600 mt-1">Formada por la compactación y cementación de {sedimentType === 'arena' ? 'granos de arena' : sedimentType === 'arcilla' ? 'lodo y arcilla' : 'cantos rodados'}.</p>
                                        </div>
                                    </div>
                                    
                                    {completedTypes.size < 3 ? (
                                        <div className="text-orange-600 font-bold text-xs text-center bg-orange-50 border border-orange-200 p-2 rounded-lg mt-4">
                                            Debes experimentar con los otros tipos de sedimentos antes de continuar ({completedTypes.size}/3).
                                        </div>
                                    ) : (
                                        hasViewedGif && <ReflectionBox id="compactacion" onSave={onComplete} hideExample={true} />
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="relative w-64 h-64 bg-white rounded-xl border-4 border-stone-300 overflow-hidden shadow-inner flex flex-col justify-end shrink-0">
                        <div className="absolute top-0 w-full bg-stone-800 border-b-8 border-stone-600 z-20 transition-all duration-75" style={{ height: `${(time/5000000) * 60 + 10}px` }}>
                            <div className="w-8 h-full bg-stone-400 mx-auto"></div>
                        </div>

                        {sedimentType && (
                            <div className="w-full transition-all duration-75 flex flex-col justify-end overflow-hidden" style={{ height: `${160 - (time/5000000) * 50}px` }}>
                                <div className="w-full h-full relative bg-amber-100" style={{ opacity: 1 - time/5000000 }}>
                                    {sedimentType === 'arena' && <div className="absolute inset-0" style={{ backgroundImage: 'radial-gradient(#d97706 2px, transparent 2px)', backgroundSize: '10px 10px' }}></div>}
                                    {sedimentType === 'arcilla' && <div className="absolute inset-0 bg-orange-200"></div>}
                                    {sedimentType === 'cantos' && <div className="absolute inset-0" style={{ backgroundImage: 'radial-gradient(#78716c 6px, transparent 6px)', backgroundSize: '20px 20px' }}></div>}
                                </div>
                                <div className="absolute bottom-0 w-full transition-all duration-500 bg-amber-700 flex items-center justify-center border-t-4 border-amber-900 shadow-inner" style={{ height: `${(time/5000000) * 80}px`, opacity: time/5000000 }}>
                                    {isDone && <span className="text-white font-bold text-xl drop-shadow-md z-30">{SEDIMENT_NAMES[sedimentType]}</span>}
                                </div>
                            </div>
                        )}
                    </div>

                    <Modal isOpen={showGif} onClose={() => setShowGif(false)} title="Animación: Compactación">
                        <img src="https://i.ibb.co/F4QLcL3g/compacting-cementing.gif" alt="Compactación" className="w-full rounded-xl shadow-inner border border-stone-200" />
                    </Modal>
                </div>
            );
        };

        // --- PHASE 1.5: MOVILIZACIÓN DE RECURSOS 1 (Simulador Externo y Desbloqueo) ---
        const Movilizacion1Phase = ({ onNext }) => {
            const [answer, setAnswer] = useState("");
            const isCorrect = answer.toLowerCase().includes("magma");

            return (
                <div className="flex-1 flex flex-col items-center justify-center p-4 animate-fade-in h-full">
                    <div className="bg-white p-8 md:p-12 rounded-3xl shadow-sm border border-stone-200 max-w-3xl w-full text-center">
                        <div className="text-6xl mb-6 text-blue-600">💻</div>
                        <h2 className="text-3xl font-black text-stone-800 mb-6">Simulador Interactivo</h2>
                        <p className="text-stone-600 mb-8 leading-relaxed text-lg">
                            Antes de construir el diagrama completo, vamos a ver cómo suceden todos estos cambios de manera continua en la naturaleza.
                        </p>
                        <a href="https://www.learner.org/wp-content/interactive/rockcycle/transformrock/" target="_blank" rel="noopener noreferrer" className="inline-block">
                            <Button variant="primary" className="py-4 px-10 text-xl mb-8">Abrir Simulador Externo</Button>
                        </a>
                        <div className="border-t border-stone-200 pt-8 mt-4 bg-stone-50 p-6 rounded-xl shadow-inner">
                            <label className="block text-stone-700 font-bold mb-2">Para desbloquear la siguiente fase, responde:</label>
                            <p className="text-stone-600 mb-3 text-sm">¿En qué se ha transformado la obsidiana en la última pantalla del simulador?</p>
                            <input 
                                type="text" 
                                value={answer} 
                                onChange={e => setAnswer(e.target.value)} 
                                className="w-full max-w-sm mx-auto p-3 border-2 border-stone-200 rounded-xl mb-6 focus:border-blue-500 outline-none text-center" 
                                placeholder="Escribe tu respuesta..." 
                            />
                            <Button variant="success" onClick={onNext} disabled={!isCorrect} className="w-full md:w-auto mx-auto text-lg">Continuar a Esquema →</Button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- PHASE 3 PRE: Pizarra Hipótesis ---
        const PizarraPhase = ({ onNext, teacherMode }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                if (teacherMode) onNext();
            }, [teacherMode]);

            const getCoordinates = (e, canvas) => {
                if (e.touches && e.touches.length > 0) {
                    const rect = canvas.getBoundingClientRect();
                    return {
                        x: e.touches[0].clientX - rect.left,
                        y: e.touches[0].clientY - rect.top
                    };
                }
                return { x: e.nativeEvent.offsetX, y: e.nativeEvent.offsetY };
            };

            const startDrawing = (e) => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const pos = getCoordinates(e, canvas);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                e.preventDefault(); 
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const pos = getCoordinates(e, canvas);
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#3b82f6';
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            };

            const stopDrawing = () => {
                if(isDrawing) {
                    canvasRef.current.getContext('2d').closePath();
                    setIsDrawing(false);
                }
            };

            const clearCanvas = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            };

            return (
                <div className="flex-1 flex flex-col items-center justify-center p-4 animate-fade-in h-full w-full max-w-4xl mx-auto">
                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-xl w-full border border-stone-200 text-center flex flex-col h-[80vh]">
                        <div className="text-4xl mb-2">📝</div>
                        <h2 className="text-3xl font-black text-stone-800 mb-2">Dibuja tu Hipótesis</h2>
                        <p className="text-stone-600 mb-4 leading-relaxed text-sm">
                            Antes de ver y construir el mapa real, dibuja aquí o en tu libreta cómo crees que se conectan las rocas y los procesos.
                        </p>
                        
                        <div className="flex-1 w-full bg-stone-50 rounded-2xl border-4 border-stone-200 shadow-inner overflow-hidden mb-4 relative touch-none">
                            <canvas 
                                ref={canvasRef}
                                width={800} 
                                height={400}
                                className="w-full h-full cursor-crosshair touch-none block"
                                onMouseDown={startDrawing}
                                onMouseMove={draw}
                                onMouseUp={stopDrawing}
                                onMouseLeave={stopDrawing}
                                onTouchStart={startDrawing}
                                onTouchMove={draw}
                                onTouchEnd={stopDrawing}
                            />
                            <button onClick={clearCanvas} className="absolute bottom-4 right-4 bg-white text-stone-500 hover:text-red-500 font-bold p-2 rounded-full shadow border border-stone-200 z-20">
                                <IconTrash/>
                            </button>
                        </div>
                        
                        <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-4 text-left max-w-xl mx-auto text-xs w-full">
                            <h4 className="font-bold text-blue-900 mb-1">Recuerda incluir en tu esquema:</h4>
                            <ul className="list-disc pl-5 text-blue-800 space-y-1">
                                <li>Rocas (Ígneas, Sedimentarias, Metamórficas, Magma, Sedimentos).</li>
                                <li>Flechas direccionales con el nombre del proceso.</li>
                            </ul>
                        </div>

                        <Button variant="primary" onClick={onNext} className="w-full md:w-auto mx-auto py-3 px-8 text-md">
                            Ya lo he validado con el profesor → Mostrar Mapa
                        </Button>
                    </div>
                </div>
            );
        };

        // --- PHASE 3: CONSTRUCCIÓN DEL DIAGRAMA ---
        const DiagramPhase = ({ onComplete, onUpdateProgress, progress, teacherMode, onNext }) => {
            
            const initialPlacedRocks = {
                'n_meta': 'i_metamorfica',
                'n_ignea': 'i_ignea',
                'n_sedi': 'i_sedimentaria',
                'n_magma': 'i_magma',
                'n_sedimento': 'i_sedimento'
            };

            const [placedItems, setPlacedItems] = useState(() => {
                if (teacherMode) return DIAGRAM_SOLUTION;
                if (progress.diagramPlacedItems && Object.keys(progress.diagramPlacedItems).length > 0) return progress.diagramPlacedItems;
                return initialPlacedRocks;
            });
            
            const [selectedItem, setSelectedItem] = useState(null);
            const [errorNode, setErrorNode] = useState(null);
            const [infoModal, setInfoModal] = useState(null); 

            const isComplete = Object.keys(DIAGRAM_SOLUTION).every(k => placedItems[k] === DIAGRAM_SOLUTION[k]);

            useEffect(() => {
                if (teacherMode) setPlacedItems({...DIAGRAM_SOLUTION});
            }, [teacherMode]);

            useEffect(() => {
                if (isComplete && !progress.diagrama) onComplete();
            }, [isComplete]);

            useEffect(() => {
                if (!teacherMode) {
                    onUpdateProgress({ diagramPlacedItems: placedItems });
                }
            }, [placedItems, teacherMode]);

            const handleSlotTap = (slotId) => {
                const isRockNode = slotId.startsWith('n_');
                if (isRockNode) {
                    setInfoModal(ITEMS_DIAGRAMA.find(i => i.id === DIAGRAM_SOLUTION[slotId]));
                    return;
                }

                if (!selectedItem) {
                    if (placedItems[slotId]) {
                        setInfoModal(ITEMS_DIAGRAMA.find(i => i.id === placedItems[slotId]));
                    }
                    return; 
                }

                const expectedItemId = DIAGRAM_SOLUTION[slotId];
                if (selectedItem.id === expectedItemId) {
                    setPlacedItems(prev => ({...prev, [slotId]: selectedItem.id}));
                    setSelectedItem(null);
                } else {
                    setErrorNode(slotId);
                    setTimeout(() => setErrorNode(null), 500);
                    setSelectedItem(null); 
                }
            };

            const availableItems = ITEMS_DIAGRAMA.filter(item => item.type === 'proceso');

            return (
                <div className="flex flex-col h-full gap-4 relative animate-fade-in">
                    
                    {infoModal && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in" onClick={() => setInfoModal(null)}>
                            <div className="bg-white p-6 rounded-2xl shadow-2xl max-w-xl w-full relative" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setInfoModal(null)} className="absolute -top-3 -right-3 bg-stone-700 hover:bg-red-500 text-white rounded-full w-8 h-8 font-bold shadow-lg hover:scale-105 transition-all flex items-center justify-center z-50">✕</button>
                                <h3 className="text-2xl font-black mb-4 text-center text-stone-800 flex items-center justify-center gap-2">
                                    {infoModal.icon} {infoModal.label}
                                </h3>
                                {infoModal.type === 'proceso' ? (
                                    <div className="border border-stone-200 rounded-xl overflow-hidden shadow-inner">
                                        <img src={infoModal.gif} alt={infoModal.label} className="w-full h-auto object-contain bg-stone-50" />
                                    </div>
                                ) : (
                                    <div className="bg-blue-50 border border-blue-100 p-6 rounded-xl text-center shadow-inner">
                                        <p className="text-lg text-blue-900 leading-relaxed">{infoModal.def}</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <PhaseHeader 
                        title="Construye el Ciclo" 
                        subtitle="Selecciona los procesos inferiores para conectar las rocas situadas en el mapa." 
                        progressText={`${Object.keys(placedItems).length} / ${Object.keys(DIAGRAM_SOLUTION).length}`}
                        onNext={isComplete ? onNext : null}
                        nextLabel="Ir a Navegación"
                    />

                    <div className="flex flex-col flex-1 gap-6 relative">
                        {/* PANEL DIAGRAMA (A dalt, full width) */}
                        <div className="w-full bg-white rounded-2xl shadow-inner border-4 border-stone-200 relative overflow-hidden min-h-[700px]">
                            
                            <div className="absolute top-[50%] left-[50%] -translate-x-1/2 -translate-y-1/2 text-center opacity-10 pointer-events-none flex flex-col items-center z-0 mt-8">
                                <span className="font-black text-4xl uppercase tracking-[0.3em] text-stone-800">Ciclo de las<br/>Rocas</span>
                            </div>

                            <svg viewBox="0 0 1200 800" preserveAspectRatio="none" className="absolute inset-0 w-full h-full pointer-events-none z-10">
                                <defs>
                                    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea" /></marker>
                                    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c" /></marker>
                                    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" /></marker>
                                    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#eab308" /></marker>
                                    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706" /></marker>
                                </defs>
                                
                                {DIAGRAM_LAYOUT.EDGES.map(edge => {
                                    if(edge.curved) {
                                        return <path key={`base-${edge.id}`} d={`M ${edge.sx} ${edge.sy} C ${edge.cx1} ${edge.cy1}, ${edge.cx2} ${edge.cy2}, ${edge.ex} ${edge.ey}`} stroke={edge.color} strokeWidth="4" markerEnd={`url(#${edge.marker})`} fill="none" />
                                    }
                                    return <path key={`base-${edge.id}`} 
                                          d={`M ${edge.sx} ${edge.sy} Q ${edge.cx} ${edge.cy} ${edge.ex} ${edge.ey}`}
                                          stroke={edge.color} 
                                          strokeWidth="4" 
                                          fill="none"
                                          markerEnd={`url(#${edge.marker})`}/>
                                })}
                            </svg>

                            {Object.entries(DIAGRAM_LAYOUT.NODES).map(([nodeId, pos]) => {
                                const placedItemId = placedItems[nodeId];
                                const itemData = ITEMS_DIAGRAMA.find(i => i.id === placedItemId);

                                return (
                                    <div key={nodeId} 
                                         onClick={() => handleSlotTap(nodeId)}
                                         className={`absolute w-32 md:w-36 -translate-x-1/2 -translate-y-1/2 p-3 border-2 border-solid rounded-xl text-center font-bold text-xs md:text-sm z-10 shadow-md scale-100 cursor-pointer hover:scale-105 transition-transform bg-white ${itemData ? itemData.color : ''}`} 
                                         style={{ top: `${(pos.cy / 800) * 100}%`, left: `${(pos.cx / 1200) * 100}%` }}>
                                        {itemData ? itemData.label : 'Roca'}
                                        {nodeId === 'n_ignea' && <div className="text-[9px] font-normal mt-1 leading-tight text-stone-700">Plutónica / Volcánica</div>}
                                    </div>
                                );
                            })}

                            {DIAGRAM_LAYOUT.EDGES.map((edge) => {
                                const placedItemId = placedItems[edge.id];
                                const itemData = ITEMS_DIAGRAMA.find(i => i.id === placedItemId);
                                const isError = errorNode === edge.id;
                                
                                const midPos = getEdgeMidpoint(edge);

                                return (
                                    <div key={edge.id} onClick={() => handleSlotTap(edge.id)}
                                         className={`absolute flex flex-col items-center justify-center z-20 cursor-pointer transition-all hover:scale-110
                                            ${selectedItem && !itemData ? 'ring-4 ring-blue-300 rounded-full' : ''}
                                            ${isError ? 'animate-shake' : ''}
                                         `} style={{ top: midPos.top, left: midPos.left, transform: 'translate(-50%, -50%)' }}>
                                        
                                        <div className="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-md border-[3px]" style={{ borderColor: edge.color }}>
                                            {itemData ? <span className="text-2xl">{itemData.icon}</span> : <span className="text-[10px] text-stone-400">?</span>}
                                        </div>
                                        {itemData && <span className="bg-white/90 px-2 py-0.5 rounded text-[9px] font-bold text-stone-800 shadow-sm mt-1 uppercase">{itemData.label}</span>}
                                    </div>
                                );
                            })}
                            
                            {isComplete && (
                                <div className="absolute top-4 left-1/2 -translate-x-1/2 bg-green-500 text-white font-bold px-6 py-2 rounded-full shadow-lg flex items-center gap-2 animate-bounce z-50">
                                    <IconCheck/> ¡Diagrama Completado!
                                </div>
                            )}
                        </div>

                        {/* PANEL BANCO DE PIEZAS (A sota, horitzontal) */}
                        <div className="w-full bg-white rounded-2xl shadow-sm border border-stone-200 p-6 z-30 mb-20">
                            <h3 className="font-bold text-stone-800 mb-2 border-b pb-2 flex justify-between items-center text-lg">
                                <span>Procesos Geológicos</span>
                                {isComplete && <button onClick={onNext} className="bg-green-600 text-white text-sm px-4 py-2 rounded-lg font-bold shadow hover:bg-green-700 transition">Continuar a Navegación</button>}
                            </h3>
                            <p className="text-xs text-stone-500 mb-6">Selecciona un proceso y toca las flechas del diagrama donde correspondan (se pueden repetir). Toca las rocas o los procesos completados para ver su información.</p>
                            
                            <div className="flex flex-wrap justify-center gap-4">
                                {availableItems.map(item => (
                                    <div key={item.id} 
                                         onClick={() => setSelectedItem(selectedItem?.id === item.id ? null : item)}
                                         className={`p-3 px-6 rounded-xl border-2 text-sm font-bold cursor-pointer transition-all flex items-center gap-2 bg-stone-50 border-stone-300 text-stone-700 hover:bg-stone-100 min-w-[160px]
                                            ${selectedItem?.id === item.id ? 'ring-4 ring-blue-400 scale-105 shadow-md border-blue-500 bg-white' : ''}
                                         `}>
                                        <span className="text-xl">{item.icon}</span>
                                        <span>{item.label}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };


        // --- PHASE 4: DESAFIOS DE NAVEGACIÓN EN EL MAPA ---
        const MISSIONS = [
            { id: 1, start: 'n_sedi', target: 'n_meta', energy: 3, name: "Misión 1: Iniciación", desc: "Convierte la Roca Sedimentaria directamente en una Roca Metamórfica.", blockedEdges: [], mustPass: [] },
            { id: 2, start: 'n_ignea', target: 'n_sedi', energy: 6, name: "Misión 2: El Desgaste", desc: "Convierte una Roca Ígnea en una Roca Sedimentaria. Pista: Deberás pasar por el estado de Sedimentos.", blockedEdges: [], mustPass: ['n_sedimento'], idealPath: ['e_ignea_sedimento', 'e_sedimento_sedi'] },
            { id: 3, start: 'n_meta', target: 'n_ignea', energy: 8, name: "Misión 3: El Despertar Volcánico", desc: "Convierte una Roca Metamórfica en una Roca Ígnea (Volcánica o Plutónica).", blockedEdges: [], mustPass: ['n_magma'], idealPath: ['e_meta_magma', 'e_magma_ignea'] },
            { id: 4, start: 'n_sedi', target: 'n_ignea', energy: 10, name: "Misión 4: El Gran Viaje", desc: "Convierte una Roca Sedimentaria en una Roca Ígnea pasando por el metamorfismo.", blockedEdges: ['e_sedi_magma'], mustPass: ['n_meta', 'n_magma'], idealPath: ['e_sedi_meta', 'e_meta_magma', 'e_magma_ignea'] }
        ];

        const ROCK_NAMES = { 'n_ignea': 'Roca Ígnea', 'n_sedi': 'Roca Sedimentaria', 'n_meta': 'Roca Metamórfica', 'n_magma': 'Magma', 'n_sedimento': 'Sedimentos' };

        // Componente Metacognición Post-Misión
        const PostMissionReflection = ({ mission, allHypotheses, currentMissionIdx, onSave }) => {
            const [text, setText] = useState("");
            const hyp = allHypotheses[currentMissionIdx];
            if (!hyp) return null;

            const getProcNameFromEdge = (edgeId) => {
                const procId = DIAGRAM_SOLUTION[edgeId] || edgeId;
                const proc = ITEMS_DIAGRAMA.find(i => i.id === procId);
                return proc ? proc.label : edgeId;
            };

            const getProcNameFromId = (pId) => {
                const p = ITEMS_DIAGRAMA.find(i => i.id === pId);
                return p ? p.label : pId;
            };

            const plannedNames = (hyp.predictedPath || []).map(getProcNameFromId);
            const actualNames = (hyp.actualPathEdges || []).map(getProcNameFromEdge);

            const isPerfect = JSON.stringify(plannedNames) === JSON.stringify(actualNames);

            const handleSave = () => {
                if (!isPerfect && text.trim().length < 5) {
                    alert("Por favor, explica brevemente por qué cambiaste de plan.");
                    return;
                }
                onSave(isPerfect ? "Seguí la ruta planificada a la perfección." : text);
            };

            return (
                <div className="absolute inset-0 bg-green-500/90 backdrop-blur-md z-[200] flex items-center justify-center animate-fade-in p-4 overflow-y-auto">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl border-4 border-green-300 w-full max-w-2xl text-center flex flex-col items-center my-auto">
                        <div className="text-7xl mb-4 animate-bounce">🏆</div>
                        <h4 className="text-3xl font-black text-green-700 mb-6">¡Misión Superada!</h4>
                        
                        <div className="w-full text-left bg-stone-50 p-4 rounded-xl border border-stone-200 mb-6">
                            <h5 className="font-bold text-stone-800 mb-2 border-b pb-1">Análisis de tu ruta:</h5>
                            
                            <div className="flex flex-col md:flex-row gap-4 mb-4 mt-3">
                                <div className="flex-1 bg-white p-3 rounded-lg border border-stone-200 shadow-sm">
                                    <p className="text-xs font-bold text-stone-500 mb-2 uppercase tracking-wide">Procesos Planificados</p>
                                    <ol className="list-decimal list-inside text-sm font-medium text-stone-700 space-y-1">
                                        {plannedNames.map((name, idx) => <li key={idx}>{name}</li>)}
                                    </ol>
                                </div>
                                <div className="flex-1 bg-white p-3 rounded-lg border border-stone-200 shadow-sm">
                                    <p className="text-xs font-bold text-stone-500 mb-2 uppercase tracking-wide">Procesos Ejecutados</p>
                                    <ol className="list-decimal list-inside text-sm font-medium text-green-700 space-y-1">
                                        {actualNames.map((name, idx) => <li key={idx}>{name}</li>)}
                                    </ol>
                                </div>
                            </div>
                            
                            {isPerfect ? (
                                <p className="text-sm font-bold text-green-700 bg-green-100 p-3 rounded shadow-sm border border-green-200">
                                    ¡Ruta perfecta! Has seguido exactamente los procesos que habías planificado.
                                </p>
                            ) : (
                                <p className="text-sm font-bold text-orange-700 bg-orange-100 p-3 rounded shadow-sm border border-orange-200">
                                    ¡Muy bien, llegaste al objetivo! Pero tu ruta real no coincidió con tu plan original. ¿Por qué tuviste que cambiar de plan sobre la marcha?
                                </p>
                            )}
                        </div>

                        {!isPerfect && (
                            <textarea 
                                className="w-full p-4 border-2 border-stone-200 rounded-xl mb-6 text-sm resize-none focus:ring-2 focus:ring-green-500 outline-none transition-all custom-scroll shadow-inner min-h-[100px]"
                                placeholder="Escribe aquí tu reflexión sobre este cambio..."
                                id="mission-reflection-input"
                                value={text}
                                onChange={(e) => setText(e.target.value)}
                            ></textarea>
                        )}

                        <Button variant="success" onClick={handleSave} className="w-full py-4 text-lg shadow-lg">
                            Continuar →
                        </Button>
                    </div>
                </div>
            );
        };

        const DesafiosNavegacionPhase = ({ progress, onUpdateProgress, onCompleteProgress, teacherMode }) => {
            
            const [difficulty, setDifficulty] = useState(progress.navDifficulty || null); 
            const [currentMissionIdx, setCurrentMissionIdx] = useState(progress.navMissionIdx || 0);
            const [isSandbox, setIsSandbox] = useState(progress.navIsSandbox || false);
            const [showMetacognition, setShowMetacognition] = useState(false);
            const [allHypotheses, setAllHypotheses] = useState(Array.isArray(progress.navHypotheses) ? progress.navHypotheses : []);
            const [missionReflections, setMissionReflections] = useState(progress.missionReflections || {});
            
            const [metaQ1, setMetaQ1] = useState(progress.reflections?.metaQ1 || "");
            const [metaQ2, setMetaQ2] = useState(progress.reflections?.metaQ2 || "");

            const mission = MISSIONS[currentMissionIdx] || MISSIONS[0];
            
            // Navegation State
            const [energy, setEnergy] = useState(0);
            const [currentNode, setCurrentNode] = useState(null);
            const [step, setStep] = useState(0); 
            const [selectedOrigin, setSelectedOrigin] = useState(null);
            const [selectedEdge, setSelectedEdge] = useState(null);
            const [pathHistory, setPathHistory] = useState([]);
            
            const [feedback, setFeedback] = useState({type: 'info', text: ''});
            const [animatingGif, setAnimatingGif] = useState(null);
            const [animatingTitle, setAnimatingTitle] = useState("");
            const [hypothesisMade, setHypothesisMade] = useState(false);
            const [missionWon, setMissionWon] = useState(false);
            const [infoModal, setInfoModal] = useState(null); 
            
            // Blind-Path State
            const [hypothesisText, setHypothesisText] = useState("");
            const [plannedPath, setPlannedPath] = useState([]);
            const [currentPlanStep, setCurrentPlanStep] = useState(0);

            // Hint System
            const [hintsLeft, setHintsLeft] = useState(3);
            const [isHintMode, setIsHintMode] = useState(false);
            const [revealedElements, setRevealedElements] = useState([]);

            const UNIQUE_PROCESSES = useMemo(() => {
                const uniqueLabels = new Set();
                const uniques = [];
                ITEMS_DIAGRAMA.filter(i => i.type === 'proceso').forEach(p => {
                    if (!uniqueLabels.has(p.label)) {
                        uniqueLabels.add(p.label);
                        uniques.push(p);
                    }
                });
                return uniques;
            }, []);

            useEffect(() => {
                if (!teacherMode) {
                    onUpdateProgress({
                        navMissionIdx: currentMissionIdx,
                        navHypotheses: Array.isArray(allHypotheses) ? allHypotheses : [],
                        navIsSandbox: isSandbox,
                        navDifficulty: difficulty,
                        missionReflections: missionReflections,
                        reflections: {
                            ...(progress.reflections || {}),
                            metaQ1,
                            metaQ2
                        }
                    });
                }
            }, [currentMissionIdx, allHypotheses, isSandbox, difficulty, missionReflections, metaQ1, metaQ2, teacherMode]);

            useEffect(() => {
                if (difficulty && !isSandbox && !showMetacognition) {
                    setEnergy(mission.energy);
                    setCurrentNode(mission.start);
                    setStep(0);
                    setSelectedOrigin(null);
                    setSelectedEdge(null);
                    setPathHistory([]);
                    setFeedback({type: 'info', text: 'Lee la misión y formula tu hipótesis para empezar.'});
                    setHypothesisMade(false);
                    setHypothesisText("");
                    setPlannedPath(['']); 
                    setCurrentPlanStep(0);
                    setHintsLeft(3);
                    setRevealedElements([]);
                    setIsHintMode(false);
                    setMissionWon(false);
                }
            }, [currentMissionIdx, isSandbox, showMetacognition, difficulty]);

            const handleAddPlanStep = () => setPlannedPath([...plannedPath, '']);
            const handlePlanChange = (index, val) => {
                const newPlan = [...plannedPath];
                newPlan[index] = val;
                setPlannedPath(newPlan);
            };
            const handleRemovePlanStep = (index) => setPlannedPath(plannedPath.filter((_, i) => i !== index));

            const saveHypothesis = () => {
                if(hypothesisText.trim().length < 10) {
                    alert("Por favor, escribe una justificación más detallada.");
                    return;
                }
                if(plannedPath.length === 0 || plannedPath.some(p => p === '')) {
                    alert("Debes completar todos los selectores de tu ruta planificada.");
                    return;
                }
                setHypothesisMade(true);
                const newHypotheses = Array.isArray(allHypotheses) ? [...allHypotheses] : [];
                newHypotheses[currentMissionIdx] = {
                    levelName: mission.name,
                    start: ROCK_NAMES[mission.start],
                    target: ROCK_NAMES[mission.target],
                    text: hypothesisText,
                    predictedPath: [...plannedPath],
                    actualPath: [],
                    actualPathEdges: [],
                    reflection: ""
                };
                setAllHypotheses(newHypotheses);
                setFeedback({type: 'info', text: 'Haz clic en tu posición actual en el mapa para empezar.'});
            };

            const resetMission = () => {
                if (confirm("¿Reiniciar la misión? Perderás el progreso actual.")) {
                    setEnergy(mission.energy);
                    setCurrentNode(mission.start);
                    setStep(0);
                    setSelectedOrigin(null);
                    setSelectedEdge(null);
                    setPathHistory([]);
                    setCurrentPlanStep(0);
                    setFeedback({type: 'info', text: 'Misión reiniciada. Empieza desde tu origen.'});
                }
            };

            const consumeEnergyAndCheck = (msg) => {
                let finalMsg = msg;
                if (!teacherMode && !isSandbox) {
                    const newEnergy = energy - 1;
                    setEnergy(newEnergy);
                    if (newEnergy <= 0) {
                        finalMsg = '¡Te has quedado sin energía! Haz clic en reiniciar misión.';
                    }
                }
                setFeedback({type: 'error', text: finalMsg});
                setStep(0);
                setSelectedOrigin(null);
                setSelectedEdge(null);
            };

            const applyHint = (elementId) => {
                if (energy < 1 && !teacherMode) {
                    setFeedback({type: 'error', text: 'No tienes suficiente energía para pedir una pista.'});
                    setIsHintMode(false);
                    return;
                }
                if (!teacherMode) {
                    setEnergy(prev => prev - 1);
                    setHintsLeft(prev => prev - 1);
                }
                setRevealedElements(prev => [...prev, elementId]);
                setIsHintMode(false);
                setFeedback({type: 'success', text: 'Pista activada temporalmente.'});
                setTimeout(() => {
                    setRevealedElements(prev => prev.filter(e => e !== elementId));
                    setFeedback({type: 'info', text: 'Continúa con tu navegación.'});
                }, 3000);
            };

            const handleNodeClick = (nodeId) => {
                try {
                    const isRevealed = revealedElements.includes(nodeId) || teacherMode || isSandbox || difficulty === 'easy' || difficulty === 'normal' || (difficulty === 'hard' && hypothesisMade && ['n_ignea', 'n_sedi', 'n_meta'].includes(nodeId));
                    
                    if (isRevealed && step === 0 && nodeId !== currentNode) {
                        setInfoModal(ITEMS_DIAGRAMA.find(i => i.id === DIAGRAM_SOLUTION[nodeId]));
                        return;
                    }

                    if (!hypothesisMade && !isSandbox) return;
                    if (animatingGif || (energy <= 0 && !teacherMode && !isSandbox) || missionWon) return;
                    if (isHintMode) return applyHint(nodeId);

                    if (step === 0) {
                        if (nodeId === currentNode) {
                            setSelectedOrigin(nodeId);
                            setStep(1);
                            setFeedback({type: 'info', text: 'Selecciona el PROCESO (flecha) que quieres aplicar.'});
                        } else {
                            setFeedback({type: 'error', text: `Estás en ${ROCK_NAMES[currentNode] || 'otra roca'}.`});
                        }
                    } else if (step === 2) {
                        const expectedTarget = DIAGRAM_ADJACENCY[selectedOrigin]?.[selectedEdge];
                        
                        if (expectedTarget === nodeId) {
                            if (!isSandbox && mission.blockedEdges.includes(selectedEdge)) {
                                consumeEnergyAndCheck("¡Esa ruta está BLOQUEADA! Busca una alternativa.");
                                return;
                            }

                            // VALID MOVE
                            const itemData = getEdgeData(selectedEdge);
                            setAnimatingGif(itemData?.gif || 'https://i.ibb.co/nsv6C6P6/heat-pressure.gif');
                            setAnimatingTitle(itemData?.label || 'Proceso');
                            
                            if (!teacherMode && !isSandbox) setEnergy(e => e - 1);
                            
                            setTimeout(() => {
                                setAnimatingGif(null);
