    <style>
        body {
            font-family: 'Inter', sans-serif;

            color: #1e293b;
            overflow-x: hidden;

        }
        
        /* Animaciones suaves */
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        
        .slide-up {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ocultar barra de scroll */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Scrollbar suave para la barra lateral */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>

            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>

        const IconInfo = () => (

        const IconLock = () => (

        const rocks = {
            conglomerado: {
                name: "Conglomerado", type: "Roca Sedimentaria", colorScheme: { bg: "bg-amber-100", border: "border-amber-400", text: "text-amber-800", headerBg: "bg-amber-500" },

            arenisca: {
                name: "Arenisca", type: "Roca Sedimentaria", colorScheme: { bg: "bg-amber-100", border: "border-amber-400", text: "text-amber-800", headerBg: "bg-amber-500" },

                            <div className="flex justify-center gap-3">
                                <span className="inline-flex items-center gap-2 bg-black/20 px-5 py-2 rounded-full text-base font-bold tracking-wide backdrop-blur-sm shadow-inner border border-white/20">
                                    🏷️ {result.type}
                                </span>
                            </div>
                        </div>
                    </div>

        // --- COMPONENTE: PANTALLA PREDICCIÓN (2 PASOS) ---
        const PredictionScreen = ({ result, onComplete }) => {

        // --- COMPONENTE: VIRTUAL BOARD (Optimizado para Touch/iPad) ---
        const VirtualBoard = ({ children, isConstructionMode = false }) => {
            const [scale, setScale] = useState(1);
            const [pos, setPos] = useState({ x: 0, y: 0 });
            const isDragging = useRef(false);
            const lastPointer = useRef({ x: 0, y: 0 });

            // Usamos Pointer Events para soportar tanto ratón como táctil en iPad
            const handlePointerDown = (e) => {
                if (['INPUT', 'TEXTAREA', 'BUTTON', 'IMG'].includes(e.target.tagName) || e.target.closest('[draggable="true"]')) return;
                isDragging.current = true;
                e.target.setPointerCapture(e.pointerId);
                lastPointer.current = { x: e.clientX, y: e.clientY };
            };
            
            const handlePointerMove = (e) => {
                if (!isDragging.current) return;
                const dx = e.clientX - lastPointer.current.x;
                const dy = e.clientY - lastPointer.current.y;
                setPos(p => ({ x: p.x + dx, y: p.y + dy }));
                lastPointer.current = { x: e.clientX, y: e.clientY };
            };
            
            const handlePointerUp = (e) => {
                isDragging.current = false;
                e.target.releasePointerCapture(e.pointerId);
            };
            
            const handleWheel = (e) => {
                const scaleAmount = -e.deltaY * 0.002;
                setScale(s => Math.min(Math.max(0.3, s + scaleAmount), 3));
            };

            const pan = (dx, dy) => {
                setPos(p => ({ x: p.x + dx, y: p.y + dy }));
            };

            return (
                <div 
                    className={`w-full h-full overflow-hidden bg-[#f8fafc] ${!isConstructionMode ? 'cursor-grab active:cursor-grabbing' : ''} relative`}
                    onPointerDown={handlePointerDown}
                    onPointerMove={handlePointerMove}
                    onPointerUp={handlePointerUp}
                    onPointerCancel={handlePointerUp}
                    onWheel={handleWheel}
                >
                    <div 
                        className="absolute"
                        style={{ 
                            transform: `translate(${pos.x}px, ${pos.y}px) scale(${scale})`, 
                            transformOrigin: 'top left', 
                            transition: isDragging.current ? 'none' : 'transform 0.15s ease-out' 
                        }}
                    >
                        {children}
                    </div>
                    {/* Controles de Navegación y Zoom */}
                    <div className="absolute bottom-6 right-6 sm:top-6 sm:bottom-auto flex flex-col gap-4 z-40">
                        
                        {/* D-Pad Direccional */}
                        <div className="bg-white/80 p-2 rounded-2xl shadow-lg backdrop-blur grid grid-cols-3 gap-1 items-center justify-center">
                            <div></div>
                            <button onClick={() => pan(0, 150)} className="w-10 h-10 bg-white shadow rounded-xl flex items-center justify-center text-slate-700 hover:bg-slate-100 transition-colors" title="Mover Arriba">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m18 15-6-6-6 6"/></svg>
                            </button>
                            <div></div>
                            <button onClick={() => pan(150, 0)} className="w-10 h-10 bg-white shadow rounded-xl flex items-center justify-center text-slate-700 hover:bg-slate-100 transition-colors" title="Mover Izquierda">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                            </button>
                            <div className="w-10 h-10 flex items-center justify-center">
                                <div className="w-2 h-2 bg-slate-300 rounded-full"></div>
                            </div>
                            <button onClick={() => pan(-150, 0)} className="w-10 h-10 bg-white shadow rounded-xl flex items-center justify-center text-slate-700 hover:bg-slate-100 transition-colors" title="Mover Derecha">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                            </button>
                            <div></div>
                            <button onClick={() => pan(0, -150)} className="w-10 h-10 bg-white shadow rounded-xl flex items-center justify-center text-slate-700 hover:bg-slate-100 transition-colors" title="Mover Abajo">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                            </button>
                            <div></div>
                        </div>

                        {/* Controles Zoom */}
                        <div className="bg-white/80 p-2 rounded-2xl shadow-lg backdrop-blur flex flex-col gap-2 items-center">
                            <button onClick={() => setScale(s => Math.min(3, s + 0.2))} className="w-10 h-10 bg-white shadow rounded-xl font-bold text-xl hover:bg-slate-100 flex items-center justify-center text-slate-700 transition-colors">+</button>
                            <button onClick={() => {setScale(1); setPos({x:0, y:0});}} className="w-10 h-10 bg-white shadow rounded-xl font-bold text-sm hover:bg-slate-100 flex items-center justify-center text-slate-700 transition-colors">1x</button>
                            <button onClick={() => setScale(s => Math.max(0.3, s - 0.2))} className="w-10 h-10 bg-white shadow rounded-xl font-bold text-xl hover:bg-slate-100 flex items-center justify-center text-slate-700 transition-colors">-</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPONENTE: ÁRBOL MODO DOCENTE ---
        const TreeNode = ({ nodeId, parentOptionLabel, activeNode, setActiveNode, filterType, setSelectedRock }) => {
            const isRock = !!rocks[nodeId];
            const lineLength = "w-48 sm:w-72"; // Clados ALARGADOS EVITANDO SOLAPAMIENTO

            if (isRock) {
                const rock = rocks[nodeId];
                const isDimmed = filterType !== 'all' && !rock.type.toLowerCase().includes(filterType.toLowerCase());
                
                return (
                    <div className={`flex items-center transition-all duration-300 ${isDimmed ? 'opacity-20 grayscale' : 'opacity-100'}`}>

                        >
                            {rock.name}
                        </button>

                );
            }

            const node = tree[nodeId];
            const isOpen = activeNode === nodeId;

            return (

                    {/* Línia d'entrada des del pare */}
                    {parentOptionLabel && (

                            </span>
                        </div>
                    )}
                    
                    {/* Node actual (Punt interactiu) */}

                        <button 
                            onClick={() => setActiveNode(isOpen ? null : nodeId)}
                            className={`w-8 h-8 rounded-full border-4 z-10 relative transition-all shadow-md ${isOpen ? 'bg-blue-500 border-blue-200 scale-125' : 'bg-slate-700 border-white hover:bg-slate-600'}`}
                        />
                        <div className="absolute right-0 w-6 h-1.5 bg-slate-300 top-1/2 -translate-y-1/2 z-0 rounded-r-full"></div>
                        
                        {isOpen && (
                            <>
                                <div className="fixed inset-0 z-40" onClick={(e) => { e.stopPropagation(); setActiveNode(null); }}></div>
                                <div className="absolute left-1/2 -translate-x-1/2 bottom-full mb-4 w-72 bg-slate-800 text-white text-sm p-5 rounded-2xl shadow-2xl z-50 text-center font-semibold animate-fade-in border-2 border-slate-700">
                                    {node.text}

                                </div>
                            </>

                    {/* Fills (Branques) */}
                    <div className="flex flex-col justify-center border-l-4 border-slate-300 py-6 gap-10 rounded-l-lg">
                        {node.options.map((opt, idx) => (
                            <TreeNode 
                                key={idx} 
                                nodeId={opt.next} 
                                parentOptionLabel={opt.label} 
                                activeNode={activeNode}
                                setActiveNode={setActiveNode}
                                filterType={filterType}
                                setSelectedRock={setSelectedRock}
                            />
                        ))}
                    </div>
                </div>
            );
        };

        const TeacherMode = ({ onExit }) => {
            const [activeNode, setActiveNode] = useState(null);
            const [filterType, setFilterType] = useState('all');
            const [selectedRock, setSelectedRock] = useState(null);

            return (
                <div className="fixed inset-0 bg-slate-50 z-50 flex flex-col">
                    <div className="bg-slate-900 text-white p-4 shadow-md flex justify-between items-center z-20 relative">
                        <div className="flex items-center gap-6">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 p-2 rounded-lg"><IconPickaxe /></div>
                                <h2 className="font-bold text-lg hidden sm:block">Pizarra Virtual Docente</h2>
                            </div>
                            <div className="flex flex-col gap-1.5">
                                <div className="flex gap-2 flex-wrap">
                                    {['all', 'Sedimentaria', 'Ígnea', 'Metamórfica'].map(f => (
                                        <button 
                                            key={f}
                                            onClick={() => setFilterType(f)}

                                        >
                                            {f === 'all' ? 'Todas' : f + 's'}
                                        </button>
                                    ))}
                                </div>
                                <div className="flex gap-4 text-[11px] font-bold ml-1">
                                    <span className="flex items-center gap-1 text-amber-300"><div className="w-2.5 h-2.5 rounded bg-amber-500"></div> Sedimentarias</span>
                                    <span className="flex items-center gap-1 text-red-300"><div className="w-2.5 h-2.5 rounded bg-red-500"></div> Ígneas</span>
                                    <span className="flex items-center gap-1 text-purple-300"><div className="w-2.5 h-2.5 rounded bg-purple-500"></div> Metamórficas</span>
                                </div>
                            </div>
                        </div>
                        <button onClick={onExit} className="bg-red-500 hover:bg-red-600 px-4 py-2.5 rounded-lg text-sm font-bold transition-colors shadow-lg border border-red-400">Salir de vista docente</button>
                    </div>

                    <div className="flex-1 relative overflow-hidden">
                        <VirtualBoard>
                            <div className="absolute top-[50vh] left-20 -translate-y-1/2 pb-32">
                                <TreeNode

        // --- APLICACIÓN PRINCIPAL ---
        const App = () => {

                    setTeacherMode(true);
                    setShowUnlock(false);
                    setPin("");

                    alert("PIN incorrecto. Acceso denegado.");
                    setPin("");
                }
            };

            const handleAnswerClick = (option, nextId) => {
                setIsAnimating(true);
                setTimeout(() => {
                    setIsAnimating(false);
                    setPendingJustification({ option, nextId, questionId: currentNodeId });
                }, 300);
            };

            const handleJustification = (reason) => {
                const { option, nextId, questionId } = pendingJustification;
                setHistory([...history, { 
                    question: tree[questionId].text, 
                    answer: option.label,
                    reason: reason,
                    nodeId: questionId
                }]);

                if (rocks[nextId]) {
                    setResult(rocks[nextId]);
                    if (appMode === 'prediction') {
                        setPredictionResolved(false);
                    }
                } else {
                    setCurrentNodeId(nextId);
                }
                setPendingJustification(null);
            };

            const handleBack = () => {
                if (pendingJustification) {
                    setPendingJustification(null);
                    return;
                }
                if (result) {
                    if (appMode === 'prediction' && predictionResolved) {
                        setPredictionResolved(false); 
                        return;
                    }
                    setResult(null);
                    const newHistory = [...history];
                    newHistory.pop();
                    setHistory(newHistory);
                    return;
                }
                if (history.length > 0) {
                    const newHistory = [...history];
                    const lastState = newHistory.pop();
                    setHistory(newHistory);
                    setCurrentNodeId(lastState.nodeId);
                }
            };

            const handleRestart = () => {
                setHistory([]);
                setCurrentNodeId('q1');
                setResult(null);
                setPendingJustification(null);
                setPredictionResolved(false);
                setAppMode(null); 
            };

                                </div>

                                {/* Modo Exploración (Mudo) */}
                                <div onClick={() => setAppMode('blank')} className="bg-white p-6 rounded-2xl border-2 border-slate-200 hover:border-teal-500 hover:shadow-xl transition-all cursor-pointer group flex flex-col h-full">
                                    <div className="text-4xl mb-4 group-hover:scale-110 transition-transform origin-left">🏗️</div>
                                    <h3 className="font-bold text-slate-800 text-xl mb-2">Construye la Clave</h3>
                                    <p className="text-slate-600 text-sm flex-1">Modo avanzado. Observa las muestras reales y crea tu propia clave interactiva.</p>
                                    <div className="mt-4 text-teal-600 font-bold text-sm uppercase tracking-wider group-hover:translate-x-2 transition-transform">Explorar →</div>
                                </div>
                            </div>
                        </div>
                        
                        <button onClick={() => setShowUnlock(true)} className="absolute top-6 right-6 text-slate-300 hover:text-slate-600 transition-colors p-2" title="Acceso Docente">
                            <IconLock />
                        </button>

                        {/* Modal Desbloqueo */}
                        {showUnlock && (
                            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm fade-in">
                                <div className="bg-white p-6 rounded-3xl shadow-2xl max-w-sm w-full relative slide-up">
                                    <h3 className="font-bold text-xl text-slate-800 mb-2 flex items-center gap-2">
                                        <IconLock /> Acceso Docente
                                    </h3>
                                    <p className="text-sm text-slate-500 mb-6">Introduce el PIN para desbloquear la vista panorámica.</p>
                                    <input 
                                        type="password" 
                                        value={pin} 
                                        onChange={e => setPin(e.target.value)} 
                                        className="border-2 border-slate-200 p-3 w-full rounded-xl mb-6 text-center tracking-[0.5em] text-2xl font-bold focus:border-blue-500 outline-none transition-colors" 
                                        placeholder="****" 
                                        autoFocus 
                                        onKeyDown={e => e.key === 'Enter' && handleUnlock()} 
                                    />
                                    <div className="flex justify-end gap-3">
                                        <button onClick={() => {setShowUnlock(false); setPin("");}} className="text-slate-500 hover:bg-slate-100 px-4 py-2 rounded-lg font-medium transition-colors">Cancelar</button>
                                        <button onClick={handleUnlock} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold shadow-md transition-colors">Desbloquear</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            const numOptions = tree[currentNodeId]?.options.length || 2;
            const gridColsClass = numOptions === 3 ? 'md:grid-cols-3 sm:grid-cols-2' : 'sm:grid-cols-2';

            return (
                <div className="min-h-screen flex flex-col relative bg-slate-50">
                    <header className={`text-white p-4 shadow-lg flex items-center justify-between z-10 relative ${appMode === 'prediction' ? 'bg-indigo-900' : 'bg-slate-900'}`}>
                        <div className="flex items-center gap-4">
                            <div className={`${appMode === 'prediction' ? 'bg-indigo-600' : 'bg-blue-600'} p-2.5 rounded-xl shadow-inner hidden sm:block`}>
                                <IconPickaxe size={24} />
                            </div>
                            <div>
                                <h1 className="font-extrabold text-xl leading-tight tracking-tight">Laboratorio de Geología</h1>
                                <p className={`${appMode === 'prediction' ? 'text-indigo-200' : 'text-blue-200'} text-xs font-medium`}>
                                    {appMode === 'prediction' ? 'Modo Predicción Activo' : 'Clave Dicotómica para 2º ESO'}
                                </p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2 sm:gap-4">
                            <button 
                                onClick={() => setShowUnlock(true)} 
                                className="text-slate-400 hover:text-white transition-colors p-2 rounded-lg hover:bg-slate-800" 
                                title="Acceso Docente"
                            >
                                <IconLock />
                            </button>
                            <button 
                                onClick={handleRestart}
                                className="flex items-center gap-2 bg-black/20 hover:bg-black/40 transition-colors px-4 py-2 rounded-xl text-sm font-bold shadow-md border border-white/10"
                            >
                                <IconRefresh />
                                <span className="hidden sm:inline">Cambiar Modo</span>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 flex flex-col items-center justify-center p-4 sm:p-6 w-full max-w-5xl mx-auto relative">
                        
                        {(history.length > 0 || result || pendingJustification) && (
                            <div className="w-full mb-8 flex flex-col gap-4">
                                <button 
                                    onClick={handleBack}
                                    className="flex items-center gap-1 text-slate-500 hover:text-slate-800 transition-colors w-fit text-sm font-bold px-3 py-2 -ml-3 rounded-lg hover:bg-slate-200"
                                >
                                    <IconBack />
                                    Volver al paso anterior
                                </button>
                                
                                <div className="flex flex-wrap items-center gap-2 text-xs text-slate-400 font-medium bg-white p-3.5 rounded-2xl border border-slate-200 shadow-sm">
                                    <span className="text-slate-500 font-bold mr-1">Tu análisis:</span>
                                    {history.map((step, idx) => (
                                        <div key={idx} className="flex items-center gap-2">
                                            <span 
                                                className="bg-slate-50 border border-slate-200 text-slate-700 px-3 py-1.5 rounded-lg shadow-sm hover:border-blue-300 cursor-help transition-colors" 
                                                title={`Justificación: ${step.reason}`}
                                            >
                                                {step.answer}
                                            </span>
                                            {idx < history.length - 1 && <span className="text-slate-300 font-bold">→</span>}
                                        </div>
                                    ))}
                                    {result && <span className="text-slate-300 font-bold">→</span>}
                                    {result && <span className="bg-blue-100 text-blue-800 border border-blue-200 px-3 py-1.5 rounded-lg font-bold shadow-sm">{result.name}</span>}
                                </div>
                            </div>
                        )}

                        {!result && !pendingJustification && (
                            <div className="w-full mb-10 fade-in max-w-4xl">
                                <div className="flex justify-between text-xs font-bold text-slate-500 mb-3 px-1">
                                    <span>Paso {history.length + 1}</span>
                                    <span className={`${appMode === 'prediction' ? 'text-indigo-600' : 'text-blue-600'} uppercase tracking-wide`}>Análisis en curso</span>
                                </div>
                                <div className="w-full bg-slate-200 h-2.5 rounded-full overflow-hidden shadow-inner">
                                    <div 
                                        className={`${appMode === 'prediction' ? 'bg-indigo-500' : 'bg-blue-500'} h-full transition-all duration-700 ease-out rounded-full`} 
                                        style={{width: `${Math.min(((history.length + 1) / 5) * 100, 100)}%`}}
                                    ></div>
                                </div>
                                <div className="text-center mt-4">
                                    <span className={`inline-block text-sm font-semibold px-4 py-2 rounded-xl shadow-sm border ${appMode === 'prediction' ? 'text-indigo-700 bg-indigo-50 border-indigo-100' : 'text-blue-700 bg-blue-50 border-blue-100'}`}>
                                        📍 {tree[currentNodeId].context}
                                    </span>
                                </div>
                            </div>
                        )}

                        {!result && !pendingJustification && (
                            <div key={currentNodeId} className="w-full max-w-4xl bg-white rounded-3xl shadow-xl border border-slate-100 p-8 sm:p-12 fade-in text-center relative">
                                <h2 className="text-3xl sm:text-4xl font-extrabold text-slate-800 mb-12 leading-tight">
                                    {tree[currentNodeId].text}
                                </h2>
                                
                                <div className={`grid grid-cols-1 gap-6 ${gridColsClass}`}>
                                    {tree[currentNodeId].options.map((option, idx) => {
                                        const colorClasses = option.color === 'green' 
                                            ? 'bg-emerald-50/40 border-emerald-200 hover:border-emerald-500 hover:bg-emerald-50 hover:text-emerald-900 text-slate-700'
                                            : option.color === 'amber'
                                            ? 'bg-amber-50/40 border-amber-200 hover:border-amber-500 hover:bg-amber-50 hover:text-amber-900 text-slate-700'
                                            : option.color === 'purple'
                                            ? 'bg-purple-50/40 border-purple-200 hover:border-purple-500 hover:bg-purple-50 hover:text-purple-900 text-slate-700'
                                            : 'bg-slate-50/40 border-slate-200 hover:border-blue-500 hover:bg-blue-50 hover:text-blue-900 text-slate-700';
                                        
                                        const accentColor = option.color === 'green' ? 'bg-emerald-500' : option.color === 'amber' ? 'bg-amber-500' : option.color === 'purple' ? 'bg-purple-500' : 'bg-blue-500';

                                        return (
                                            <button
                                                key={idx}
                                                onClick={() => handleAnswerClick(option, option.next)}
                                                className={`group relative flex flex-col items-center justify-center gap-4 bg-white border-2 p-8 rounded-2xl transition-all duration-300 ${colorClasses} ${isAnimating ? 'scale-95 opacity-50' : 'hover:-translate-y-1 hover:shadow-xl'}`}
                                            >
                                                <span className="text-5xl drop-shadow-sm group-hover:scale-110 transition-transform">{option.icon}</span>
                                                <span className="text-xl font-bold text-center leading-snug">
                                                    {option.label}
                                                </span>
                                                <div className={`absolute inset-x-0 bottom-0 h-1.5 scale-x-0 group-hover:scale-x-100 transition-transform origin-left rounded-b-2xl ${accentColor}`}></div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {pendingJustification && (
                            <div className="w-full max-w-4xl bg-white rounded-3xl shadow-xl border border-slate-100 p-8 sm:p-12 text-center slide-up">
                                <div className="text-6xl mb-6">{pendingJustification.option.icon}</div>
                                <h2 className="text-2xl font-bold text-slate-600 mb-2">Has elegido:</h2>
                                <p className={`text-3xl font-extrabold mb-10 ${appMode === 'prediction' ? 'text-indigo-600' : 'text-blue-600'}`}>"{pendingJustification.option.label}"</p>
                                
                                <div className="bg-slate-50 rounded-2xl p-6 sm:p-8 border border-slate-200">
                                    <p className="text-xl font-bold text-slate-800 mb-6">🤔 ¿Por qué has elegido esta opción?</p>
                                    
                                    <div className="flex flex-col gap-4 max-w-lg mx-auto">
                                        {[
                                            { text: "Por lo que observo visualmente", icon: "👀" },
                                            { text: "Por su textura al tacto", icon: "🖐️" },
                                            { text: "Por el resultado analítico de la prueba", icon: "🔬" }
                                        ].map((reason, idx) => (
                                            <button 
                                                key={idx}
                                                onClick={() => handleJustification(reason.text)}
                                                className={`flex items-center gap-4 bg-white border-2 border-slate-200 text-slate-700 font-bold py-4 px-6 rounded-xl transition-all shadow-sm hover:shadow-md hover:-translate-y-0.5 text-left ${appMode === 'prediction' ? 'hover:bg-indigo-50 hover:border-indigo-400' : 'hover:bg-blue-50 hover:border-blue-400'}`}
                                            >
                                                <span className="text-2xl">{reason.icon}</span>
                                                <span className="text-lg">{reason.text}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {result && appMode === 'prediction' && !predictionResolved && (
                            <PredictionScreen result={result} onComplete={() => setPredictionResolved(true)} />
                        )}

                        {result && (appMode === 'guided' || (appMode === 'prediction' && predictionResolved)) && (
                            <RockDetails result={result} handleRestart={() => {
                                setHistory([]);
                                setCurrentNodeId('q1');
                                setResult(null);
                                setPredictionResolved(false);
                            }} />
                        )}

                    </main>
                    
                    {showUnlock && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm fade-in">
                            <div className="bg-white p-6 rounded-3xl shadow-2xl max-w-sm w-full relative slide-up">
                                <h3 className="font-bold text-xl text-slate-800 mb-2 flex items-center gap-2">
                                    <IconLock /> Acceso Docente
                                </h3>
                                <p className="text-sm text-slate-500 mb-6">Introduce el PIN para desbloquear la vista panorámica de la clave.</p>
                                <input 
                                    type="password" 
                                    value={pin} 
                                    onChange={e => setPin(e.target.value)} 
                                    className="border-2 border-slate-200 p-3 w-full rounded-xl mb-6 text-center tracking-[0.5em] text-2xl font-bold focus:border-blue-500 focus:ring-0 outline-none transition-colors" 
                                    placeholder="****" 
                                    autoFocus 
                                    onKeyDown={e => e.key === 'Enter' && handleUnlock()} 
                                />
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => {setShowUnlock(false); setPin("");}} className="text-slate-500 hover:bg-slate-100 px-4 py-2 rounded-lg font-medium transition-colors">Cancelar</button>
                                    <button onClick={handleUnlock} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold shadow-md transition-colors">Desbloquear</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
