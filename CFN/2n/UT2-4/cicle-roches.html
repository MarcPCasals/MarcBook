                                <div className="absolute inset-0 z-[15] bg-stone-100/95 backdrop-blur-md flex items-center justify-center flex-col" title="Complète l'hypothèse pour débloquer la carte">
                                    <div className="bg-white p-6 rounded-2xl shadow-xl border-2 border-stone-300 text-center">
                                        <span className="text-4xl text-stone-400 block mb-2"><IconLock/></span>
                                        <p className="font-black text-stone-700 text-xl">Carte bloquée en Mode Difficile</p>
                                        <p className="text-sm text-stone-500 mt-2">Déduis le parcours en utilisant tes connaissances sans regarder le diagramme.</p>
                                    </div>
                                </div>
                            )}

                            {Object.entries(DIAGRAM_LAYOUT.NODES).map(([nodeId, pos]) => {
                                const itemData = ITEMS_DIAGRAMA.find(i => i.id === DIAGRAM_SOLUTION[nodeId]);
                                const isCurrent = nodeId === currentNode;
                                const isOriginSelected = nodeId === selectedOrigin;

                                return (
                                    <div key={nodeId} 
                                         onClick={() => handleNodeClick(nodeId)}
                                         className={`absolute w-32 md:w-36 -translate-x-1/2 -translate-y-1/2 p-3 border-2 border-solid rounded-xl text-center font-bold text-xs md:text-sm shadow-md z-20 transition-transform bg-white
                                            ${!hypothesisMade && !isSandbox ? 'pointer-events-none grayscale opacity-50' : 'cursor-pointer'}
                                            ${itemData ? itemData.color : 'bg-stone-100'}
                                            ${isCurrent && step === 0 ? 'border-blue-500 animate-pulse scale-110' : ''}
                                            ${isOriginSelected ? 'border-green-500 scale-105' : (!hypothesisMade && !isSandbox ? '' : 'hover:scale-105')}
                                            ${!isCurrent && step === 0 ? 'opacity-60 saturate-50' : ''}
                                            ${step === 2 && hypothesisMade ? 'hover:border-blue-400' : ''}
                                            ${isHintMode ? 'ring-2 ring-yellow-400 border-yellow-500 shadow-[0_0_15px_#facc15]' : ''}
                                         `}
                                         style={{ top: `${(pos.cy / 800) * 100}%`, left: `${(pos.cx / 1200) * 100}%` }}>
                                        {getNodeLabel(nodeId)}
                                    </div>
                                );
                            })}

                            {DIAGRAM_LAYOUT.EDGES.map((edge) => {
                                const itemData = getEdgeData(edge.id);
                                const isSelected = edge.id === selectedEdge;
                                const isBlocked = !isSandbox && mission.blockedEdges.includes(edge.id);
                                const isRevealed = revealedElements.includes(edge.id) || teacherMode || isSandbox || difficulty === 'easy';
                                
                                const midPos = getEdgeMidpoint(edge);

                                return (
                                    <div key={edge.id} 
                                         onClick={() => !isBlocked && handleEdgeClick(edge.id)}
                                         className={`absolute flex flex-col items-center justify-center z-20 transition-all
                                            ${!hypothesisMade && !isSandbox ? 'pointer-events-none grayscale opacity-50' : 'cursor-pointer'}
                                            ${isSelected ? 'scale-110' : isBlocked ? 'grayscale cursor-not-allowed opacity-60' : 'hover:scale-110'}
                                            ${step === 1 ? 'animate-pulse' : ''}
                                            ${step !== 1 && !isSelected ? 'opacity-90' : ''}
                                         `}
                                         style={{ top: midPos.top, left: midPos.left, transform: 'translate(-50%, -50%)' }}>
                                        
                                        <div className={`w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-md border-[3px]
                                            ${isSelected ? 'ring-4 ring-blue-300 border-blue-500' : isBlocked ? 'border-red-500' : ''}
                                            ${isHintMode ? 'ring-4 ring-yellow-400' : ''}
                                        `} style={{ borderColor: isSelected ? undefined : edge.color }}>
                                            {(!isRevealed && difficulty === 'hard') ? <span className="text-[10px] text-stone-400">?</span> : <span className="text-2xl">{itemData?.icon}</span>}
                                            {isBlocked && <div className="absolute inset-0 flex items-center justify-center text-red-600 text-3xl font-black bg-white/50 backdrop-blur-[1px] rounded-full">X</div>}
                                        </div>
                                        
                                        {(!(!isRevealed && difficulty === 'hard')) && (
                                            <span className="bg-white/90 px-2 py-0.5 rounded text-[10px] font-bold text-stone-800 shadow-sm mt-1 uppercase text-center max-w-[100px] leading-tight">
                                                {getEdgeLabel(edge.id)}
                                            </span>
                                        )}
                                    </div>
                                );
                            })}
                        </div>

                        {/* Sidebar (Hypothesis or Navigation Status) - Ara està a sota horitzontal */}
                        <div className="w-full flex flex-col md:flex-row gap-6 pb-20">
                            {!hypothesisMade && !isSandbox ? (
                                <div className="w-full bg-white rounded-3xl border-2 border-blue-400 p-6 flex flex-col md:flex-row gap-6 shadow-lg z-40">
                                    <div className="flex-1 flex flex-col">
                                        <div className="flex items-center gap-4 mb-2">
                                            <div className="text-4xl">🤔</div>
                                            <h4 className="text-xl font-black text-blue-900">Phase d'Hypothèse</h4>
                                        </div>
                                        <div className="flex items-center justify-between mb-4">
                                            <p className="text-stone-600 text-xs leading-relaxed max-w-sm">
                                                Quel parcours suivras-tu pour aller de <strong className="text-stone-800">{ROCK_NAMES[mission.start]}</strong> à <strong className="text-blue-700">{ROCK_NAMES[mission.target]}</strong> ? Planifie et justifie.
                                            </p>
                                            <button onClick={() => {setDifficulty(null); resetMission();}} className="text-xs bg-stone-200 text-stone-700 px-3 py-2 rounded hover:bg-stone-300 transition shadow-sm font-bold">Changer de Difficulté</button>
                                        </div>
                                        <textarea 
                                            className="w-full p-3 border-2 border-stone-200 rounded-xl mb-4 text-xs resize-none focus:ring-2 focus:ring-blue-500 outline-none transition-all custom-scroll shadow-inner flex-1 min-h-[80px]"
                                            placeholder="Justifie ta décision ici..."
                                            value={hypothesisText}
                                            onChange={(e) => setHypothesisText(e.target.value)}
                                        ></textarea>
                                    </div>

                                    <div className="flex-1 flex flex-col">
                                        <div className="bg-blue-50 p-3 rounded-xl border border-blue-200 mb-4 flex-1">
                                            <h5 className="font-bold text-blue-900 text-xs uppercase mb-2">Parcours Planifié</h5>
                                            {plannedPath.map((stepEdge, idx) => (
                                                <div key={idx} className="flex gap-2 mb-2">
                                                    <span className="font-bold text-blue-800 py-1 text-xs">{idx+1}.</span>
                                                    <select className="flex-1 p-1 text-xs border border-blue-300 rounded focus:ring-blue-500" value={stepEdge} onChange={(e) => handlePlanChange(idx, e.target.value)}>
                                                        <option value="">Sélectionne un processus...</option>
                                                        {UNIQUE_PROCESSES.map(p => (
                                                            <option key={p.id} value={p.id}>{difficulty === 'hard' ? EXPERT_PROCESS_LABELS[p.id] : `${p.icon} ${p.label}`}</option>
                                                        ))}
                                                    </select>
                                                    {plannedPath.length > 1 && <button onClick={() => handleRemovePlanStep(idx)} className="text-red-500">✕</button>}
                                                </div>
                                            ))}
                                            <button onClick={handleAddPlanStep} className="text-blue-600 font-bold text-xs mt-2">+ Ajouter un processus</button>
                                        </div>
                                        <Button onClick={saveHypothesis} variant="primary" className="py-3 text-sm mt-auto w-full">Enregistrer et Activer la Carte</Button>
                                    </div>
                                </div>
                            ) : (
                                <div className="w-full bg-stone-100/80 rounded-3xl border border-stone-200 p-6 flex flex-col md:flex-row gap-6 shadow-inner z-40">
                                    <div className="flex-1">
                                        <div className="flex justify-between items-center border-b border-stone-300 pb-2 mb-4">
                                            <h3 className="font-bold text-stone-700">État de la Navigation</h3>
                                            {!isSandbox && <button onClick={() => {setDifficulty(null); resetMission(); setHypothesisMade(false);}} className="text-xs bg-stone-200 text-stone-700 px-3 py-2 rounded hover:bg-stone-300 transition shadow-sm font-bold">Changer de Difficulté</button>}
                                        </div>
                                        <div className="flex flex-col md:flex-row gap-3">
                                            <div className={`flex-1 p-3 rounded-lg border-2 transition-all ${step === 0 ? 'bg-white border-blue-400 shadow-md scale-105' : selectedOrigin ? 'bg-green-50 border-green-300 opacity-70' : 'bg-stone-50 border-stone-200 opacity-50'}`}>
                                                <span className="text-xs font-bold text-stone-500 block">1. Origine</span>
                                                <span className="font-bold text-stone-800">{selectedOrigin ? getNodeLabel(selectedOrigin) : 'En attente de clic...'}</span>
                                            </div>
                                            <div className={`flex-1 p-3 rounded-lg border-2 transition-all ${step === 1 ? 'bg-white border-blue-400 shadow-md scale-105' : selectedEdge ? 'bg-green-50 border-green-300 opacity-70' : 'bg-stone-50 border-stone-200 opacity-50'}`}>
                                                <span className="text-xs font-bold text-stone-500 block">2. Processus</span>
                                                <span className="font-bold text-stone-800 flex items-center">{selectedEdge ? getEdgeLabel(selectedEdge) : 'En attente de clic...'}</span>
                                            </div>
                                            <div className={`flex-1 p-3 rounded-lg border-2 transition-all ${step === 2 ? 'bg-white border-blue-400 shadow-md scale-105' : 'bg-stone-50 border-stone-200 opacity-50'}`}>
                                                <span className="text-xs font-bold text-stone-500 block">3. Destination</span>
                                                <span className="font-bold text-stone-800">En attente de clic...</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex-1 flex flex-col justify-end">
                                        <div className={`p-4 rounded-xl border-2 transition-all flex-1 flex items-center justify-center ${feedback.type === 'error' ? 'bg-red-50 border-red-300 text-red-800' : feedback.type === 'success' ? 'bg-green-50 border-green-300 text-green-800' : 'bg-blue-50 border-blue-300 text-blue-800'}`}>
                                            <p className="text-sm font-bold text-center">{feedback.text}</p>
                                        </div>
                                        {teacherMode && !isSandbox && (
                                            <div className="mt-4 bg-green-50 p-3 rounded-xl border border-green-200">
                                                <h4 className="font-bold text-green-800 text-xs uppercase mb-2">Bon Parcours (Enseignant)</h4>
                                                <div className="flex flex-wrap gap-2 text-xs text-green-700 font-medium">
                                                    {mission.idealPath.map((edgeId, idx) => {
                                                        const procId = DIAGRAM_SOLUTION[edgeId];
                                                        const proc = ITEMS_DIAGRAMA.find(i => i.id === procId);
                                                        return <div key={idx} className="bg-white px-2 py-1 rounded shadow-sm border border-green-200"><span className="font-black mr-1">{idx+1}.</span> {proc?.label}</div>
                                                    })}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };


        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [progress, setProgress] = useState(() => {
                const saved = localStorage.getItem('rocas_progress');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        return {
                            ...INITIAL_PROGRESS,
                            ...parsed,
                            reflections: {
                                ...(INITIAL_PROGRESS.reflections || {}),
                                ...(parsed.reflections || {})
                            }
                        };
                    } catch(e) { return INITIAL_PROGRESS; }
                }
                return INITIAL_PROGRESS;
            });
            const [teacherMode, setTeacherMode] = useState(false);
            const [currentPhase, setCurrentPhase] = useState(1);
            const [activeChallenge, setActiveChallenge] = useState(null);

            const updateProgress = (newData) => {
                setProgress(prev => {
                    const combined = { ...prev, ...newData };
                    localStorage.setItem('rocas_progress', JSON.stringify(combined));
                    return combined;
                });
            };

            const completeChallenge = (id, reflectionText) => {
                setProgress(prev => {
                    const newProgress = { ...prev, [id]: true };
                    if (reflectionText) {
                        newProgress.reflections = { ...(prev.reflections || {}), [id]: reflectionText };
                    }
                    localStorage.setItem('rocas_progress', JSON.stringify(newProgress));
                    return newProgress;
                });
            };

            const toggleTeacherMode = () => {
                if (teacherMode) setTeacherMode(false);
                else {
                    const code = prompt("Introduis le code enseignant :");
                    if (code === "2421") {
                        setTeacherMode(true);
                        const td = { calor: true, fusion: true, enfriamiento: true, meteorizacion: true, compactacion: true, diagrama: true, retos: true, reflections: progress.reflections, hasDrawnHypothesis: true };
                        setProgress(p => ({...p, ...td}));
                        localStorage.setItem('rocas_progress', JSON.stringify({...progress, ...td}));
                    } else if (code) alert("Code incorrect");
                }
            };

            const resetProgress = () => {
                if (confirm("Es-tu sûr de vouloir effacer toute la progression ?")) {
                    setProgress(INITIAL_PROGRESS);
                    localStorage.setItem('rocas_progress', JSON.stringify(INITIAL_PROGRESS));
                    setTeacherMode(false);
                    setCurrentPhase(1);
                    setActiveChallenge(null);
                }
            };

            const retos = [
                { id: 'calor', title: '1. Chaleur et Pression', icon: '🔥', component: RetoCalor },
                { id: 'fusion', title: '2. Fusion', icon: '🌋', component: RetoFusion },
                { id: 'enfriamiento', title: '3. Refroidissement', icon: '❄️', component: RetoEnfriamiento },
                { id: 'meteorizacion', title: '4. Altération et Érosion', icon: '🌧️', component: RetoMeteorizacion },
                { id: 'compactacion', title: '5. Compactage', icon: '🧱', component: RetoCompactacion }
            ];

            return (
                <div className="min-h-screen flex flex-col bg-stone-100">
                    {/* HEADER */}
                    <header className="bg-stone-800 text-stone-50 px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-md">
                        <h1 className="text-xl md:text-2xl font-black tracking-tight flex items-center gap-2">
                            <span className="text-3xl">🪨</span> Modélisation du cycle des roches
                        </h1>
                        <div className="flex gap-4 items-center">
                            <button onClick={toggleTeacherMode} className={`p-2 rounded-full transition-colors ${teacherMode ? 'bg-amber-500 text-stone-900' : 'bg-stone-700 text-stone-300 hover:bg-stone-600'}`} title="Mode Enseignant">
                                {teacherMode ? <IconUnlock/> : <IconTeacher/>}
                            </button>
                            <button onClick={resetProgress} className="p-2 bg-stone-700 text-red-400 rounded-full hover:bg-red-500 hover:text-white transition-colors" title="Effacer la Progression">
                                <IconTrash/>
                            </button>
                        </div>
                    </header>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 w-full max-w-7xl mx-auto p-4 md:p-8 flex flex-col">
                        
                        {/* NAVIGATION TABS */}
                        {!activeChallenge && (
                            <div className="flex flex-wrap bg-white rounded-xl p-2 mb-6 shadow-sm border border-stone-200 max-w-3xl mx-auto w-full shrink-0">
                                <button onClick={() => setCurrentPhase(1)} className={`flex-1 py-3 text-xs md:text-sm font-bold rounded-lg transition-all min-w-[120px] ${currentPhase === 1 ? 'bg-stone-800 text-white shadow-md' : 'text-stone-500 hover:bg-stone-100'}`}>1. Théorie</button>
                                <button onClick={() => setCurrentPhase(1.5)} disabled={!progress.compactacion && !teacherMode} className={`flex-1 py-3 text-xs md:text-sm font-bold rounded-lg transition-all min-w-[120px] ${currentPhase === 1.5 ? 'bg-stone-800 text-white shadow-md' : 'text-stone-500 hover:bg-stone-100 disabled:opacity-50'}`}>2. Action</button>
                                <button onClick={() => setCurrentPhase(2)} disabled={!progress.compactacion && !teacherMode} className={`flex-1 py-3 text-xs md:text-sm font-bold rounded-lg transition-all min-w-[120px] ${currentPhase === 2 || currentPhase === 2.5 ? 'bg-stone-800 text-white shadow-md' : 'text-stone-500 hover:bg-stone-100 disabled:opacity-50'}`}>3. Le Cycle</button>
                                <button onClick={() => setCurrentPhase(3)} disabled={!progress.diagrama && !teacherMode} className={`flex-1 py-3 text-xs md:text-sm font-bold rounded-lg transition-all min-w-[120px] ${currentPhase === 3 ? 'bg-stone-800 text-white shadow-md' : 'text-stone-500 hover:bg-stone-100 disabled:opacity-50'}`}>4. Navigation</button>
                            </div>
                        )}

                        {/* DYNAMIC VIEW */}
                        <div className="flex-1 flex flex-col animate-fade-in">
                            {activeChallenge ? (
                                <div className="flex-1 flex flex-col h-full">
                                    <PhaseHeader 
                                        title={activeChallenge.title} 
                                        onBack={() => setActiveChallenge(null)}
                                        infoBox={progress[activeChallenge.id] && <span className="text-green-600 flex items-center gap-1 font-bold bg-green-50 px-3 py-1 rounded-lg"><IconCheck/> Terminé</span>}
                                    />
                                    <div className="flex-1 bg-white rounded-3xl shadow-sm border border-stone-200 overflow-hidden flex flex-col h-full min-h-[600px]">
                                        <div className="flex-1 overflow-y-auto custom-scroll flex flex-col bg-stone-50/50 relative">
                                            <activeChallenge.component onComplete={(refData) => completeChallenge(activeChallenge.id, refData)} teacherMode={teacherMode} />
                                            {progress[activeChallenge.id] && (
                                                <div className="p-4 bg-white border-t border-stone-200 flex justify-end shrink-0 animate-fade-in sticky bottom-0 z-50">
                                                    <Button variant="success" onClick={() => {
                                                        const currentIndex = retos.findIndex(r => r.id === activeChallenge.id);
                                                        if (currentIndex < retos.length - 1) setActiveChallenge(retos[currentIndex + 1]);
                                                        else { setActiveChallenge(null); setCurrentPhase(1.5); }
                                                    }}>
                                                        {activeChallenge.id === 'compactacion' ? "Aller à l'Action en Vidéo" : 'Transformation suivante'} →
                                                    </Button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ) : currentPhase === 1 ? (
                                <div className="flex flex-col gap-6 p-4">
                                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-stone-200 text-center max-w-4xl mx-auto w-full">
                                        <h2 className="text-2xl font-black text-stone-800 mb-4">Transformations de Base</h2>
                                        <p className="text-stone-600 text-sm leading-relaxed mb-4">Penses-tu que les roches ne changent jamais ? Par exemple, si tu trouves un morceau de granit aujourd'hui, peux-tu espérer qu'il restera du granit jusqu'à la fin de ta vie ? C'est peut-être vrai, mais seulement parce que notre vie est très courte comparée à l'histoire de la Terre.</p>
                                        <p className="text-stone-600 text-sm leading-relaxed mb-4">Si nous prenons du recul et observons le temps géologique (qui se concentre sur les changements survenant au fil des millions d'années), nous découvrons que les roches changent bel et bien. En fait, toutes les roches se transforment lentement d'un type à un autre, encore et encore. Ces changements forment un cycle, appelé le <strong>"cycle des roches"</strong>.</p>
                                        <p className="text-stone-600 text-sm leading-relaxed">La façon dont les roches changent dépend de plusieurs processus qui se produisent constamment à la surface et sous la surface de la Terre. Examinons maintenant de plus près chacun de ces processus.</p>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {retos.map((reto, idx) => {
                                            const isUnlocked = idx === 0 || progress[retos[idx-1].id] || teacherMode;
                                            const isCompleted = progress[reto.id];
                                            return (
                                                <div key={reto.id} onClick={() => isUnlocked && setActiveChallenge(reto)}
                                                     className={`relative p-6 rounded-3xl border-2 transition-all cursor-pointer h-48 flex flex-col justify-center items-center text-center
                                                        ${isCompleted ? 'bg-green-50 border-green-400 hover:bg-green-100 shadow-sm' : 
                                                          isUnlocked ? 'bg-white border-stone-300 hover:border-blue-400 hover:shadow-md hover:-translate-y-1 shadow-sm' : 
                                                          'bg-stone-100 border-stone-200 opacity-60 cursor-not-allowed'}
                                                     `}>
                                                    <div className="text-5xl mb-4">{reto.icon}</div>
                                                    <h3 className="font-bold text-stone-800 text-lg">{reto.title}</h3>
                                                    {isCompleted && <div className="absolute top-4 right-4 text-green-600 bg-white rounded-full p-1 shadow-sm border border-green-200"><IconCheck/></div>}
                                                    {!isUnlocked && <div className="absolute inset-0 bg-stone-100/60 backdrop-blur-[2px] rounded-3xl flex items-center justify-center"><div className="bg-stone-800 text-white p-4 rounded-full shadow-lg"><IconLock/></div></div>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ) : currentPhase === 1.5 ? (
                                <Movilizacion1Phase onNext={() => setCurrentPhase(progress.hasDrawnHypothesis ? 2.5 : 2)} />
                            ) : currentPhase === 2 ? (
                                <PizarraPhase teacherMode={teacherMode} onNext={() => { updateProgress({hasDrawnHypothesis: true}); setCurrentPhase(2.5); }} />
                            ) : currentPhase === 2.5 ? (
                                <div className="flex-1 flex flex-col h-full animate-shake" style={{animationDuration: '0.2s'}}>
                                    <DiagramPhase onComplete={() => updateProgress({diagrama: true})} onUpdateProgress={updateProgress} progress={progress} teacherMode={teacherMode} onNext={() => setCurrentPhase(3)} />
                                </div>
                            ) : (
                                <DesafiosNavegacionPhase progress={progress} onUpdateProgress={updateProgress} onCompleteProgress={() => updateProgress({retos: true})} teacherMode={teacherMode} />
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
