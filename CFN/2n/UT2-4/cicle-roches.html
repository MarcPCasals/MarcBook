                                <div className="absolute inset-0 flex flex-col justify-around pointer-events-none z-20 overflow-hidden">
                                    <div className="h-1 w-16 bg-gray-400 rounded-full animate-[wind-blow_0.5s_linear_infinite]"></div>
                                    <div className="h-1 w-24 bg-gray-400 rounded-full animate-[wind-blow_0.5s_linear_infinite_0.2s] ml-8"></div>
                                    <div className="h-1 w-12 bg-gray-400 rounded-full animate-[wind-blow_0.5s_linear_infinite_0.4s]"></div>
                                </div>
                            )}
                            {activeAgent === 'raices' && (
                                <div className="absolute bottom-10 left-1/2 -translate-x-1/2 pointer-events-none z-20">
                                    <svg width="80" height="80" viewBox="0 0 100 100" className="animate-[roots-grow_0.8s_ease-out_forwards]">
                                        <path d="M50 0 Q40 50 20 80 M50 0 Q60 60 80 90 M50 0 Q50 50 40 100 M50 0 Q50 50 60 100" stroke="#16a34a" strokeWidth="6" strokeLinecap="round" fill="none" />
                                    </svg>
                                </div>
                            )}

                            {rockSize > 0 && (
                                <div className="bg-stone-500 rounded-t-3xl rounded-b-lg border-b-4 border-stone-700 transition-all duration-300 relative z-10 shadow-lg" style={{ width: `${rockSize}px`, height: `${rockSize}px` }}></div>
                            )}
                            
                            {particles.map(p => (
                                <div key={p.id} className="particle bottom-10" style={{ '--tx': p.tx, '--ty': p.ty, backgroundColor: p.color }}></div>
                            ))}

                            <div className="absolute bottom-0 w-full bg-amber-200/80 transition-all duration-500 border-t border-amber-300" style={{ height: `${(time/1000000) * 60}px` }}>
                                <div className="absolute inset-0 opacity-50" style={{ backgroundImage: 'radial-gradient(#b45309 1px, transparent 1px)', backgroundSize: '10px 10px' }}></div>
                            </div>
                        </div>
                        {isDone && <div className="mt-6 text-amber-700 font-black text-xl text-center leading-tight bg-amber-100 border-2 border-amber-300 px-4 py-2 rounded-full shadow-md animate-fade-in">Sédiments !</div>}
                    </div>

                    <Modal isOpen={showGif} onClose={() => setShowGif(false)} title="Animation : Altération et Érosion">
                        <img src="https://i.ibb.co/q33LWFkh/weather-erosion.gif" alt="Altération et Érosion" className="w-full rounded-xl shadow-inner border border-stone-200" />
                    </Modal>
                </div>
            );
        };

        // 5. Compactación
        const SEDIMENT_IMAGES = {
            'arena': 'https://i.ibb.co/6c93TgKj/arenisca.jpg',
            'arcilla': 'https://i.ibb.co/TD6Wh1dM/arcilla.jpg',
            'cantos': 'https://i.ibb.co/C3b9rsS6/conglomerado.webp'
        };
        const SEDIMENT_NAMES = {
            'arena': 'Grès',
            'arcilla': 'Shale (Argilite)',
            'cantos': 'Conglomérat'
        };

        const RetoCompactacion = ({ onComplete, teacherMode }) => {
            const [sedimentType, setSedimentType] = useState(null); 
            const [time, setTime] = useState(0);
            const [showGif, setShowGif] = useState(false);
            const [hasViewedGif, setHasViewedGif] = useState(false);
            const [completedTypes, setCompletedTypes] = useState(new Set());
            const [expandedImage, setExpandedImage] = useState(null);
            
            const timerRef = useRef(null);
            const isDone = time >= 5000000;

            useEffect(() => {
                if (teacherMode) {
                    setSedimentType('arena');
                    setTime(5000000);
                    setCompletedTypes(new Set(['arena', 'arcilla', 'cantos']));
                    setHasViewedGif(true);
                }
            }, [teacherMode]);

            useEffect(() => {
                if (isDone && sedimentType) {
                    setCompletedTypes(prev => {
                        const newSet = new Set(prev);
                        newSet.add(sedimentType);
                        return newSet;
                    });
                }
            }, [isDone, sedimentType]);

            const handlePress = () => {
                if (!sedimentType || isDone) return;
                
                let currentT = time;
                timerRef.current = setInterval(() => {
                    currentT += 200000;
                    if(currentT >= 5000000) {
                        clearInterval(timerRef.current);
                        setTime(5000000);
                    } else {
                        setTime(currentT);
                    }
                }, 50);
            };

            const stopPress = () => clearInterval(timerRef.current);

            const handleSedimentChange = (type) => {
                setSedimentType(type);
                setTime(0); 
            };

            return (
                <div className="flex flex-col lg:flex-row gap-8 items-center justify-center p-4 h-full w-full max-w-5xl mx-auto">

                    <Modal isOpen={!!expandedImage} onClose={() => setExpandedImage(null)} title={SEDIMENT_NAMES[sedimentType]}>
                        <img src={expandedImage} alt={SEDIMENT_NAMES[sedimentType]} className="w-full max-h-[60vh] object-contain rounded-lg shadow-inner" />
                    </Modal>

                    <div className="flex-1 w-full space-y-4 flex flex-col justify-center">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200 relative">
                            <h3 className="text-xl font-bold text-stone-800 mb-2">Compactage et Cimentation</h3>
                            <div className="absolute top-4 right-4 bg-stone-100 px-3 py-1 rounded-full text-xs font-bold text-stone-500 shadow-inner">
                                ⏳ {time.toLocaleString()} ans
                            </div>
                            <p className="text-stone-600 text-sm leading-relaxed mb-4 mt-4">
                                La même chose se produit avec les sédiments formés par l'altération et l'érosion des roches. Au fil du temps, les sédiments s'accumulent dans les océans, les lacs et les vallées, formant des couches qui exercent un <strong className="text-stone-600 underline">poids</strong> sur le matériau sous-jacent. Ce poids <strong className="text-amber-800 underline">comprime</strong> les particules de sédiments, les compactant. L'eau qui passe par les espaces entre les particules aide à les cimenter encore plus. Ce processus de <strong className="text-amber-800 underline">compactage et de cimentation</strong> des sédiments forme la <strong className="text-amber-700 font-bold">roche sédimentaire</strong>.
                            </p>
                            
                            <AnalogyDropdown 
                                question="Que se passe-t-il avec un tas d'ordures en vrac lorsqu'il est introduit dans un compacteur ?" 
                                text="La pression de la machine produit un cube solide d'ordures compactées."
                                result="C'est comme le camion poubelle qui écrase les sacs. Des couches et des couches de sédiments s'accumulent, et le poids écrase celles du dessous, tandis que les minéraux les collent. C'est ainsi que naissent les Roches Sédimentaires !"
                            />

                            <Button onClick={() => {setShowGif(true); setHasViewedGif(true);}} variant={hasViewedGif ? "secondary" : "primary"} className="w-full py-2 text-sm mt-4 animate-pulse">🎬 Voir l'Animation (OBLIGATOIRE)</Button>
                        </div>
                        
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-stone-200 space-y-4">
                            <h4 className="font-bold text-sm text-stone-700">Étape 1 : Choisis les sédiments déposés</h4>
                            <div className="grid grid-cols-3 gap-2">
                                <button onClick={()=>handleSedimentChange('arena')} className={`font-bold py-3 rounded-lg border text-xs shadow-sm transition-colors relative ${sedimentType === 'arena' ? 'bg-yellow-500 text-white border-yellow-600' : 'bg-yellow-50 hover:bg-yellow-100 text-yellow-800 border-yellow-200'}`}>
                                    Grains de Sable
                                    {completedTypes.has('arena') && <span className="absolute -top-2 -right-2 text-green-500 bg-white rounded-full text-lg shadow"><IconCheck/></span>}
                                </button>
                                <button onClick={()=>handleSedimentChange('arcilla')} className={`font-bold py-3 rounded-lg border text-xs shadow-sm transition-colors relative ${sedimentType === 'arcilla' ? 'bg-orange-500 text-white border-orange-600' : 'bg-orange-50 hover:bg-orange-100 text-orange-800 border-orange-200'}`}>
                                    Boue et Argile
                                    {completedTypes.has('arcilla') && <span className="absolute -top-2 -right-2 text-green-500 bg-white rounded-full text-lg shadow"><IconCheck/></span>}
                                </button>
                                <button onClick={()=>handleSedimentChange('cantos')} className={`font-bold py-3 rounded-lg border text-xs shadow-sm transition-colors relative ${sedimentType === 'cantos' ? 'bg-stone-600 text-white border-stone-700' : 'bg-stone-100 hover:bg-stone-200 text-stone-800 border-stone-300'}`}>
                                    Galets
                                    {completedTypes.has('cantos') && <span className="absolute -top-2 -right-2 text-green-500 bg-white rounded-full text-lg shadow"><IconCheck/></span>}
                                </button>
                            </div>

                            {sedimentType && !isDone && (
                                <>
                                    <h4 className="font-bold text-sm text-stone-700 mt-4">Étape 2 : Simuler des millions d'années de pression</h4>
                                    <Button 
                                        onMouseDown={handlePress} onMouseUp={stopPress} onMouseLeave={stopPress}
                                        onTouchStart={handlePress} onTouchEnd={stopPress}
                                        className="w-full h-16 select-none cursor-pointer animate-pulse"
                                        variant="primary"
                                    >
                                        👇 Maintenir appuyé
                                    </Button>
                                </>
                            )}
                            
                            {isDone && (
                                <div className="animate-fade-in mt-4">
                                    <h4 className="font-bold text-sm text-stone-700 mb-3">Roche formée !</h4>
                                    <div 
                                        className="flex items-center gap-4 bg-stone-50 p-3 rounded-xl border border-stone-200 mb-2 cursor-pointer hover:border-blue-300 transition-colors relative group"
                                        onClick={() => setExpandedImage(SEDIMENT_IMAGES[sedimentType])}
                                    >
                                        <div className="relative">
                                            <img src={SEDIMENT_IMAGES[sedimentType]} alt={SEDIMENT_NAMES[sedimentType]} className="w-20 h-20 rounded-lg object-cover border border-stone-300 shadow-sm" />
                                            <div className="absolute inset-0 bg-black/20 hidden group-hover:flex items-center justify-center rounded-lg text-white"><IconExpand/></div>
                                        </div>
                                        <div>
                                            <h4 className="font-black text-stone-800 text-sm">Exemple Réel : {SEDIMENT_NAMES[sedimentType]}</h4>
                                            <p className="text-xs text-stone-600 mt-1">Formée par le compactage et la cimentation de {sedimentType === 'arena' ? 'grains de sable' : sedimentType === 'arcilla' ? 'boue et argile' : 'galets'}.</p>
                                        </div>
                                    </div>
                                    
                                    {completedTypes.size < 3 ? (
                                        <div className="text-orange-600 font-bold text-xs text-center bg-orange-50 border border-orange-200 p-2 rounded-lg mt-4">
                                            Tu dois expérimenter avec les autres types de sédiments avant de continuer ({completedTypes.size}/3).
                                        </div>
                                    ) : (
                                        hasViewedGif && <ReflectionBox id="compactacion" onSave={onComplete} hideExample={true} />
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="relative w-64 h-64 bg-white rounded-xl border-4 border-stone-300 overflow-hidden shadow-inner flex flex-col justify-end shrink-0">
                        <div className="absolute top-0 w-full bg-stone-800 border-b-8 border-stone-600 z-20 transition-all duration-75" style={{ height: `${(time/5000000) * 60 + 10}px` }}>
                            <div className="w-8 h-full bg-stone-400 mx-auto"></div>
                        </div>

                        {sedimentType && (
                            <div className="w-full transition-all duration-75 flex flex-col justify-end overflow-hidden" style={{ height: `${160 - (time/5000000) * 50}px` }}>
                                <div className="w-full h-full relative bg-amber-100" style={{ opacity: 1 - time/5000000 }}>
                                    {sedimentType === 'arena' && <div className="absolute inset-0" style={{ backgroundImage: 'radial-gradient(#d97706 2px, transparent 2px)', backgroundSize: '10px 10px' }}></div>}
                                    {sedimentType === 'arcilla' && <div className="absolute inset-0 bg-orange-200"></div>}
                                    {sedimentType === 'cantos' && <div className="absolute inset-0" style={{ backgroundImage: 'radial-gradient(#78716c 6px, transparent 6px)', backgroundSize: '20px 20px' }}></div>}
                                </div>
                                <div className="absolute bottom-0 w-full transition-all duration-500 bg-amber-700 flex items-center justify-center border-t-4 border-amber-900 shadow-inner" style={{ height: `${(time/5000000) * 80}px`, opacity: time/5000000 }}>
                                    {isDone && <span className="text-white font-bold text-xl drop-shadow-md z-30">{SEDIMENT_NAMES[sedimentType]}</span>}
                                </div>
                            </div>
                        )}
                    </div>

                    <Modal isOpen={showGif} onClose={() => setShowGif(false)} title="Animation : Compactage">
                        <img src="https://i.ibb.co/F4QLcL3g/compacting-cementing.gif" alt="Compactage" className="w-full rounded-xl shadow-inner border border-stone-200" />
                    </Modal>
                </div>
            );
        };

        // --- PHASE 1.5: MOVILIZACIÓN DE RECURSOS 1 (Simulador Externo y Desbloqueo) ---
        const Movilizacion1Phase = ({ onNext }) => {
            const [answer, setAnswer] = useState("");
            const isCorrect = answer.toLowerCase().includes("magma");

            return (
                <div className="flex-1 flex flex-col items-center justify-center p-4 animate-fade-in h-full">
                    <div className="bg-white p-8 md:p-12 rounded-3xl shadow-sm border border-stone-200 max-w-3xl w-full text-center">
                        <div className="text-6xl mb-6 text-blue-600">💻</div>
                        <h2 className="text-3xl font-black text-stone-800 mb-6">Simulateur Interactif</h2>
                        <p className="text-stone-600 mb-8 leading-relaxed text-lg">
                            Avant de construire le diagramme complet, voyons comment tous ces changements se produisent de manière continue dans la nature.
                        </p>
                        <a href="https://www.learner.org/wp-content/interactive/rockcycle/transformrock/" target="_blank" rel="noopener noreferrer" className="inline-block">
                            <Button variant="primary" className="py-4 px-10 text-xl mb-8">Ouvrir le Simulateur Externe</Button>
                        </a>
                        <div className="border-t border-stone-200 pt-8 mt-4 bg-stone-50 p-6 rounded-xl shadow-inner">
                            <label className="block text-stone-700 font-bold mb-2">Pour débloquer la phase suivante, réponds :</label>
                            <p className="text-stone-600 mb-3 text-sm">En quoi l'obsidienne s'est-elle transformée sur le dernier écran du simulateur ?</p>
                            <input 
                                type="text" 
                                value={answer} 
                                onChange={e => setAnswer(e.target.value)} 
                                className="w-full max-w-sm mx-auto p-3 border-2 border-stone-200 rounded-xl mb-6 focus:border-blue-500 outline-none text-center" 
                                placeholder="Écris ta réponse..." 
                            />
                            <Button variant="success" onClick={onNext} disabled={!isCorrect} className="w-full md:w-auto mx-auto text-lg">Continuer vers le Schéma →</Button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- PHASE 3 PRE: Pizarra Hipótesis ---
        const PizarraPhase = ({ onNext, teacherMode }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                if (teacherMode) onNext();
            }, [teacherMode]);

            const getCoordinates = (e, canvas) => {
                if (e.touches && e.touches.length > 0) {
                    const rect = canvas.getBoundingClientRect();
                    return {
                        x: e.touches[0].clientX - rect.left,
                        y: e.touches[0].clientY - rect.top
                    };
                }
                return { x: e.nativeEvent.offsetX, y: e.nativeEvent.offsetY };
            };

            const startDrawing = (e) => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const pos = getCoordinates(e, canvas);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                e.preventDefault(); 
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const pos = getCoordinates(e, canvas);
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#3b82f6';
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            };

            const stopDrawing = () => {
                if(isDrawing) {
                    canvasRef.current.getContext('2d').closePath();
                    setIsDrawing(false);
                }
            };

            const clearCanvas = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            };

            return (
                <div className="flex-1 flex flex-col items-center justify-center p-4 animate-fade-in h-full w-full max-w-4xl mx-auto">
                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-xl w-full border border-stone-200 text-center flex flex-col h-[80vh]">
                        <div className="text-4xl mb-2">📝</div>
                        <h2 className="text-3xl font-black text-stone-800 mb-2">Dessine ton Hypothèse</h2>
                        <p className="text-stone-600 mb-4 leading-relaxed text-sm">
                            Avant de voir et de construire la vraie carte, dessine ici ou dans ton cahier comment tu penses que les roches et les processus se connectent.
                        </p>
                        
                        <div className="flex-1 w-full bg-stone-50 rounded-2xl border-4 border-stone-200 shadow-inner overflow-hidden mb-4 relative touch-none">
                            <canvas 
                                ref={canvasRef}
                                width={800} 
                                height={400}
                                className="w-full h-full cursor-crosshair touch-none block"
                                onMouseDown={startDrawing}
                                onMouseMove={draw}
                                onMouseUp={stopDrawing}
                                onMouseLeave={stopDrawing}
                                onTouchStart={startDrawing}
                                onTouchMove={draw}
                                onTouchEnd={stopDrawing}
                            />
                            <button onClick={clearCanvas} className="absolute bottom-4 right-4 bg-white text-stone-500 hover:text-red-500 font-bold p-2 rounded-full shadow border border-stone-200 z-20">
                                <IconTrash/>
                            </button>
                        </div>
                        
                        <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-4 text-left max-w-xl mx-auto text-xs w-full">
                            <h4 className="font-bold text-blue-900 mb-1">N'oublie pas d'inclure dans ton schéma :</h4>
                            <ul className="list-disc pl-5 text-blue-800 space-y-1">
                                <li>Roches (Ignées, Sédimentaires, Métamorphiques, Magma, Sédiments).</li>
                                <li>Flèches directionnelles avec le nom du processus.</li>
                            </ul>
                        </div>

                        <Button variant="primary" onClick={onNext} className="w-full md:w-auto mx-auto py-3 px-8 text-md">
                            Je l'ai déjà validé avec le professeur → Afficher la Carte
                        </Button>
                    </div>
                </div>
            );
        };

        // --- PHASE 3: CONSTRUCCIÓN DEL DIAGRAMA ---
        const DiagramPhase = ({ onComplete, onUpdateProgress, progress, teacherMode, onNext }) => {
            
            const initialPlacedRocks = {
                'n_meta': 'i_metamorfica',
                'n_ignea': 'i_ignea',
                'n_sedi': 'i_sedimentaria',
                'n_magma': 'i_magma',
                'n_sedimento': 'i_sedimento'
            };

            const [placedItems, setPlacedItems] = useState(() => {
                if (teacherMode) return DIAGRAM_SOLUTION;
                if (progress.diagramPlacedItems && Object.keys(progress.diagramPlacedItems).length > 0) return progress.diagramPlacedItems;
                return initialPlacedRocks;
            });
            
            const [selectedItem, setSelectedItem] = useState(null);
            const [errorNode, setErrorNode] = useState(null);
            const [infoModal, setInfoModal] = useState(null); 

            const isComplete = Object.keys(DIAGRAM_SOLUTION).every(k => placedItems[k] === DIAGRAM_SOLUTION[k]);

            useEffect(() => {
                if (teacherMode) setPlacedItems({...DIAGRAM_SOLUTION});
            }, [teacherMode]);

            useEffect(() => {
                if (isComplete && !progress.diagrama) onComplete();
            }, [isComplete]);

            useEffect(() => {
                if (!teacherMode) {
                    onUpdateProgress({ diagramPlacedItems: placedItems });
                }
            }, [placedItems, teacherMode]);

            const handleSlotTap = (slotId) => {
                const isRockNode = slotId.startsWith('n_');
                if (isRockNode) {
                    setInfoModal(ITEMS_DIAGRAMA.find(i => i.id === DIAGRAM_SOLUTION[slotId]));
                    return;
                }

                if (!selectedItem) {
                    if (placedItems[slotId]) {
                        setInfoModal(ITEMS_DIAGRAMA.find(i => i.id === placedItems[slotId]));
                    }
                    return; 
                }

                const expectedItemId = DIAGRAM_SOLUTION[slotId];
                if (selectedItem.id === expectedItemId) {
                    setPlacedItems(prev => ({...prev, [slotId]: selectedItem.id}));
                    setSelectedItem(null);
                } else {
                    setErrorNode(slotId);
                    setTimeout(() => setErrorNode(null), 500);
                    setSelectedItem(null); 
                }
            };

            const availableItems = ITEMS_DIAGRAMA.filter(item => item.type === 'proceso');

            return (
                <div className="flex flex-col h-full gap-4 relative animate-fade-in">
                    
                    {infoModal && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in" onClick={() => setInfoModal(null)}>
                            <div className="bg-white p-6 rounded-2xl shadow-2xl max-w-xl w-full relative" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setInfoModal(null)} className="absolute -top-3 -right-3 bg-stone-700 hover:bg-red-500 text-white rounded-full w-8 h-8 font-bold shadow-lg hover:scale-105 transition-all flex items-center justify-center z-50">✕</button>
                                <h3 className="text-2xl font-black mb-4 text-center text-stone-800 flex items-center justify-center gap-2">
                                    {infoModal.icon} {infoModal.label}
                                </h3>
                                {infoModal.type === 'proceso' ? (
                                    <div className="border border-stone-200 rounded-xl overflow-hidden shadow-inner">
                                        <img src={infoModal.gif} alt={infoModal.label} className="w-full h-auto object-contain bg-stone-50" />
                                    </div>
                                ) : (
                                    <div className="bg-blue-50 border border-blue-100 p-6 rounded-xl text-center shadow-inner">
                                        <p className="text-lg text-blue-900 leading-relaxed">{infoModal.def}</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <PhaseHeader 
                        title="Construis le Cycle" 
                        subtitle="Sélectionne les processus ci-dessous pour connecter les roches situées sur la carte." 
                        progressText={`${Object.keys(placedItems).length} / ${Object.keys(DIAGRAM_SOLUTION).length}`}
                        onNext={isComplete ? onNext : null}
                        nextLabel="Aller à la Navigation"
                    />

                    <div className="flex flex-col flex-1 gap-6 relative">
                        {/* PANEL DIAGRAMA (A dalt, full width) */}
                        <div className="w-full bg-white rounded-2xl shadow-inner border-4 border-stone-200 relative overflow-hidden min-h-[700px]">
                            
                            <svg viewBox="0 0 1200 800" preserveAspectRatio="none" className="absolute inset-0 w-full h-full pointer-events-none z-10">
                                <defs>
                                    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea" /></marker>
                                    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c" /></marker>
                                    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" /></marker>
                                    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#eab308" /></marker>
                                    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706" /></marker>
                                </defs>
                                
                                {DIAGRAM_LAYOUT.EDGES.map(edge => {
                                    if(edge.curved) {
                                        return <path key={`base-${edge.id}`} d={`M ${edge.sx} ${edge.sy} C ${edge.cx1} ${edge.cy1}, ${edge.cx2} ${edge.cy2}, ${edge.ex} ${edge.ey}`} stroke={edge.color} strokeWidth="4" markerEnd={`url(#${edge.marker})`} fill="none" />
                                    }
                                    return <path key={`base-${edge.id}`} 
                                          d={`M ${edge.sx} ${edge.sy} Q ${edge.cx} ${edge.cy} ${edge.ex} ${edge.ey}`}
                                          stroke={edge.color} 
                                          strokeWidth="4" 
                                          fill="none"
                                          markerEnd={`url(#${edge.marker})`}/>
                                })}
                            </svg>

                            {Object.entries(DIAGRAM_LAYOUT.NODES).map(([nodeId, pos]) => {
                                const placedItemId = placedItems[nodeId];
                                const itemData = ITEMS_DIAGRAMA.find(i => i.id === placedItemId);

                                return (
                                    <div key={nodeId} 
                                         onClick={() => handleSlotTap(nodeId)}
                                         className={`absolute w-32 md:w-36 -translate-x-1/2 -translate-y-1/2 p-3 border-2 border-solid rounded-xl text-center font-bold text-xs md:text-sm z-10 shadow-md scale-100 cursor-pointer hover:scale-105 transition-transform bg-white ${itemData ? itemData.color : ''}`} 
                                         style={{ top: `${(pos.cy / 800) * 100}%`, left: `${(pos.cx / 1200) * 100}%` }}>
                                        {itemData ? itemData.label : 'Roche'}
                                        {nodeId === 'n_ignea' && <div className="text-[9px] font-normal mt-1 leading-tight text-stone-700">Plutonique / Volcanique</div>}
                                    </div>
                                );
                            })}

                            {DIAGRAM_LAYOUT.EDGES.map((edge) => {
                                const placedItemId = placedItems[edge.id];
                                const itemData = ITEMS_DIAGRAMA.find(i => i.id === placedItemId);
                                const isError = errorNode === edge.id;
                                
                                const midPos = getEdgeMidpoint(edge);

                                return (
                                    <div key={edge.id} onClick={() => handleSlotTap(edge.id)}
                                         className={`absolute flex flex-col items-center justify-center z-20 cursor-pointer transition-all hover:scale-110
                                            ${selectedItem && !itemData ? 'ring-4 ring-blue-300 rounded-full' : ''}
                                            ${isError ? 'animate-shake' : ''}
                                         `} style={{ top: midPos.top, left: midPos.left, transform: 'translate(-50%, -50%)' }}>
                                        
                                        <div className="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-md border-[3px]" style={{ borderColor: edge.color }}>
                                            {itemData ? <span className="text-2xl">{itemData.icon}</span> : <span className="text-[10px] text-stone-400">?</span>}
                                        </div>
                                        {itemData && <span className="bg-white/90 px-2 py-0.5 rounded text-[9px] font-bold text-stone-800 shadow-sm mt-1 uppercase">{itemData.label}</span>}
                                    </div>
                                );
                            })}
                            
                            {isComplete && (
                                <div className="absolute top-4 left-1/2 -translate-x-1/2 bg-green-500 text-white font-bold px-6 py-2 rounded-full shadow-lg flex items-center gap-2 animate-bounce z-50">
                                    <IconCheck/> Diagramme Terminé !
                                </div>
                            )}
                        </div>

                        {/* PANEL BANCO DE PIEZAS (A sota, horitzontal) */}
                        <div className="w-full bg-white rounded-2xl shadow-sm border border-stone-200 p-6 z-30 mb-20">
                            <h3 className="font-bold text-stone-800 mb-2 border-b pb-2 flex justify-between items-center text-lg">
                                <span>Processus Géologiques</span>
                                {isComplete && <button onClick={onNext} className="bg-green-600 text-white text-sm px-4 py-2 rounded-lg font-bold shadow hover:bg-green-700 transition">Continuer vers la Navigation</button>}
                            </h3>
                            <p className="text-xs text-stone-500 mb-6">Sélectionne un processus et touche les flèches du diagramme où elles correspondent (elles peuvent être répétées). Touche les roches ou les processus terminés pour voir leurs informations.</p>
                            
                            <div className="flex flex-wrap justify-center gap-4">
                                {availableItems.map(item => (
                                    <div key={item.id} 
                                         onClick={() => setSelectedItem(selectedItem?.id === item.id ? null : item)}
                                         className={`p-3 px-6 rounded-xl border-2 text-sm font-bold cursor-pointer transition-all flex items-center gap-2 bg-stone-50 border-stone-300 text-stone-700 hover:bg-stone-100 min-w-[160px]
                                            ${selectedItem?.id === item.id ? 'ring-4 ring-blue-400 scale-105 shadow-md border-blue-500 bg-white' : ''}
                                         `}>
                                        <span className="text-xl">{item.icon}</span>
                                        <span>{item.label}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };


        // --- PHASE 4: DESAFIOS DE NAVEGACIÓN EN EL MAPA ---
        const MISSIONS = [
            { id: 1, start: 'n_sedi', target: 'n_meta', energy: 3, name: "Mission 1 : Initiation", desc: "Objectif : Convertis la Roche Sédimentaire directement en Roche Métamorphique.", blockedEdges: [], mustPass: [] },
            { id: 2, start: 'n_ignea', target: 'n_sedi', energy: 6, name: "Mission 2 : L'Usure", desc: "Objectif : Convertis une Roche Ignée en Roche Sédimentaire. Indice : Tu devras passer par l'état de Sédiments.", blockedEdges: [], mustPass: ['n_sedimento'], idealPath: ['e_ignea_sedimento', 'e_sedimento_sedi'] },
            { id: 3, start: 'n_meta', target: 'n_ignea', energy: 8, name: "Mission 3 : Le Réveil Volcanique", desc: "Objectif : Convertis une Roche Métamorphique en Roche Ignée (Volcanique ou Plutonique).", blockedEdges: [], mustPass: ['n_magma'], idealPath: ['e_meta_magma', 'e_magma_ignea'] },
            { id: 4, start: 'n_sedi', target: 'n_ignea', energy: 10, name: "Mission 4 : Le Grand Voyage", desc: "Objectif : Convertis une Roche Sédimentaire en Roche Ignée en passant par le métamorphisme.", blockedEdges: ['e_sedi_magma'], mustPass: ['n_meta', 'n_magma'], idealPath: ['e_sedi_meta', 'e_meta_magma', 'e_magma_ignea'] }
        ];

        const ROCK_NAMES = { 'n_ignea': 'Roche Ignée', 'n_sedi': 'Roche Sédimentaire', 'n_meta': 'Roche Métamorphique', 'n_magma': 'Magma', 'n_sedimento': 'Sédiments' };

        // Componente Metacognición Post-Misión
        const PostMissionReflection = ({ mission, allHypotheses, currentMissionIdx, onSave }) => {
            const [text, setText] = useState("");
            const hyp = allHypotheses[currentMissionIdx];
            if (!hyp) return null;

            const getProcNameFromEdge = (edgeId) => {
                const procId = DIAGRAM_SOLUTION[edgeId] || edgeId;
                const proc = ITEMS_DIAGRAMA.find(i => i.id === procId);
                return proc ? proc.label : edgeId;
            };

            const getProcNameFromId = (pId) => {
                const p = ITEMS_DIAGRAMA.find(i => i.id === pId);
                return p ? p.label : pId;
            };

            const plannedNames = (hyp.predictedPath || []).map(getProcNameFromId);
            const actualNames = (hyp.actualPathEdges || []).map(getProcNameFromEdge);

            const isPerfect = JSON.stringify(plannedNames) === JSON.stringify(actualNames);

            const handleSave = () => {
                if (!isPerfect && text.trim().length < 5) {
                    alert("S'il te plaît, explique brièvement pourquoi tu as changé de plan.");
                    return;
                }
                onSave(isPerfect ? "J'ai suivi le parcours planifié à la perfection." : text);
            };

            return (
                <div className="absolute inset-0 bg-green-500/90 backdrop-blur-md z-[200] flex items-center justify-center animate-fade-in p-4 overflow-y-auto">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl border-4 border-green-300 w-full max-w-2xl text-center flex flex-col items-center my-auto">
                        <div className="text-7xl mb-4 animate-bounce">🏆</div>
                        <h4 className="text-3xl font-black text-green-700 mb-6">Mission Accomplie !</h4>
                        
                        <div className="w-full text-left bg-stone-50 p-4 rounded-xl border border-stone-200 mb-6">
                            <h5 className="font-bold text-stone-800 mb-2 border-b pb-1">Analyse de ton parcours :</h5>
                            
                            <div className="flex flex-col md:flex-row gap-4 mb-4 mt-3">
                                <div className="flex-1 bg-white p-3 rounded-lg border border-stone-200 shadow-sm">
                                    <p className="text-xs font-bold text-stone-500 mb-2 uppercase tracking-wide">Processus Planifiés</p>
                                    <ol className="list-decimal list-inside text-sm font-medium text-stone-700 space-y-1">
                                        {plannedNames.map((name, idx) => <li key={idx}>{name}</li>)}
                                    </ol>
                                </div>
                                <div className="flex-1 bg-white p-3 rounded-lg border border-stone-200 shadow-sm">
                                    <p className="text-xs font-bold text-stone-500 mb-2 uppercase tracking-wide">Processus Exécutés</p>
                                    <ol className="list-decimal list-inside text-sm font-medium text-green-700 space-y-1">
                                        {actualNames.map((name, idx) => <li key={idx}>{name}</li>)}
                                    </ol>
                                </div>
                            </div>
                            
                            {isPerfect ? (
                                <p className="text-sm font-bold text-green-700 bg-green-100 p-3 rounded shadow-sm border border-green-200">
                                    Parcours parfait ! Tu as suivi exactement les processus que tu avais planifiés.
                                </p>
                            ) : (
                                <p className="text-sm font-bold text-orange-700 bg-orange-100 p-3 rounded shadow-sm border border-orange-200">
                                    Très bien, tu as atteint l'objectif ! Mais ton vrai parcours n'a pas coïncidé avec ton plan initial. Pourquoi as-tu dû changer de plan en cours de route ?
                                </p>
                            )}
                        </div>

                        {!isPerfect && (
                            <textarea 
                                className="w-full p-4 border-2 border-stone-200 rounded-xl mb-6 text-sm resize-none focus:ring-2 focus:ring-green-500 outline-none transition-all custom-scroll shadow-inner min-h-[100px]"
                                placeholder="Écris ici ta réflexion sur ce changement..."
                                id="mission-reflection-input"
                                value={text}
                                onChange={(e) => setText(e.target.value)}
                            ></textarea>
                        )}

                        <Button variant="success" onClick={handleSave} className="w-full py-4 text-lg shadow-lg">
                            Continuer →
                        </Button>
                    </div>
                </div>
            );
        };

        const DesafiosNavegacionPhase = ({ progress, onUpdateProgress, onCompleteProgress, teacherMode }) => {
            
            const [difficulty, setDifficulty] = useState(progress.navDifficulty || null); 
            const [currentMissionIdx, setCurrentMissionIdx] = useState(progress.navMissionIdx || 0);
            const [isSandbox, setIsSandbox] = useState(progress.navIsSandbox || false);
            const [showMetacognition, setShowMetacognition] = useState(false);
            const [allHypotheses, setAllHypotheses] = useState(Array.isArray(progress.navHypotheses) ? progress.navHypotheses : []);
            const [missionReflections, setMissionReflections] = useState(progress.missionReflections || {});
            
            const [metaQ1, setMetaQ1] = useState(progress.reflections?.metaQ1 || "");
            const [metaQ2, setMetaQ2] = useState(progress.reflections?.metaQ2 || "");

            const mission = MISSIONS[currentMissionIdx] || MISSIONS[0];
            
            // Navegation State
            const [energy, setEnergy] = useState(0);
            const [currentNode, setCurrentNode] = useState(null);
            const [step, setStep] = useState(0); 
            const [selectedOrigin, setSelectedOrigin] = useState(null);
            const [selectedEdge, setSelectedEdge] = useState(null);
            const [pathHistory, setPathHistory] = useState([]);
            
            const [feedback, setFeedback] = useState({type: 'info', text: ''});
            const [animatingGif, setAnimatingGif] = useState(null);
            const [animatingTitle, setAnimatingTitle] = useState("");
            const [hypothesisMade, setHypothesisMade] = useState(false);
            const [missionWon, setMissionWon] = useState(false);
            const [infoModal, setInfoModal] = useState(null); 
            
            // Blind-Path State
            const [hypothesisText, setHypothesisText] = useState("");
            const [plannedPath, setPlannedPath] = useState([]);
            const [currentPlanStep, setCurrentPlanStep] = useState(0);

            // Hint System
            const [hintsLeft, setHintsLeft] = useState(3);
            const [isHintMode, setIsHintMode] = useState(false);
            const [revealedElements, setRevealedElements] = useState([]);

            const UNIQUE_PROCESSES = useMemo(() => {
                const uniqueLabels = new Set();
                const uniques = [];
                ITEMS_DIAGRAMA.filter(i => i.type === 'proceso').forEach(p => {
                    if (!uniqueLabels.has(p.label)) {
                        uniqueLabels.add(p.label);
                        uniques.push(p);
                    }
                });
                return uniques;
            }, []);

            useEffect(() => {
                if (!teacherMode) {
                    onUpdateProgress({
                        navMissionIdx: currentMissionIdx,
                        navHypotheses: Array.isArray(allHypotheses) ? allHypotheses : [],
                        navIsSandbox: isSandbox,
                        navDifficulty: difficulty,
                        missionReflections: missionReflections,
                        reflections: {
                            ...(progress.reflections || {}),
                            metaQ1,
                            metaQ2
                        }
                    });
                }
            }, [currentMissionIdx, allHypotheses, isSandbox, difficulty, missionReflections, metaQ1, metaQ2, teacherMode]);

            useEffect(() => {
                if (difficulty && !isSandbox && !showMetacognition) {
                    setEnergy(mission.energy);
                    setCurrentNode(mission.start);
                    setStep(0);
                    setSelectedOrigin(null);
                    setSelectedEdge(null);
                    setPathHistory([]);
                    setFeedback({type: 'info', text: 'Lis la mission et formule ton hypothèse pour commencer.'});
                    setHypothesisMade(false);
                    setHypothesisText("");
                    setPlannedPath(['']); 
                    setCurrentPlanStep(0);
                    setHintsLeft(3);
                    setRevealedElements([]);
                    setIsHintMode(false);
                    setMissionWon(false);
                }
            }, [currentMissionIdx, isSandbox, showMetacognition, difficulty]);

            const handleAddPlanStep = () => setPlannedPath([...plannedPath, '']);
            const handlePlanChange = (index, val) => {
                const newPlan = [...plannedPath];
                newPlan[index] = val;
                setPlannedPath(newPlan);
            };
            const handleRemovePlanStep = (index) => setPlannedPath(plannedPath.filter((_, i) => i !== index));

            const saveHypothesis = () => {
                if(hypothesisText.trim().length < 10) {
                    alert("S'il te plaît, écris une justification plus détaillée.");
                    return;
                }
                if(plannedPath.length === 0 || plannedPath.some(p => p === '')) {
                    alert("Tu dois compléter tous les sélecteurs de ton parcours planifié.");
                    return;
                }
                setHypothesisMade(true);
                const newHypotheses = Array.isArray(allHypotheses) ? [...allHypotheses] : [];
                newHypotheses[currentMissionIdx] = {
                    levelName: mission.name,
                    start: ROCK_NAMES[mission.start],
                    target: ROCK_NAMES[mission.target],
                    text: hypothesisText,
                    predictedPath: [...plannedPath],
                    actualPath: [],
                    actualPathEdges: [],
                    reflection: ""
                };
                setAllHypotheses(newHypotheses);
                setFeedback({type: 'info', text: 'Clique sur ta position actuelle sur la carte pour commencer.'});
            };

            const resetMission = () => {
                if (confirm("Recommencer la mission ? Tu perdras ta progression actuelle.")) {
                    setEnergy(mission.energy);
                    setCurrentNode(mission.start);
                    setStep(0);
                    setSelectedOrigin(null);
                    setSelectedEdge(null);
                    setPathHistory([]);
                    setCurrentPlanStep(0);
                    setFeedback({type: 'info', text: 'Mission recommencée. Commence depuis ton origine.'});
                }
            };

            const consumeEnergyAndCheck = (msg) => {
                let finalMsg = msg;
                if (!teacherMode && !isSandbox) {
                    const newEnergy = energy - 1;
                    setEnergy(newEnergy);
                    if (newEnergy <= 0) {
                        finalMsg = 'Tu n\'as plus d\'énergie ! Clique sur recommencer la mission.';
                    }
                }
                setFeedback({type: 'error', text: finalMsg});
                setStep(0);
                setSelectedOrigin(null);
                setSelectedEdge(null);
            };

            const applyHint = (elementId) => {
                if (energy < 1 && !teacherMode) {
                    setFeedback({type: 'error', text: 'Tu n\'as pas assez d\'énergie pour demander un indice.'});
                    setIsHintMode(false);
                    return;
                }
                if (!teacherMode) {
                    setEnergy(prev => prev - 1);
                    setHintsLeft(prev => prev - 1);
                }
                setRevealedElements(prev => [...prev, elementId]);
                setIsHintMode(false);
                setFeedback({type: 'success', text: 'Indice activé temporairement.'});
                setTimeout(() => {
                    setRevealedElements(prev => prev.filter(e => e !== elementId));
                    setFeedback({type: 'info', text: 'Continue ta navigation.'});
                }, 3000);
            };

            const handleNodeClick = (nodeId) => {
                try {
                    const isRevealed = revealedElements.includes(nodeId) || teacherMode || isSandbox || difficulty === 'easy' || difficulty === 'normal' || (difficulty === 'hard' && hypothesisMade && ['n_ignea', 'n_sedi', 'n_meta'].includes(nodeId));
                    
                    if (isRevealed && step === 0 && nodeId !== currentNode) {
                        setInfoModal(ITEMS_DIAGRAMA.find(i => i.id === DIAGRAM_SOLUTION[nodeId]));
                        return;
                    }

                    if (!hypothesisMade && !isSandbox) return;
                    if (animatingGif || (energy <= 0 && !teacherMode && !isSandbox) || missionWon) return;
                    if (isHintMode) return applyHint(nodeId);

                    if (step === 0) {
                        if (nodeId === currentNode) {
                            setSelectedOrigin(nodeId);
                            setStep(1);
                            setFeedback({type: 'info', text: 'Sélectionne le PROCESSUS (flèche) que tu veux appliquer.'});
                        } else {
                            setFeedback({type: 'error', text: `Tu es à ${ROCK_NAMES[currentNode] || 'une autre roche'}.`});
                        }
                    } else if (step === 2) {
                        const expectedTarget = DIAGRAM_ADJACENCY[selectedOrigin]?.[selectedEdge];
                        
                        if (expectedTarget === nodeId) {
                            if (!isSandbox && mission.blockedEdges.includes(selectedEdge)) {
                                consumeEnergyAndCheck("Ce chemin est BLOQUÉ ! Cherche une alternative.");
                                return;
                            }

                            // VALID MOVE
                            const itemData = getEdgeData(selectedEdge);
                            setAnimatingGif(itemData?.gif || 'https://i.ibb.co/nsv6C6P6/heat-pressure.gif');
                            setAnimatingTitle(itemData?.label || 'Processus');
                            
                            if (!teacherMode && !isSandbox) setEnergy(e => e - 1);
                            
                            setTimeout(() => {
                                setAnimatingGif(null);
                                const newHistory = [...pathHistory, { from: selectedOrigin, edge: selectedEdge, to: nodeId }];
                                setPathHistory(newHistory);
                                setCurrentNode(nodeId);
                                setStep(0);
                                setSelectedOrigin(null);
                                setSelectedEdge(null);
                                setCurrentPlanStep(prev => prev + 1);
                                
                                if (!isSandbox && (nodeId === mission.target || (mission.target === 'n_ignea' && (nodeId === 'n_plutonica' || nodeId === 'n_volcanica')))) {
                                    const passedNodes = newHistory.map(h => h.to);
                                    const allMustPassMet = mission.mustPass.every(mp => passedNodes.includes(mp));
                                    
                                    if (allMustPassMet) {
                                        const updatedHyp = Array.isArray(allHypotheses) ? [...allHypotheses] : [];
                                        if(updatedHyp[currentMissionIdx]) {
                                            updatedHyp[currentMissionIdx].actualPath = newHistory.map(h => h.to);
                                            updatedHyp[currentMissionIdx].actualPathEdges = newHistory.map(h => h.edge);
                                        }
                                        setAllHypotheses(updatedHyp);
                                        
                                        setMissionWon(true);
                                    } else {
                                        setFeedback({type: 'error', text: 'Tu es arrivé à destination, mais tu n\'as pas respecté les restrictions de la mission. Tu dois recommencer.'});
                                    }
                                } else {
                                    setFeedback({type: 'success', text: `Transformé ! Sélectionne ta nouvelle position pour continuer.`});
                                }
                            }, 4500); 
                        } else {
                            consumeEnergyAndCheck("Le processus n'est pas physiquement possible vers cette destination.");
                        }
                    }
                } catch(e) {
                    console.error(e);
                    consumeEnergyAndCheck("Une erreur inattendue s'est produite lors de la navigation.");
                }
            };

            const handleEdgeClick = (edgeId) => {
                try {
                    const isRevealed = revealedElements.includes(edgeId) || teacherMode || isSandbox || difficulty === 'easy';
                    if (isRevealed && step === 0) {
                        setInfoModal(getEdgeData(edgeId));
                        return;
                    }

                    if (!hypothesisMade && !isSandbox) return;
                    if (animatingGif || (energy <= 0 && !teacherMode && !isSandbox) || missionWon) return;
                    if (isHintMode) return applyHint(edgeId);

                    if (step === 1) {
                        if (!isSandbox && !teacherMode) {
                            if (currentPlanStep >= plannedPath.length) {
                                return consumeEnergyAndCheck(`Tu as dépassé le nombre de processus planifiés ! Tu en avais planifié ${plannedPath.length}. Recommence la mission.`);
                            }
                        }
                        setSelectedEdge(edgeId);
                        setStep(2);
                        setFeedback({type: 'info', text: 'Clique sur le NŒUD DE DESTINATION que tu espères atteindre.'});
                    } else if (step === 0) {
                        setFeedback({type: 'error', text: 'Sélectionne d\'abord le NŒUD D\'ORIGINE.'});
                    } else if (step === 2) {
                        if (!isSandbox && !teacherMode) {
                            if (currentPlanStep >= plannedPath.length) {
                                return consumeEnergyAndCheck(`Tu as dépassé le nombre de processus planifiés ! Tu en avais planifié ${plannedPath.length}. Recommence la mission.`);
                            }
                        }
                        setSelectedEdge(edgeId); 
                    }
                } catch (e) {
                    console.error(e);
                    consumeEnergyAndCheck("Une erreur inattendue s'est produite.");
                }
            };

            const getNodeLabel = (nodeId) => {
                const isRevealed = revealedElements.includes(nodeId) || teacherMode || isSandbox || difficulty === 'easy' || difficulty === 'normal' || (difficulty === 'hard' && hypothesisMade && ['n_ignea', 'n_sedi', 'n_meta'].includes(nodeId));
                const itemData = ITEMS_DIAGRAMA.find(i => i.id === DIAGRAM_SOLUTION[nodeId]);
                return isRevealed ? itemData?.label : 'Roche'; 
            };

            const getEdgeLabel = (edgeId) => {
                const itemData = getEdgeData(edgeId);
                const isRevealed = revealedElements.includes(edgeId) || teacherMode || isSandbox || difficulty === 'easy';
                if (isRevealed) return <span className="flex items-center gap-1">{itemData?.icon} {itemData?.label}</span>;
                if (difficulty === 'normal' || difficulty === 'hard') return <span className="flex items-center text-lg">{itemData?.icon}</span>; 
                return <span>Processus</span>;
            };

            const saveMissionReflectionAndNext = (text) => {
                const newRef = {...missionReflections, [mission.id]: text};
                setMissionReflections(newRef);
                
                const newHyp = [...allHypotheses];
                if(newHyp[currentMissionIdx]) newHyp[currentMissionIdx].reflection = text;
                setAllHypotheses(newHyp);
                
                setMissionWon(false);
                if (currentMissionIdx < MISSIONS.length - 1) {
                    setCurrentMissionIdx(prev => prev + 1);
                } else {
                    setShowMetacognition(true);
                }
            };

            const generatePDF = () => {
                const element = document.getElementById('informe-pdf');
                
                const pxToMm = 0.264583;
                const eWidth = element.scrollWidth * pxToMm;
                const eHeight = element.scrollHeight * pxToMm;

                const opt = { 
                    margin: [10, 10, 10, 10], 
                    filename: 'Laboratoire_Roches_Resume.pdf', 
                    image: { type: 'jpeg', quality: 0.98 }, 
                    html2canvas: { scale: 2, useCORS: true, scrollY: 0 }, 
                    jsPDF: { unit: 'mm', format: [Math.max(210, eWidth + 20), eHeight + 20], orientation: 'portrait' } 
                };
                html2pdf().set(opt).from(element).save();
            };

            if (!difficulty) {
                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-4 animate-fade-in h-full">
                        <div className="bg-white p-8 md:p-12 rounded-3xl shadow-xl max-w-4xl w-full border border-stone-200 text-center">
                            <div className="text-6xl mb-6">🧭</div>
                            <h2 className="text-3xl font-black text-stone-800 mb-4">Navigation du Cycle</h2>
                            <p className="text-stone-600 mb-8 leading-relaxed text-lg">Déduis et trace le parcours des roches à travers le cycle. Choisis la difficulté :</p>

                                    <h3 className="font-bold text-green-700 text-xl mb-2">Mode Facile</h3>
                                    <p className="text-sm text-stone-600">Noms visibles sur toute la carte.</p>
                                </button>
                                <button onClick={() => setDifficulty('normal')} className="flex flex-col items-center p-6 border-2 border-orange-400 rounded-2xl hover:bg-orange-50 shadow-sm group bg-white transition-transform hover:-translate-y-1">
                                    <div className="bg-orange-100 text-orange-600 w-16 h-16 rounded-full flex items-center justify-center text-3xl mb-4 group-hover:bg-orange-500 group-hover:text-white transition-colors">🧐</div>
                                    <h3 className="font-bold text-orange-700 text-xl mb-2">Mode Normal</h3>
                                    <p className="text-sm text-stone-600">Roches visibles, processus comme icônes cachées.</p>

                                <button onClick={() => setDifficulty('hard')} className="flex flex-col items-center p-6 border-2 border-red-400 rounded-2xl hover:bg-red-50 shadow-sm group bg-white transition-transform hover:-translate-y-1">
                                    <div className="bg-red-100 text-red-600 w-16 h-16 rounded-full flex items-center justify-center text-3xl mb-4 group-hover:bg-red-500 group-hover:text-white transition-colors">🤯</div>
                                    <h3 className="font-bold text-red-700 text-xl mb-2">Mode Difficile</h3>
                                    <p className="text-sm text-stone-600">Diagramme caché jusqu'à l'enregistrement de l'hypothèse.</p>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (showMetacognition) {
                const getProcNameFromEdge = (edgeId) => {
                    const procId = DIAGRAM_SOLUTION[edgeId] || edgeId;
                    const proc = ITEMS_DIAGRAMA.find(i => i.id === procId);
                    return proc ? proc.label : edgeId;
                };

                return (
                    <div className="flex-1 flex flex-col p-4 animate-fade-in h-full max-w-4xl mx-auto w-full custom-scroll overflow-y-auto">
                        <div className="bg-white rounded-3xl shadow-lg border-2 border-stone-200 p-8 flex flex-col items-center text-center mb-8 relative">
                            
                            {/* Visual Content for PDF */}
                            <div id="informe-pdf" className="w-full text-left p-4 pdf-content pb-10">
                                <div className="text-center mb-8 border-b-4 border-blue-600 pb-4">
                                    <h2 className="text-3xl font-black text-stone-800">Bulletin Scientifique : Cycle des Roches</h2>
                                    <p className="text-stone-500">Résumé de l'apprentissage et réflexions</p>
                                </div>
                                
                                {/* Reflections from Phase 1 */}
                                {progress.reflections && Object.keys(progress.reflections).length > 0 && (
                                    <div className="mb-8">
                                        <h3 className="text-xl font-bold text-blue-900 border-b border-blue-200 pb-2 mb-4">Mes Réflexions sur les Processus :</h3>

                                            {['calor', 'fusion', 'enfriamiento', 'meteorizacion', 'compactacion'].map((k) => {
                                                if(!progress.reflections[k] || progress.reflections[k].startsWith('metaQ')) return null;
                                                return <li key={k} className="bg-stone-50 p-3 rounded-lg border border-stone-200 shadow-sm"><strong className="capitalize text-blue-700 block mb-1">{k}</strong> "{progress.reflections[k]}"</li>
                                            })}
                                        </ul>
                                    </div>
                                )}

                                {/* Hypotheses & Mission Reflections from Phase 4 */}
                                <div className="mb-8">
                                    <h3 className="text-xl font-bold text-green-900 border-b border-green-200 pb-2 mb-4">Mes Parcours de Navigation :</h3>

                                        if (!hyp) return null;
                                        return (
                                            <div key={i} className="bg-green-50/50 p-4 rounded-xl border border-green-100 mb-4 text-sm shadow-sm">

                                                <p className="text-xs font-mono text-green-700 mb-3">✓ Parcours validé : {hyp.start} ➔ {hyp.actualPathEdges?.map(edgeId => getProcNameFromEdge(edgeId)).join(' ➔ ') || 'Terminé'}</p>
                                                {hyp.reflection && <p className="text-stone-800 bg-white p-3 rounded-lg border border-green-200 shadow-sm"><strong className="text-green-800 block mb-1">Conclusion post-défi :</strong> "{hyp.reflection}"</p>}

                                    })}

                                    <h3 className="text-xl font-bold text-orange-900 border-b border-orange-200 pb-2 mb-4">Réflexion Finale :</h3>

                                        <div className="bg-orange-50 p-4 rounded-lg border border-orange-200 text-left shadow-sm">
                                            <label className="block text-sm font-bold text-stone-800 mb-2">1. Penses-tu que le cycle des roches est plus complexe ou plus facile que ce que tu imaginais au début ? Pourquoi ?</label>

                                        </div>
                                        <div className="bg-orange-50 p-4 rounded-lg border border-orange-200 text-left shadow-sm">
                                            <label className="block text-sm font-bold text-stone-800 mb-2">2. Y a-t-il un processus ou un type de roche qui n'est pas encore tout à fait clair pour toi ?</label>
                                            <textarea value={metaQ2} onChange={e=>setMetaQ2(e.target.value)} onInput={autoResizeTextarea} className="w-full p-3 border border-orange-300 rounded focus:ring-orange-500 text-sm min-h-[80px] resize-none overflow-hidden" placeholder="Écris ta réponse..."></textarea>

                                    </div>

                            </div>

                                    setPathHistory([]);

            return (

                    <Modal isOpen={!!animatingGif} title={`Application : ${animatingTitle}`}>

                    {infoModal && (

                                        <p className="text-lg text-blue-900 leading-relaxed">{infoModal.def}</p>

                            {!isSandbox && <p className="text-stone-600 font-medium text-sm mt-1">{mission.desc}</p>}

                        <div className="flex gap-4 items-center flex-wrap justify-center">

                                <div className="flex items-center gap-2 bg-stone-100 p-2 px-4 rounded-xl border border-stone-200">

                                    <div className="text-left"><span className="text-[10px] font-bold text-stone-500 uppercase block">Destination</span><span className="font-bold text-blue-700 text-sm">{ROCK_NAMES[mission.target]}</span></div>
                                </div>

                            {!isSandbox && (
                                <div className="bg-blue-50 border border-blue-200 p-2 px-4 rounded-xl text-center flex items-center gap-4">
                                    <div>
                                        <span className="text-[10px] font-bold text-blue-600 uppercase block">Énergie</span>

                                    </div>

                                        disabled={hintsLeft <= 0 || (energy < 1 && !teacherMode)}
                                        className={`px-3 py-2 rounded-xl text-xs font-bold shadow transition-colors ${isHintMode ? 'bg-yellow-400 text-stone-900 animate-pulse ring-2 ring-yellow-500' : 'bg-yellow-100 text-yellow-800 hover:bg-yellow-200'} disabled:opacity-50`}

                                    >
                                        💡 Indice ({hintsLeft})
                                    </button>
                                </div>
                            )}

                            {!isSandbox && (
                                <button onClick={resetMission} className="bg-stone-200 hover:bg-stone-300 text-stone-700 p-3 rounded-xl transition-colors" title="Recommencer la Mission">
                                    ⟲
                                </button>
                            )}
                        </div>
                    </div>
                    
                    <div className={`flex flex-col gap-6 flex-1 relative z-30 w-full ${isHintMode ? 'cursor-help' : ''}`}>
                        
                        {/* DIAGRAMA INTERACTIVO (MAPA) */}

                            <svg viewBox="0 0 1200 800" preserveAspectRatio="none" className="absolute inset-0 w-full h-full pointer-events-none z-10">
                                <defs>
                                    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea" /></marker>
                                    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c" /></marker>
                                    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" /></marker>
                                    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#eab308" /></marker>
                                    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706" /></marker>
                                </defs>
                                
                                {DIAGRAM_LAYOUT.EDGES.map(edge => {
                                    if(edge.curved) {
                                        return <path key={`base-${edge.id}`} d={`M ${edge.sx} ${edge.sy} C ${edge.cx1} ${edge.cy1}, ${edge.cx2} ${edge.cy2}, ${edge.ex} ${edge.ey}`} stroke={edge.color} strokeWidth="4" markerEnd={`url(#${edge.marker})`} fill="none" />
                                    }
                                    return <path key={`base-${edge.id}`} 
                                          d={`M ${edge.sx} ${edge.sy} Q ${edge.cx} ${edge.cy} ${edge.ex} ${edge.ey}`}
                                          stroke={edge.color} 
                                          strokeWidth="4" 
                                          fill="none"
                                          markerEnd={`url(#${edge.marker})`}/>
                                })}

                                {teacherMode && !isSandbox && mission.idealPath && mission.idealPath.map(edgeId => {
                                    const edgeData = DIAGRAM_LAYOUT.EDGES.find(e => e.id === edgeId);
                                    if (!edgeData) return null;
                                    if(edgeData.curved) return <path key={`ideal-${edgeId}`} d={`M ${edgeData.sx} ${edgeData.sy} C ${edgeData.cx1} ${edgeData.cy1}, ${edgeData.cx2} ${edgeData.cy2}, ${edgeData.ex} ${edgeData.ey}`} className="teacher-path pointer-events-none" fill="none" />
                                    return <path key={`ideal-${edgeId}`} d={`M ${edgeData.sx} ${edgeData.sy} Q ${edgeData.cx} ${edgeData.cy} ${edgeData.ex} ${edgeData.ey}`} fill="none" className="teacher-path pointer-events-none" />
                                })}

                                {pathHistory.map((hist, idx) => {
                                    const edgeData = DIAGRAM_LAYOUT.EDGES.find(e => e.id === hist.edge);
                                    if(!edgeData) return null;
                                    if(edgeData.curved) return <path key={`hist-${idx}`} d={`M ${edgeData.sx} ${edgeData.sy} C ${edgeData.cx1} ${edgeData.cy1}, ${edgeData.cx2} ${edgeData.cy2}, ${edgeData.ex} ${edgeData.ey}`} className="neon-path pointer-events-none" fill="none" />
                                    return (
                                        <path key={`hist-${idx}`} 
                                            d={`M ${edgeData.sx} ${edgeData.sy} Q ${edgeData.cx} ${edgeData.cy} ${edgeData.ex} ${edgeData.ey}`}
                                            fill="none"
                                            className="neon-path pointer-events-none"/>
                                    );
                                })}
                            </svg>

                            {/* En Modo Difícil, el mapa entero queda borroso durante la hipótesis */}
