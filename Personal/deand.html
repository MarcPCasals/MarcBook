        // 3. MAPA DEA
        const MapScreen = ({ onNavigate }) => {
            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const userMarkerRef = useRef(null);
            
            const [userLoc, setUserLoc] = useState(null);
            const [selectedDea, setSelectedDea] = useState(null);
            const [distanceInfo, setDistanceInfo] = useState({ dist: 0, formattedDist: '--', time: 0 });

            // Calcular distància (Fórmula de Haversine)
            const getDistance = (lat1, lon1, lat2, lon2) => {
                const R = 6371; // Radi de la terra en km
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                          Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                return R * c; // Distància en km
            };

            useEffect(() => {
                // Inicialitzar mapa
                if (!mapInstance.current && mapRef.current) {
                    mapInstance.current = L.map(mapRef.current, {
                        zoomControl: false, // Sense botons de zoom com demanat
                        center: [42.5063, 1.5218], // Centre d'Andorra aprox
                        zoom: 12
                    });

                    // Estil net tipus AndorraTools
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; OpenStreetMap contributors'
                    }).addTo(mapInstance.current);

                    // Afegir Marcadors DEA amb el nou array complet
                    DEAS.forEach(dea => {
                        const icon = L.divIcon({
                            className: 'bg-transparent',
                            html: '<div class="custom-dea-marker flex items-center justify-center"><i class="fa-solid fa-heart-pulse text-white text-[10px] transform rotate-45"></i></div>',
                            iconSize: [30, 30],
                            iconAnchor: [15, 30]
                        });
                        
                        const marker = L.marker([dea.lat, dea.lng], { icon }).addTo(mapInstance.current);
                        marker.on('click', () => {
                            setSelectedDea(dea);
                        });
                    });
                }

                // GPS Tracking
                if ("geolocation" in navigator) {
                    const watchId = navigator.geolocation.watchPosition(
                        (position) => {
                            const { latitude, longitude } = position.coords;
                            const newLoc = { lat: latitude, lng: longitude };
                            setUserLoc(newLoc);

                            // Actualitzar marcador d'usuari
                            if (mapInstance.current) {
                                if (userMarkerRef.current) {
                                    userMarkerRef.current.setLatLng([latitude, longitude]);
                                } else {
                                    const userIcon = L.divIcon({
                                        className: 'bg-transparent',
                                        html: '<div class="custom-user-marker"></div>',
                                        iconSize: [20, 20],
                                        iconAnchor: [10, 10]
                                    });
                                    userMarkerRef.current = L.marker([latitude, longitude], { icon: userIcon, zIndexOffset: 1000 }).addTo(mapInstance.current);
                                    mapInstance.current.setView([latitude, longitude], 14); // Centrar primer cop
                                }
                            }
                        },
                        (error) => console.log("Error GPS", error),
                        { enableHighAccuracy: true, maximumAge: 0 }
                    );
                    return () => navigator.geolocation.clearWatch(watchId);
                }
            }, []);

            // Calcular distància i temps quan se selecciona un DEA
            useEffect(() => {
                if (userLoc && selectedDea) {
                    const distKm = getDistance(userLoc.lat, userLoc.lng, selectedDea.lat, selectedDea.lng);
                    const distMeters = Math.round(distKm * 1000);
                    const timeMins = Math.round((distKm / 5) * 60); // Aprox 5km/h caminant
                    
                    // Formatar la distància segons la distància calculada
                    let formattedDist = '--';
                    if (distMeters < 1000) {
                        formattedDist = `${distMeters} m`;
                    } else {
                        formattedDist = `${distKm.toFixed(1).replace('.', ',')} km`;
                    }

                    setDistanceInfo({ dist: distMeters, formattedDist, time: timeMins });
                }
            }, [selectedDea, userLoc]);

            const handleCenterUser = () => {
                if (userLoc && mapInstance.current) {
                    mapInstance.current.setView([userLoc.lat, userLoc.lng], 15);
                }
            };

            const handleNearestDea = () => {
                if (!userLoc) return alert("Activa el GPS per trobar el DEA més proper");
                let nearest = DEAS[0];
                let minDist = getDistance(userLoc.lat, userLoc.lng, nearest.lat, nearest.lng);
                
                DEAS.forEach(dea => {
                    const d = getDistance(userLoc.lat, userLoc.lng, dea.lat, dea.lng);
                    if (d < minDist) {
                        minDist = d;
                        nearest = dea;
                    }
                });
                
                setSelectedDea(nearest);
                if (mapInstance.current) {
                    mapInstance.current.setView([nearest.lat, nearest.lng], 16);
                }
            };

            const openRoute = () => {
                if (!userLoc || !selectedDea) return;
                const url = `https://www.google.com/maps/dir/?api=1&origin=${userLoc.lat},${userLoc.lng}&destination=${selectedDea.lat},${selectedDea.lng}&travelmode=walking`;
                window.open(url, '_blank');
            };

            return (
                <div className="w-screen h-screen flex flex-col bg-white animate-fade-in relative">
                    {/* Header Top */}
                    <div className="absolute top-4 left-4 z-[1000] flex gap-2">
                        <button onClick={() => onNavigate('home')} className="bg-brand-black text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg active:scale-95">
                            <i className="fa-solid fa-arrow-left text-xl"></i>
                        </button>
                    </div>

                    <div className="absolute top-4 right-4 z-[1000]">
                        <div className="bg-white px-4 py-2 rounded-full shadow-lg font-gothic text-3xl tracking-widest text-brand-blue border-2 border-brand-blue">
                            DEA MAP
                        </div>
                    </div>

                    {/* Mapa */}
                    <div ref={mapRef} className="flex-1 w-full z-0"></div>

                    {/* Botons Flotants Mapa */}
                    <div className="absolute bottom-40 right-4 z-[1000] flex flex-col gap-4">
                        <button onClick={handleCenterUser} className="bg-white text-brand-black w-14 h-14 rounded-full flex items-center justify-center shadow-xl border-2 border-gray-200 active:scale-95">
                            <i className="fa-solid fa-location-crosshairs text-2xl"></i>
                        </button>
                        <button onClick={handleNearestDea} className="bg-brand-blue text-white w-14 h-14 rounded-full flex items-center justify-center shadow-xl active:scale-95 border-2 border-white">
                            <i className="fa-solid fa-bolt text-2xl"></i>
                        </button>
                    </div>

                    {/* Targeta Inferior DEA Seleccionat */}
                    <div className={`absolute bottom-0 w-full bg-white rounded-t-3xl shadow-[0_-10px_20px_rgba(0,0,0,0.1)] p-6 z-[1000] transition-transform duration-300 ${selectedDea ? 'translate-y-0' : 'translate-y-full'}`}>
                        {selectedDea && (
                            <div className="flex flex-col gap-4">
                                <div className="flex justify-between items-start">
                                    <div className="flex-1 pr-4">
                                        <h2 className="font-gothic text-4xl text-brand-black leading-none">{selectedDea.name}</h2>
                                        <p className="text-gray-600 font-semibold mt-1 text-sm"><i className="fa-solid fa-location-dot text-brand-blue mr-2"></i>{selectedDea.address}</p>
                                    </div>
                                    <button onClick={() => setSelectedDea(null)} className="text-gray-400 hover:text-black">
                                        <i className="fa-solid fa-times text-2xl"></i>
                                    </button>
                                </div>

                                <div className="bg-gray-50 p-4 rounded-xl flex flex-col gap-3">
                                    <div className="flex items-center gap-3">
                                        <i className="fa-solid fa-ruler text-gray-500 text-xl w-6 text-center"></i>
                                        <span className="font-bold text-2xl text-brand-black">{userLoc ? distanceInfo.formattedDist : '--'}</span>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <i className="fa-solid fa-person-walking text-brand-blue text-xl w-6 text-center"></i>
                                        <span className="font-bold text-2xl text-brand-black">{userLoc ? `${distanceInfo.time} min caminant` : '--'}</span>
                                    </div>
                                </div>

                                <button onClick={openRoute} className="w-full bg-brand-red text-white font-gothic text-5xl py-4 rounded-2xl shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-3 tracking-widest uppercase mt-2">
                                    <i className="fa-solid fa-route"></i> ANAR-HI
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // 4. PROTOCOL ABCDE (MENÚ PRINCIPAL)
        const AbcdeScreen = ({ onNavigate, onSelectLetter }) => {
            return (
                <div className="w-screen h-screen flex flex-col bg-white animate-fade-in px-6 py-8">
                    <div className="flex items-center mb-8 relative">
                        <button onClick={() => onNavigate('home')} className="text-brand-black w-12 h-12 flex items-center justify-center active:scale-95 absolute left-0">
                            <i className="fa-solid fa-arrow-left text-3xl"></i>
                        </button>
                        <h1 className="font-gothic text-6xl text-brand-black w-full text-center tracking-widest">A B C D E</h1>
                    </div>

                    <div className="flex-1 flex flex-col gap-4">
                        <button onClick={() => onSelectLetter('A')} className="flex-1 bg-brand-blue rounded-2xl flex items-center justify-center shadow-md active:scale-95">
                            <span className="font-gothic text-5xl text-white tracking-wider">A - VIA AÈRIA</span>
                        </button>
                        <button onClick={() => onSelectLetter('B')} className="flex-1 bg-brand-green rounded-2xl flex items-center justify-center shadow-md active:scale-95">
                            <span className="font-gothic text-5xl text-white tracking-wider">B - RESPIRACIÓ</span>
                        </button>
                        <button onClick={() => onSelectLetter('C')} className="flex-1 bg-brand-red rounded-2xl flex items-center justify-center shadow-md active:scale-95">
                            <span className="font-gothic text-5xl text-white tracking-wider">C - CIRCULACIÓ</span>
                        </button>
                        <button onClick={() => onSelectLetter('D')} className="flex-1 bg-brand-orange rounded-2xl flex items-center justify-center shadow-md active:scale-95">
                            <span className="font-gothic text-5xl text-white tracking-wider">D - DISCAPACITAT</span>
                        </button>
                        <button onClick={() => onSelectLetter('E')} className="flex-1 bg-brand-purple rounded-2xl flex items-center justify-center shadow-md active:scale-95">
                            <span className="font-gothic text-5xl text-white tracking-wider">E - EXPOSICIÓ</span>
                        </button>
                    </div>
                </div>
            );
        };

        // UI Helpers for Details
        const InfoBox = ({ text, color }) => (
            <div className="bg-gray-50 rounded-xl p-4 mb-6 border-l-4 shadow-sm" style={{ borderColor: color }}>
                <h3 className="font-gothic text-2xl mb-1 tracking-wide" style={{ color: color }}>QUAN FER-HO?</h3>
                <p className="text-gray-700 font-medium">{text}</p>
            </div>
        );

        const SectionHeader = ({ title, color }) => (
            <h2 className="font-gothic text-3xl mb-3 flex items-center gap-2 border-b-2 pb-1 mt-6" style={{ borderColor: color, color: color }}>
                {title}
            </h2>
        );
        
        const ListItem = ({ icon, text, subtitle, details }) => {
            const [expanded, setExpanded] = useState(false);
            
            return (
                <div className="mb-3 bg-gray-50 rounded-xl overflow-hidden border border-gray-100 shadow-sm">
                    <button
                        onClick={() => setExpanded(!expanded)}
                        className="w-full flex items-start gap-3 p-4 text-left active:bg-gray-100 transition-colors"
                    >
                        <span className="text-2xl shrink-0 mt-0.5">{icon}</span>
                        <div className="flex-1">
                            <span className="font-bold text-lg leading-tight uppercase text-brand-black block">{text}</span>
                            {subtitle && <span className="text-gray-600 text-sm block mt-0.5">{subtitle}</span>}
                        </div>
                        {details && details.length > 0 && (
                            <i className={`fa-solid fa-chevron-${expanded ? 'up' : 'down'} text-gray-400 mt-1 transition-transform`}></i>
                        )}
                    </button>
                    
                    {expanded && details && details.length > 0 && (
                        <div className="p-4 pt-0 pl-14 bg-gray-50">
                            <ul className="list-disc list-outside text-gray-700 space-y-1.5 marker:text-brand-black">
                                {details.map((d, i) => (
                                    <li key={i} className="text-sm font-medium">{d}</li>
                                ))}
                            </ul>
                        </div>
                    )}
                </div>
            );
        };

        // 5. DETALLS LLETRES AMB EL NOU CONTINGUT
        const DetailA = () => (
            <div className="p-4">
                <InfoBox text="Quan la persona no pot respirar bé, s’ofega o no pot parlar." color="#0066CC" />
                
                <SectionHeader title="COMPROVA" color="#0066CC" />
                <ListItem 
                    icon="😮‍💨" 
                    text="LI COSTA RESPIRAR" 
                    subtitle="Mira si respira amb dificultat."
                    details={["Mira si obre bé la boca", "Escolta sorolls estranys", "Observa si s’agafa el coll"]} 
                />
                <ListItem 
                    icon="🚫" 
                    text="NO RESPIRA" 
                    subtitle="Comprova si entra aire."
                    details={["Apropa l’orella a la boca", "Mira si el pit es mou", "Truca al 112 immediatament"]} 
                />

                <SectionHeader title="QUÈ FER" color="#0066CC" />
                <ListItem 
                    icon="↩️" 
                    text="OBRIR VIA AÈRIA" 
                    subtitle="Obrir la respiració."
                    details={["Inclina el cap enrere", "Aixeca el mentó", "Vigila si torna a respirar"]} 
                />
            </div>
        );

        const DetailB = () => (
            <div className="p-4">
                <InfoBox text="Després d’obrir la via aèria, mira si respira normalment." color="#009933" />
                
                <SectionHeader title="COMPROVA" color="#009933" />
                <ListItem 
                    icon="👀" 
                    text="EL PIT ES MOU" 
                    subtitle="Mira si respira."
                    details={["Observa el pit durant uns segons", "Mira si puja i baixa normalment"]} 
                />
                <ListItem 
                    icon="🥶" 
                    text="COLOR BLAUÓS" 
                    subtitle="Mira llavis i cara."
                    details={["Comprova si els llavis són blaus", "Mira si la pell està morada o pàl·lida"]} 
                />

                <SectionHeader title="QUÈ FER" color="#009933" />
                <ListItem 
                    icon="💨" 
                    text="DONAR OXIGEN" 
                    subtitle="Si tens oxigen disponible."
                    details={["Col·loca mascareta", "Ajuda a respirar millor"]} 
                />
            </div>
        );

        const DetailC = () => (
            <div className="p-4">
                <InfoBox text="Mira si té pols, sang o està molt dèbil." color="#E62E2D" />
                
                <SectionHeader title="COMPROVA" color="#E62E2D" />
                <ListItem 
                    icon="💓" 
                    text="TÉ POLS" 
                    subtitle="Comprova si el cor batega."
                    details={["Toca el coll o el canell", "Busca batecs durant 10 segons"]} 
                />
                <ListItem 
                    icon="🩸" 
                    text="SAGNAT" 
                    subtitle="Busca sang visible."
                    details={["Mira braços, cames i roba", "Pressiona la ferida si sagna molt"]} 
                />

                <SectionHeader title="QUÈ FER" color="#E62E2D" />
                <ListItem 
                    icon="❤️‍🩹" 
                    text="INICIAR RCP" 
                    subtitle="Si no té pols."
                    details={["Col·loca mans al centre del pit", "Comença compressions fortes i ràpides", "Utilitza DEA si n’hi ha"]} 
                />
            </div>
        );

        const DetailD = () => (
            <div className="p-4">
                <InfoBox text="Mira si respon o actua de forma estranya." color="#FF8C00" />
                
                <SectionHeader title="COMPROVA" color="#FF8C00" />
                <ListItem 
                    icon="🗣️" 
                    text="RESPON?" 
                    subtitle="Parla-li."
                    details={["Pregunta si et sent", "Mira si obre els ulls", "Observa si es mou"]} 
                />
                <ListItem 
                    icon="⚡" 
                    text="CONVULSIONS" 
                    subtitle="Moviments bruscos."
                    details={["Retira objectes del voltant", "Protegeix el cap", "No el subjectis fort"]} 
                />

                <SectionHeader title="QUÈ FER" color="#FF8C00" />
                <ListItem 
                    icon="🧠" 
                    text="CONTROLAR CONSCIÈNCIA" 
                    subtitle="Vigila si empitjora."
                    details={["Continua parlant-li", "Vigila respiració", "Truca al 112 si no respon"]} 
                />
            </div>
        );

        const DetailE = () => (
            <div className="p-4">
                <InfoBox text="Quan la persona està més estable." color="#800080" />
                
                <SectionHeader title="COMPROVA" color="#800080" />
                <ListItem 
                    icon="🔍" 
                    text="LESIONS" 
                    subtitle="Busca ferides o cops."
                    details={["Revisa cap, braços i cames", "Busca deformacions o sang"]} 
                />
                <ListItem 
                    icon="🌡️" 
                    text="TEMPERATURA" 
                    subtitle="Mira si té fred o calor extrema."
                    details={["Toca la pell", "Tapa’l si té fred"]} 
                />

                <SectionHeader title="QUÈ FER" color="#800080" />
                <ListItem 
                    icon="📋" 
                    text="OPUMA" 
                    subtitle="Preguntes importants sobre la persona."
                    details={[
                        "QUÈ ÉS OPUMA? Una manera ràpida d’obtenir informació important del pacient.",
                        "O – OCÓRRER: Què ha passat? (Ex: Ha caigut? Li fa mal el pit? Ha perdut el coneixement?)",
                        "P – PROBLEMES / MALALTIES: Té alguna malaltia? (Ex: Diabetis, Asma, Problemes del cor)"
                    ]} 
                />
            </div>
        );

        const LetterDetailScreen = ({ letter, onBack }) => {
            const config = {
                'A': { title: "A - VIA AÈRIA", color: "bg-brand-blue", comp: <DetailA /> },
                'B': { title: "B - RESPIRACIÓ", color: "bg-brand-green", comp: <DetailB /> },
                'C': { title: "C - CIRCULACIÓ", color: "bg-brand-red", comp: <DetailC /> },
                'D': { title: "D - DISCAPACITAT", color: "bg-brand-orange", comp: <DetailD /> },
                'E': { title: "E - EXPOSICIÓ", color: "bg-brand-purple", comp: <DetailE /> },
            }[letter];

            return (
                <div className="w-screen h-screen flex flex-col bg-white animate-fade-in relative overflow-hidden">
                    {/* Header Colorejat */}
                    <div className={`${config.color} p-6 pb-4 shadow-md z-10 flex items-center shrink-0`}>
                        <button onClick={onBack} className="text-white text-3xl active:scale-95 pr-4">
                            <i className="fa-solid fa-arrow-left"></i>
                        </button>
                        <h1 className="font-gothic text-5xl text-white tracking-widest pt-2">{config.title}</h1>
                    </div>
                    {/* Contingut Scrolleable */}
                    <div className="flex-1 overflow-y-auto bg-white pb-10">
                        {config.comp}
                    </div>
                </div>
            );
        };

        // --- APP CONTROLLER ---
        const App = () => {
            const [screen, setScreen] = useState('splash'); // splash, home, map, abcde, detail
            const [selectedLetter, setSelectedLetter] = useState(null);

            const navigate = (newScreen) => {
                setScreen(newScreen);
                window.scrollTo(0,0);
            };

            const openLetter = (letter) => {
                setSelectedLetter(letter);
                navigate('detail');
            };

            return (
                <div className="font-sans antialiased bg-white min-h-screen w-full select-none">
                    {screen === 'splash' && <SplashScreen onFinish={() => navigate('home')} />}
                    {screen === 'home' && <HomeScreen onNavigate={navigate} />}
                    {screen === 'map' && <MapScreen onNavigate={navigate} />}
                    {screen === 'abcde' && <AbcdeScreen onNavigate={navigate} onSelectLetter={openLetter} />}
                    {screen === 'detail' && <LetterDetailScreen letter={selectedLetter} onBack={() => navigate('abcde')} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
